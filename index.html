<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Labverse Speed Test - Check your IP and network speed with stunning cosmic animations.">
  <meta name="keywords" content="Public IP, Speed Test, Fibonacci, Quantum Particles">
  <meta name="author" content="Labverse Team">
  <meta property="og:title" content="Labverse Speed Test">
  <meta property="og:description" content="Discover your public IP and test your network speed with mesmerizing sacred geometry animations.">
  <meta property="og:image" content="/assets/labverse-og-image.png">
  <meta property="og:url" content="https://labverse.co.za">
  <meta name="twitter:card" content="summary_large_image">
  <title>Labverse Speed Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Source+Code_Pro&family=Exo+2:wght@400;700&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --matrix-blue: #00b7eb;
      --cosmic-magenta: #ff00cc;
      --cosmic-cyan: #00f2fe;
      --light-aura: #e6f0ff;
      --dark-bg: #070b1a;
      --card-bg: rgba(13, 20, 43, 0.7);
      --glow-radius: 15px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Source Code Pro', monospace;
    }

    html, body {
      height: 100vh;
      width: 100%;
      background: var(--dark-bg);
      color: var(--light-aura);
      overflow: hidden; /* Disable scrolling */
    }

    #vanta-bg {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      z-index: 1;
      opacity: 0.5;
    }

    #background-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      opacity: 0.8;
    }

    .container {
      position: relative;
      z-index: 10;
      height: 100vh;
      width: 90%;
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0.5rem;
    }

    header {
      padding: 0.5rem 0;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      text-transform: uppercase;
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 15px var(--cosmic-cyan); }
      to { text-shadow: 0 0 30px var(--cosmic-magenta); }
    }

    .ip-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      width: 100%;
      max-width: 400px;
    }

    .ip-label {
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(0.6rem, 1vw, 0.8rem);
      color: #8492b4;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    .ip-display {
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(1.2rem, 3vw, 2rem);
      color: var(--light-aura);
      background: var(--card-bg);
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      border: 1px solid rgba(79, 172, 254, 0.3);
      box-shadow: 0 0 15px var(--matrix-blue);
      word-break: break-all;
    }

    .copy-btn {
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      color: var(--dark-bg);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      text-transform: uppercase;
      box-shadow: 0 0 20px rgba(73, 115, 255, 0.4);
      transition: all 0.3s ease;
    }

    .copy-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(73, 115, 255, 0.6);
    }

    .network-info {
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(0.6rem, 1vw, 0.8rem);
      color: #8492b4;
      max-width: 300px;
      line-height: 1.4;
      margin-bottom: 0.5rem;
    }

    .error-message {
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(0.6rem, 1vw, 0.8rem);
      color: #ff5555;
      margin-top: 0.5rem;
      display: none;
    }

    .speed-test-card {
      background: var(--card-bg);
      border-radius: 15px;
      padding: 1rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), 0 0 50px rgba(73, 115, 255, 0.15) inset;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(79, 172, 254, 0.3);
      width: 100%;
      max-height: calc(100vh - 150px); /* Fit within viewport */
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .test-type {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1rem, 2vw, 1.5rem);
      text-align: center;
      margin-bottom: 0.5rem;
      color: #00f2fe;
    }

    .progress-bar {
      height: 6px;
      width: 100%;
      background: rgba(13, 25, 50, 0.7);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }

    .progress {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      border-radius: 3px;
      transition: width 0.3s linear;
      box-shadow: 0 0 10px rgba(73, 115, 255, 0.6);
    }

    .speedometer {
      position: relative;
      width: clamp(150px, 50vw, 250px);
      height: clamp(75px, 25vw, 125px);
      margin: 0 auto 2rem;
    }

    .speedometer-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .speed-value {
      position: absolute;
      bottom: -1rem;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(1rem, 2vw, 1.5rem);
      font-weight: 700;
      color: #e0e0ff;
      z-index: 5;
      text-shadow: 0 0 10px rgba(73, 115, 255, 0.8);
    }

    .speed-unit {
      position: absolute;
      bottom: -2rem;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(0.5rem, 0.8vw, 0.7rem);
      color: #8492b4;
      z-index: 5;
    }

    .graph-container {
      position: relative;
      height: 120px;
      margin: 0.5rem 0;
      background: rgba(13, 25, 50, 0.5);
      border-radius: 8px;
      padding: 10px;
    }

    .graph-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .results {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .result-box {
      text-align: center;
      padding: 0.5rem;
      border-radius: 8px;
      background: rgba(13, 25, 50, 0.7);
      flex: 1;
      min-width: 100px;
      border: 1px solid rgba(79, 172, 254, 0.2);
    }

    .result-label {
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(0.6rem, 1vw, 0.8rem);
      color: #8492b4;
      margin-bottom: 0.3rem;
    }

    .result-value {
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(0.8rem, 1.5vw, 1.2rem);
      font-weight: bold;
      color: #e0e0ff;
    }

    .button-container {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      margin-top: 1rem;
      margin-bottom: 1rem; /* Added to prevent button being cut off */
    }

    .start-button, .test-again-button {
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      border: none;
      color: var(--dark-bg);
      padding: 0.5rem 1.5rem;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      font-weight: bold;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(73, 115, 255, 0.4);
    }

    .start-button:hover, .test-again-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(73, 115, 255, 0.6);
    }

    .start-button:active, .test-again-button:active {
      transform: translateY(1px);
    }

    .hidden {
      display: none;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 0.5rem;
    }

    .loading img {
      width: 32px;
      height: 32px;
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(7, 11, 26, 0.95);
      z-index: 100;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      padding: 1rem;
    }

    .overlay.active {
      display: flex;
    }

    .overlay iframe {
      width: 100%;
      height: 80%;
      max-width: 900px;
      border: none;
      border-radius: 8px;
    }

    .close-button {
      background: linear-gradient(90deg, #ff5555, #ff7777);
      border: none;
      color: var(--light-aura);
      padding: 0.5rem 1.5rem;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      font-weight: bold;
      border-radius: 20px;
      cursor: pointer;
      margin-top: 1rem;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(255, 85, 85, 0.4);
    }

    .close-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(255, 85, 85, 0.6);
    }

    footer {
      position: absolute;
      bottom: 0.3rem;
      width: 100%;
      text-align: center;
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(0.5rem, 0.8vw, 0.7rem);
      color: #8492b4;
      z-index: 10;
    }

    footer a {
      color: #00f2fe;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .container { padding: 0.3rem; }
      h1 { font-size: clamp(1.2rem, 4vw, 2rem); }
      .ip-display { font-size: clamp(1rem, 2.5vw, 1.5rem); }
      .network-info { font-size: clamp(0.5rem, 0.8vw, 0.7rem); }
      .speedometer { width: clamp(120px, 40vw, 180px); height: clamp(60px, 20vw, 90px); }
      .graph-container { height: 100px; }
      .loading img { width: 24px; height: 24px; }
    }

    @media (max-width: 480px) {
      h1 { font-size: clamp(1rem, 3vw, 1.5rem); }
      .ip-container { gap: 0.3rem; }
      .ip-display { font-size: clamp(0.8rem, 2vw, 1.2rem); }
      .results { flex-direction: column; }
      .result-box { width: 100%; min-width: unset; }
    }
  </style>
</head>
<body>
  <div id="vanta-bg"></div>
  <canvas id="background-canvas"></canvas>

  <div class="container">
    <header>
      <h1>Labverse Speed Test</h1>
    </header>
    <div class="ip-container">
      <div class="ip-label">YOUR PUBLIC IP IS</div>
      <div class="ip-display" id="ip-display" aria-live="polite">Fetching IP...</div>
      <button class="copy-btn" id="copy-ip-btn" aria-label="Copy IP address">Copy IP</button>
    </div>
    <div class="network-info" id="network-info" aria-live="polite">Fetching network info...</div>
    <div class="error-message" id="error-message">Error fetching data</div>
    <div class="speed-test-card">
      <div class="test-type" id="test-type">Speed Test</div>
      <div class="progress-bar">
        <div class="progress" id="progress-bar"></div>
      </div>
      <div class="speedometer">
        <canvas class="speedometer-canvas" id="speedometer-canvas"></canvas>
        <div class="speed-value" id="speed-value">0</div>
        <div class="speed-unit">Mbps</div>
      </div>
      <div class="graph-container hidden" id="graph-container">
        <canvas class="graph-canvas" id="graph-canvas"></canvas>
      </div>
      <div class="results hidden" id="results-container">
        <div class="result-box">
          <div class="result-label">Download</div>
          <div class="result-value" id="download-result">0 Mbps</div>
        </div>
        <div class="result-box">
          <div class="result-label">Ping</div>
          <div class="result-value" id="ping-result">0 ms</div>
        </div>
      </div>
      <div class="button-container">
        <button class="start-button" id="start-button">Start Test</button>
        <button class="test-again-button hidden" id="test-again-button">Test Again</button>
      </div>
      <div class="loading hidden" id="loading">
        <img src="/assets/loading.svg" alt="Loading" class="animate-spin">
      </div>
    </div>
    <!-- AdSense Placeholder: Insert AdSense code here for future integration -->
  </div>

  <div class="overlay" id="overlay">
    <iframe id="speed-frame" src=""></iframe>
    <button class="close-button" id="close-overlay">Close</button>
  </div>

  <footer>
    © 2025 Labverse | Powered by <a href="https://onefar.co.za" target="_blank" rel="noopener">1FAR</a>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.net.min.js"></script>
  <script>
    // Initialize Vanta.js background
    VANTA.NET({
      el: "#vanta-bg",
      mouseControls: true,
      touchControls: true,
      minHeight: 200,
      minWidth: 200,
      scale: 1,
      scaleMobile: 1,
      color: 0x00ffff,
      backgroundColor: 0x070b1a,
      points: 10,
      maxDistance: 20,
      spacing: 15
    });

    // Utility Functions
    const log = (message) => console.log('[DEBUG] ' + message);

    const copyToClipboard = (text) => {
      navigator.clipboard.writeText(text).catch(() => {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
      });
    };

    // Particle Animations
    let particles = [];
    let mousePos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    const particleCanvas = document.getElementById('background-canvas');
    const particleCtx = particleCanvas.getContext('2d');

    function resizeParticleCanvas() {
      particleCanvas.width = window.innerWidth * devicePixelRatio;
      particleCanvas.height = window.innerHeight * devicePixelRatio;
      particleCtx.scale(devicePixelRatio, devicePixelRatio);
    }
    resizeParticleCanvas();

    document.addEventListener('mousemove', (e) => {
      mousePos.x = e.clientX;
      mousePos.y = e.clientY;
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      if (e.touches.length > 0) {
        mousePos.x = e.touches[0].clientX;
        mousePos.y = e.touches[0].clientY;
      }
    }, { passive: true });

    function createParticle(index) {
      const phi = (1 + Math.sqrt(5)) / 2;
      const theta = index * 2 * Math.PI * phi;
      const r = Math.sqrt(index) * 10;
      return {
        x: window.innerWidth / 2 + r * Math.cos(theta),
        y: window.innerHeight / 2 + r * Math.sin(theta),
        vx: (Math.random() - 0.5) * 2,
        vy: (Math.random() - 0.5) * 2,
        life: 600,
        color: `hsl(${Math.random() * 360}, 70%, 70%)`
      };
    }

    function initParticles() {
      particles = Array.from({ length: 15 }, (_, i) => createParticle(i));
    }
    initParticles();

    function triggerBigBang() {
      particles = Array.from({ length: 30 }, (_, i) => {
        const theta = i * 2 * Math.PI * ((1 + Math.sqrt(5)) / 2);
        const r = Math.sqrt(i) * 15;
        return {
          x: window.innerWidth / 2,
          y: window.innerHeight / 2,
          vx: r * Math.cos(theta) * 0.05,
          vy: r * Math.sin(theta) * 0.05,
          life: 300,
          color: `hsl(${Math.random() * 360}, 70%, 70%)`
        };
      });
    }

    function animateParticles() {
      particleCtx.clearRect(0, 0, particleCanvas.width / devicePixelRatio, particleCanvas.height / devicePixelRatio);
      particles = particles.filter(p => {
        if (p.life <= 0) return false;
        p.life--;
        p.x += p.vx + (mousePos.x - window.innerWidth / 2) * 0.0001;
        p.y += p.vy + (mousePos.y - window.innerHeight / 2) * 0.0001;
        p.vx *= 0.98;
        p.vy *= 0.98;
        particleCtx.beginPath();
        particleCtx.arc(p.x, p.y, 2, 0, Math.PI * 2);
        particleCtx.fillStyle = p.color;
        particleCtx.globalAlpha = p.life / 600;
        particleCtx.fill();
        return true;
      });

      if (particles.length < 15 && Math.random() < 0.1) {
        particles.push(createParticle(particles.length));
      }

      particleCtx.globalAlpha = 1;
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    window.addEventListener('resize', () => {
      resizeParticleCanvas();
      initParticles();
    }, { passive: true });

    // IP and Location Fetch
    async function fetchIP() {
      const ipDisplay = document.getElementById('ip-display');
      try {
        const response = await fetch('https://api.ipify.org?format=json', { signal: AbortSignal.timeout(5000) });
        if (!response.ok) throw new Error('Network error');
        const data = await response.json();
        ipDisplay.textContent = data.ip;
        return data.ip;
      } catch (error) {
        ipDisplay.textContent = 'N/A';
        document.getElementById('error-message').textContent = 'Failed to fetch IP';
        document.getElementById('error-message').classList.remove('hidden');
        log('IP fetch error: ' + error.message);
        return 'N/A';
      }
    }

    async function fetchLocationInfo() {
      const networkInfo = document.getElementById('network-info');
      try {
        let response = await fetch('https://ip-api.com/json/?fields=status,message,country,city,isp', { signal: AbortSignal.timeout(5000) });
        let data = await response.json();
        if (data.status !== 'success') throw new Error(data.message || 'Failed to fetch location info');
        const info = {
          isp: data.isp || 'N/A',
          city: data.city || 'N/A',
          country: data.country || 'N/A'
        };
        networkInfo.innerHTML = `ISP: ${info.isp}<br>Location: ${info.city}, ${info.country}`;
        return info;
      } catch (error) {
        log('ip-api.com fetch error: ' + error.message);
        try {
          const response = await fetch('https://ipinfo.io/json', { signal: AbortSignal.timeout(5000) });
          const data = await response.json();
          const info = {
            isp: data.org || 'N/A',
            city: data.city || 'N/A',
            country: data.country || 'N/A'
          };
          networkInfo.innerHTML = `ISP: ${info.isp}<br>Location: ${info.city}, ${info.country}`;
          return info;
        } catch (fallbackError) {
          networkInfo.innerHTML = `ISP: N/A<br>Location: N/A`;
          document.getElementById('error-message').textContent = 'Failed to fetch network info';
          document.getElementById('error-message').classList.remove('hidden');
          log('ipinfo.io fetch error: ' + fallbackError.message);
          return { isp: 'N/A', city: 'N/A', country: 'N/A' };
        }
      }
    }

    // Speedometer - IMPROVED to show all values
    function drawSpeedometer(speed) {
      const canvas = document.getElementById('speedometer-canvas');
      const ctx = canvas.getContext('2d');
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      canvas.width = width * devicePixelRatio;
      canvas.height = height * devicePixelRatio;
      ctx.scale(devicePixelRatio, devicePixelRatio);

      ctx.clearRect(0, 0, width, height);
      const maxSpeed = 1000; // Match graph range
      const logMax = Math.log10(maxSpeed + 1);
      const logSpeed = Math.log10(speed + 1);
      const angle = (logSpeed / logMax) * Math.PI;
      const centerX = width / 2;
      const centerY = height;
      const radius = Math.min(width / 2, height) * 0.9;

      // Background arc
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius, Math.PI, 2 * Math.PI);
      const bgGradient = ctx.createLinearGradient(0, 0, width, 0);
      bgGradient.addColorStop(0, 'rgba(73, 115, 255, 0.2)');
      bgGradient.addColorStop(1, 'rgba(0, 242, 254, 0.2)');
      ctx.strokeStyle = bgGradient;
      ctx.lineWidth = 12;
      ctx.stroke();

      // Speed arc
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius, Math.PI, Math.PI + angle);
      const speedGradient = ctx.createLinearGradient(0, 0, width, 0);
      speedGradient.addColorStop(0, '#4facfe');
      speedGradient.addColorStop(1, '#00f2fe');
      ctx.strokeStyle = speedGradient;
      ctx.lineWidth = 12;
      ctx.stroke();

      // Glow effect
      ctx.shadowColor = 'rgba(0, 242, 254, 0.8)';
      ctx.shadowBlur = 15;
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Needle
      ctx.save();
      ctx.translate(centerX, centerY);
      ctx.rotate(Math.PI + angle);
      ctx.beginPath();
      ctx.moveTo(-5, 0);
      ctx.lineTo(radius - 20, 0);
      ctx.lineTo(-5, 0);
      ctx.fillStyle = '#e0e0ff';
      ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
      ctx.shadowBlur = 10;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.restore();

      // Center circle
      ctx.beginPath();
      ctx.arc(centerX, centerY, 8, 0, 2 * Math.PI);
      ctx.fillStyle = '#070b1a';
      ctx.fill();
      ctx.strokeStyle = '#00f2fe';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Speed labels on arch - IMPROVED to ensure all values are visible
      const speeds = [0, 10, 50, 100, 200, 500, 1000];
      ctx.font = `8px 'Exo 2', sans-serif`; // Increased font size
      ctx.fillStyle = '#e0e0ff';
      ctx.textAlign = 'center';
      
      speeds.forEach((s) => {
        const logS = Math.log10(s + 1);
        const tickAngle = Math.PI + (logS / logMax) * Math.PI;
        
        // Calculate position with adjusted radius to prevent overlap
        const labelRadius = radius + 15; // Reduced distance for better visibility
        const labelX = centerX + labelRadius * Math.cos(tickAngle);
        const labelY = centerY + labelRadius * Math.sin(tickAngle);
        
        // Create tick marks
        const tickStartX = centerX + (radius - 5) * Math.cos(tickAngle);
