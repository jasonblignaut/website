<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Labverse Speed Test - Check your IP and network speed with stunning cosmic animations.">
  <meta name="keywords" content="Public IP, Speed Test, Fibonacci, Quantum Particles">
  <meta name="author" content="Labverse Team">
  <meta property="og:title" content="Labverse Speed Test">
  <meta property="og:description" content="Discover your public IP and test your network speed with mesmerizing sacred geometry animations.">
  <meta property="og:image" content="/assets/labverse-og-image.png">
  <meta property="og:url" content="https://labverse.co.za">
  <meta name="twitter:card" content="summary_large_image">
  <title>Labverse Speed Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Source+Code+Pro&family=Exo+2:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --matrix-blue: #00b7eb;
      --cosmic-magenta: #ff00cc;
      --cosmic-cyan: #00f2fe;
      --light-aura: #e6f0ff;
      --dark-bg: #070b1a;
      --card-bg: rgba(13, 20, 43, 0.7);
      --glow-radius: 15px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Source Code Pro', monospace;
    }

    html, body {
      height: 100vh;
      width: 100%;
      background: var(--dark-bg);
      color: var(--light-aura);
      overflow-x: hidden;
    }

    #vanta-bg {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      z-index: 1;
      opacity: 0.5;
    }

    #background-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      opacity: 0.8;
    }

    .container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      width: 90%;
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      text-align: center;
      padding: 1rem 0.5rem;
      gap: 0.5rem;
    }

    header {
      padding: 0.3rem 0;
      margin-bottom: 0.3rem;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.2rem, 4vw, 2rem);
      text-transform: uppercase;
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 15px var(--cosmic-cyan); }
      to { text-shadow: 0 0 30px var(--cosmic-magenta); }
    }

    .ip-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      margin-bottom: 0.5rem;
      width: 100%;
      max-width: 400px;
    }

    .ip-label {
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(0.5rem, 1vw, 0.7rem);
      color: #8492b4;
      margin-bottom: 0.3rem;
      text-transform: uppercase;
    }

    .ip-display {
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      color: var(--light-aura);
      background: var(--card-bg);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid rgba(79, 172, 254, 0.3);
      box-shadow: 0 0 15px var(--matrix-blue);
      word-break: break-all;
    }

    .copy-btn {
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      color: var(--dark-bg);
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.6rem, 1.2vw, 0.8rem);
      text-transform: uppercase;
      box-shadow: 0 0 20px rgba(73, 115, 255, 0.4);
      transition: all 0.3s ease;
    }

    .copy-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(73, 115, 255, 0.6);
    }

    .network-info {
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(0.5rem, 1vw, 0.7rem);
      color: #8492b4;
      max-width: 300px;
      line-height: 1.4;
      margin-bottom: 0.5rem;
    }

    .error-message {
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(0.5rem, 1vw, 0.7rem);
      color: #ff5555;
      margin-top: 0.3rem;
      display: none;
    }

    .speed-test-card {
      background: var(--card-bg);
      border-radius: 15px;
      padding: 1rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), 0 0 50px rgba(73, 115, 255, 0.15) inset;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(79, 172, 254, 0.3);
      width: 100%;
      overflow: visible; /* Remove scroll box */
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .test-type {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.9rem, 2vw, 1.2rem);
      text-align: center;
      margin-bottom: 0.5rem;
      color: #00f2fe;
    }

    .progress-bar {
      height: 5px;
      width: 100%;
      background: rgba(13, 25, 50, 0.7);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .progress {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      border-radius: 3px;
      transition: width 0.3s linear;
      box-shadow: 0 0 10px rgba(73, 115, 255, 0.6);
    }

    .speedometer {
      position: relative;
      width: clamp(200px, 60vw, 300px);
      height: clamp(100px, 30vw, 150px);
      margin: 0 auto 2rem;
      visibility: visible;
    }

    .speedometer-canvas {
      width: 100%;
      height: 100%;
      display: block;
      visibility: visible;
    }

    .speed-value {
      position: absolute;
      bottom: -2rem;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.2rem, 2.5vw, 1.8rem);
      font-weight: 700;
      color: #e0e0ff;
      z-index: 5;
      text-shadow: 0 0 10px rgba(73, 115, 255, 0.8);
    }

    .speed-unit {
      position: absolute;
      bottom: -3rem;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(0.6rem, 1vw, 0.8rem);
      color: #8492b4;
      z-index: 5;
    }

    .graph-container {
      position: relative;
      height: 180px;
      width: 100%;
      margin: 1rem 0 1.5rem;
      background: rgba(13, 25, 50, 0.5);
      border-radius: 8px;
      padding: 10px;
    }

    .graph-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .results {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      gap: 0.5rem;
      margin-top: 0.5rem;
      width: 100%;
    }

    .result-box {
      text-align: center;
      padding: 0.8rem;
      border-radius: 8px;
      background: rgba(13, 25, 50, 0.7);
      flex: 1;
      min-width: 100px;
      border: 1px solid rgba(79, 172, 254, 0.2);
    }

    .result-label {
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(0.6rem, 1.2vw, 0.8rem);
      color: #8492b4;
      margin-bottom: 0.4rem;
    }

    .result-value {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.9rem, 1.8vw, 1.2rem);
      font-weight: bold;
      color: #e0e0ff;
    }

    .button-container {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.5rem;
      margin-bottom: 0.8rem;
      width: 100%;
    }

    .start-button, .test-again-button {
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      border: none;
      color: var(--dark-bg);
      padding: 0.5rem 1.5rem;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.7rem, 1.4vw, 0.9rem);
      font-weight: bold;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(73, 115, 255, 0.4);
      min-width: 120px;
    }

    .start-button:hover, .test-again-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(73, 115, 255, 0.6);
    }

    .start-button:active, .test-again-button:active {
      transform: translateY(1px);
    }

    .hidden {
      display: none !important;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 0.3rem;
    }

    .loading img {
      width: 24px;
      height: 24px;
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(7, 11, 26, 0.95);
      z-index: 100;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      padding: 1rem;
    }

    .overlay.active {
      display: flex;
    }

    .overlay iframe {
      width: 100%;
      height: 80%;
      max-width: 900px;
      border: none;
      border-radius: 8px;
    }

    .close-button {
      background: linear-gradient(90deg, #ff5555, #ff7777);
      border: none;
      color: var(--light-aura);
      padding: 0.4rem 1.2rem;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.6rem, 1.2vw, 0.8rem);
      font-weight: bold;
      border-radius: 20px;
      cursor: pointer;
      margin-top: 0.8rem;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(255, 85, 85, 0.4);
    }

    .close-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(255, 85, 85, 0.6);
    }

    footer {
      position: relative;
      width: 100%;
      text-align: center;
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(0.4rem, 0.8vw, 0.6rem);
      color: #8492b4;
      padding: 1rem 0;
      margin-top: auto;
    }

    footer a {
      color: #00f2fe;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    .fade-out {
      animation: fadeOut 1s ease-in-out forwards;
    }

    @media (max-width: 768px) {
      .container {
        padding-top: 1rem;
        padding-bottom: 1rem;
        justify-content: flex-start;
        min-height: 100vh;
      }
      
      h1 {
        font-size: clamp(1rem, 3vw, 1.5rem);
      }
      
      .ip-container {
        gap: 0.2rem;
        margin-bottom: 0.5rem;
      }
      
      .ip-display {
        font-size: clamp(0.8rem, 2vw, 1.2rem);
        padding: 0.4rem 0.8rem;
      }
      
      .network-info {
        font-size: clamp(0.4rem, 0.8vw, 0.6rem);
        margin-bottom: 0.5rem;
      }
      
      .speed-test-card {
        padding: 0.8rem;
      }
      
      .speedometer {
        width: clamp(150px, 70vw, 250px);
        height: clamp(75px, 35vw, 125px);
        margin-bottom: 3rem;
      }
      
      .speed-value {
        font-size: clamp(1rem, 2vw, 1.5rem);
        bottom: -2rem;
      }
      
      .speed-unit {
        font-size: clamp(0.5rem, 0.8vw, 0.7rem);
        bottom: -2.8rem;
      }
      
      .graph-container {
        height: 140px;
        margin: 1.5rem 0;
      }
      
      .button-container {
        flex-direction: row;
        gap: 0.8rem;
        margin-top: 1rem;
      }
      
      .start-button, .test-again-button {
        font-size: clamp(0.6rem, 1.2vw, 0.8rem);
        padding: 0.4rem 1rem;
        min-width: 100px;
      }
    }

    @media (max-width: 480px) {
      .container {
        width: 95%;
        padding: 0.8rem 0.3rem;
      }
      
      .speed-test-card {
        padding: 0.6rem;
      }
      
      .speedometer {
        width: 180px;
        height: 90px;
        margin-bottom: 3.5rem;
      }
      
      .button-container {
        flex-direction: column;
        gap: 0.5rem;
        align-items: center;
      }
      
      .start-button, .test-again-button {
        width: 90%;
      }
      
      .result-box {
        padding: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <div id="vanta-bg"></div>
  <canvas id="background-canvas"></canvas>

  <div class="container">
    <header>
      <h1>Labverse Speed Test</h1>
    </header>
    <div class="ip-container">
      <div class="ip-label">YOUR PUBLIC IP IS</div>
      <div class="ip-display" id="ip-display" aria-live="polite">Fetching IP...</div>
      <button class="copy-btn" id="copy-ip-btn" aria-label="Copy IP address">COPY IP</button>
    </div>
    <div class="network-info" id="network-info" aria-live="polite">Fetching network info...</div>
    <div class="error-message" id="error-message">Error fetching data</div>
    <div class="speed-test-card">
      <div class="test-type" id="test-type">Testing Download Speed</div>
      <div class="progress-bar">
        <div class="progress" id="progress-bar"></div>
      </div>
      <div class="speedometer">
        <canvas class="speedometer-canvas" id="speedometer-canvas"></canvas>
        <div class="speed-value" id="speed-value">0.0</div>
        <div class="speed-unit">Mbps</div>
      </div>
      <div class="graph-container hidden" id="graph-container">
        <canvas class="graph-canvas" id="graph-canvas"></canvas>
      </div>
      <div class="results hidden" id="results-container">
        <div class="result-box">
          <div class="result-label">Download</div>
          <div class="result-value" id="download-result">0 Mbps</div>
        </div>
        <div class="result-box">
          <div class="result-label">Ping</div>
          <div class="result-value" id="ping-result">0 ms</div>
        </div>
      </div>
      <div class="button-container">
        <button class="start-button" id="start-button">Start Test</button>
        <button class="test-again-button hidden" id="test-again-button">Test Again</button>
      </div>
      <div class="loading hidden" id="loading">
        <img src="/assets/loading.svg" alt="Loading" class="animate-spin">
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <iframe id="speed-frame" src=""></iframe>
    <button class="close-button" id="close-overlay">Close</button>
  </div>

  <footer>
    © 2025 Labverse | Powered by <a href="https://onefar.co.za" target="_blank" rel="noopener">1FAR</a>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.net.min.js"></script>
  <script>
    // Initialize Vanta.js background
    VANTA.NET({
      el: "#vanta-bg",
      mouseControls: true,
      touchControls: true,
      minHeight: 200,
      minWidth: 200,
      scale: 1,
      scaleMobile: 1,
      color: 0x00ffff,
      backgroundColor: 0x070b1a,
      points: 10,
      maxDistance: 20,
      spacing: 15
    });

    // Utility Functions
    const log = (message) => console.log('[DEBUG] ' + message);

    const copyToClipboard = (text) => {
      navigator.clipboard.writeText(text).catch(() => {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
      });
    };

    // Particle Animations
    let particles = [];
    let mousePos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    const particleCanvas = document.getElementById('background-canvas');
    const particleCtx = particleCanvas.getContext('2d');
    const devicePixelRatio = window.devicePixelRatio || 1;

    function resizeParticleCanvas() {
      particleCanvas.width = window.innerWidth * devicePixelRatio;
      particleCanvas.height = window.innerHeight * devicePixelRatio;
      particleCtx.scale(devicePixelRatio, devicePixelRatio);
    }
    resizeParticleCanvas();

    document.addEventListener('mousemove', (e) => {
      mousePos.x = e.clientX;
      mousePos.y = e.clientY;
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      if (e.touches.length > 0) {
        mousePos.x = e.touches[0].clientX;
        mousePos.y = e.touches[0].clientY;
      }
    }, { passive: true });

    function createParticle(index) {
      const phi = (1 + Math.sqrt(5)) / 2;
      const theta = index * 2 * Math.PI * phi;
      const r = Math.sqrt(index) * 10;
      return {
        x: window.innerWidth / 2 + r * Math.cos(theta),
        y: window.innerHeight / 2 + r * Math.sin(theta),
        vx: (Math.random() - 0.5) * 2,
        vy: (Math.random() - 0.5) * 2,
        life: 600,
        color: `hsl(${Math.random() * 360}, 70%, 70%)`
      };
    }

    function initParticles() {
      particles = Array.from({ length: 15 }, (_, i) => createParticle(i));
    }
    initParticles();

    function triggerBigBang() {
      particles = Array.from({ length: 30 }, (_, i) => {
        const theta = i * 2 * Math.PI * ((1 + Math.sqrt(5)) / 2);
        const r = Math.sqrt(i) * 15;
        return {
          x: window.innerWidth / 2,
          y: window.innerHeight / 2,
          vx: r * Math.cos(theta) * 0.05,
          vy: r * Math.sin(theta) * 0.05,
          life: 300,
          color: `hsl(${Math.random() * 360}, 70%, 70%)`
        };
      });
    }

    function animateParticles() {
      particleCtx.clearRect(0, 0, particleCanvas.width / devicePixelRatio, particleCanvas.height / devicePixelRatio);
      particles = particles.filter(p => {
        if (p.life <= 0) return false;
        p.life--;
        p.x += p.vx + (mousePos.x - window.innerWidth / 2) * 0.0001;
        p.y += p.vy + (mousePos.y - window.innerHeight / 2) * 0.0001;
        p.vx *= 0.98;
        p.vy *= 0.98;
        particleCtx.beginPath();
        particleCtx.arc(p.x, p.y, 2, 0, Math.PI * 2);
        particleCtx.fillStyle = p.color;
        particleCtx.globalAlpha = p.life / 600;
        particleCtx.fill();
        return true;
      });

      if (particles.length < 15 && Math.random() < 0.1) {
        particles.push(createParticle(particles.length));
      }

      particleCtx.globalAlpha = 1;
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    window.addEventListener('resize', () => {
      resizeParticleCanvas();
      initParticles();
      // Redraw speedometer and graph on resize
      drawSpeedometer(parseFloat(document.getElementById('speed-value').textContent) || 0);
      drawGraph();
    }, { passive: true });

    // IP and Location Fetch
    async function fetchIP() {
      const ipDisplay = document.getElementById('ip-display');
      try {
        const response = await fetch('https://api.ipify.org?format=json', { signal: AbortSignal.timeout(5000) });
        if (!response.ok) throw new Error('Network error');
        const data = await response.json();
        ipDisplay.textContent = data.ip;
        return data.ip;
      } catch (error) {
        ipDisplay.textContent = 'N/A';
        document.getElementById('error-message').textContent = 'Failed to fetch IP';
        document.getElementById('error-message').style.display = 'block';
        log('IP fetch error: ' + error.message);
        return 'N/A';
      }
    }

    async function fetchLocationInfo() {
      const networkInfo = document.getElementById('network-info');
      try {
        let response = await fetch('https://ip-api.com/json/?fields=status,message,country,city,isp', { signal: AbortSignal.timeout(5000) });
        let data = await response.json();
        if (data.status !== 'success') throw new Error(data.message || 'Failed to fetch location info');
        const info = {
          isp: data.isp || 'N/A',
          city: data.city || 'N/A',
          country: data.country || 'N/A'
        };
        networkInfo.innerHTML = `ISP: ${info.isp}<br>Location: ${info.city}, ${info.country}`;
        return info;
      } catch (error) {
        log('ip-api.com fetch error: ' + error.message);
        try {
          const response = await fetch('https://ipinfo.io/json', { signal: AbortSignal.timeout(5000) });
          const data = await response.json();
          const info = {
            isp: data.org || 'N/A',
            city: data.city || 'N/A',
            country: data.country || 'N/A'
          };
          networkInfo.innerHTML = `ISP: ${info.isp}<br>Location: ${info.city}, ${info.country}`;
          return info;
        } catch (fallbackError) {
          networkInfo.innerHTML = `ISP: N/A<br>Location: N/A`;
          document.getElementById('error-message').textContent = 'Failed to fetch network info';
          document.getElementById('error-message').style.display = 'block';
          log('ipinfo.io fetch error: ' + fallbackError.message);
          return { isp: 'N/A', city: 'N/A', country: 'N/A' };
        }
      }
    }

    // Speedometer
    function drawSpeedometer(speed) {
      const canvas = document.getElementById('speedometer-canvas');
      const ctx = canvas.getContext('2d');
      if (!ctx) {
        log('Speedometer canvas context not available');
        return;
      }
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      canvas.width = width * devicePixelRatio;
      canvas.height = height * devicePixelRatio;
      ctx.scale(devicePixelRatio, devicePixelRatio);

      ctx.clearRect(0, 0, width, height);
      const maxSpeed = 1000;
      const logMax = Math.log10(maxSpeed + 1);
      const logSpeed = Math.log10(speed + 1);
      const angle = (logSpeed / logMax) * Math.PI;
      const centerX = width / 2;
      const centerY = height;
      const radius = Math.min(width / 2, height) * 0.85;
      
      // Draw background arc
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius, Math.PI, 2 * Math.PI);
      const bgGradient = ctx.createLinearGradient(0, 0, width, 0);
      bgGradient.addColorStop(0, 'rgba(73, 115, 255, 0.2)');
      bgGradient.addColorStop(1, 'rgba(0, 242, 254, 0.2)');
      ctx.strokeStyle = bgGradient;
      ctx.lineWidth = 12;
      ctx.stroke();

      // Draw speed arc
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius, Math.PI, Math.PI + angle);
      const speedGradient = ctx.createLinearGradient(0, 0, width, 0);
      speedGradient.addColorStop(0, '#4facfe');
      speedGradient.addColorStop(1, '#00f2fe');
      ctx.strokeStyle = speedGradient;
      ctx.lineWidth = 12;
      ctx.stroke();

      // Add glow effect
      ctx.shadowColor = 'rgba(0, 242, 254, 0.8)';
      ctx.shadowBlur = 15;
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Draw needle
      ctx.save();
      ctx.translate(centerX, centerY);
      ctx.rotate(Math.PI + angle);
      ctx.beginPath();
      ctx.moveTo(-5, 0);
      ctx.lineTo(radius - 20, 0);
      ctx.lineTo(0, -5);
      ctx.fillStyle = '#e0e0ff';
      ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
      ctx.shadowBlur = 10;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.restore();

      // Draw center circle
      ctx.beginPath();
      ctx.arc(centerX, centerY, 8, 0, 2 * Math.PI);
      ctx.fillStyle = '#070b1a';
      ctx.fill();
      ctx.strokeStyle = '#00f2fe';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Draw speed scale and labels
      const speeds = [0, 10, 50, 100, 200, 500, 1000];
      ctx.font = `10px 'Exo 2', sans-serif`;
      ctx.fillStyle = '#e0e0ff';
      ctx.textAlign = 'center';
      
      speeds.forEach((s) => {
        const logS = Math.log10(s + 1);
        const tickAngle = Math.PI + (logS / logMax) * Math.PI;
        
        // Calculate positions for label placement
        const labelRadius = radius + 15;
        const labelX = centerX + labelRadius * Math.cos(tickAngle);
        const labelY = centerY + labelRadius * Math.sin(tickAngle);
        
        // Draw tick marks
        const tickStartRadius = radius - 5;
        const tickEndRadius = radius + 5;
        const tickStartX = centerX + tickStartRadius * Math.cos(tickAngle);
        const tickStartY = centerY + tickStartRadius * Math.sin(tickAngle);
        const tickEndX = centerX + tickEndRadius * Math.cos(tickAngle);
        const tickEndY = centerY + tickEndRadius * Math.sin(tickAngle);
        
        ctx.beginPath();
        ctx.moveTo(tickStartX, tickStartY);
        ctx.lineTo(tickEndX, tickEndY);
        ctx.strokeStyle = '#8492b4';
        ctx.lineWidth = 1;
        ctx.stroke();
        
        // Adjust label position for better readability
        ctx.fillText(s, labelX, labelY + 4);
      });
    }

    function animateSpeedometer(targetSpeed) {
      let currentSpeed = parseFloat(document.getElementById('speed-value').textContent) || 0;
      const step = (targetSpeed - currentSpeed) / 30;
      
      function update() {
        currentSpeed += step;
        if (Math.abs(currentSpeed - targetSpeed) < 0.1) currentSpeed = targetSpeed;
        document.getElementById('speed-value').textContent = currentSpeed.toFixed(1);
        drawSpeedometer(currentSpeed);
        if (Math.abs(currentSpeed - targetSpeed) >= 0.1) {
          requestAnimationFrame(update);
        }
      }
      requestAnimationFrame(update);
    }

    // Graph
    let graphData = [];
    function drawGraph() {
      const canvas = document.getElementById('graph-canvas');
      const ctx = canvas.getContext('2d');
      if (!ctx) {
        log('Graph canvas context not available');
        return;
      }
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      canvas.width = width * devicePixelRatio;
      canvas.height = height * devicePixelRatio;
      ctx.scale(devicePixelRatio, devicePixelRatio);

      ctx.clearRect(0, 0, width, height);
      const maxSpeed = 1000;
      const maxTime = 30;
      const padding = { left: 50, right: 20, top: 20, bottom: 35 };

      // Draw axes
      ctx.beginPath();
      ctx.moveTo(padding.left, padding.top);
      ctx.lineTo(padding.left, height - padding.bottom);
      ctx.lineTo(width - padding.right, height - padding.bottom);
      ctx.strokeStyle = 'rgba(73, 115, 255, 0.4)';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Draw grid lines and Y-axis labels (logarithmic scale)
      const speedLevels = [0, 10, 50, 100, 200, 500, 1000];
      const logMax = Math.log10(maxSpeed + 1);
      ctx.font = `10px 'Exo 2', sans-serif`;
      ctx.fillStyle = '#8492b4';
      ctx.textAlign = 'right';
      
      speedLevels.forEach((level) => {
        const logLevel = Math.log10(level + 1);
        const y = (height - padding.bottom) - (logLevel / logMax) * (height - padding.top - padding.bottom);
        
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(width - padding.right, y);
        ctx.strokeStyle = 'rgba(73, 115, 255, 0.1)';
        ctx.stroke();
        
        ctx.fillText(level, padding.left - 5, y + 4);
      });

      // Draw X-axis labels
      ctx.textAlign = 'center';
      ctx.fillStyle = '#8492b4';
      for (let t = 0; t <= maxTime; t += 6) {
        const x = padding.left + (t / maxTime) * (width - padding.left - padding.right);
        ctx.fillText(t, x, height - padding.bottom + 15);
      }

      // Plot data
      if (graphData.length > 0) {
        ctx.beginPath();
        let startX = padding.left;
        let startY = height - padding.bottom;
        
        if (graphData[0].speed > 0) {
          startY = (height - padding.bottom) - (Math.log10(graphData[0].speed + 1) / logMax) * (height - padding.top - padding.bottom);
        }
        
        ctx.moveTo(startX, startY);
        
        graphData.forEach((point) => {
          const x = padding.left + (point.time / maxTime) * (width - padding.left - padding.right);
          const y = (height - padding.bottom) - (Math.log10(point.speed + 1) / logMax) * (height - padding.top - padding.bottom);
          ctx.lineTo(x, y);
        });
        
        ctx.strokeStyle = '#00f2fe';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // Add glow effect to the line
        ctx.shadowColor = 'rgba(0, 242, 254, 0.8)';
        ctx.shadowBlur = 8;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
      
      // Add axis labels
      ctx.font = `12px 'Exo 2', sans-serif`;
      ctx.fillStyle = '#e0e0ff';
      ctx.textAlign = 'center';
      ctx.fillText('Time (seconds)', width / 2, height - 5);
      
      ctx.save();
      ctx.translate(15, height / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.textAlign = 'center';
      ctx.fillText('Speed (Mbps)', 0, 0);
      ctx.restore();
    }

    function updateGraph(time, speed) {
      graphData.push({ time, speed });
      if (graphData.length > 300) graphData.shift();
      drawGraph();
    }

    function resetGraph() {
      graphData = [{ time: 0, speed: 0 }];
      drawGraph();
    }

    function animateGraphEnd() {
      const canvas = document.getElementById('graph-canvas');
      canvas.classList.add('fade-out');
    }

    // Speed Test
    const CONFIG = {
      testServer: {
        downloadUrl: '/assets/25mb.bin',
        pingResource: '/assets/ping-test.txt',
      },
      testDurations: { download: 30000, ping: 5000 },
      maxTestTimeout: 35000,
    };

    function initializeSpeedTest() {
      const startButton = document.getElementById('start-button');
      const testAgainButton = document.getElementById('test-again-button');
      const progressBar = document.getElementById('progress-bar');
      const testType = document.getElementById('test-type');
      const speedValue = document.getElementById('speed-value');
      const graphContainer = document.getElementById('graph-container');
      const resultsContainer = document.getElementById('results-container');
      const downloadResult = document.getElementById('download-result');
      const pingResult = document.getElementById('ping-result');
      const loading = document.getElementById('loading');
      const overlay = document.getElementById('overlay');
      const speedFrame = document.getElementById('speed-frame');
      const closeOverlay = document.getElementById('close-overlay');

      let testActive = false;
      let controller = null;
      let finalDownloadSpeed = 0;
      let finalPing = 0;

      async function runPingTest() {
        testType.textContent = 'Testing Ping';
        const pingTimes = [];
        for (let i = 0; i < 15; i++) {
          if (!testActive) break;
          try {
            const start = performance.now();
            await fetch(`${CONFIG.testServer.pingResource}?t=${Date.now()}`, { cache: 'no-store', signal: AbortSignal.timeout(2000) });
            const ping = performance.now() - start;
            pingTimes.push(ping);
            log(`Ping #${i + 1}: ${ping.toFixed(2)}ms`);
          } catch (error) {
            pingTimes.push(999);
            log(`Ping #${i + 1} failed: ${error.message}`);
          }
          await new Promise(resolve => setTimeout(resolve, 333));
        }
        const successfulPings = pingTimes.filter(t => t !== 999);
        finalPing = successfulPings.length ? successfulPings.reduce((sum, t) => sum + t, 0) / successfulPings.length : 999;
        pingResult.textContent = `${finalPing.toFixed(0)} ms`;
      }

      async function runDownloadTest() {
        testType.textContent = 'Testing Download Speed';
        let totalBytes = 0;
        const startTime = performance.now();
        const overallTimeout = setTimeout(() => {
          testActive = false;
          if (controller) controller.abort();
          finalizeTest();
        }, CONFIG.maxTestTimeout);

        try {
          controller = new AbortController();
          const response = await fetch(CONFIG.testServer.downloadUrl, { cache: 'no-store', signal: controller.signal });
          if (!response.ok) throw new Error('Failed to fetch download resource');
          const reader = response.body.getReader();
          let lastUpdate = startTime;

          while (testActive) {
            const { done, value } = await reader.read();
            if (done || !testActive) {
              controller.abort();
              break;
            }
            totalBytes += value ? value.length : 0;
            const elapsed = (performance.now() - startTime) / 1000;
            if (performance.now() - lastUpdate >= 100) {
              const speed = ((totalBytes * 8) / elapsed) / (1024 * 1024);
              progressBar.style.width = `${(elapsed / (CONFIG.testDurations.download / 1000)) * 100}%`;
              speedValue.textContent = speed.toFixed(1);
              animateSpeedometer(speed);
              updateGraph(elapsed, speed);
              lastUpdate = performance.now();
            }
            if (elapsed >= CONFIG.testDurations.download / 1000) {
              controller.abort();
              break;
            }
          }
        } catch (error) {
          log('Download error: ' + error.message);
          throw error;
        } finally {
          clearTimeout(overallTimeout);
          controller = null;
        }

        const totalTime = (performance.now() - startTime) / 1000;
        finalDownloadSpeed = totalTime > 0 ? ((totalBytes * 8) / totalTime) / (1024 * 1024) : 0;
        downloadResult.textContent = `${finalDownloadSpeed.toFixed(1)} Mbps`;
      }

      function finalizeTest() {
        if (!finalDownloadSpeed && !finalPing) {
          document.getElementById('error-message').textContent = 'Speed test failed. Please try again.';
          document.getElementById('error-message').style.display = 'block';
          startButton.textContent = 'Start Test';
        } else {
          resultsContainer.classList.remove('hidden');
          startButton.textContent = 'More Info';
          testAgainButton.classList.remove('hidden');
          triggerBigBang();
          setTimeout(() => {
            // Keep the speedometer showing the final result
            animateGraphEnd();
          }, 1500);
        }
        startButton.disabled = false;
        testActive = false;
        loading.classList.add('hidden');
      }

      async function runTest() {
        testActive = true;
        startButton.disabled = true;
        startButton.textContent = 'Testing...';
        testAgainButton.classList.add('hidden');
        loading.classList.remove('hidden');
        progressBar.style.width = '0';
        speedValue.textContent = '0.0';
        animateSpeedometer(0);
        resetGraph();
        graphContainer.classList.remove('hidden');
        resultsContainer.classList.add('hidden');
        document.getElementById('error-message').style.display = 'none';

        try {
          await runPingTest();
          if (testActive) await runDownloadTest();
          if (testActive) finalizeTest();
        } catch (error) {
          log('Test error: ' + error.message);
          finalizeTest();
        }
      }

      drawSpeedometer(0);
      drawGraph();

      startButton.addEventListener('click', () => {
        if (startButton.textContent === 'More Info') {
          speedFrame.src = 'https://speed.cloudflare.com';
          overlay.classList.add('active');
        } else {
          runTest();
        }
      });

      testAgainButton.addEventListener('click', runTest);

      closeOverlay.addEventListener('click', () => {
        overlay.classList.remove('active');
        speedFrame.src = '';
      });

      window.addEventListener('beforeunload', () => {
        testActive = false;
        if (controller) controller.abort();
      });
    }

    // Main Initialization
    document.addEventListener('DOMContentLoaded', async () => {
      initializeSpeedTest();
      const ip = await fetchIP();
      await fetchLocationInfo();
      document.getElementById('copy-ip-btn').addEventListener('click', () => {
        if (ip !== 'N/A') {
          copyToClipboard(ip);
          triggerBigBang();
        }
      });
    });
  </script>
</body>
