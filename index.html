    <style>
        :root {
            --matrix-blue: #00b7eb;
            --cosmic-magenta: #ff00cc;
            --void-black: #08081a;
            --light-aura: #e6f0ff;
            --glow-radius: 15px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Exo 2', sans-serif;
        }

        body {
            background: var(--void-black);
            color: var(--light-aura);
            overflow: hidden;
            position: relative;
        }

        /* Main Content */
        .main {
            height: 100vh;
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            grid-template-rows: 200px 1fr 200px;
            align-items: center;
            justify-items: center;
            padding: 1.5rem;
            position: relative;
            z-index: 1;
        }

        .ip-container {
            grid-column: 2;
            grid-row: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ip-container h1 {
            font-family: 'Space Mono', monospace;
            font-size: clamp(2rem, 5vw, 4rem);
            background: linear-gradient(90deg, var(--matrix-blue), var(--cosmic-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            text-shadow: 0 0 12px var(--matrix-blue);
        }

        .ip-display {
            font-family: 'Space Mono', monospace;
            font-size: clamp(1.8rem, 4vw, 3rem);
            color: var(--light-aura);
            background: rgba(8, 8, 26, 0.85);
            padding: 1rem 2.5rem;
            border-radius: 12px;
            border: 2px solid var(--matrix-blue);
            box-shadow: 0 0 15px var(--matrix-blue);
            margin-bottom: 0.5rem;
            text-shadow: 0 0 8px var(--matrix-blue);
        }

        .network-info {
            font-family: 'Space Mono', monospace;
            font-size: clamp(0.8rem, 1.5vw, 1rem);
            color: var(--light-aura);
            max-width: 400px;
            line-height: 1.4;
            text-shadow: 0 0 5px var(--matrix-blue);
            text-align: center;
        }

        .copy-button {
            background: linear-gradient(90deg, var(--matrix-blue), var(--cosmic-magenta));
            color: var(--light-aura);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            text-transform: uppercase;
            box-shadow: 0 0 var(--glow-radius) var(--matrix-blue);
            transition: all 0.2s;
            margin-top: 0.5rem;
        }

        .copy-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 calc(var(--glow-radius) * 1.5) var(--matrix-blue);
        }

        /* Ad Blocks */
        .ad-block {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ad-top {
            grid-column: 1 / 4;
            grid-row: 1;
            width: 100%;
            height: 100%;
            min-height: 90px;
        }

        .ad-bottom {
            grid-column: 1 / 4;
            grid-row: 3;
            width: 100%;
            height: 100%;
            min-height: 90px;
        }

        .ad-left {
            grid-column: 1;
            grid-row: 2;
            width: 100%;
            height: 100%;
            min-width: 160px;
        }

        .ad-right {
            grid-column: 3;
            grid-row: 2;
            width: 100%;
            height: 100%;
            min-width: 160px;
        }

        /* Background Canvas */
        #background-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Footer */
        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(8, 8, 26, 0.95);
            padding: 1rem;
            text-align: center;
            z-index: 1001;
        }

        footer p {
            color: var(--light-aura);
            font-size: 0.9rem;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .main {
                grid-template-columns: 1fr;
                grid-template-rows: 100px 1fr 100px;
            }

            .ip-container h1 {
                font-size: clamp(1.8rem, 4vw, 2.5rem);
            }

            .ip-display {
                font-size: clamp(1.5rem, 3vw, 2rem);
                padding: 0.8rem 1.5rem;
            }

            .network-info {
                font-size: clamp(0.7rem, 1.2vw, 0.9rem);
            }

            .copy-button {
                padding: 0.6rem 1.5rem;
                font-size: 0.9rem;
            }

            .ad-left, .ad-right {
                display: none;
            }

            .ad-top, .ad-bottom {
                min-height: 50px;
            }
        }
    </style>
</head>
<body>
    <canvas id="background-canvas"></canvas>
    <section class="main">
        <!-- AdSense Leaderboard (Top) -->
        <div class="ad-block ad-top">
            <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1234567890123456" crossorigin="anonymous"></script>
            <ins class="adsbygoogle" style="display:inline-block;width:728px;height:90px" data-ad-client="ca-pub-1234567890123456" data-ad-slot="1234567890"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
        <!-- AdSense Skyscraper (Left) -->
        <div class="ad-block ad-left">
            <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1234567890123456" crossorigin="anonymous"></script>
            <ins class="adsbygoogle" style="display:inline-block;width:160px;height:600px" data-ad-client="ca-pub-1234567890123456" data-ad-slot="1234567891"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
        <!-- IP and Network Info -->
        <div class="ip-container">
            <h1>Your Public IP Address</h1>
            <div class="ip-display" id="ip-display">Fetching IP...</div>
            <div class="network-info" id="network-info">Fetching network info...</div>
            <button class="copy-button" onclick="copyIP()">Copy IP</button>
        </div>
        <!-- AdSense Skyscraper (Right) -->
        <div class="ad-block ad-right">
            <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1234567890123456" crossorigin="anonymous"></script>
            <ins class="adsbygoogle" style="display:inline-block;width:160px;height:600px" data-ad-client="ca-pub-1234567890123456" data-ad-slot="1234567892"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
        <!-- AdSense Leaderboard (Bottom) -->
        <div class="ad-block ad-bottom">
            <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1234567890123456" crossorigin="anonymous"></script>
            <ins class="adsbygoogle" style="display:inline-block;width:728px;height:90px" data-ad-client="ca-pub-1234567890123456" data-ad-slot="1234567893"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
    </section>
    <footer>
        <p>© 2025 Labverse.co.za | Powered by AI, Math & Cosmic Precision</p>
    </footer>

    <script>
        // Fetch Public IP
        async function fetchPublicIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                document.getElementById('ip-display').textContent = data.ip;
            } catch (error) {
                document.getElementById('ip-display').textContent = 'IP unavailable';
                console.error('IP Fetch Error:', error);
            }
        }

        // Fetch Network Info with Fallback
        async function fetchNetworkInfo() {
            try {
                // Primary API: ipinfo.io
                const response = await fetch('https://ipinfo.io/json?token=your-ipinfo-token'); // Replace with your ipinfo.io token
                if (!response.ok) throw new Error('ipinfo.io failed');
                const data = await response.json();
                const dns = data.hostname || 'N/A';
                const isp = data.org || 'N/A';
                const city = data.city || 'N/A';
                const country = data.country || 'N/A';
                document.getElementById('network-info').textContent = `Hostname: ${dns} | ISP: ${isp} | Location: ${city}, ${country}`;
            } catch (error) {
                console.error('Network Info Error:', error);
                // Fallback: ip-api.com (no token required)
                try {
                    const fallback = await fetch('http://ip-api.com/json');
                    const fallbackData = await fallback.json();
                    const dns = fallbackData.hostname || 'N/A';
                    const isp = fallbackData.isp || 'N/A';
                    const city = fallbackData.city || 'N/A';
                    const country = fallbackData.country || 'N/A';
                    document.getElementById('network-info').textContent = `Hostname: ${dns} | ISP: ${isp} | Location: ${city}, ${country}`;
                } catch (fallbackError) {
                    document.getElementById('network-info').textContent = 'Network info unavailable';
                    console.error('Fallback Error:', fallbackError);
                }
            }
        }

        // Initialize Fetch
        fetchPublicIP();
        fetchNetworkInfo();

        // Copy IP to Clipboard
        function copyIP() {
            const ip = document.getElementById('ip-display').textContent;
            navigator.clipboard.writeText(ip).then(() => {
                alert('IP copied to clipboard!');
            }).catch(err => {
                console.error('Copy Error:', err);
            });
        }

        // Background Animation
        function initBackground() {
            const canvas = document.getElementById('background-canvas');
            if (!canvas.getContext('webgl') && !canvas.getContext('experimental-webgl')) {
                console.error('WebGL not supported');
                return;
            }
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            camera.position.z = 20; // Increased for larger view

            let spirals = [], particles = [], trails = [], mousePos = { x: 0, y: 0 };

            // Mouse Interaction
            document.addEventListener('mousemove', (e) => {
                mousePos.x = (e.clientX / window.innerWidth) * 2 - 1;
                mousePos.y = -(e.clientY / window.innerHeight) * 2 + 1;
            }, { passive: true });

            // Golden Spiral
            function createSpiral(offset, scale) {
                const phi = (1 + Math.sqrt(5)) / 2;
                const points = [];
                for (let i = 0; i < 30; i++) { // Increased points for visibility
                    const theta = i * 0.3 + offset; // Wider spacing
                    const r = Math.pow(phi, theta / Math.PI) * scale * 1.5; // Larger scale
                    points.push(new THREE.Vector3(r * Math.cos(theta), r * Math.sin(theta), 0));
                }
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const material = new THREE.LineBasicMaterial({ color: 0xff00cc, transparent: true, opacity: 0.8, linewidth: 2 }); // Bolder
                const spiral = new THREE.Line(geometry, material);
                scene.add(spiral);
                return { obj: spiral, life: 10, offset, scale };
            }

            // Fibonacci Particles
            function createParticle(index, offset) {
                const fib = (n) => n <= 1 ? n : fib(n - 1) + fib(n - 2);
                const r = fib(index) * 0.15; // Larger radius
                const x = r * Math.cos(index + offset);
                const y = r * Math.sin(index + offset);
                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.Float32BufferAttribute([x, y, Math.random() * 0.1], 3));
                const material = new THREE.PointsMaterial({ color: 0x00b7eb, size: 0.1, transparent: true, opacity: 0.9 }); // Larger, brighter
                const particle = new THREE.Points(geometry, material);
                scene.add(particle);
                return { obj: particle, life: 10, index, offset };
            }

            // Connecting Trails
            function createTrail(from, to, color) {
                const points = [from, to];
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const material = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.6, linewidth: 1.5 }); // Bolder
                const trail = new THREE.Line(geometry, material);
                scene.add(trail);
                return { obj: trail, life: 10 };
            }

            // Initialize Animations
            function initAnimations() {
                spirals.push(createSpiral(Math.random() * 2 * Math.PI, 0.2 + Math.random() * 0.1)); // Larger scale
                for (let i = 0; i < 15; i++) { // More particles
                    particles.push(createParticle(i % 5, Math.random() * 2 * Math.PI));
                }
            }
            initAnimations();

            function updateAnimations() {
                spirals = spirals.filter(s => {
                    if (s.life <= 0) { scene.remove(s.obj); return false; }
                    s.life -= 1 / 60;
                    s.obj.material.opacity = s.life / 10 * 0.8;
                    s.obj.rotation.z += 0.01 * (Math.random() - 0.5); // More dynamic
                    s.obj.position.x = mousePos.x * 0.2;
                    s.obj.position.y = mousePos.y * 0.2;
                    return true;
                });

                particles = particles.filter(p => {
                    if (p.life <= 0) { scene.remove(p.obj); return false; }
                    p.life -= 1 / 60;
                    p.obj.material.opacity = p.life / 10 * 0.9;
                    p.obj.position.x += (Math.random() - 0.5) * 0.02 + mousePos.x * 0.01;
                    p.obj.position.y += (Math.random() - 0.5) * 0.02 + mousePos.y * 0.01;
                    return true;
                });

                trails = trails.filter(t => {
                    if (t.life <= 0) { scene.remove(t.obj); return false; }
                    t.life -= 1 / 60;
                    t.obj.material.opacity = t.life / 10 * 0.6;
                    return true;
                });

                if (spirals.length < 4 && Math.random() < 0.04) {
                    spirals.push(createSpiral(Math.random() * 2 * Math.PI, 0.2 + Math.random() * 0.1));
                }
                if (particles.length < 15 && Math.random() < 0.06) {
                    particles.push(createParticle(Math.floor(Math.random() * 5), Math.random() * 2 * Math.PI));
                }

                if (trails.length < 60) {
                    particles.forEach(p => {
                        const pos = p.obj.position;
                        particles.forEach(p2 => {
                            if (p !== p2) {
                                const pos2 = p2.obj.position;
                                const dist = pos.distanceTo(pos2);
                                if (dist < 1 && Math.random() < 0.02) { // Larger distance
                                    trails.push(createTrail(pos, pos2, 0x00b7eb));
                                }
                            }
                        });
                        spirals.forEach(s => {
                            const points = s.obj.geometry.attributes.position.array;
                            for (let i = 0; i < points.length; i += 3) {
                                const spiralPos = new THREE.Vector3(points[i], points[i + 1], points[i + 2]);
                                const dist = pos.distanceTo(spiralPos);
                                if (dist < 1 && Math.random() < 0.01) {
                                    trails.push(createTrail(pos, spiralPos, 0xff00cc));
                                }
                            }
                        });
                    });
                }
            }

            function animate() {
                requestAnimationFrame(animate);
                updateAnimations();
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }, { passive: true });
        }
        initBackground();
    </script>
</body>
</html>
