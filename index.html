<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Labverse — Cyber Lab for AI, Hacking, Cybersecurity, and Future Tech Experiments. View your public IP with cosmic Fibonacci particle animations." />
  <meta name="keywords" content="Labverse, Cyber Lab, AI, Hacking, Cybersecurity, Public IP, Fibonacci, Quantum Particles, South Africa, Sandton" />
  <meta name="author" content="Labverse Team" />
  <meta property="og:title" content="Labverse | Cyber Labs of the Future" />
  <meta property="og:description" content="Discover your public IP address and network info with mesmerizing sacred geometry animations." />
  <meta property="og:image" content="https://labverse.co.za/assets/labverse-og-image.png" />
  <meta property="og:url" content="https://labverse.co.za" />
  <meta name="twitter:card" content="summary_large_image" />

  <title>Labverse | Your Public IP Address</title>

  <!-- Favicon -->
  <link rel="icon" href="favicon.ico" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Source+Code+Pro&display=swap" rel="stylesheet">

  <!-- Three.js for WebGL -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

  <!-- Style -->
  <style>
    :root {
      --matrix-blue: #00b7eb;
      --cosmic-magenta: #ff00cc;
      --cosmic-gold: #ffd700;
      --cosmic-cyan: #00ffff;
      --void-black: #08081a;
      --light-aura: #e6f0ff;
      --glow-radius: 15px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Orbitron', sans-serif;
    }

    html, body {
      height: 100%;
      background: radial-gradient(ellipse at center, #0a0a0a 0%, #000000 100%);
      color: var(--light-aura);
      overflow: hidden;
    }

    #background-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1; /* Lower z-index to ensure animations cover entire site */
    }

    .container {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: clamp(1rem, 3vw, 1.5rem);
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 3.5rem);
      background: linear-gradient(90deg, var(--matrix-blue), var(--cosmic-magenta));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: clamp(0.5rem, 2vw, 1rem);
      text-shadow: 0 0 12px var(--matrix-blue);
      animation: glow 3s infinite ease-in-out;
    }

    @keyframes glow {
      0% { text-shadow: 0 0 5px var(--matrix-blue); }
      50% { text-shadow: 0 0 20px var(--cosmic-magenta); }
      100% { text-shadow: 0 0 5px var(--matrix-blue); }
    }

    .ip-display {
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(1.5rem, 4vw, 2.8rem);
      color: var(--light-aura);
      background: rgba(8, 8, 26, 0.85);
      padding: clamp(0.8rem, 2vw, 1rem) clamp(1.5rem, 3vw, 2.5rem);
      border-radius: 12px;
      border: 2px solid var(--matrix-blue);
      box-shadow: 0 0 15px var(--matrix-blue);
      margin-bottom: clamp(0.3rem, 1vw, 0.5rem);
      text-shadow: 0 0 8px var(--matrix-blue);
      word-break: break-all;
    }

    .network-info {
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(0.7rem, 1.5vw, 1rem);
      color: var(--light-aura);
      max-width: clamp(200px, 80vw, 400px);
      line-height: 1.4;
      text-shadow: 0 0 5px var(--matrix-blue);
      margin-bottom: clamp(0.5rem, 2vw, 1rem);
    }

    .btn {
      background: linear-gradient(90deg, var(--matrix-blue), var(--cosmic-magenta));
      color: var(--light-aura);
      border: none;
      padding: clamp(0.6rem, 1.5vw, 0.8rem) clamp(1.5rem, 3vw, 2rem);
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(0.8rem, 1.5vw, 1rem);
      text-transform: uppercase;
      box-shadow: 0 0 var(--glow-radius) var(--matrix-blue);
      transition: all 0.3s ease;
      margin-top: clamp(0.3rem, 1vw, 0.5rem);
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 calc(var(--glow-radius) * 1.5) var(--cosmic-magenta);
      background: var(--cosmic-cyan);
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: transparent; /* Transparent footer for cinematic theme */
      padding: clamp(0.5rem, 2vw, 1rem);
      text-align: center;
      font-size: clamp(0.7rem, 1.5vw, 0.9rem);
      color: var(--light-aura);
      z-index: 10;
      text-shadow: 0 0 5px var(--matrix-blue);
    }

    @media (max-width: 768px) {
      .container {
        padding: clamp(0.5rem, 2vw, 1rem);
      }

      h1 {
        font-size: clamp(1.5rem, 4vw, 2.5rem);
      }

      .ip-display {
        font-size: clamp(1.2rem, 3vw, 2rem);
        padding: clamp(0.5rem, 1.5vw, 0.8rem) clamp(1rem, 2vw, 1.5rem);
      }

      .network-info {
        font-size: clamp(0.6rem, 1.2vw, 0.9rem);
        max-width: 90vw;
      }

      .btn {
        padding: clamp(0.4rem, 1vw, 0.6rem) clamp(1rem, 2vw, 1.5rem);
        font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: clamp(1.2rem, 3.5vw, 2rem);
      }

      .ip-display {
        font-size: clamp(1rem, 2.5vw, 1.5rem);
      }

      .network-info {
        font-size: clamp(0.5rem, 1vw, 0.8rem);
      }

      .btn {
        font-size: clamp(0.6rem, 1vw, 0.8rem);
      }
    }
  </style>
</head>

<body>
  <canvas id="background-canvas"></canvas>

  <div class="container">
    <h1>Labverse | Your Public IP</h1>
    <div class="ip-display" id="ip-display">Fetching IP...</div>
    <div class="network-info" id="network-info">Fetching network info...</div>
    <button class="btn" onclick="copyIP()">Copy IP</button>
  </div>

  <footer>
    © 2025 Labverse | Powered by AI, Math & Cosmic Precision 🌌
  </footer>

  <script>
    // Fetch Public IP
    async function fetchPublicIP() {
      try {
        const response = await fetch('https://api.ipify.org?format=json');
        if (!response.ok) throw new Error('IP fetch failed');
        const data = await response.json();
        document.getElementById('ip-display').textContent = data.ip;
        return data.ip;
      } catch (error) {
        document.getElementById('ip-display').textContent = 'IP unavailable';
        console.error('IP Fetch Error:', error);
        return null;
      }
    }

    // Fetch Network Info with Multiple Fallback APIs
    async function fetchNetworkInfo() {
      let networkData = { isp: 'Unknown', city: 'Unknown', country: 'Unknown' };

      // Try ip-api.com
      try {
        const response = await fetch('http://ip-api.com/json');
        if (response.ok) {
          const data = await response.json();
          if (data.status !== 'fail') {
            networkData.isp = data.isp || 'Unknown';
            networkData.city = data.city || 'Unknown';
            networkData.country = data.country || 'Unknown';
            document.getElementById('network-info').textContent = `ISP: ${networkData.isp} | Location: ${networkData.city}, ${networkData.country}`;
            return;
          }
        }
      } catch (error) {
        console.error('ip-api.com Error:', error);
      }

      // Fallback 1: ipinfo.io
      try {
        const response = await fetch('https://ipinfo.io/json');
        if (response.ok) {
          const data = await response.json();
          networkData.isp = data.org?.split(' ').slice(1).join(' ') || 'Unknown';
          networkData.city = data.city || 'Unknown';
          networkData.country = data.country || 'Unknown';
          document.getElementById('network-info').textContent = `ISP: ${networkData.isp} | Location: ${networkData.city}, ${networkData.country}`;
          return;
        }
      } catch (error) {
        console.error('ipinfo.io Error:', error);
      }

      // Fallback 2: geoip-js.com
      try {
        const response = await fetch('https://get.geojs.io/v1/ip/geo.json');
        if (response.ok) {
          const data = await response.json();
          networkData.isp = data.organization_name || 'Unknown';
          networkData.city = data.city || 'Unknown';
          networkData.country = data.country || 'Unknown';
          document.getElementById('network-info').textContent = `ISP: ${networkData.isp} | Location: ${networkData.city}, ${networkData.country}`;
          return;
        }
      } catch (error) {
        console.error('geoip-js.com Error:', error);
      }

      // Final Fallback
      document.getElementById('network-info').textContent = `ISP: Unknown | Location: Unknown`;
    }

    // Initialize Fetch
    fetchPublicIP();
    fetchNetworkInfo();

    // WebGL Background Animation
    let scene, camera, renderer, particles = [], trails = [], mousePos = { x: 0, y: 0 };

    function initBackground() {
      const canvas = document.getElementById('background-canvas');
      if (!canvas.getContext('webgl') && !canvas.getContext('experimental-webgl')) {
        console.error('WebGL not supported');
        document.getElementById('network-info').textContent = 'WebGL not supported';
        return;
      }
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      camera.position.z = 50; // Adjusted for wider view

      // Mouse Interaction
      document.addEventListener('mousemove', (e) => {
        mousePos.x = (e.clientX / window.innerWidth) * 2 - 1;
        mousePos.y = -(e.clientY / window.innerHeight) * 2 + 1;
      }, { passive: true });

      // Fibonacci Particle
      function createParticle(index, offset, life = 10, velocity = new THREE.Vector3(0, 0, 0), color = 0x00b7eb) {
        const phi = (1 + Math.sqrt(5)) / 2;
        const theta = index * 2 * Math.PI * phi;
        const r = Math.sqrt(index) * 0.8; // Increased radius for wider spread
        const x = r * Math.cos(theta + offset);
        const y = r * Math.sin(theta + offset);
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.Float32BufferAttribute([x, y, Math.random() * 0.5], 3));
        const material = new THREE.PointsMaterial({ color, size: 0.3, transparent: true, opacity: 1 });
        const particle = new THREE.Points(geometry, material);
        scene.add(particle);
        return { obj: particle, life, index, offset, velocity };
      }

      // Connecting Trail
      function createTrail(from, to, color, life = 10) {
        const points = [from, to];
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        const material = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.7, linewidth: 2 });
        const trail = new THREE.Line(geometry, material);
        scene.add(trail);
        return { obj: trail, life };
      }

      // Initialize Animations
      function initAnimations() {
        for (let i = 0; i < 100; i++) { // Increased particle count for fuller effect
          particles.push(createParticle(i, Math.random() * 2 * Math.PI));
        }
      }
      initAnimations();

      // Big Bang Explosion on Copy
      function triggerBigBang() {
        particles.forEach(p => { scene.remove(p.obj); p.obj.geometry.dispose(); p.obj.material.dispose(); });
        trails.forEach(t => { scene.remove(t.obj); t.obj.geometry.dispose(); t.obj.material.dispose(); });
        particles = [];
        trails = [];

        const colors = [0x00b7eb, 0xff00cc, 0x00ffff, 0xffd700];
        for (let i = 0; i < 300; i++) { // Increased for more dramatic explosion
          const theta = i * 2 * Math.PI * ((1 + Math.sqrt(5)) / 2);
          const r = Math.sqrt(i) * 1.2; // Larger spread
          const velocity = new THREE.Vector3(
            r * Math.cos(theta) * 0.15,
            r * Math.sin(theta) * 0.15,
            (Math.random() - 0.5) * 0.08
          );
          particles.push(createParticle(i, Math.random() * 2 * Math.PI, 5, velocity, colors[Math.floor(Math.random() * colors.length)]));
        }
        for (let i = 0; i < 400; i++) { // More trails for richer effect
          const from = new THREE.Vector3(
            (Math.random() - 0.5) * 5,
            (Math.random() - 0.5) * 5,
            0
          );
          const to = new THREE.Vector3(
            from.x + (Math.random() - 0.5) * 8,
            from.y + (Math.random() - 0.5) * 8,
            0
          );
          trails.push(createTrail(from, to, colors[Math.floor(Math.random() * colors.length)], 5));
        }
      }

      function updateAnimations() {
        particles = particles.filter(p => {
          if (p.life <= 0) { scene.remove(p.obj); p.obj.geometry.dispose(); p.obj.material.dispose(); return false; }
          p.life -= 1 / 60;
          p.obj.material.opacity = p.life / 10 * 1;
          p.obj.position.x += p.velocity.x + mousePos.x * 0.03; // Increased mouse influence
          p.obj.position.y += p.velocity.y + mousePos.y * 0.03;
          p.obj.position.z += p.velocity.z;
          p.velocity.multiplyScalar(0.98);
          return true;
        });

        trails = trails.filter(t => {
          if (t.life <= 0) { scene.remove(t.obj); t.obj.geometry.dispose(); t.obj.material.dispose(); return false; }
          t.life -= 1 / 60;
          t.obj.material.opacity = t.life / 10 * 0.7;
          return true;
        });

        if (particles.length < 100 && Math.random() < 0.1) {
          particles.push(createParticle(Math.floor(Math.random() * 100), Math.random() * 2 * Math.PI));
        }

        if (trails.length < 200) { // Increased trail limit
          particles.forEach(p => {
            const pos = p.obj.position;
            particles.forEach(p2 => {
              if (p !== p2) {
                const pos2 = p2.obj.position;
                const dist = pos.distanceTo(pos2);
                if (dist < 3 && Math.random() < 0.05) { // Adjusted for wider connections
                  trails.push(createTrail(pos, pos2, Math.random() > 0.5 ? 0x00b7eb : 0xff00cc));
                }
              }
            });
          });
        }
      }

      function animate() {
        requestAnimationFrame(animate);
        updateAnimations();
        renderer.render(scene, camera);
      }
      animate();

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }, { passive: true });

      window.triggerBigBang = triggerBigBang;
    }
    initBackground();

    // Copy IP to Clipboard
    function copyIP() {
      const ip = document.getElementById('ip-display').textContent;
      navigator.clipboard.writeText(ip).then(() => {
        window.triggerBigBang(); // Explosion effect only
      }).catch(err => {
        console.error('Copy Error:', err);
        document.getElementById('network-info').textContent = 'Copy failed';
      });
    }
  </script>
</body>
</html>
