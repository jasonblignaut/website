<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Odyssey</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Orbitron', sans-serif;
            background: radial-gradient(circle, #0a0a2a, #000);
            color: #00ffcc;
            overflow: hidden;
            height: 100vh;
            cursor: crosshair;
        }
        #container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #canvas {
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px;
            border-radius: 15px;
            border: 3px solid #00ffcc;
            font-size: 16px;
            z-index: 20;
            box-shadow: 0 0 50px #00ffcc;
            transition: box-shadow 0.5s, transform 0.5s;
        }
        #hud.glow {
            box-shadow: 0 0 100px #ff00cc;
            transform: scale(1.1);
        }
        #controls {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 15px;
            z-index: 20;
        }
        button {
            padding: 15px 30px;
            background: linear-gradient(45deg, #00ffcc, #ff00cc, #00ccff);
            border: none;
            border-radius: 10px;
            color: #0a0a2a;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
            text-shadow: 0 0 5px #fff;
        }
        button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px #ff00cc;
        }
        #log {
            position: absolute;
            right: -420px;
            top: 10px;
            width: 400px;
            height: 600px;
            background: rgba(0, 0, 0, 0.85);
            padding: 20px;
            border-radius: 15px;
            border: 3px solid #ff00cc;
            overflow-y: auto;
            font-size: 14px;
            box-shadow: 0 0 50px #ff00cc;
            transition: right 0.5s;
        }
        #log.visible {
            right: 10px;
        }
        #logToggle {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 30;
            padding: 10px;
            background: #ff00cc;
            color: #0a0a2a;
            border-radius: 5px;
            cursor: pointer;
        }
        #sceneSelector {
            position: absolute;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            z-index: 20;
        }
        #sceneSelector button {
            display: block;
            margin: 10px 0;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0.7; }
        }
        @keyframes bloom {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }
        .blooming {
            animation: bloom 2s forwards;
        }
        .pulsing {
            animation: pulse 3s infinite;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
</head>
<body>
    <div id="container">
        <div id="logToggle">Toggle Log</div>
        <div id="hud">
            Scene: <span id="sceneName">Flower of Life</span> | Energy: <span id="energy">0</span> | Coherence: <span id="coherence">0</span> | Progress: <span id="progress">0%</span>
        </div>
        <canvas id="canvas"></canvas>
        <div id="controls">
            <button onclick="interact()">Focus Intent</button>
            <button onclick="nextScene()">Next Scene</button>
            <button onclick="resetJourney()">Reset Journey</button>
        </div>
        <div id="log">
            <h3>Universal Log</h3>
            <div id="logContent"></div>
        </div>
        <div id="sceneSelector">
            <button onclick="setScene(1)">Flower of Life</button>
            <button onclick="setScene(2)">Golden Spiral</button>
            <button onclick="setScene(3)">Seed of Life</button>
            <button onclick="setScene(4)">Quantum Field</button>
            <button onclick="setScene(5)">Torus</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let sceneNum = 1;
        let energy = 0;
        let coherence = 0;
        let progress = 0;
        let angle = 0;
        let mouse = { x: 0, y: 0, clicked: false, clickStrength: 0 };
        let audioContext, oscillator, gainNode;
        let particles = [];
        let geometries = [];
        let transitionOpacity = 1;
        let transitioning = false;

        // Canvas Setup
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.globalCompositeOperation = 'lighter';
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Particle System
        function initParticles() {
            for (let i = 0; i < 1000; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 3,
                    vy: (Math.random() - 0.5) * 3,
                    size: Math.random() * 2 + 1,
                    hue: Math.random() * 360,
                    opacity: 0.5,
                    wave: Math.random() * 2 * Math.PI
                });
            }
        }

        function drawParticles() {
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.wave += 0.03;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                const dx = mouse.x - p.x;
                const dy = mouse.y - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 200) {
                    p.vx += dx * 0.02 * (mouse.clicked ? mouse.clickStrength + 1 : 1);
                    p.vy += dy * 0.02 * (mouse.clicked ? mouse.clickStrength + 1 : 1);
                    p.opacity = Math.min(p.opacity + 0.02, 1);
                } else {
                    p.opacity = Math.max(p.opacity - 0.01, 0.5);
                }
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * (1 + Math.sin(p.wave) * 0.5), 0, 2 * Math.PI);
                ctx.fillStyle = `hsla(${p.hue}, 70%, 50%, ${p.opacity * transitionOpacity})`;
                ctx.fill();
            });
        }

        // Audio Setup
        function initAudio(frequency) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioContext.createOscillator();
            gainNode = audioContext.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.value = frequency;
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.start();
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
        }

        function stopAudio() {
            if (oscillator) oscillator.stop();
            if (audioContext) audioContext.close();
        }

        function updateAudio() {
            if (gainNode) {
                gainNode.gain.setValueAtTime(0.1 + (coherence / 1000), audioContext.currentTime);
                oscillator.frequency.setValueAtTime(528 + (energy / 100), audioContext.currentTime);
            }
        }

        // Scene Management with Transitions
        function setScene(newScene) {
            if (transitioning) return;
            transitioning = true;
            transitionOpacity = 1;
            stopAudio();
            sceneNum = newScene;
            geometries = [];
            const transition = setInterval(() => {
                transitionOpacity -= 0.05;
                if (transitionOpacity <= 0) {
                    clearInterval(transition);
                    initScene();
                    const fadeIn = setInterval(() => {
                        transitionOpacity += 0.05;
                        if (transitionOpacity >= 1) {
                            clearInterval(fadeIn);
                            transitioning = false;
                        }
                    }, 50);
                }
            }, 50);
            updateHUD();
        }

        function nextScene() {
            setScene((sceneNum % 5) + 1);
        }

        // Scene 1: Flower of Life - Cosmic Blueprint (Default)
        function initScene1() {
            initAudio(432); // Pythagorean tuning
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const radius = Math.min(canvas.width, canvas.height) / 20;
            // Central Circle
            geometries.push({ type: 'circle', x: cx, y: cy, r: radius, hue: 180, opacity: 0, pulsing: true });
            // First Layer (6 circles)
            for (let i = 0; i < 6; i++) {
                const a = (2 * Math.PI / 6) * i + angle;
                const x = cx + radius * Math.cos(a);
                const y = cy + radius * Math.sin(a);
                geometries.push({ type: 'circle', x, y, r: radius, hue: 180 + i * 30, opacity: 0, pulsing: true });
            }
            // Second Layer (12 circles)
            for (let i = 0; i < 12; i++) {
                const a = (2 * Math.PI / 12) * i + angle;
                const x = cx + 2 * radius * Math.cos(a);
                const y = cy + 2 * radius * Math.sin(a);
                geometries.push({ type: 'circle', x, y, r: radius, hue: 180 + i * 15, opacity: 0, pulsing: true });
            }
            // Third Layer (18 circles)
            for (let i = 0; i < 18; i++) {
                const a = (2 * Math.PI / 18) * i + angle;
                const x = cx + 3 * radius * Math.cos(a);
                const y = cy + 3 * radius * Math.sin(a);
                geometries.push({ type: 'circle', x, y, r: radius, hue: 180 + i * 10, opacity: 0, pulsing: true });
            }
            // Glowing Connections (Metatron’s Cube-like)
            for (let i = 0; i < geometries.length; i++) {
                for (let j = i + 1; j < geometries.length; j++) {
                    geometries.push({
                        type: 'line',
                        x1: geometries[i].x,
                        y1: geometries[i].y,
                        x2: geometries[j].x,
                        y2: geometries[j].y,
                        hue: (geometries[i].hue + geometries[j].hue) / 2,
                        opacity: 0
                    });
                }
            }
        }

        // Scene 2: Golden Spiral - Genesis
        function initScene2() {
            initAudio(528); // Solfeggio 528Hz
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            let phi = (1 + Math.sqrt(5)) / 2;
            let r = 5, a = 0;
            const points = [];
            for (let i = 0; i < 1000; i++) {
                a += 0.1;
                r = 5 * Math.pow(phi, a / (Math.PI / 2));
                const x = cx + r * Math.cos(a + angle);
                const y = cy + r * Math.sin(a + angle);
                points.push({ x, y });
                if (i % 10 === 0) {
                    geometries.push({
                        type: 'circle',
                        x,
                        y,
                        r: 10 * (coherence / 100 + 1),
                        hue: 180 + i * 0.2,
                        opacity: 0,
                        pulsing: true
                    });
                }
            }
            geometries.push({ type: 'spiral', points, hue: 180, opacity: 0 });
            // Cosmic Pulses
            geometries.push({
                type: 'circle',
                x: cx,
                y: cy,
                r: 20,
                hue: 60,
                opacity: 0,
                pulsing: true,
                scale: 1
            });
        }

        // Scene 3: Seed of Life - Formation
        function initScene3() {
            initAudio(432); // 432Hz
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const radius = Math.min(canvas.width, canvas.height) / 15;
            // Central Sphere
            geometries.push({ type: 'circle', x: cx, y: cy, r: radius, hue: 180, opacity: 0, pulsing: true });
            // 6 Surrounding Spheres
            for (let i = 0; i < 6; i++) {
                const a = (2 * Math.PI / 6) * i + angle;
                const x = cx + radius * Math.cos(a);
                const y = cy + radius * Math.sin(a);
                geometries.push({ type: 'circle', x, y, r: radius, hue: 180 + i * 30, opacity: 0, pulsing: true });
                // Connections to Center
                geometries.push({
                    type: 'line',
                    x1: cx,
                    y1: cy,
                    x2: x,
                    y2: y,
                    hue: 180 + i * 30,
                    opacity: 0
                });
            }
        }

        // Scene 4: Quantum Field - Void of Potential
        function initScene4() {
            initAudio(0); // White noise
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            // Quantum Particles
            for (let i = 0; i < 200; i++) {
                const x = cx + (Math.random() - 0.5) * canvas.width * 0.8;
                const y = cy + (Math.random() - 0.5) * canvas.height * 0.8;
                geometries.push({
                    type: 'circle',
                    x,
                    y,
                    r: 5,
                    hue: 300 + Math.random() * 60,
                    opacity: 0,
                    pulsing: true,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2
                });
            }
            // Wave Interference Pattern
            for (let x = 0; x < canvas.width; x += 5) {
                let intensity = 0;
                for (let n = -10; n <= 10; n++) {
                    intensity += Math.sin(2 * Math.PI * n * (x - cx) / 50 + angle * n) / (n || 1);
                }
                intensity = Math.abs(intensity) * 30;
                geometries.push({
                    type: 'rect',
                    x,
                    y: canvas.height - 100 - intensity,
                    w: 4,
                    h: intensity * 2,
                    hue: 300,
                    opacity: 0.5 * transitionOpacity
                });
            }
        }

        // Scene 5: Torus - Infinite Flow
        function initScene5() {
            initAudio(963); // 963Hz
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const innerR = 50;
            const outerR = 150;
            // Torus Simulation (2D Projection)
            for (let i = 0; i < 360; i += 5) {
                const a = (i * Math.PI / 180) + angle;
                const x = cx + (outerR + innerR * Math.cos(a)) * Math.cos(a);
                const y = cy + (outerR + innerR * Math.cos(a)) * Math.sin(a);
                geometries.push({
                    type: 'circle',
                    x,
                    y,
                    r: 5,
                    hue: i,
                    opacity: 0,
                    pulsing: true
                });
            }
            // Energy Flow Lines
            for (let i = 0; i < 360; i += 10) {
                const a1 = (i * Math.PI / 180) + angle;
                const a2 = ((i + 10) * Math.PI / 180) + angle;
                const x1 = cx + outerR * Math.cos(a1);
                const y1 = cy + outerR * Math.sin(a1);
                const x2 = cx + outerR * Math.cos(a2);
                const y2 = cy + outerR * Math.sin(a2);
                geometries.push({
                    type: 'line',
                    x1,
                    y1,
                    x2,
                    y2,
                    hue: i,
                    opacity: 0
                });
            }
        }

        // Initialize Scene
        function initScene() {
            geometries = [];
            switch (sceneNum) {
                case 1: initScene1(); break;
                case 2: initScene2(); break;
                case 3: initScene3(); break;
                case 4: initScene4(); break;
                case 5: initScene5(); break;
            }
        }

        // Draw Geometries
        function drawGeometries() {
            geometries.forEach(g => {
                if (g.opacity < 1) g.opacity = Math.min(g.opacity + 0.02, 1);
                ctx.globalAlpha = g.opacity * transitionOpacity;
                if (g.type === 'circle') {
                    ctx.beginPath();
                    const scale = g.pulsing ? (1 + Math.sin(Date.now() / 500 + g.x) * 0.2) : 1;
                    ctx.arc(g.x, g.y, g.r * scale, 0, 2 * Math.PI);
                    const gradient = ctx.createRadialGradient(g.x, g.y, 0, g.x, g.y, g.r * scale);
                    gradient.addColorStop(0, `hsla(${g.hue}, 70%, 50%, 0.8)`);
                    gradient.addColorStop(1, `hsla(${g.hue}, 70%, 50%, 0)`);
                    ctx.fillStyle = gradient;
                    ctx.strokeStyle = `hsla(${g.hue}, 70%, 50%, ${g.opacity * transitionOpacity})`;
                    ctx.lineWidth = 2;
                    ctx.fill();
                    ctx.stroke();
                    if (g.vx) {
                        g.x += g.vx;
                        g.y += g.vy;
                        if (g.x < 0 || g.x > canvas.width) g.vx *= -1;
                        if (g.y < 0 || g.y > canvas.height) g.vy *= -1;
                        const dx = mouse.x - g.x;
                        const dy = mouse.y - g.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 200) {
                            g.vx += dx * 0.02 * (mouse.clicked ? mouse.clickStrength + 1 : 1);
                            g.vy += dy * 0.02 * (mouse.clicked ? mouse.clickStrength + 1 : 1);
                        }
                    }
                } else if (g.type === 'line') {
                    ctx.beginPath();
                    ctx.moveTo(g.x1, g.y1);
                    ctx.lineTo(g.x2, g.y2);
                    ctx.strokeStyle = `hsla(${g.hue}, 70%, 50%, ${g.opacity * transitionOpacity * 0.3})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                } else if (g.type === 'spiral') {
                    ctx.beginPath();
                    ctx.moveTo(g.points[0].x, g.points[0].y);
                    for (let i = 1; i < g.points.length; i++) {
                        ctx.lineTo(g.points[i].x, g.points[i].y);
                    }
                    ctx.strokeStyle = `hsla(${g.hue}, 70%, 50%, ${g.opacity * transitionOpacity})`;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                } else if (g.type === 'rect') {
                    ctx.fillStyle = `hsla(${g.hue}, 70%, 50%, ${g.opacity * transitionOpacity})`;
                    ctx.fillRect(g.x, g.y, g.w, g.h);
                }
            });
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            angle += 0.01 + (energy / 10000);
            drawParticles();
            drawGeometries();
            updateEnergy();
            updateAudio();
            updateHUD();
        }

        // Mouse Interaction
        let lastClickTime = 0;
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
            energy += Math.sin(distToCenter(mouse.x, mouse.y) / 100) * 0.5;
            angle += (mouse.x - canvas.width / 2) / 10000;
        }, { passive: true });

        canvas.addEventListener('mousedown', (e) => {
            mouse.clicked = true;
            const now = Date.now();
            mouse.clickStrength = Math.min((now - lastClickTime) / 1000, 5);
            lastClickTime = now;
            const log = document.getElementById('logContent');
            log.innerHTML += `<p>Intent Focused at (${mouse.x}, ${mouse.y}) - Strength: ${mouse.clickStrength.toFixed(2)}</p>`;
            energy += 100 * mouse.clickStrength;
            coherence += mouse.clickStrength * 10;
            // Add Burst of Particles on Click
            for (let i = 0; i < 20; i++) {
                particles.push({
                    x: mouse.x,
                    y: mouse.y,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5,
                    size: Math.random() * 3 + 2,
                    hue: Math.random() * 360,
                    opacity: 1,
                    wave: Math.random() * 2 * Math.PI
                });
            }
        });

        canvas.addEventListener('mouseup', () => {
            mouse.clicked = false;
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const scaleFactor = e.deltaY > 0 ? 0.95 : 1.05;
            geometries.forEach(g => {
                if (g.r) g.r *= scaleFactor;
                if (g.points) {
                    g.points.forEach(p => {
                        p.x = canvas.width / 2 + (p.x - canvas.width / 2) * scaleFactor;
                        p.y = canvas.height / 2 + (p.y - canvas.height / 2) * scaleFactor;
                    });
                }
            });
        }, { passive: false });

        function distToCenter(x, y) {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            return Math.sqrt((x - cx) * (x - cx) + (y - cy) * (y - cy));
        }

        // User Interaction
        function interact() {
            energy += 100;
            coherence += Math.random() * 20;
            const log = document.getElementById('logContent');
            log.innerHTML += `<p>Amplified Intent - Energy: +100, Coherence: +${Math.floor(Math.random() * 20)}</p>`;
            if (energy > 5000 && coherence > 200) progress += 1;
            updateHUD();
        }

        function resetJourney() {
            energy = 0;
            coherence = 0;
            progress = 0;
            document.getElementById('logContent').innerHTML = '<h3>Universal Log</h3>';
            setScene(1);
        }

        function updateEnergy() {
            switch (sceneNum) {
                case 1:
                    energy += Math.PI * Math.pow(10, 2) * (coherence / 100 + 1) * 0.001; // Circle area
                    break;
                case 2:
                    energy += 0.1 * Math.pow((1 + Math.sqrt(5)) / 2, 0.01) * (coherence / 100 + 1); // Fibonacci growth
                    break;
                case 3:
                    energy += (4 / 3 * Math.PI * Math.pow(10, 3)) * (mouse.clickStrength + 1) * 0.0001; // Sphere volume
                    break;
                case 4:
                    energy += 6.626e-34 * (coherence / 100 + 1); // Planck’s constant
                    break;
                case 5:
                    energy += Math.pow(1, 2) * 1 * (progress / 100 + 1); // Torus energy flow
                    break;
            }
            if (progress > 95 && energy > 10000) {
                const log = document.getElementById('logContent');
                log.innerHTML += '<p>Consciousness-Driven Singularity Achieved! Universal Law Discovered!</p>';
                alert('You’ve unlocked a new reality! Share with the world!');
            }
        }

        function updateHUD() {
            document.getElementById('sceneName').textContent = ['Flower of Life', 'Golden Spiral', 'Seed of Life', 'Quantum Field', 'Torus'][sceneNum - 1];
            document.getElementById('energy').textContent = Math.floor(energy);
            document.getElementById('coherence').textContent = Math.floor(coherence);
            document.getElementById('progress').textContent = Math.min(progress, 100).toFixed(1) + '%';
            document.getElementById('hud').classList.toggle('glow', energy > 5000);
        }

        // Log Toggle
        document.getElementById('logToggle').addEventListener('click', () => {
            document.getElementById('log').classList.toggle('visible');
        });

        // Start
        initParticles();
        setScene(1);
        animate();
    </script>
</body>
</html>
