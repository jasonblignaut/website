    <style>
        :root {
            --matrix-blue: #00b7eb;
            --cosmic-magenta: #ff00cc;
            --cosmic-gold: #ffd700;
            --cosmic-cyan: #00ffff;
            --void-black: #08081a;
            --light-aura: #e6f0ff;
            --glow-radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Exo 2', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--void-black);
            color: var(--light-aura);
            overflow: hidden;
            position: relative;
            cursor: default;
            overscroll-behavior: none;
        }

        /* Main Content */
        .main {
            height: 100vh;
            display: grid;
            grid-template-columns: minmax(0, 160px) minmax(200px, 1fr) minmax(0, 160px);
            grid-template-rows: auto 1fr auto;
            gap: clamp(0.5rem, 2vw, 1rem);
            align-items: center;
            justify-items: center;
            padding: clamp(0.5rem, 2vw, 1rem);
            position: relative;
            z-index: 1;
        }

        .ip-container {
            grid-column: 2;
            grid-row: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-width: 100%;
            width: 100%;
        }

        .ip-container h1 {
            font-family: 'Space Mono', monospace;
            font-size: clamp(1.2rem, 3.5vw, 2.5rem);
            background: linear-gradient(90deg, var(--matrix-blue), var(--cosmic-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: clamp(0.3rem, 1.5vw, 0.5rem);
            text-shadow: 0 0 10px var(--matrix-blue);
            white-space: nowrap;
            text-align: center;
        }

        .ip-display {
            font-family: 'Space Mono', monospace;
            font-size: clamp(1rem, 3vw, 2rem);
            color: var(--light-aura);
            background: rgba(8, 8, 26, 0.85);
            padding: clamp(0.5rem, 1.5vw, 0.8rem) clamp(1rem, 2vw, 1.5rem);
            border-radius: 10px;
            border: 2px solid var(--matrix-blue);
            box-shadow: 0 0 12px var(--matrix-blue);
            margin-bottom: clamp(0.3rem, 1vw, 0.5rem);
            text-shadow: 0 0 6px var(--matrix-blue);
            word-break: break-all;
            text-align: center;
            max-width: 100%;
        }

        .network-info {
            font-family: 'Space Mono', monospace;
            font-size: clamp(0.6rem, 1.2vw, 0.9rem);
            color: var(--light-aura);
            max-width: clamp(160px, 90vw, 360px);
            line-height: 1.4;
            text-shadow: 0 0 4px var(--matrix-blue);
            text-align: center;
        }

        .copy-button {
            background: linear-gradient(90deg, var(--matrix-blue), var(--cosmic-magenta));
            color: var(--light-aura);
            border: none;
            padding: clamp(0.4rem, 1vw, 0.6rem) clamp(1rem, 2vw, 1.5rem);
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            font-size: clamp(0.7rem, 1.2vw, 0.9rem);
            text-transform: uppercase;
            box-shadow: 0 0 var(--glow-radius) var(--matrix-blue);
            transition: all 0.2s;
            margin-top: clamp(0.2rem, 1vw, 0.4rem);
        }

        .copy-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 calc(var(--glow-radius) * 1.5) var(--matrix-blue);
        }

        /* Ad Blocks */
        .ad-block {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .ad-top {
            grid-column: 1 / 4;
            grid-row: 1;
            min-height: 60px;
            max-height: 90px;
        }

        .ad-bottom {
            grid-column: 1 / 4;
            grid-row: 3;
            min-height: 60px;
            max-height: 90px;
        }

        .ad-left {
            grid-column: 1;
            grid-row: 2;
            min-width: 120px;
            max-width: 160px;
        }

        .ad-right {
            grid-column: 3;
            grid-row: 2;
            min-width: 120px;
            max-width: 160px;
        }

        /* Background Canvas */
        #background-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Footer */
        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(8, 8, 26, 0.95);
            padding: clamp(0.3rem, 1.5vw, 0.5rem);
            text-align: center;
            z-index: 1001;
        }

        footer p {
            color: var(--light-aura);
            font-size: clamp(0.5rem, 1vw, 0.8rem);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .main {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr auto;
                gap: clamp(0.3rem, 1.5vw, 0.5rem);
                padding: clamp(0.3rem, 1.5vw, 0.5rem);
            }

            .ip-container h1 {
                font-size: clamp(1rem, 3vw, 1.8rem);
            }

            .ip-display {
                font-size: clamp(0.9rem, 2.5vw, 1.5rem);
                padding: clamp(0.4rem, 1vw, 0.6rem) clamp(0.8rem, 1.5vw, 1rem);
            }

            .network-info {
                font-size: clamp(0.5rem, 1vw, 0.8rem);
                max-width: 90vw;
            }

            .copy-button {
                padding: clamp(0.3rem, 0.8vw, 0.5rem) clamp(0.8rem, 1.5vw, 1rem);
                font-size: clamp(0.6rem, 1vw, 0.8rem);
            }

            .ad-left, .ad-right {
                display: none;
            }

            .ad-top, .ad-bottom {
                min-height: 50px;
                max-height: 60px;
            }
        }

        @media (max-width: 480px) {
            .main {
                padding: clamp(0.2rem, 1vw, 0.4rem);
            }

            .ip-container h1 {
                font-size: clamp(0.9rem, 2.5vw, 1.5rem);
            }

            .ip-display {
                font-size: clamp(0.8rem, 2vw, 1.2rem);
            }

            .network-info {
                font-size: clamp(0.4rem, 0.8vw, 0.7rem);
            }

            .copy-button {
                font-size: clamp(0.5rem, 0.8vw, 0.7rem);
            }
        }

        @media (max-width: 360px) {
            .main {
                padding: clamp(0.1rem, 0.8vw, 0.3rem);
            }

            .ip-container h1 {
                font-size: clamp(0.8rem, 2vw, 1.2rem);
            }

            .ip-display {
                font-size: clamp(0.7rem, 1.8vw, 1rem);
            }
        }
    </style>
</head>
<body>
    <canvas id="background-canvas"></canvas>
    <section class="main">
        <!-- AdSense Leaderboard (Top) -->
        <div class="ad-block ad-top">
            <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1234567890123456" crossorigin="anonymous"></script>
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1234567890123456" data-ad-slot="1234567890" data-ad-format="auto" data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
        <!-- AdSense Skyscraper (Left) -->
        <div class="ad-block ad-left">
            <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1234567890123456" crossorigin="anonymous"></script>
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1234567890123456" data-ad-slot="1234567891" data-ad-format="auto" data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
        <!-- IP and Network Info -->
        <div class="ip-container">
            <h1>Your Public IP Address</h1>
            <div class="ip-display" id="ip-display">Fetching IP...</div>
            <div class="network-info" id="network-info">Fetching network info...</div>
            <button class="copy-button" onclick="copyIP()">Copy IP</button>
        </div>
        <!-- AdSense Skyscraper (Right) -->
        <div class="ad-block ad-right">
            <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1234567890123456" crossorigin="anonymous"></script>
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1234567890123456" data-ad-slot="1234567892" data-ad-format="auto" data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
        <!-- AdSense Leaderboard (Bottom) -->
        <div class="ad-block ad-bottom">
            <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1234567890123456" crossorigin="anonymous"></script>
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1234567890123456" data-ad-slot="1234567893" data-ad-format="auto" data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
    </section>
    <footer>
        <p>© 2025 Labverse.co.za | Powered by AI, Math & Cosmic Precision</p>
    </footer>

    <script>
        // Fetch Public IP
        async function fetchPublicIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                if (!response.ok) throw new Error('IP fetch failed');
                const data = await response.json();
                document.getElementById('ip-display').textContent = data.ip;
                return data.ip;
            } catch (error) {
                document.getElementById('ip-display').textContent = 'IP unavailable';
                console.error('IP Fetch Error:', error);
                return null;
            }
        }

        // Fetch Network Info with Multiple Fallbacks
        async function fetchNetworkInfo() {
            let networkData = { isp: 'N/A', city: 'N/A', country: 'N/A' };

            // Try ipinfo.io (Primary)
            try {
                const response = await fetch('https://ipinfo.io/json?token=your-ipinfo-token'); // Replace with your ipinfo.io token
                if (response.ok) {
                    const data = await response.json();
                    networkData.isp = data.org || 'N/A';
                    networkData.city = data.city || 'N/A';
                    networkData.country = data.country || 'N/A';
                    document.getElementById('network-info').textContent = `ISP: ${networkData.isp} | Location: ${networkData.city}, ${networkData.country}`;
                    return;
                }
            } catch (error) {
                console.error('ipinfo.io Error:', error);
            }

            // Fallback 1: ip-api.com
            try {
                const response = await fetch('http://ip-api.com/json');
                if (response.ok) {
                    const data = await response.json();
                    networkData.isp = data.isp || 'N/A';
                    networkData.city = data.city || 'N/A';
                    networkData.country = data.country || 'N/A';
                    document.getElementById('network-info').textContent = `ISP: ${networkData.isp} | Location: ${networkData.city}, ${networkData.country}`;
                    return;
                }
            } catch (error) {
                console.error('ip-api.com Error:', error);
            }

            // Fallback 2: geojs.io
            try {
                const response = await fetch('https://get.geojs.io/v1/ip/geo.json');
                if (response.ok) {
                    const data = await response.json();
                    networkData.isp = data.organization || 'N/A';
                    networkData.city = data.city || 'N/A';
                    networkData.country = data.country || 'N/A';
                    document.getElementById('network-info').textContent = `ISP: ${networkData.isp} | Location: ${networkData.city}, ${networkData.country}`;
                    return;
                }
            } catch (error) {
                console.error('geojs.io Error:', error);
            }

            // Final Fallback
            document.getElementById('network-info').textContent = `ISP: N/A | Location: N/A`;
        }

        // Initialize Fetch
        fetchPublicIP();
        fetchNetworkInfo();

        // Background Animation
        let scene, camera, renderer, particles = [], trails = [], mousePos = { x: 0, y: 0 };

        function initBackground() {
            const canvas = document.getElementById('background-canvas');
            if (!canvas.getContext('webgl') && !canvas.getContext('experimental-webgl')) {
                console.error('WebGL not supported');
                document.getElementById('network-info').textContent = 'WebGL not supported';
                return;
            }
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            camera.position.z = 20;

            // Mouse Interaction
            document.addEventListener('mousemove', (e) => {
                mousePos.x = (e.clientX / window.innerWidth) * 2 - 1;
                mousePos.y = -(e.clientY / window.innerHeight) * 2 + 1;
            }, { passive: true });

            // Touch Interaction (Mobile)
            document.addEventListener('touchmove', (e) => {
                if (e.touches.length > 0) {
                    mousePos.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
                    mousePos.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
                }
            }, { passive: true });

            // Fibonacci Particle
            function createParticle(index, offset, life = 10, velocity = new THREE.Vector3(0, 0, 0), color = 0x00b7eb) {
                const phi = (1 + Math.sqrt(5)) / 2;
                const theta = index * 2 * Math.PI * phi; // Golden angle
                const r = Math.sqrt(index) * 0.3; // Smooth spiral distribution
                const x = r * Math.cos(theta + offset);
                const y = r * Math.sin(theta + offset);
                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.Float32BufferAttribute([x, y, Math.random() * 0.2], 3));
                const material = new THREE.PointsMaterial({ color, size: 0.15, transparent: true, opacity: 1 });
                const particle = new THREE.Points(geometry, material);
                scene.add(particle);
                return { obj: particle, life, index, offset, velocity };
            }

            // Connecting Trail
            function createTrail(from, to, color, life = 10) {
                const points = [from, to];
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const material = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.6, linewidth: 1.5 });
                const trail = new THREE.Line(geometry, material);
                scene.add(trail);
                return { obj: trail, life };
            }

            // Initialize Animations
            function initAnimations() {
                for (let i = 0; i < 20; i++) {
                    particles.push(createParticle(i, Math.random() * 2 * Math.PI));
                }
            }
            initAnimations();

            // Big Bang Explosion on Copy
            function triggerBigBang() {
                particles.forEach(p => { scene.remove(p.obj); p.obj.geometry.dispose(); p.obj.material.dispose(); });
                trails.forEach(t => { scene.remove(t.obj); t.obj.geometry.dispose(); t.obj.material.dispose(); });
                particles = [];
                trails = [];

                const colors = [0x00b7eb, 0xff00cc, 0x00ffff, 0xffd700]; // Blue, magenta, cyan, gold
                for (let i = 0; i < 100; i++) {
                    const theta = i * 2 * Math.PI * ((1 + Math.sqrt(5)) / 2); // Golden angle
                    const r = Math.sqrt(i) * 0.5;
                    const velocity = new THREE.Vector3(
                        r * Math.cos(theta) * 0.1,
                        r * Math.sin(theta) * 0.1,
                        (Math.random() - 0.5) * 0.05
                    );
                    particles.push(createParticle(i, Math.random() * 2 * Math.PI, 5, velocity, colors[Math.floor(Math.random() * colors.length)]));
                }
                for (let i = 0; i < 150; i++) {
                    const from = new THREE.Vector3(
                        (Math.random() - 0.5) * 2,
                        (Math.random() - 0.5) * 2,
                        0
                    );
                    const to = new THREE.Vector3(
                        from.x + (Math.random() - 0.5) * 4,
                        from.y + (Math.random() - 0.5) * 4,
                        0
                    );
                    trails.push(createTrail(from, to, colors[Math.floor(Math.random() * colors.length)], 5));
                }
            }

            function updateAnimations() {
                particles = particles.filter(p => {
                    if (p.life <= 0) { scene.remove(p.obj); p.obj.geometry.dispose(); p.obj.material.dispose(); return false; }
                    p.life -= 1 / 60;
                    p.obj.material.opacity = p.life / 10 * 1;
                    p.obj.position.x += p.velocity.x + mousePos.x * 0.015;
                    p.obj.position.y += p.velocity.y + mousePos.y * 0.015;
                    p.obj.position.z += p.velocity.z;
                    p.velocity.multiplyScalar(0.98);
                    return true;
                });

                trails = trails.filter(t => {
                    if (t.life <= 0) { scene.remove(t.obj); t.obj.geometry.dispose(); t.obj.material.dispose(); return false; }
                    t.life -= 1 / 60;
                    t.obj.material.opacity = p.life / 10 * 0.6;
                    return true;
                });

                if (particles.length < 20 && Math.random() < 0.05) {
                    particles.push(createParticle(Math.floor(Math.random() * 20), Math.random() * 2 * Math.PI));
                }

                if (trails.length < 80) {
                    particles.forEach(p => {
                        const pos = p.obj.position;
                        particles.forEach(p2 => {
                            if (p !== p2) {
                                const pos2 = p2.obj.position;
                                const dist = pos.distanceTo(pos2);
                                if (dist < 1.5 && Math.random() < 0.02) {
                                    trails.push(createTrail(pos, pos2, Math.random() > 0.5 ? 0x00b7eb : 0xff00cc));
                                }
                            }
                        });
                    });
                }
            }

            function animate() {
                requestAnimationFrame(animate);
                updateAnimations();
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }, { passive: true });

            window.triggerBigBang = triggerBigBang;
        }
        initBackground();

        // Copy IP to Clipboard
        function copyIP() {
            const ip = document.getElementById('ip-display').textContent;
            navigator.clipboard.writeText(ip).then(() => {
                window.triggerBigBang();
            }).catch(err => {
                console.error('Copy Error:', err);
                document.getElementById('network-info').textContent = 'Copy failed';
            });
        }
    </script>
</body>
