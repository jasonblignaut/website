  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // Debug Logging
    function logDebug(message) {
      console.log('[DEBUG] ' + message);
    }

    // Fetch Public IP
    async function fetchPublicIP() {
      try {
        const response = await fetch('https://api.ipify.org?format=json');
        if (!response.ok) throw new Error('IP fetch failed');
        const data = await response.json();
        document.getElementById('ip-display').textContent = data.ip;
        return data.ip;
      } catch (error) {
        document.getElementById('ip-display').textContent = 'IP unavailable';
        logDebug('IP Fetch Error: ' + error.message);
        return null;
      }
    }

    // Fetch Network Info
    async function fetchNetworkInfo() {
      const endpoints = [
        { url: 'https://api.ipgeolocation.io/ipgeo?apiKey=free', parser: (data) => ({
          isp: data.isp || 'Unknown',
          city: data.city || 'Unknown',
          country: data.country_name || 'Unknown'
        }) },
        { url: 'https://get.geojs.io/v1/ip/geo.json', parser: (data) => ({
          isp: data.organization_name || 'Unknown',
          city: data.city || 'Unknown',
          country: data.country || 'Unknown'
        }) }
      ];
      for (const { url, parser } of endpoints) {
        try {
          const response = await fetch(url);
          if (!response.ok) continue;
          const data = await response.json();
          const networkData = parser(data);
          document.getElementById('network-info').innerHTML = `ISP: ${networkData.isp}<br>Location: ${networkData.city}, ${networkData.country}`;
          return;
        } catch (error) {
          logDebug(`Network Info Fetch Error (${url}): ${error.message}`);
        }
      }
      document.getElementById('network-info').innerHTML = `ISP: Unknown<br>Location: Unknown`;
    }

    // Initialize Speed Test (Librespeed)
    async function initSpeedTest() {
      try {
        const speedResults = document.getElementById('speed-results');
        speedResults.textContent = 'Speed test running...';

        // Using a public Librespeed instance (replace with your hosted instance if needed)
        const testUrl = 'https://speedtest.0x3.me/api/speedtest.php';
        const downloadSize = 10 * 1024 * 1024; // 10MB
        const uploadSize = 5 * 1024 * 1024; // 5MB

        async function measureDownload() {
          const startTime = performance.now();
          const response = await fetch(testUrl + '?size=' + downloadSize);
          if (!response.ok) throw new Error('Download test failed');
          await response.blob();
          const endTime = performance.now();
          const duration = (endTime - startTime) / 1000; // seconds
          return (downloadSize * 8 / duration / 1e6).toFixed(2); // Mbps
        }

        async function measureUpload() {
          const startTime = performance.now();
          const blob = new Blob([new ArrayBuffer(uploadSize)]);
          const formData = new FormData();
          formData.append('file', blob);
          const response = await fetch(testUrl, { method: 'POST', body: formData });
          if (!response.ok) throw new Error('Upload test failed');
          await response.blob();
          const endTime = performance.now();
          const duration = (endTime - startTime) / 1000; // seconds
          return (uploadSize * 8 / duration / 1e6).toFixed(2); // Mbps
        }

        const download = await measureDownload();
        const upload = await measureUpload();
        speedResults.textContent = `Download: ${download} Mbps | Upload: ${upload} Mbps`;
        speedResults.classList.add('show');
        logDebug(`Speed Test Completed: Download ${download} Mbps, Upload ${upload} Mbps`);
      } catch (error) {
        logDebug('Speed Test Error: ' + error.message);
        document.getElementById('speed-results').textContent = 'Speed test unavailable';
      }
    }

    // Flower of Life Background
    function initBackgroundCanvas() {
      try {
        const canvas = document.getElementById('background-canvas');
        const ctx = canvas.getContext('2d');
        if (!ctx) throw new Error('2D canvas context not supported');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const PI = 3.141592653589793;
        const SQRT3 = 1.732050807568877;

        function drawFlowerOfLife(time) {
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          // Cosmic Gradient
          const gradient = ctx.createRadialGradient(
            canvas.width / 2, canvas.height / 2, 0,
            canvas.width / 2, canvas.height / 2, Math.max(canvas.width, canvas.height)
          );
          gradient.addColorStop(0, 'rgba(10, 10, 30, 1)');
          gradient.addColorStop(0.4, 'rgba(20, 50, 80, 0.9)');
          gradient.addColorStop(0.8, 'rgba(5, 15, 40, 0.7)');
          gradient.addColorStop(1, 'rgba(0, 0, 0, 1)');
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          // Stars
          for (let i = 0; i < 200; i++) {
            ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.5 + 0.3})`;
            ctx.beginPath();
            ctx.arc(
              Math.random() * canvas.width,
              Math.random() * canvas.height,
              Math.random() * 1.5,
              0, 2 * PI
            );
            ctx.fill();
          }

          // Accurate Flower of Life
          ctx.strokeStyle = `rgba(100, 200, 255, ${0.3 + Math.sin(time * 0.001) * 0.2})`;
          ctx.lineWidth = 1.5;
          const centerX = canvas.width / 2;
          const centerY = canvas.height / 2;
          const radius = Math.min(canvas.width, canvas.height) / 10;
          const anim = Math.sin(time * 0.0004) * 5;
          const positions = [
            { x: 0, y: 0 },
            ...Array.from({ length: 6 }, (_, i) => ({
              x: radius * Math.cos(i * PI / 3),
              y: radius * Math.sin(i * PI / 3)
            })),
            ...Array.from({ length: 12 }, (_, i) => {
              const angle = i * PI / 6;
              const r = radius * SQRT3;
              return {
                x: r * Math.cos(angle),
                y: r * Math.sin(angle)
              };
            })
          ];

          positions.forEach(pos => {
            ctx.beginPath();
            ctx.arc(centerX + pos.x + anim, centerY + pos.y + anim, radius, 0, 2 * PI);
            ctx.stroke();
          });
        }

        function animateBackground(time) {
          requestAnimationFrame(animateBackground);
          drawFlowerOfLife(time);
        }
        animateBackground(0);

        window.addEventListener('resize', () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }, { passive: true });

        return true;
      } catch (error) {
        logDebug('Background Canvas Initialization Error: ' + error.message);
        return false;
      }
    }

    // WebGL Cube with LED Particles
    function initWebGL() {
      try {
        const canvas = document.getElementById('webgl-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 2.5);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);

        // Post-processing
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);
        const bloomPass = new UnrealBloomPass(
          new THREE.Vector2(window.innerWidth, window.innerHeight),
          0.6,
          0.4,
          0.8
        );
        composer.addPass(bloomPass);

        // Cube
        const cubeGeometry = new THREE.BoxGeometry(1, 1, 1);
        const cubeMaterial = new THREE.MeshBasicMaterial({
          color: 0x000000,
          transparent: true,
          opacity: 0.1,
          wireframe: true
        });
        const cube = new THREE.Mesh(cubeGeometry, cubeMaterial);
        scene.add(cube);

        // Cube Edges (LED Lines)
        const edgeGeometry = new THREE.EdgesGeometry(cubeGeometry);
        const edgeMaterial = new THREE.ShaderMaterial({
          uniforms: {
            time: { value: 0 },
            uColor1: { value: new THREE.Color('#ff4d94') },
            uColor2: { value: new THREE.Color('#4dffeb') },
            uColor3: { value: new THREE.Color('#cc66ff') }
          },
          vertexShader: `
            varying vec3 vPosition;
            void main() {
              vPosition = position;
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
          `,
          fragmentShader: `
            uniform float time;
            uniform vec3 uColor1;
            uniform vec3 uColor2;
            uniform vec3 uColor3;
            varying vec3 vPosition;
            void main() {
              float t1 = sin(time * 0.5) * 0.5 + 0.5;
              float t2 = sin(time * 0.3 + 3.141592653589793) * 0.5 + 0.5;
              vec3 color = mix(uColor1, uColor2, t1);
              color = mix(color, uColor3, t2);
              float pulse = sin(time * 2.0 + vPosition.x * 0.5) * 0.5 + 0.5;
              gl_FragColor = vec4(color * (1.0 + pulse), 1.0);
            }
          `,
          transparent: true
        });
        const edges = new THREE.LineSegments(edgeGeometry, edgeMaterial);
        cube.add(edges);

        // LED Particles Inside Cube
        const phi = (1 + Math.sqrt(5)) / 2;
        const particleCount = 50;
        const particleGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const offsets = new Float32Array(particleCount);
        for (let i = 0; i < particleCount; i++) {
          const theta = i * 2 * Math.PI * phi;
          const r = Math.sqrt(i) * 0.3;
          positions[i * 3] = r * Math.cos(theta) * 0.4;
          positions[i * 3 + 1] = r * Math.sin(theta) * 0.4;
          positions[i * 3 + 2] = (Math.random() - 0.5) * 0.4;
          offsets[i] = Math.random() * 2 * Math.PI;
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particleGeometry.setAttribute('offset', new THREE.BufferAttribute(offsets, 1));
        const particleMaterial = new THREE.ShaderMaterial({
          uniforms: {
            time: { value: 0 },
            uColor1: { value: new THREE.Color('#ff4d94') },
            uColor2: { value: new THREE.Color('#4dffeb') },
            uColor3: { value: new THREE.Color('#cc66ff') }
          },
          vertexShader: `
            attribute float offset;
            varying float vOffset;
            void main() {
              vOffset = offset;
              gl_PointSize = 8.0 + sin(offset) * 4.0;
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
          `,
          fragmentShader: `
            uniform float time;
            uniform vec3 uColor1;
            uniform vec3 uColor2;
            uniform vec3 uColor3;
            varying float vOffset;
            void main() {
              float t1 = sin(time * 0.4) * 0.5 + 0.5;
              float t2 = sin(time * 0.2 + 3.141592653589793) * 0.5 + 0.5;
              vec3 color = mix(uColor1, uColor2, t1);
              color = mix(color, uColor3, t2);
              float pulse = sin(time * 2.5 + vOffset) * 0.5 + 0.5;
              vec2 coord = gl_PointCoord - vec2(0.5);
              float dist = length(coord);
              if (dist > 0.5) discard;
              float alpha = smoothstep(0.5, 0.2, dist);
              gl_FragColor = vec4(color * (1.0 + pulse), alpha);
            }
          `,
          transparent: true
        });
        const particles = new THREE.Points(particleGeometry, particleMaterial);
        cube.add(particles);

        // Big Bang Burst
        function triggerBigBang() {
          const burstCount = 30;
          const burstPositions = new Float32Array(burstCount * 3);
          const burstOffsets = new Float32Array(burstCount);
          for (let i = 0; i < burstCount; i++) {
            const theta = i * 2 * Math.PI * phi;
            const r = Math.sqrt(i) * 0.1;
            burstPositions[i * 3] = r * Math.cos(theta) * 0.4;
            burstPositions[i * 3 + 1] = r * Math.sin(theta) * 0.4;
            burstPositions[i * 3 + 2] = (Math.random() - 0.5) * 0.4;
            burstOffsets[i] = Math.random() * 2 * Math.PI;
          }
          const burstGeometry = new THREE.BufferGeometry();
          burstGeometry.setAttribute('position', new THREE.BufferAttribute(burstPositions, 3));
          burstGeometry.setAttribute('offset', new THREE.BufferAttribute(burstOffsets, 1));
          const burstMaterial = new THREE.ShaderMaterial({
            uniforms: {
              time: { value: 0 },
              uColor1: { value: new THREE.Color('#ff4d94') },
              uColor2: { value: new THREE.Color('#4dffeb') },
              uColor3: { value: new THREE.Color('#cc66ff') }
            },
            vertexShader: particleMaterial.vertexShader,
            fragmentShader: particleMaterial.fragmentShader.replace('float alpha = smoothstep(0.5, 0.2, dist);', 'float alpha = smoothstep(0.5, 0.2, dist) * (1.0 - time);'),
            transparent: true
          });
          const burst = new THREE.Points(burstGeometry, burstMaterial);
          cube.add(burst);
          let burstTime = 0;
          const animateBurst = (t) => {
            burstTime += 0.016;
            burstMaterial.uniforms.time.value = burstTime;
            if (burstTime < 1) {
              requestAnimationFrame(animateBurst);
            } else {
              cube.remove(burst);
              burstGeometry.dispose();
              burstMaterial.dispose();
            }
          };
          animateBurst(0);
          logDebug('Big Bang Triggered');
        }

        // Interactivity
        let mouseX = 0, mouseY = 0, touchX = 0, touchY = 0;
        let targetRotationX = 0, targetRotationY = 0;
        let isDragging = false;

        document.addEventListener('mousemove', (e) => {
          mouseX = (e.clientX / window.innerWidth) * 2 - 1;
          mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
          if (!isDragging) {
            targetRotationY = mouseX * Math.PI * 1.5;
            targetRotationX = mouseY * Math.PI * 0.75;
          }
        }, { passive: true });

        document.addEventListener('mousedown', () => { isDragging = true; });
        document.addEventListener('mouseup', () => { isDragging = false; });

        document.addEventListener('touchstart', (e) => {
          e.preventDefault();
          const touch = e.touches[0];
          touchX = (touch.clientX / window.innerWidth) * 2 - 1;
          touchY = -(touch.clientY / window.innerHeight) * 2 + 1;
          isDragging = true;
          triggerBigBang();
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
          e.preventDefault();
          const touch = e.touches[0];
          const newTouchX = (touch.clientX / window.innerWidth) * 2 - 1;
          const newTouchY = -(touch.clientY / window.innerHeight) * 2 + 1;
          if (isDragging) {
            targetRotationY += (newTouchX - touchX) * Math.PI * 2;
            targetRotationX += (newTouchY - touchY) * Math.PI;
            touchX = newTouchX;
            touchY = newTouchY;
          }
        }, { passive: false });

        document.addEventListener('touchend', () => { isDragging = false; });

        // Animation Loop
        function animate(time) {
          try {
            requestAnimationFrame(animate);
            cube.rotation.y += (targetRotationY - cube.rotation.y) * 0.1;
            cube.rotation.x += (targetRotationX - cube.rotation.x) * 0.1;
            edgeMaterial.uniforms.time.value = time * 0.001;
            particleMaterial.uniforms.time.value = time * 0.001;
            composer.render();
          } catch (error) {
            logDebug('WebGL Render Error: ' + error.message);
            document.getElementById('error-message').style.display = 'block';
          }
        }
        animate(0);

        // Resize Handler
        window.addEventListener('resize', () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
          composer.setSize(window.innerWidth, window.innerHeight);
        }, { passive: true });

        window.triggerBigBang = triggerBigBang;
        return true;
      } catch (error) {
        logDebug('WebGL Initialization Error: ' + error.message);
        return false;
      }
    }

    // Copy IP to Clipboard
    window.copyIP = function() {
      try {
        const ip = document.getElementById('ip-display').textContent;
        if (!ip || ip === 'IP unavailable') {
          logDebug('No IP to copy');
          return;
        }
        navigator.clipboard.writeText(ip).then(() => {
          window.triggerBigBang();
          logDebug('IP copied successfully');
        }).catch(err => {
          logDebug('Clipboard Error: ' + err.message);
          const textarea = document.createElement('textarea');
          textarea.value = ip;
          document.body.appendChild(textarea);
          textarea.select();
          try {
            document.execCommand('copy');
            window.triggerBigBang();
            logDebug('Fallback copy successful');
          } catch (e) {
            logDebug('Fallback Copy Error: ' + e.message);
          }
          document.body.removeChild(textarea);
        });
      } catch (error) {
        logDebug('Copy IP Error: ' + error.message);
      }
    };

    // Initialize Everything
    document.addEventListener('DOMContentLoaded', () => {
      fetchPublicIP();
      fetchNetworkInfo();
      initSpeedTest();
      const errorMessage = document.getElementById('error-message');
      if (!initBackgroundCanvas() || !initWebGL()) {
        errorMessage.style.display = 'block';
      } else {
        errorMessage.style.display = 'none';
      }
      document.getElementById('copy-ip-btn').addEventListener('click', window.copyIP);
    });
  </script>
</body>
</html>
