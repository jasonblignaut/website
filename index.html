<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Source+Code+Pro&display=swap" rel="stylesheet">

  <!-- Style -->
  <style>
    :root {
      --matrix-blue: #00b7eb;
      --cosmic-magenta: #ff00cc;
      --cosmic-gold: #ffd700;
      --cosmic-cyan: #00ffff;
      --light-aura: #e6f0ff;
      --glow-radius: 15px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Source+Code+Pro', monospace;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: #000000;
      color: var(--light-aura);
      overflow: hidden;
      margin: 0;
      touch-action: none;
    }

    #background-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: block;
      opacity: 1;
    }

    #webgl-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      display: block;
    }

    .container {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: clamp(1rem, 3vw, 1.5rem);
      padding-top: clamp(4rem, 10vh, 6rem);
    }

    h1 {
      font-family: 'Source+Code+Pro', monospace;
      font-size: clamp(2rem, 6vw, 4rem);
      text-transform: uppercase;
      color: var(--light-aura);
      margin-bottom: clamp(1rem, 3vw, 1.5rem);
      text-shadow: 0 0 5px var(--matrix-blue);
      letter-spacing: 0.2rem;
      font-weight: 700;
    }

    .ip-display {
      font-family: 'Source+Code+Pro', monospace;
      font-size: clamp(1.5rem, 4vw, 2.8rem);
      color: var(--light-aura);
      background: rgba(8, 8, 26, 0.85);
      padding: clamp(0.8rem, 2vw, 1rem) clamp(1.5rem, 3vw, 2.5rem);
      border-radius: 12px;
      border: 2px solid var(--matrix-blue);
      box-shadow: 0 0 20px var(--matrix-blue);
      margin-bottom: clamp(0.5rem, 1.5vw, 0.8rem);
      text-shadow: 0 0 10px var(--matrix-blue);
      word-break: break-all;
    }

    .network-info {
      font-family: 'Source+Code+Pro', monospace;
      font-size: clamp(0.7rem, 1.5vw, 1rem);
      color: var(--light-aura);
      max-width: clamp(200px, 80vw, 400px);
      line-height: 1.6;
      text-shadow: 0 0 5px var(--matrix-blue);
      margin-bottom: clamp(0.8rem, 2vw, 1.2rem);
      text-align: center;
    }

    .error-message {
      font-family: 'Source+Code+Pro', monospace;
      font-size: clamp(0.7rem, 1.5vw, 1rem);
      color: #ff5555;
      margin-top: 1rem;
      text-shadow: 0 0 5px var(--matrix-blue);
      display: none;
    }

    .btn {
      background: linear-gradient(90deg, var(--matrix-blue), var(--cosmic-magenta));
      color: var(--light-aura);
      border: none;
      padding: clamp(0.6rem, 1.5vw, 0.8rem) clamp(1.5rem, 3vw, 2rem);
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Source+Code+Pro', monospace;
      font-size: clamp(0.8rem, 1.5vw, 1rem);
      text-transform: uppercase;
      box-shadow: 0 0 var(--glow-radius) var(--matrix-blue);
      transition: all 0.3s ease;
      margin-top: clamp(0.3rem, 1vw, 0.5rem);
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 calc(var(--glow-radius) * 1.5) var(--cosmic-magenta);
      background: var(--cosmic-cyan);
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: transparent;
      padding: clamp(0.5rem, 2vw, 1rem);
      text-align: center;
      font-size: clamp(0.7rem, 1.5vw, 0.9rem);
      color: var(--light-aura);
      z-index: 10;
      text-shadow: 0 0 5px var(--matrix-blue);
    }

    @media (max-width: 768px) {
      .container {
        padding: clamp(0.5rem, 2vw, 1rem);
        padding-top: clamp(3rem, 8vh, 5rem);
      }

      h1 {
        font-size: clamp(1.5rem, 4vw, 2.5rem);
        letter-spacing: 0.15rem;
      }

      .ip-display {
        font-size: clamp(1.2rem, 3vw, 2rem);
        padding: clamp(0.5rem, 1.5vw, 0.8rem) clamp(1rem, 2vw, 1.5rem);
      }

      .network-info, .error-message {
        font-size: clamp(0.6rem, 1.2vw, 0.9rem);
        max-width: 90vw;
      }

      .btn {
        padding: clamp(0.4rem, 1vw, 0.6rem) clamp(1rem, 2vw, 1.5rem);
        font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: clamp(1.2rem, 3.5vw, 2rem);
        letter-spacing: 0.1rem;
      }

      .ip-display {
        font-size: clamp(1rem, 2.5vw, 1.5rem);
      }

      .network-info, .error-message {
        font-size: clamp(0.5rem, 1vw, 0.8rem);
      }

      .btn {
        font-size: clamp(0.6rem, 1vw, 0.8rem);
      }
    }
  </style>
</head>

<body>
  <canvas id="background-canvas"></canvas>
  <canvas id="webgl-canvas"></canvas>

  <div class="container">
    <h1>YOUR PUBLIC IP</h1>
    <div class="ip-display" id="ip-display">Fetching IP...</div>
    <div class="network-info" id="network-info">Fetching network info...</div>
    <div class="error-message" id="error-message">Animations failed to load. Please check your browser settings.</div>
    <button class="btn" onclick="copyIP()">Copy IP</button>
  </div>

  <footer>
    © 2025 Labverse | Powered by 1FAR | WHAT IS MY IP ADDRESS
  </footer>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // Debug Logging
    function logDebug(message) {
      console.log('[DEBUG] ' + message);
    }

    // Fetch Public IP
    async function fetchPublicIP() {
      try {
        const response = await fetch('https://api.ipify.org?format=json');
        if (!response.ok) throw new Error('IP fetch failed');
        const data = await response.json();
        document.getElementById('ip-display').textContent = data.ip;
        return data.ip;
      } catch (error) {
        document.getElementById('ip-display').textContent = 'IP unavailable';
        logDebug('IP Fetch Error: ' + error.message);
        return null;
      }
    }

    // Fetch Network Info
    async function fetchNetworkInfo() {
      let networkData = { isp: 'Unknown', city: 'Unknown', country: 'Unknown' };
      const endpoints = [
        'https://ip-api.com/json',
        'https://ipinfo.io/json',
        'https://get.geojs.io/v1/ip/geo.json'
      ];

      for (const url of endpoints) {
        try {
          const response = await fetch(url);
          if (!response.ok) continue;
          const data = await response.json();
          if (url.includes('ip-api.com') && data.status !== 'fail') {
            networkData.isp = data.isp || 'Unknown';
            networkData.city = data.city || 'Unknown';
            networkData.country = data.country || 'Unknown';
          } else if (url.includes('ipinfo.io')) {
            networkData.isp = data.org?.split(' ').slice(1).join(' ') || 'Unknown';
            networkData.city = data.city || 'Unknown';
            networkData.country = data.country || 'Unknown';
          } else if (url.includes('geojs.io')) {
            networkData.isp = data.organization_name || 'Unknown';
            networkData.city = data.city || 'Unknown';
            networkData.country = data.country || 'Unknown';
          }
          document.getElementById('network-info').innerHTML = `ISP: ${networkData.isp}<br>Location: ${networkData.city}, ${networkData.country}`;
          return;
        } catch (error) {
          logDebug(`Network Info Fetch Error (${url}): ${error.message}`);
        }
      }
      document.getElementById('network-info').innerHTML = `ISP: Unknown<br>Location: Unknown`;
    }

    // Initialize Fetch
    fetchPublicIP();
    fetchNetworkInfo();

    // WebGL Animation
    function initWebGL() {
      try {
        const canvas = document.getElementById('webgl-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 2.5);
        camera.lookAt(0, 0, 0);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);

        // Post-processing
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);
        const bloomPass = new UnrealBloomPass(
          new THREE.Vector2(window.innerWidth, window.innerHeight),
          0.7,
          0.4,
          0.75
        );
        composer.addPass(bloomPass);

        // Outer dodecahedron
        const outerGeometry = new THREE.DodecahedronGeometry(1, 0);
        const outerMaterial = new THREE.ShaderMaterial({
          uniforms: {
            time: { value: 0 },
            uColor1: { value: new THREE.Color('#ff4d94') },
            uColor2: { value: new THREE.Color('#4dffeb') },
            uColor3: { value: new THREE.Color('#cc66ff') }
          },
          vertexShader: `
            varying vec3 vNormal;
            varying vec3 vPosition;
            void main() {
              vNormal = normalize(normalMatrix * normal);
              vPosition = position;
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
          `,
          fragmentShader: `
            uniform float time;
            uniform vec3 uColor1;
            uniform vec3 uColor2;
            uniform vec3 uColor3;
            varying vec3 vNormal;
            varying vec3 vPosition;

            void main() {
              float t1 = sin(time * 0.6 + 3.141592653589793) * 0.5 + 0.5;
              float t2 = sin(time * 0.4) * 0.5 + 0.5;
              vec3 color = mix(uColor1, uColor2, t1);
              color = mix(color, uColor3, t2);
              float r = 0.5 + 0.5 * sin(time * 0.3 + vPosition.x * 1.618033988749895);
              float g = 0.5 + 0.5 * sin(time * 0.5 + vPosition.y * 1.618033988749895);
              float b = 0.5 + 0.5 * sin(time * 0.7 + vPosition.z * 1.618033988749895);
              vec3 ledColor = mix(color, vec3(r, g, b), 0.3);
              float fresnel = pow(1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0))), 4.0);
              vec3 finalColor = ledColor + fresnel * ledColor * 1.3;
              gl_FragColor = vec4(finalColor, 0.95);
            }
          `,
          transparent: true,
          side: THREE.DoubleSide
        });

        const outerDodecahedron = new THREE.Mesh(outerGeometry, outerMaterial);
        scene.add(outerDodecahedron);

        // Middle dodecahedron
        const middleGeometry = new THREE.DodecahedronGeometry(0.65, 0);
        const middleMaterial = new THREE.ShaderMaterial({
          uniforms: outerMaterial.uniforms,
          vertexShader: outerMaterial.vertexShader,
          fragmentShader: `
            uniform float time;
            uniform vec3 uColor1;
            uniform vec3 uColor2;
            uniform vec3 uColor3;
            varying vec3 vNormal;
            varying vec3 vPosition;

            void main() {
              float t1 = sin(time * 0.5 + 1.5707963267948966) * 0.5 + 0.5;
              float t2 = sin(time * 0.3) * 0.5 + 0.5;
              vec3 color = mix(uColor2, uColor3, t1);
              color = mix(color, uColor1, t2);
              float r = 0.5 + 0.5 * sin(time * 0.4 + vPosition.x * 1.618033988749895);
              float g = 0.5 + 0.5 * sin(time * 0.6 + vPosition.y * 1.618033988749895);
              float b = 0.5 + 0.5 * sin(time * 0.8 + vPosition.z * 1.618033988749895);
              vec3 ledColor = mix(color, vec3(r, g, b), 0.35);
              float fresnel = pow(1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0))), 3.5);
              vec3 finalColor = ledColor + fresnel * ledColor * 1.1;
              gl_FragColor = vec4(finalColor, 0.93);
            }
          `,
          transparent: true,
          side: THREE.DoubleSide
        });

        const middleDodecahedron = new THREE.Mesh(middleGeometry, middleMaterial);
        outerDodecahedron.add(middleDodecahedron);

        // Inner dodecahedron
        const innerGeometry = new THREE.DodecahedronGeometry(0.35, 0);
        const innerMaterial = new THREE.ShaderMaterial({
          uniforms: outerMaterial.uniforms,
          vertexShader: outerMaterial.vertexShader,
          fragmentShader: `
            uniform float time;
            uniform vec3 uColor1;
            uniform vec3 uColor2;
            uniform vec3 uColor3;
            varying vec3 vNormal;
            varying vec3 vPosition;

            void main() {
              float t1 = sin(time * 0.7 + 4.71238898038469) * 0.5 + 0.5;
              float t2 = sin(time * 0.2) * 0.5 + 0.5;
              vec3 color = mix(uColor3, uColor1, t1);
              color = mix(color, uColor2, t2);
              float r = 0.5 + 0.5 * sin(time * 0.5 + vPosition.x * 2.0);
              float g = 0.5 + 0.5 * sin(time * 0.7 + vPosition.y * 2.0);
              float b = 0.5 + 0.5 * sin(time * 0.9 + vPosition.z * 2.0);
              vec3 ledColor = mix(color, vec3(r, g, b), 0.4);
              float fresnel = pow(1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0))), 3.0);
              vec3 finalColor = ledColor + fresnel * ledColor * 1.0;
              gl_FragColor = vec4(finalColor, 0.9);
            }
          `,
          transparent: true,
          side: THREE.DoubleSide
        });

        const innerDodecahedron = new THREE.Mesh(innerGeometry, innerMaterial);
        middleDodecahedron.add(innerDodecahedron);

        // LED strips
        function createLEDEdges(geometry) {
          const edgesGeometry = new THREE.EdgesGeometry(geometry);
          const ledMaterial = new THREE.ShaderMaterial({
            uniforms: {
              time: { value: 0 },
              uColor1: { value: new THREE.Color('#ff4d94') },
              uColor2: { value: new THREE.Color('#4dffeb') },
              uColor3: { value: new THREE.Color('#cc66ff') },
              uColor4: { value: new THREE.Color('#66ff99') }
            },
            vertexShader: `
              varying vec3 vPosition;
              void main() {
                vPosition = position;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
              }
            `,
            fragmentShader: `
              uniform float time;
              uniform vec3 uColor1;
              uniform vec3 uColor2;
              uniform vec3 uColor3;
              uniform vec3 uColor4;
              varying vec3 vPosition;

              void main() {
                float t1 = sin(time * 0.8) * 0.5 + 0.5;
                float t2 = sin(time * 0.5 + 3.141592653589793) * 0.5 + 0.5;
                float t3 = sin(time * 0.3) * 0.5 + 0.5;
                vec3 color = mix(uColor1, uColor2, t1);
                color = mix(color, uColor3, t2);
                color = mix(color, uColor4, t3);
                float r = 0.5 + 0.5 * sin(time * 1.0 + vPosition.x * 1.618033988749895);
                float g = 0.5 + 0.5 * sin(time * 1.2 + vPosition.y * 1.618033988749895);
                float b = 0.5 + 0.5 * sin(time * 1.4 + vPosition.z * 1.618033988749895);
                vec3 ledColor = mix(color, vec3(r, g, b), 0.5);
                float glow = sin(time * 2.5 + vPosition.x * 0.5) * 0.5 + 0.5;
                gl_FragColor = vec4(ledColor * (1.0 + glow * 1.0), 1.0);
              }
            `,
            transparent: true
          });
          return new THREE.LineSegments(edgesGeometry, ledMaterial);
        }

        outerDodecahedron.add(createLEDEdges(outerGeometry));
        middleDodecahedron.add(createLEDEdges(middleGeometry));
        innerDodecahedron.add(createLEDEdges(innerGeometry));

        // Fibonacci-inspired LED particles
        const ledCount = 200;
        const ledGeometry = new THREE.BufferGeometry();
        const ledPositions = new Float32Array(ledCount * 3);
        const ledOffsets = new Float32Array(ledCount);
        const phi = (1 + Math.sqrt(5)) / 2;
        for (let i = 0; i < ledCount; i++) {
          const theta = i * 2 * Math.PI * phi;
          const r = Math.sqrt(i) * 0.05;
          const x = r * Math.cos(theta);
          const y = r * Math.sin(theta);
          const z = (Math.random() - 0.5) * 0.5;
          ledPositions[i * 3] = isFinite(x) ? x : 0;
          ledPositions[i * 3 + 1] = isFinite(y) ? y : 0;
          ledPositions[i * 3 + 2] = isFinite(z) ? z : 0;
          ledOffsets[i] = Math.random() * Math.PI * 2;
        }
        ledGeometry.setAttribute('position', new THREE.BufferAttribute(ledPositions, 3));
        ledGeometry.setAttribute('offset', new THREE.BufferAttribute(ledOffsets, 1));
        const ledParticleMaterial = new THREE.ShaderMaterial({
          uniforms: {
            time: { value: 0 },
            uColor1: { value: new THREE.Color('#ff4d94') },
            uColor2: { value: new THREE.Color('#4dffeb') },
            uColor3: { value: new THREE.Color('#cc66ff') },
            uColor4: { value: new THREE.Color('#66ff99') }
          },
          vertexShader: `
            attribute float offset;
            varying float vOffset;
            void main() {
              vOffset = offset;
              gl_PointSize = 8.0;
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
          `,
          fragmentShader: `
            uniform float time;
            uniform vec3 uColor1;
            uniform vec3 uColor2;
            uniform vec3 uColor3;
            uniform vec3 uColor4;
            varying float vOffset;

            void main() {
              float pulse = sin(time * 3.0 + vOffset) * 0.5 + 0.5;
              float t1 = sin(time * 0.6) * 0.5 + 0.5;
              float t2 = sin(time * 0.4 + 3.141592653589793) * 0.5 + 0.5;
              vec3 color = mix(uColor1, uColor2, t1);
              color = mix(color, uColor3, t2);
              color = mix(color, uColor4, sin(time * 0.2) * 0.5 + 0.5);
              float r = 0.5 + 0.5 * sin(time * 0.8 + vOffset * 1.618033988749895);
              float g = 0.5 + 0.5 * sin(time * 1.0 + vOffset * 1.618033988749895);
              float b = 0.5 + 0.5 * sin(time * 1.2 + vOffset * 1.618033988749895);
              vec3 ledColor = mix(color, vec3(r, g, b), 0.6);
              vec2 coord = gl_PointCoord - vec2(0.5);
              float dist = length(coord);
              if (dist > 0.5) discard;
              float alpha = smoothstep(0.5, 0.2, dist);
              gl_FragColor = vec4(ledColor * (1.0 + pulse), alpha);
            }
          `,
          transparent: true
        });
        const ledParticles = new THREE.Points(ledGeometry, ledParticleMaterial);
        outerDodecahedron.add(ledParticles);

        // Fibonacci-inspired quantum particles
        const particleCount = 50;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        const particleVelocities = new Float32Array(particleCount * 3);
        const particleLifetimes = new Float32Array(particleCount);
        const particleOffsets = new Float32Array(particleCount);
        for (let i = 0; i < particleCount; i++) {
          const theta = i * 2 * Math.PI * phi;
          const r = Math.sqrt(i) * 0.3;
          const x = r * Math.cos(theta);
          const y = r * Math.sin(theta);
          const z = (Math.random() - 0.5) * 2;
          particlePositions[i * 3] = isFinite(x) ? x : 0;
          particlePositions[i * 3 + 1] = isFinite(y) ? y : 0;
          particlePositions[i * 3 + 2] = isFinite(z) ? z : 0;
          particleVelocities[i * 3] = (Math.random() - 0.5) * 0.05;
          particleVelocities[i * 3 + 1] = (Math.random() - 0.5) * 0.05;
          particleVelocities[i * 3 + 2] = (Math.random() - 0.5) * 0.05;
          particleLifetimes[i] = Math.random() * 4 + 1;
          particleOffsets[i] = Math.random() * Math.PI * 2;
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        particleGeometry.setAttribute('offset', new THREE.BufferAttribute(particleOffsets, 1));
        const particleMaterial = new THREE.ShaderMaterial({
          uniforms: { time: { value: 0 } },
          vertexShader: `
            attribute float offset;
            varying float vOffset;
            void main() {
              vOffset = offset;
              gl_PointSize = 6.0 + sin(offset) * 3.0;
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
          `,
          fragmentShader: `
            uniform float time;
            varying float vOffset;
            void main() {
              float t = sin(time * 2.0 + vOffset) * 0.5 + 0.5;
              vec3 color = vec3(
                0.5 + 0.5 * sin(t * 3.141592653589793 + 2.0),
                0.5 + 0.5 * cos(t * 3.141592653589793 + 1.0),
                0.7 + 0.3 * sin(t * 3.141592653589793)
              );
              vec2 coord = gl_PointCoord - vec2(0.5);
              float dist = length(coord);
              if (dist > 0.5) discard;
              float alpha = smoothstep(0.5, 0.2, dist) * (0.8 + t * 0.2);
              gl_FragColor = vec4(color, alpha);
            }
          `,
          transparent: true
        });
        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);

        // Interactivity
        let mouseX = 0, mouseY = 0;
        let touchX = 0, touchY = 0;
        let targetRotationX = 0, targetRotationY = 0;
        let isDragging = false;

        document.addEventListener('mousemove', (e) => {
          mouseX = (e.clientX / window.innerWidth) * 2 - 1;
          mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
          if (!isDragging) {
            targetRotationY = mouseX * Math.PI * 1.5;
            targetRotationX = mouseY * Math.PI * 0.75;
          }
        }, { passive: true });

        document.addEventListener('mousedown', () => { isDragging = true; });
        document.addEventListener('mouseup', () => { isDragging = false; });

        document.addEventListener('touchstart', (e) => {
          e.preventDefault();
          const touch = e.touches[0];
          touchX = (touch.clientX / window.innerWidth) * 2 - 1;
          touchY = -(touch.clientY / window.innerHeight) * 2 + 1;
          isDragging = true;
          triggerBigBang();
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
          e.preventDefault();
          const touch = e.touches[0];
          const newTouchX = (touch.clientX / window.innerWidth) * 2 - 1;
          const newTouchY = -(touch.clientY / window.innerHeight) * 2 + 1;
          if (isDragging) {
            targetRotationY += (newTouchX - touchX) * Math.PI * 2;
            targetRotationX += (newTouchY - touchY) * Math.PI;
            touchX = newTouchX;
            touchY = newTouchY;
          }
        }, { passive: false });

        document.addEventListener('touchend', () => { isDragging = false; });

        function triggerBigBang() {
          const burstCount = 30;
          const burstPositions = new Float32Array(burstCount * 3);
          const burstVelocities = new Float32Array(burstCount * 3);
          for (let i = 0; i < burstCount; i++) {
            const theta = i * 2 * Math.PI * phi;
            const r = Math.sqrt(i) * 0.1;
            const x = r * Math.cos(theta);
            const y = r * Math.sin(theta);
            const z = (Math.random() - 0.5) * 0.5;
            burstPositions[i * 3] = isFinite(x) ? x : 0;
            burstPositions[i * 3 + 1] = isFinite(y) ? y : 0;
            burstPositions[i * 3 + 2] = isFinite(z) ? z : 0;
            burstVelocities[i * 3] = (Math.random() - 0.5) * 0.1;
            burstVelocities[i * 3 + 1] = (Math.random() - 0.5) * 0.1;
            burstVelocities[i * 3 + 2] = (Math.random() - 0.5) * 0.1;
          }
          const burstGeometry = new THREE.BufferGeometry();
          burstGeometry.setAttribute('position', new THREE.BufferAttribute(burstPositions, 3));
          const burstMaterial = new THREE.PointsMaterial({
            size: 10,
            color: new THREE.Color(Math.random(), Math.random(), Math.random()),
            transparent: true,
            opacity: 0.9
          });
          const burst = new THREE.Points(burstGeometry, burstMaterial);
          outerDodecahedron.add(burst);
          let burstTime = 0;
          const animateBurst = () => {
            burstTime += 0.016;
            burstMaterial.opacity = Math.max(0, 0.9 - burstTime * 0.9);
            if (burstTime < 1) {
              for (let i = 0; i < burstCount; i++) {
                burstPositions[i * 3] += burstVelocities[i * 3];
                burstPositions[i * 3 + 1] += burstVelocities[i * 3 + 1];
                burstPositions[i * 3 + 2] += burstVelocities[i * 3 + 2];
              }
              burstGeometry.attributes.position.needsUpdate = true;
              requestAnimationFrame(animateBurst);
            } else {
              scene.remove(burst);
              burstGeometry.dispose();
              burstMaterial.dispose();
            }
          };
          animateBurst();
        }

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 0.9);
        scene.add(ambientLight);
        const pointLight1 = new THREE.PointLight(0xffffff, 2.0, 10);
        pointLight1.position.set(5, 5, 5);
        scene.add(pointLight1);
        const pointLight2 = new THREE.PointLight(0xffffff, 1.5, 10);
        pointLight2.position.set(-5, -5, -5);
        scene.add(pointLight2);

        // Animation loop
        function animate(time) {
          try {
            requestAnimationFrame(animate);

            // Update Fibonacci particles
            for (let i = 0; i < particleCount; i++) {
              const t = time * 0.001 + particleOffsets[i];
              const omega = phi;
              let x = particlePositions[i * 3] + particleVelocities[i * 3] * 0.05 * Math.sin(omega * t);
              let y = particlePositions[i * 3 + 1] + particleVelocities[i * 3 + 1] * 0.05 * Math.cos(omega * t);
              let z = particlePositions[i * 3 + 2] + particleVelocities[i * 3 + 2] * 0.05 * Math.sin(omega * t * phi);
              particlePositions[i * 3] = isFinite(x) ? x : 0;
              particlePositions[i * 3 + 1] = isFinite(y) ? y : 0;
              particlePositions[i * 3 + 2] = isFinite(z) ? z : 0;
              particleLifetimes[i] -= 0.016;
              if (particleLifetimes[i] <= 0) {
                const theta = i * 2 * Math.PI * phi;
                const r = Math.sqrt(i) * 0.3;
                x = r * Math.cos(theta);
                y = r * Math.sin(theta);
                z = (Math.random() - 0.5) * 2;
                particlePositions[i * 3] = isFinite(x) ? x : 0;
                particlePositions[i * 3 + 1] = isFinite(y) ? y : 0;
                particlePositions[i * 3 + 2] = isFinite(z) ? z : 0;
                particleVelocities[i * 3] = (Math.random() - 0.5) * 0.05;
                particleVelocities[i * 3 + 1] = (Math.random() - 0.5) * 0.05;
                particleVelocities[i * 3 + 2] = (Math.random() - 0.5) * 0.05;
                particleLifetimes[i] = Math.random() * 4 + 1;
              }
            }
            particleGeometry.attributes.position.needsUpdate = true;

            // Update rotations
            outerDodecahedron.rotation.y += (targetRotationY - outerDodecahedron.rotation.y) * 0.1;
            outerDodecahedron.rotation.x += (targetRotationX - outerDodecahedron.rotation.x) * 0.1;
            middleDodecahedron.rotation.x -= 0.003;
            middleDodecahedron.rotation.y -= 0.003;
            innerDodecahedron.rotation.x += 0.004;
            innerDodecahedron.rotation.y += 0.004;
            outerMaterial.uniforms.time.value = time * 0.001;
            middleMaterial.uniforms.time.value = time * 0.001;
            innerMaterial.uniforms.time.value = time * 0.001;
            ledParticleMaterial.uniforms.time.value = time * 0.001;
            particleMaterial.uniforms.time.value = time * 0.001;

            outerDodecahedron.children.forEach(child => {
              if (child.material && child.material.uniforms) {
                child.material.uniforms.time.value = time * 0.001;
              }
            });

            composer.render();
          } catch (error) {
            logDebug('WebGL Render Error: ' + error.message);
            document.getElementById('error-message').style.display = 'block';
          }
        }
        animate(0);

        // Resize handler
        window.addEventListener('resize', () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
          composer.setSize(window.innerWidth, window.innerHeight);
        }, { passive: true });

        // Expose for copyIP
        window.triggerBigBang = triggerBigBang;
        return true;
      } catch (error) {
        logDebug('WebGL Initialization Error: ' + error.message);
        return false;
      }
    }

    // Cosmic Flower of Life Background
    function init2DCanvas() {
      try {
        const canvas = document.getElementById('background-canvas');
        const ctx = canvas.getContext('2d');
        if (!ctx) {
          logDebug('2D canvas context not supported');
          return false;
        }

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function drawCosmicBackground(time) {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          const gradient = ctx.createRadialGradient(
            canvas.width / 2, canvas.height / 2, 0,
            canvas.width / 2, canvas.height / 2, Math.max(canvas.width, canvas.height)
          );
          gradient.addColorStop(0, 'rgba(15, 15, 40, 1)');
          gradient.addColorStop(0.3, 'rgba(30, 60, 100, 0.9)');
          gradient.addColorStop(0.7, 'rgba(10, 20, 50, 0.7)');
          gradient.addColorStop(1, 'rgba(0, 0, 0, 1)');
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          for (let i = 0; i < 150; i++) {
            ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.6 + 0.3})`;
            ctx.beginPath();
            ctx.arc(
              Math.random() * canvas.width,
              Math.random() * canvas.height,
              Math.random() * 2,
              0, Math.PI * 2
            );
            ctx.fill();
          }

          ctx.strokeStyle = `rgba(100, 200, 255, ${0.35 + Math.sin(time * 0.001) * 0.25})`;
          ctx.lineWidth = 2;
          const centerX = canvas.width / 2;
          const centerY = canvas.height / 2;
          const radius = Math.min(canvas.width, canvas.height) / 12;
          const offset = radius * 1.732050807568877;
          const anim = Math.sin(time * 0.0005) * 6;
          for (let i = -2; i <= 2; i++) {
            for (let j = -2; j <= 2; j++) {
              if (Math.abs(i) + Math.abs(j) <= 3 && !(i === 0 && j === 0)) {
                const x = centerX + (i * offset + j * offset / 2) + anim;
                const y = centerY + j * offset * 0.8660254037844386 + anim;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.stroke();
              }
            }
          }
          ctx.beginPath();
          ctx.arc(centerX + anim, centerY + anim, radius, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(centerX + anim, centerY + anim, radius * 3.4641016151377544, 0, Math.PI * 2);
          ctx.stroke();
        }

        function animateBackground(time) {
          requestAnimationFrame(animateBackground);
          drawCosmicBackground(time);
        }
        animateBackground(0);

        window.addEventListener('resize', () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }, { passive: true });

        return true;
      } catch (error) {
        logDebug('2D Canvas Initialization Error: ' + error.message);
        return false;
      }
    }

    // Initialize Animations
    document.addEventListener('DOMContentLoaded', () => {
      const errorMessage = document.getElementById('error-message');
      if (!init2DCanvas() || !initWebGL()) {
        errorMessage.style.display = 'block';
      } else {
        errorMessage.style.display = 'none';
      }
    });

    // Copy IP to Clipboard
    function copyIP() {
      try {
        logDebug('Copy IP button clicked');
        const ip = document.getElementById('ip-display').textContent;
        if (!ip || ip === 'IP unavailable') {
          logDebug('No IP to copy');
          return;
        }

        navigator.clipboard.writeText(ip).then(() => {
          logDebug('IP copied successfully');
          window.triggerBigBang();
        }).catch(err => {
          logDebug('Clipboard Error: ' + err.message);
          const textarea = document.createElement('textarea');
          textarea.value = ip;
          document.body.appendChild(textarea);
          textarea.select();
          try {
            document.execCommand('copy');
            logDebug('Fallback copy successful');
            window.triggerBigBang();
          } catch (e) {
            logDebug('Fallback Copy Error: ' + e.message);
          }
          document.body.removeChild(textarea);
        });
      } catch (error) {
        logDebug('Copy IP Error: ' + error.message);
      }
    }
  </script>
</body>
