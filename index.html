    <style>
        :root {
            --matrix-blue: #00b7eb;
            --cosmic-magenta: #ff00cc;
            --void-black: #08081a;
            --light-aura: #e6f0ff;
            --glow-radius: 15px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Exo 2', sans-serif;
        }

        body {
            background: var(--void-black);
            color: var(--light-aura);
            overflow: hidden;
            position: relative;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(8, 8, 26, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1001;
        }

        .logo {
            font-family: 'Space Mono', monospace;
            font-size: 1.6rem;
            background: linear-gradient(90deg, var(--matrix-blue), var(--cosmic-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 8px var(--matrix-blue);
        }

        /* Main Content */
        .main {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 1.5rem;
            position: relative;
            z-index: 1;
        }

        .main h1 {
            font-family: 'Space Mono', monospace;
            font-size: clamp(2rem, 5vw, 4rem);
            background: linear-gradient(90deg, var(--matrix-blue), var(--cosmic-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            text-shadow: 0 0 12px var(--matrix-blue);
        }

        .ip-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(8, 8, 26, 0.9);
            padding: 1.5rem;
            border-radius: 12px;
            border: 2px solid var(--matrix-blue);
            box-shadow: 0 0 15px var(--matrix-blue);
            margin-bottom: 1rem;
        }

        .ip-display {
            font-family: 'Space Mono', monospace;
            font-size: clamp(1.8rem, 4vw, 3rem);
            color: var(--light-aura);
            text-shadow: 0 0 8px var(--matrix-blue);
            margin-bottom: 0.5rem;
        }

        .network-info {
            font-family: 'Space Mono', monospace;
            font-size: clamp(0.8rem, 1.5vw, 1rem);
            color: var(--light-aura);
            text-align: center;
            max-width: 400px;
            line-height: 1.4;
        }

        .copy-button {
            background: linear-gradient(90deg, var(--matrix-blue), var(--cosmic-magenta));
            color: var(--light-aura);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            text-transform: uppercase;
            box-shadow: 0 0 var(--glow-radius) var(--matrix-blue);
            transition: all 0.2s;
            margin-top: 1rem;
        }

        .copy-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 calc(var(--glow-radius) * 1.5) var(--matrix-blue);
        }

        /* Ad Blocks */
        .ad-container {
            margin: 1rem;
            max-width: 728px;
            width: 100%;
            height: 90px; /* Leaderboard ad size */
            background: rgba(255, 255, 255, 0.1); /* Placeholder */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        .ad-container.side {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 160px;
            height: 600px; /* Skyscraper ad size */
        }

        .ad-container.left {
            left: 10px;
        }

        .ad-container.right {
            right: 10px;
        }

        /* Background Canvas */
        #background-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Footer */
        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(8, 8, 26, 0.95);
            padding: 1rem;
            text-align: center;
            z-index: 1001;
        }

        footer p {
            color: var(--light-aura);
            font-size: 0.9rem;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .main h1 {
                font-size: clamp(1.8rem, 4vw, 2.5rem);
            }

            .ip-display {
                font-size: clamp(1.5rem, 3vw, 2rem);
            }

            .network-info {
                font-size: clamp(0.7rem, 1.2vw, 0.9rem);
            }

            .copy-button {
                padding: 0.6rem 1.5rem;
                font-size: 0.9rem;
            }

            .ad-container.side {
                display: none; /* Hide skyscraper ads on mobile */
            }
        }
    </style>
</head>
<body>
    <canvas id="background-canvas"></canvas>
    <header>
        <div class="logo">Labverse.co.za</div>
    </header>
    <section class="main">
        <!-- Top Ad -->
        <div class="ad-container">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-YOUR_PUBLISHER_ID"
                 data-ad-slot="YOUR_AD_SLOT_ID"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>
        <h1>Your Public IP Address</h1>
        <div class="ip-container">
            <div class="ip-display" id="ip-display">Fetching IP...</div>
            <div class="network-info" id="network-info">Fetching network info...</div>
            <button class="copy-button" onclick="copyIP()">Copy IP</button>
        </div>
        <!-- Bottom Ad -->
        <div class="ad-container">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-YOUR_PUBLISHER_ID"
                 data-ad-slot="YOUR_AD_SLOT_ID"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>
    </section>
    <!-- Left Ad -->
    <div class="ad-container side left">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-YOUR_PUBLISHER_ID"
             data-ad-slot="YOUR_AD_SLOT_ID"
             data-ad-format="vertical"></ins>
        <script>
            (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>
    <!-- Right Ad -->
    <div class="ad-container side right">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-YOUR_PUBLISHER_ID"
             data-ad-slot="YOUR_AD_SLOT_ID"
             data-ad-format="vertical"></ins>
        <script>
            (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>
    <footer>
        <p>© 2025 Labverse.co.za | Powered by AI, Math & Cosmic Precision</p>
    </footer>

    <script>
        // Fetch Public IP and Network Info
        async function fetchNetworkInfo() {
            try {
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                const ip = ipData.ip;
                document.getElementById('ip-display').textContent = ip;

                // Fetch network info using ip-api.com
                const networkResponse = await fetch(`http://ip-api.com/json/${ip}`);
                const networkData = await networkResponse.json();
                if (networkData.status === 'success') {
                    const dns = await fetchDNS(); // Custom DNS fetch (see below)
                    const info = [
                        `ISP: ${networkData.isp || 'Unknown'}`,
                        `Location: ${networkData.city || 'Unknown'}, ${networkData.country || 'Unknown'}`,
                        `DNS Nameservers: ${dns.join(', ') || 'Unknown'}`,
                        `AS: ${networkData.as || 'Unknown'}`
                    ].join(' | ');
                    document.getElementById('network-info').textContent = info;
                } else {
                    document.getElementById('network-info').textContent = 'Unable to fetch network info';
                }
            } catch (error) {
                document.getElementById('ip-display').textContent = 'Unable to fetch IP';
                document.getElementById('network-info').textContent = 'Unable to fetch network info';
                console.error('Error:', error);
            }
        }

        // Fetch DNS Nameservers (Fallback using public API)
        async function fetchDNS() {
            try {
                const response = await fetch('https://dns.google/resolve?name=labverse.co.za&type=NS');
                const data = await response.json();
                return data.Answer?.map(record => record.data) || ['Unknown'];
            } catch {
                return ['Unknown'];
            }
        }

        fetchNetworkInfo();

        // Copy IP to Clipboard
        function copyIP() {
            const ip = document.getElementById('ip-display').textContent;
            navigator.clipboard.writeText(ip).then(() => {
                alert('IP copied to clipboard!');
            }).catch(err => {
                console.error('Copy Error:', err);
            });
        }

        // Background Animation
        function initBackground() {
            const canvas = document.getElementById('background-canvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            camera.position.z = 10;

            let spirals = [], particles = [], trails = [], mousePos = { x: 0, y: 0 };

            // Mouse Interaction (Minimal)
            document.addEventListener('mousemove', (e) => {
                mousePos.x = (e.clientX / window.innerWidth) * 2 - 1;
                mousePos.y = -(e.clientY / window.innerHeight) * 2 + 1;
            }, { passive: true });

            // Check if position is outside IP and ad area (600x400px centered)
            function isOutsideIPArea(x, y) {
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                const ipWidth = 600; // Expanded for IP, network info, and button
                const ipHeight = 400; // Expanded for ad blocks
                return (Math.abs(x * window.innerWidth - centerX) > ipWidth / 2) || 
                       (Math.abs(y * window.innerHeight - centerY) > ipHeight / 2);
            }

            // Golden Spiral
            function createSpiral(offset, scale) {
                const phi = (1 + Math.sqrt(5)) / 2;
                const points = [];
                for (let i = 0; i < 20; i++) {
                    const theta = i * 0.2 + offset;
                    const r = Math.pow(phi, theta / Math.PI) * scale;
                    const x = r * Math.cos(theta);
                    const y = r * Math.sin(theta);
                    const screenX = (x / 10 + 0.5) * window.innerWidth;
                    const screenY = (-y / 10 + 0.5) * window.innerHeight;
                    if (isOutsideIPArea(screenX / window.innerWidth, screenY / window.innerHeight)) {
                        points.push(new THREE.Vector3(x, y, 0));
                    }
                }
                if (points.length < 2) return null;
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const material = new THREE.LineBasicMaterial({ color: 0xff00cc, transparent: true, opacity: 0.6 });
                const spiral = new THREE.Line(geometry, material);
                scene.add(spiral);
                return { obj: spiral, life: 10, offset, scale };
            }

            // Fibonacci Particles
            function createParticle(index, offset) {
                const fib = (n) => n <= 1 ? n : fib(n - 1) + fib(n - 2);
                const r = fib(index) * 0.08;
                const x = r * Math.cos(index + offset);
                const y = r * Math.sin(index + offset);
                const screenX = (x / 10 + 0.5) * window.innerWidth;
                const screenY = (-y / 10 + 0.5) * window.innerHeight;
                if (!isOutsideIPArea(screenX / window.innerWidth, screenY / window.innerHeight)) return null;
                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.Float32BufferAttribute([x, y, Math.random() * 0.05], 3));
                const material = new THREE.PointsMaterial({ color: 0x00b7eb, size: 0.06, transparent: true, opacity: 0.7 });
                const particle = new THREE.Points(geometry, material);
                scene.add(particle);
                return { obj: particle, life: 10, index, offset };
            }

            // Connecting Trails
            function createTrail(from, to, color) {
                const screenX1 = (from.x / 10 + 0.5) * window.innerWidth;
                const screenY1 = (-from.y / 10 + 0.5) * window.innerHeight;
                const screenX2 = (to.x / 10 + 0.5) * window.innerWidth;
                const screenY2 = (-to.y / 10 + 0.5) * window.innerHeight;
                if (!isOutsideIPArea(screenX1 / window.innerWidth, screenY1 / window.innerHeight) ||
                    !isOutsideIPArea(screenX2 / window.innerWidth, screenY2 / window.innerHeight)) return null;
                const points = [from, to];
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const material = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.4 });
                const trail = new THREE.Line(geometry, material);
                scene.add(trail);
                return { obj: trail, life: 10 };
            }

            // Initialize Animations
            function initAnimations() {
                const spiral = createSpiral(Math.random() * 2 * Math.PI, 0.08 + Math.random() * 0.04);
                if (spiral) spirals.push(spiral);
                for (let i = 0; i < 10; i++) {
                    const particle = createParticle(i % 5, Math.random() * 2 * Math.PI);
                    if (particle) particles.push(particle);
                }
            }
            initAnimations();

            function updateAnimations() {
                spirals = spirals.filter(s => {
                    if (s.life <= 0) { scene.remove(s.obj); return false; }
                    s.life -= 1 / 60;
                    s.obj.material.opacity = s.life / 10;
                    s.obj.rotation.z += 0.005 * (Math.random() - 0.5);
                    s.obj.position.x = mousePos.x * 0.1;
                    s.obj.position.y = mousePos.y * 0.1;
                    return true;
                });

                particles = particles.filter(p => {
                    if (p.life <= 0) { scene.remove(p.obj); return false; }
                    p.life -= 1 / 60;
                    p.obj.material.opacity = s.life / 10;
                    let newX = p.obj.position.x + (Math.random() - 0.5) * 0.01 + mousePos.x * 0.005;
                    let newY = p.obj.position.y + (Math.random() - 0.5) * 0.01 + mousePos.y * 0.005;
                    const screenX = (newX / 10 + 0.5) * window.innerWidth;
                    const screenY = (-newY / 10 + 0.5) * window.innerHeight;
                    if (isOutsideIPArea(screenX / window.innerWidth, screenY / window.innerHeight)) {
                        p.obj.position.x = newX;
                        p.obj.position.y = newY;
                    }
                    return true;
                });

                trails = trails.filter(t => {
                    if (t.life <= 0) { scene.remove(t.obj); return false; }
                    t.life -= 1 / 60;
                    t.obj.material.opacity = t.life / 10;
                    return true;
                });

                if (spirals.length < 3 && Math.random() < 0.03) {
                    const spiral = createSpiral(Math.random() * 2 * Math.PI, 0.08 + Math.random() * 0.04);
                    if (spiral) spirals.push(spiral);
                }
                if (particles.length < 10 && Math.random() < 0.05) {
                    const particle = createParticle(Math.floor(Math.random() * 5), Math.random() * 2 * Math.PI);
                    if (particle) particles.push(particle);
                }

                if (trails.length < 50) {
                    particles.forEach(p => {
                        const pos = p.obj.position;
                        particles.forEach(p2 => {
                            if (p !== p2) {
                                const pos2 = p2.obj.position;
                                const dist = pos.distanceTo(pos2);
                                if (dist < 0.5 && Math.random() < 0.01) {
                                    const trail = createTrail(pos, pos2, 0x00b7eb);
                                    if (trail) trails.push(trail);
                                }
                            }
                        });
                        spirals.forEach(s => {
                            const points = s.obj.geometry.attributes.position.array;
                            for (let i = 0; i < points.length; i += 3) {
                                const spiralPos = new THREE.Vector3(points[i], points[i + 1], points[i + 2]);
                                const dist = pos.distanceTo(spiralPos);
                                if (dist < 0.5 && Math.random() < 0.005) {
                                    const trail = createTrail(pos, spiralPos, 0xff00cc);
                                    if (trail) trails.push(trail);
                                }
                            }
                        });
                    });
                }
            }

            function animate() {
                requestAnimationFrame(animate);
                updateAnimations();
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }, { passive: true });
        }
        initBackground();
    </script>
</body>
