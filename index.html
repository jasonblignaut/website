<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Simulate life with cosmic particle interactions and view your public IP." />
  <meta name="keywords" content="Life Simulation, Standard Model, Public IP, Sacred Geometry" />
  <meta name="author" content="Labverse Team" />
  <meta property="og:title" content="Cosmic Life Simulation" />
  <meta property="og:description" content="Explore a physics-based simulation of life with mesmerizing particle interactions and discover your public IP." />
  <meta property="og:image" content="https://labverse.co.za/assets/labverse-og-image.png" />
  <meta property="og:url" content="https://labverse.co.za" />
  <meta name="twitter:card" content="summary_large_image" />

  <title>Cosmic Life Simulation</title>

  <!-- Favicon -->
  <link rel="icon" href="favicon.ico" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Source+Code+Pro&display=swap" rel="stylesheet">

  <!-- Style -->
  <style>
    :root {
      --matrix-blue: #00b7eb;
      --cosmic-magenta: #ff00cc;
      --cosmic-gold: #ffd700;
      --cosmic-cyan: #00ffff;
      --light-aura: #e6f0ff;
      --glow-radius: 15px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Source Code Pro', monospace;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: #000000;
      color: var(--light-aura);
      overflow: hidden;
      margin: 0;
    }

    #background-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: block;
      opacity: 1;
    }

    #fallback-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: none;
      opacity: 1;
    }

    .css-particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: none;
      pointer-events: none;
    }

    .css-particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: var(--matrix-blue);
      border-radius: 50%;
      animation: cssParticleMove 8s linear infinite;
      opacity: 0.8;
    }

    @keyframes cssParticleMove {
      0% { transform: translate(0, 0); opacity: 0.8; }
      50% { opacity: 1; }
      100% { transform: translate(100vw, 100vh); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: clamp(1rem, 3vw, 1.5rem);
      padding-top: clamp(4rem, 10vh, 6rem);
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 6vw, 4rem);
      text-transform: uppercase;
      color: var(--light-aura);
      margin-bottom: clamp(1rem, 3vw, 1.5rem);
      text-shadow: 0 0 10px var(--cosmic-cyan);
      letter-spacing: 0.2rem;
      font-weight: 700;
    }

    .ip-display {
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(1.5rem, 4vw, 2.8rem);
      color: var(--light-aura);
      background: rgba(8, 8, 26, 0.85);
      padding: clamp(0.8rem, 2vw, 1rem) clamp(1.5rem, 3vw, 2.5rem);
      border-radius: 12px;
      border: 2px solid var(--cosmic-magenta);
      box-shadow: 0 0 20px var(--cosmic-magenta);
      margin-bottom: clamp(0.5rem, 1.5vw, 0.8rem);
      text-shadow: 0 0 10px var(--cosmic-magenta);
      word-break: break-all;
    }

    .network-info {
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(0.7rem, 1.5vw, 1rem);
      color: var(--light-aura);
      max-width: clamp(200px, 80vw, 400px);
      line-height: 1.6;
      text-shadow: 0 0 5px var(--matrix-blue);
      margin-bottom: clamp(0.8rem, 2vw, 1.2rem);
      text-align: center;
    }

    .error-message {
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(0.7rem, 1.5vw, 1rem);
      color: #ff5555;
      margin-top: 1rem;
      text-shadow: 0 0 5px var(--matrix-blue);
      display: none;
    }

    .controls {
      display: flex;
      gap: clamp(0.5rem, 1vw, 1rem);
      margin-top: clamp(0.5rem, 1vw, 1rem);
    }

    .btn {
      background: linear-gradient(90deg, var(--matrix-blue), var(--cosmic-magenta));
      color: var(--light-aura);
      border: none;
      padding: clamp(0.6rem, 1.5vw, 0.8rem) clamp(1.5rem, 3vw, 2rem);
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(0.8rem, 1.5vw, 1rem);
      text-transform: uppercase;
      box-shadow: 0 0 var(--glow-radius) var(--matrix-blue);
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 calc(var(--glow-radius) * 1.5) var(--cosmic-magenta);
      background: var(--cosmic-cyan);
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: transparent;
      padding: clamp(0.5rem, 2vw, 1rem);
      text-align: center;
      font-size: clamp(0.7rem, 1.5vw, 0.9rem);
      color: var(--light-aura);
      z-index: 10;
      text-shadow: 0 0 5px var(--matrix-blue);
    }

    @media (max-width: 768px) {
      .container {
        padding: clamp(0.5rem, 2vw, 1rem);
        padding-top: clamp(3rem, 8vh, 5rem);
      }

      h1 {
        font-size: clamp(1.5rem, 4vw, 2.5rem);
        letter-spacing: 0.15rem;
      }

      .ip-display {
        font-size: clamp(1.2rem, 3vw, 2rem);
        padding: clamp(0.5rem, 1.5vw, 0.8rem) clamp(1rem, 2vw, 1.5rem);
      }

      .controls {
        flex-direction: column;
        gap: clamp(0.3rem, 0.8vw, 0.5rem);
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: clamp(1.2rem, 3.5vw, 2rem);
        letter-spacing: 0.1rem;
      }

      .ip-display {
        font-size: clamp(1rem, 2.5vw, 1.5rem);
      }

      .btn {
        font-size: clamp(0.6rem, 1vw, 0.8rem);
        padding: clamp(0.4rem, 1vw, 0.6rem) clamp(1rem, 2vw, 1.5rem);
      }
    }
  </style>
</head>

<body>
  <canvas id="background-canvas"></canvas>
  <canvas id="fallback-canvas"></canvas>
  <div class="css-particles" id="css-particles"></div>

  <div class="container">
    <h1>COSMIC LIFE SIMULATION</h1>
    <div class="ip-display" id="ip-display">Fetching IP...</div>
    <div class="network-info" id="network-info">Fetching network info...</div>
    <div class="error-message" id="error-message">Simulation failed to load. Please check your browser settings.</div>
    <div class="controls">
      <button class="btn" onclick="copyIP()">Copy IP</button>
      <button class="btn" onclick="spawnParticles()">Spawn Particles</button>
      <button class="btn" onclick="triggerBigBang()">Big Bang</button>
      <button class="btn" onclick="toggleForces()">Toggle Forces</button>
    </div>
  </div>

  <footer>
    © 2025 Labverse | Powered by 1FAR | SIMULATE LIFE
  </footer>

  <!-- Three.js ES Modules -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.150.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.150.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // Debug Logging
    function logDebug(message) {
      console.log('[DEBUG] ' + message);
    }

    // Fetch Public IP
    async function fetchPublicIP() {
      try {
        const response = await fetch('https://api.ipify.org?format=json');
        if (!response.ok) throw new Error('IP fetch failed');
        const data = await response.json();
        document.getElementById('ip-display').textContent = data.ip;
        return data.ip;
      } catch (error) {
        document.getElementById('ip-display').textContent = 'IP unavailable';
        logDebug('IP Fetch Error: ' + error.message);
        return null;
      }
    }

    // Fetch Network Info
    async function fetchNetworkInfo() {
      let networkData = { isp: 'Unknown', city: 'Unknown', country: 'Unknown' };
      try {
        const response = await fetch('https://ip-api.com/json'); // Updated to HTTPS
        if (response.ok) {
          const data = await response.json();
          if (data.status !== 'fail') {
            networkData.isp = data.isp || 'Unknown';
            networkData.city = data.city || 'Unknown';
            networkData.country = data.country || 'Unknown';
            document.getElementById('network-info').innerHTML = `ISP: ${networkData.isp}<br>Location: ${networkData.city}, ${networkData.country}`;
            return;
          }
        }
      } catch (error) {
        logDebug('ip-api.com Error: ' + error.message);
        try {
          const response = await fetch('https://ipinfo.io/json');
          if (response.ok) {
            const data = await response.json();
            networkData.isp = data.org?.split(' ').slice(1).join(' ') || 'Unknown';
            networkData.city = data.city || 'Unknown';
            networkData.country = data.country || 'Unknown';
            document.getElementById('network-info').innerHTML = `ISP: ${networkData.isp}<br>Location: ${networkData.city}, ${networkData.country}`;
            return;
          }
        } catch (error) {
          logDebug('ipinfo.io Error: ' + error.message);
          document.getElementById('network-info').innerHTML = `ISP: Unknown<br>Location: Unknown`;
        }
      }
    }

    // Initialize Fetch
    fetchPublicIP();
    fetchNetworkInfo();

    // Simulation System
    let animationMode = 'none';
    let triggerBigBang = () => {};
    let spawnParticles = () => {};
    let toggleForces = () => {};
    const errorMessage = document.getElementById('error-message');

    // WebGL Simulation
    function initWebGL(canvas) {
      logDebug('Attempting WebGL initialization...');
      try {
        // Clear any existing context
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const gl = canvas.getContext('webgl', { preserveDrawingBuffer: false }) || canvas.getContext('experimental-webgl');
        if (!gl) {
          logDebug('WebGL not supported');
          return false;
        }

        let scene = new THREE.Scene();
        let camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        let renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x000000, 0);
        camera.position.z = 50;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 1, 100);
        pointLight.position.set(10, 10, 10);
        scene.add(pointLight);

        let particles = [];
        let mousePos = { x: 0, y: 0 };
        let forcesEnabled = { em: true, strong: true, weak: false, higgs: true };

        document.addEventListener('mousemove', (e) => {
          mousePos.x = (e.clientX / window.innerWidth) * 2 - 1;
          mousePos.y = -(e.clientY / window.innerHeight) * 2 + 1;
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
          if (e.touches.length > 0) {
            mousePos.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
            mousePos.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
          }
        }, { passive: true });

        function createParticle(index, type = 'fermion', life = 10, velocity = new THREE.Vector3(0, 0, 0)) {
          const phi = (1 + Math.sqrt(5)) / 2;
          const theta = index * 2 * Math.PI * phi;
          const r = Math.sqrt(index) * 0.8;
          const x = r * Math.cos(theta);
          const y = r * Math.sin(theta);
          const geometry = new THREE.BufferGeometry();
          geometry.setAttribute('position', new THREE.Float32BufferAttribute([x, y, Math.random() * 0.5], 3));
          let color, size;
          switch (type) {
            case 'fermion': color = 0x00b7eb; size = 0.3; break;
            case 'boson': color = 0xff00cc; size = 0.5; break;
            case 'higgs': color = 0xffd700; size = 0.7; break;
          }
          const material = new THREE.PointsMaterial({
            color,
            size,
            transparent: true,
            opacity: 1,
            blending: THREE.AdditiveBlending
          });
          const particle = new THREE.Points(geometry, material);
          scene.add(particle);
          return {
            obj: particle,
            life,
            index,
            type,
            velocity,
            charge: type === 'fermion' ? (Math.random() > 0.5 ? 1 : -1) : 0,
            color: type === 'fermion' ? (Math.random() > 0.5 ? 'red' : 'blue') : null,
            mass: type === 'higgs' ? 2 : type === 'fermion' ? 1 : 0.5
          };
        }

        function initParticles() {
          particles = [];
          for (let i = 0; i < 20; i++) {
            particles.push(createParticle(i, Math.random() > 0.7 ? 'boson' : Math.random() > 0.9 ? 'higgs' : 'fermion'));
          }
          logDebug('WebGL particles initialized: ' + particles.length);
        }
        initParticles();

        function spawnNewParticles() {
          for (let i = 0; i < 5; i++) {
            particles.push(createParticle(particles.length, Math.random() > 0.7 ? 'boson' : Math.random() > 0.9 ? 'higgs' : 'fermion'));
          }
          logDebug('Spawned new particles: ' + particles.length);
        }

        function triggerBigBangWebGL() {
          particles.forEach(p => {
            scene.remove(p.obj);
            try {
              p.obj.geometry.dispose();
              p.obj.material.dispose();
            } catch (e) {}
          });
          particles = [];
          for (let i = 0; i < 50; i++) {
            const theta = i * 2 * Math.PI * ((1 + Math.sqrt(5)) / 2);
            const r = Math.sqrt(i) * 1.2;
            const velocity = new THREE.Vector3(
              r * Math.cos(theta) * 0.15,
              r * Math.sin(theta) * 0.15,
              (Math.random() - 0.5) * 0.08
            );
            const type = Math.random() > 0.7 ? 'boson' : Math.random() > 0.9 ? 'higgs' : 'fermion';
            particles.push(createParticle(i, type, 5, velocity));
          }
          logDebug('WebGL Big Bang triggered');
        }

        function toggleForcesWebGL() {
          forcesEnabled.em = !forcesEnabled.em;
          forcesEnabled.strong = !forcesEnabled.strong;
          forcesEnabled.weak = !forcesEnabled.weak;
          forcesEnabled.higgs = !forcesEnabled.higgs;
          logDebug(`Forces toggled: EM=${forcesEnabled.em}, Strong=${forcesEnabled.strong}, Weak=${forcesEnabled.weak}, Higgs=${forcesEnabled.higgs}`);
        }

        function updateParticles() {
          particles = particles.filter(p => {
            if (p.life <= 0) {
              scene.remove(p.obj);
              try {
                p.obj.geometry.dispose();
                p.obj.material.dispose();
              } catch (e) {}
              return false;
            }
            p.life -= 1 / 60;
            p.obj.material.opacity = p.life / 10;

            // Apply forces
            let force = new THREE.Vector3(0, 0, 0);
            particles.forEach(p2 => {
              if (p !== p2) {
                const dist = p.obj.position.distanceTo(p2.obj.position);
                if (dist > 0.1) {
                  // Electromagnetic (U(1))
                  if (forcesEnabled.em && p.charge && p2.charge) {
                    const f = (p.charge * p2.charge) / (dist * dist);
                    const dir = p2.obj.position.clone().sub(p.obj.position).normalize();
                    force.add(dir.multiplyScalar(f * 0.05));
                  }
                  // Strong (SU(3))
                  if (forcesEnabled.strong && p.type === 'fermion' && p2.type === 'boson' && dist < 5) {
                    const f = -0.1 / dist * Math.exp(-dist / 2);
                    const dir = p2.obj.position.clone().sub(p.obj.position).normalize();
                    force.add(dir.multiplyScalar(f));
                  }
                  // Weak (SU(2))
                  if (forcesEnabled.weak && p.type === 'fermion' && Math.random() < 0.01) {
                    p.color = p.color === 'red' ? 'blue' : 'red';
                    p.obj.material.color.set(p.color === 'red' ? 0xff0000 : 0x0000ff);
                  }
                  // Higgs
                  if (forcesEnabled.higgs && p2.type === 'higgs') {
                    force.add(p.velocity.clone().multiplyScalar(-0.1 * p.mass));
                  }
                }
              }
            });

            // Mouse interaction
            const mouseForce = new THREE.Vector3(mousePos.x * 0.05, mousePos.y * 0.05, 0);
            force.add(mouseForce);

            // Update velocity and position
            p.velocity.add(force.multiplyScalar(0.1 / p.mass));
            p.velocity.multiplyScalar(0.98); // Damping
            p.obj.position.add(p.velocity);

            return true;
          });

          if (particles.length < 20 && Math.random() < 0.1) {
            particles.push(createParticle(particles.length));
          }
        }

        function animate() {
          try {
            requestAnimationFrame(animate);
            updateParticles();
            camera.position.x += Math.sin(Date.now() * 0.0001) * 0.1;
            camera.lookAt(0, 0, 0);
            renderer.render(scene, camera);
          } catch (error) {
            logDebug('WebGL Render Error: ' + error.message);
            renderer.dispose();
            return false;
          }
        }
        animate();

        window.addEventListener('resize', () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        }, { passive: true });

        triggerBigBang = triggerBigBangWebGL;
        spawnParticles = spawnNewParticles;
        toggleForces = toggleForcesWebGL;
        animationMode = 'webgl';
        logDebug('WebGL simulation started');
        return true;
      } catch (error) {
        logDebug('WebGL Initialization Error: ' + error.message);
        return false;
      }
    }

    // 2D Canvas Fallback
    function init2DCanvas(canvas) {
      logDebug('Attempting 2D canvas initialization...');
      try {
        // Clear any existing context
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const ctx = canvas.getContext('2d', { alpha: true });
        if (!ctx) {
          logDebug('2D canvas context not supported');
          return false;
        }

        let particles = [];
        let mousePos = { x: canvas.width / 2, y: canvas.height / 2 };
        let forcesEnabled = { em: true, strong: true, weak: false, higgs: true };

        document.addEventListener('mousemove', (e) => {
          mousePos.x = e.clientX;
          mousePos.y = e.clientY;
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
          if (e.touches.length > 0) {
            mousePos.x = e.touches[0].clientX;
            mousePos.y = e.touches[0].clientY;
          }
        }, { passive: true });

        function createParticle(index, type = 'fermion') {
          const phi = (1 + Math.sqrt(5)) / 2;
          const theta = index * 2 * Math.PI * phi;
          const r = Math.sqrt(index) * 10;
          return {
            x: canvas.width / 2 + r * Math.cos(theta),
            y: canvas.height / 2 + r * Math.sin(theta),
            vx: (Math.random() - 0.5) * 2,
            vy: (Math.random() - 0.5) * 2,
            life: 600,
            type,
            color: type === 'fermion' ? (Math.random() > 0.5 ? 'red' : 'blue') : type === 'boson' ? 'magenta' : 'yellow',
            charge: type === 'fermion' ? (Math.random() > 0.5 ? 1 : -1) : 0,
            mass: type === 'higgs' ? 2 : type === 'fermion' ? 1 : 0.5
          };
        }

        function initParticles() {
          particles = [];
          for (let i = 0; i < 20; i++) {
            particles.push(createParticle(i, Math.random() > 0.7 ? 'boson' : Math.random() > 0.9 ? 'higgs' : 'fermion'));
          }
          logDebug('2D canvas particles initialized: ' + particles.length);
        }
        initParticles();

        function spawnNewParticles2D() {
          for (let i = 0; i < 5; i++) {
            particles.push(createParticle(particles.length, Math.random() > 0.7 ? 'boson' : Math.random() > 0.9 ? 'higgs' : 'fermion'));
          }
          logDebug('Spawned new 2D particles: ' + particles.length);
        }

        function triggerBigBang2D() {
          particles = [];
          ctx.fillStyle = 'white';
          ctx.fillRect(canvas.width / 2 - 50, canvas.height / 2 - 50, 100, 100);
          setTimeout(() => ctx.clearRect(canvas.width / 2 - 50, canvas.height / 2 - 50, 100, 100), 1000);

          for (let i = 0; i < 50; i++) {
            const theta = i * 2 * Math.PI * ((1 + Math.sqrt(5)) / 2);
            const r = Math.sqrt(i) * 15;
            const type = Math.random() > 0.7 ? 'boson' : Math.random() > 0.9 ? 'higgs' : 'fermion';
            particles.push({
              x: canvas.width / 2,
              y: canvas.height / 2,
              vx: r * Math.cos(theta) * 0.05,
              vy: r * Math.sin(theta) * 0.05,
              life: 300,
              type,
              color: type === 'fermion' ? (Math.random() > 0.5 ? 'red' : 'blue') : type === 'boson' ? 'magenta' : 'yellow',
              charge: type === 'fermion' ? (Math.random() > 0.5 ? 1 : -1) : 0,
              mass: type === 'higgs' ? 2 : type === 'fermion' ? 1 : 0.5
            });
          }
          logDebug('2D Big Bang triggered');
        }

        function toggleForces2D() {
          forcesEnabled.em = !forcesEnabled.em;
          forcesEnabled.strong = !forcesEnabled.strong;
          forcesEnabled.weak = !forcesEnabled.weak;
          forcesEnabled.higgs = !forcesEnabled.higgs;
          logDebug(`2D Forces toggled: EM=${forcesEnabled.em}, Strong=${forcesEnabled.strong}, Weak=${forcesEnabled.weak}, Higgs=${forcesEnabled.higgs}`);
        }

        function animate2D() {
          try {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => {
              if (p.life <= 0) return false;
              p.life--;

              // Apply forces
              let fx = 0, fy = 0;
              particles.forEach(p2 => {
                if (p !== p2) {
                  const dx = p2.x - p.x;
                  const dy = p2.y - p.y;
                  const dist = Math.hypot(dx, dy);
                  if (dist > 1) {
                    // Electromagnetic
                    if (forcesEnabled.em && p.charge && p2.charge) {
                      const f = (p.charge * p2.charge) / (dist * dist);
                      fx += f * dx / dist * 0.05;
                      fy += f * dy / dist * 0.05;
                    }
                    // Strong
                    if (forcesEnabled.strong && p.type === 'fermion' && p2.type === 'boson' && dist < 50) {
                      const f = -0.1 / dist * Math.exp(-dist / 20);
                      fx += f * dx / dist;
                      fy += f * dy / dist;
                    }
                    // Weak
                    if (forcesEnabled.weak && p.type === 'fermion' && Math.random() < 0.01) {
                      p.color = p.color === 'red' ? 'blue' : 'red';
                    }
                    // Higgs
                    if (forcesEnabled.higgs && p2.type === 'higgs') {
                      fx -= p.vx * 0.1 * p.mass;
                      fy -= p.vy * 0.1 * p.mass;
                    }
                  }
                }
              });

              // Mouse interaction
              fx += (mousePos.x - canvas.width / 2) * 0.0001;
              fy += (mousePos.y - canvas.height / 2) * 0.0001;

              // Update velocity and position
              p.vx += fx / p.mass;
              p.vy += fy / p.mass;
              p.vx *= 0.98;
              p.vy *= 0.98;
              p.x += p.vx;
              p.y += p.vy;

              // Draw
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.type === 'higgs' ? 5 : 3, 0, Math.PI * 2);
              ctx.fillStyle = p.type === 'fermion' ? p.color : p.type === 'boson' ? 'magenta' : 'yellow';
              ctx.globalAlpha = p.life / 600;
              ctx.fill();
              return true;
            });

            // Draw trails
            particles.forEach(p1 => {
              particles.forEach(p2 => {
                if (p1 !== p2) {
                  const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
                  if (dist < 50 && Math.random() < 0.05) {
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.strokeStyle = p1.type === 'fermion' ? p1.color : p1.type === 'boson' ? 'magenta' : 'yellow';
                    ctx.globalAlpha = 0.3;
                    ctx.stroke();
                  }
                }
              });
            });

            ctx.globalAlpha = 1;
            if (particles.length < 20 && Math.random() < 0.1) {
              particles.push(createParticle(particles.length));
            }

            requestAnimationFrame(animate2D);
          } catch (error) {
            logDebug('2D Canvas Render Error: ' + error.message);
            return false;
          }
        }
        animate2D();

        window.addEventListener('resize', () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          initParticles();
        }, { passive: true });

        triggerBigBang = triggerBigBang2D;
        spawnParticles = spawnNewParticles2D;
        toggleForces = toggleForces2D;
        animationMode = '2d';
        logDebug('2D canvas simulation started');
        return true;
      } catch (error) {
        logDebug('2D Canvas Initialization Error: ' + error.message);
        return false;
      }
    }

    // CSS Fallback
    function initCSSAnimations() {
      logDebug('Attempting CSS animation initialization...');
      try {
        const cssParticles = document.getElementBy rattling hell.1rem);
        cssParticles.style.display = 'block';

        for (let i = 0; i < 20; i++) {
          const particle = document.createElement('div');
          particle.className = 'css-particle';
          particle.style.left = `${Math.random() * 100}vw`;
          particle.style.top = `${Math.random() * 100}vh`;
          particle.style.animationDelay = `${Math.random() * 8}s`;
          particle.style.background = `hsl(${Math.random() * 360}, 70%, 70%)`;
          cssParticles.appendChild(particle);
        }

        function triggerBigBangCSS() {
          cssParticles.innerHTML = '';
          for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'css-particle';
            particle.style.left = `${50 + (Math.random() - 0.5) * 20}vw`;
            particle.style.top = `${50 + (Math.random() - 0.5) * 20}vh`;
            particle.style.animationDuration = '2s';
            particle.style.background = `hsl(${Math.random() * 360}, 70%, 70%)`;
            cssParticles.appendChild(particle);
            setTimeout(() => particle.remove(), 2000);
          }
          logDebug('CSS Big Bang triggered');
        }

        function spawnNewParticlesCSS() {
          for (let i = 0; i < 5; i++) {
            const particle = document.createElement('div');
            particle.className = 'css-particle';
            particle.style.left = `${Math.random() * 100}vw`;
            particle.style.top = `${Math.random() * 100}vh`;
            particle.style.animationDelay = `${Math.random() * 8}s`;
            particle.style.background = `hsl(${Math.random() * 360}, 70%, 70%)`;
            cssParticles.appendChild(particle);
          }
          logDebug('Spawned new CSS particles');
        }

        function toggleForcesCSS() {
          logDebug('CSS forces toggle not implemented');
        }

        triggerBigBang = triggerBigBangCSS;
        spawnParticles = spawnNewParticlesCSS;
        toggleForces = toggleForcesCSS;
        animationMode = 'css';
        logDebug('CSS animation started');
        return true;
      } catch (error) {
        logDebug('CSS Animation Initialization Error: ' + error.message);
        return false;
      }
    }

    // Initialize Simulation
    document.addEventListener('DOMContentLoaded', () => {
      const webglCanvas = document.getElementById('background-canvas');
      const fallbackCanvas = document.getElementById('fallback-canvas');

      // Try WebGL first
      if (initWebGL(webglCanvas)) {
        fallbackCanvas.style.display = 'none';
        document.getElementById('css-particles').style.display = 'none';
        errorMessage.style.display = 'none';
        return;
      }

      // Try 2D Canvas
      if (init2DCanvas(fallbackCanvas)) {
        webglCanvas.style.display = 'none';
        fallbackCanvas.style.display = 'block';
        document.getElementById('css-particles').style.display = 'none';
        errorMessage.style.display = 'none';
        return;
      }

      // Fall back to CSS
      webglCanvas.style.display = 'none';
      fallbackCanvas.style.display = 'none';
      if (initCSSAnimations()) {
        errorMessage.style.display = 'none';
        return;
      }

      errorMessage.style.display = 'block';
      logDebug('All simulation methods failed');
    });

    // Copy IP to Clipboard
    function copyIP() {
      try {
        const ip = document.getElementById('ip-display').textContent;
        if (!ip || ip === 'IP unavailable') {
          logDebug('No IP to copy');
          return;
        }

        navigator.clipboard.writeText(ip).then(() => {
          logDebug('IP copied successfully');
          triggerBigBang();
        }).catch(err => {
          logDebug('Clipboard Error: ' + err.message);
          const textarea = document.createElement('textarea');
          textarea.value = ip;
          document.body.appendChild(textarea);
          textarea.select();
          try {
            document.execCommand('copy');
            logDebug('Fallback copy successful');
            triggerBigBang();
          } catch (e) {
            logDebug('Fallback Copy Error: ' + e.message);
          }
          document.body.removeChild(textarea);
        });
      } catch (error) {
        logDebug('Copy IP Error: ' + error.message);
      }
    }
  </script>
</body>
