<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Labverse Speed Test</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap"/>
  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: #0a0a23;
      color: #fff;
      overflow-x: hidden;
    }

    .header {
      text-align: center;
      font-size: 3em;
      color: cyan;
      margin-top: 40px;
      text-shadow: 0 0 15px cyan;
    }

    .info-box {
      margin: 30px auto;
      width: 400px;
      background-color: #111;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 0 10px cyan;
      text-align: center;
      font-size: 1em;
    }

    .button {
      margin-top: 10px;
      padding: 10px 20px;
      background: linear-gradient(to right, #ff00ff, #00ffff);
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .button:hover {
      opacity: 0.8;
    }

    #speedResults {
      margin: 20px auto;
      width: 90%;
      max-width: 800px;
      padding: 20px;
      border-radius: 15px;
      background-color: #111;
      box-shadow: 0 0 15px magenta;
    }

    iframe {
      width: 100%;
      height: 400px;
      border: none;
      border-radius: 10px;
    }

    #vanta-bg {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      z-index: -1;
    }
  </style>
</head>

<body>
  <div id="vanta-bg"></div>

  <div class="header">Labverse Speed Test</div>

  <div class="info-box">
    <p><strong>Your IP:</strong> <span id="ip">Loading...</span></p>
    <p><strong>ISP:</strong> <span id="isp">Loading...</span></p>
    <p><strong>Location:</strong> <span id="loc">Loading...</span></p>
    <button class="button" onclick="document.getElementById('speedFrame').src = 'https://librespeed.org';">Run Speed Test</button>
  </div>

  <div id="speedResults">
    <iframe id="speedFrame" src=""></iframe>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
  <script>
    VANTA.NET({
      el: "#vanta-bg",
      mouseControls: true,
      touchControls: true,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 1.00,
      scaleMobile: 1.00,
      color: 0x00ffff,
      backgroundColor: 0x0a0a23
    });

    // Get IP and Geo Info
    fetch("https://ipapi.co/json/")
      .then(res => res.json())
      .then(data => {
        document.getElementById("ip").textContent = data.ip;
        document.getElementById("isp").textContent = data.org || "Unavailable";
        document.getElementById("loc").textContent = `${data.city}, ${data.region}, ${data.country_name}`;
      })
      .catch(() => {
        document.getElementById("ip").textContent = "Error";
        document.getElementById("isp").textContent = "Error";
        document.getElementById("loc").textContent = "Error";
      });
  </script>
</body>
</html>
