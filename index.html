<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Labverse Speed Test - Check your IP and network speed with stunning cosmic animations." />
  <meta name="keywords" content="Public IP, Speed Test, Fibonacci, Quantum Particles" />
  <meta name="author" content="Labverse Team" />
  <meta property="og:title" content="Labverse Speed Test" />
  <meta property="og:description" content="Discover your public IP and test your network speed with mesmerizing sacred geometry animations." />
  <meta property="og:image" content="https://labverse.co.za/assets/labverse-og-image.png" />
  <meta property="og:url" content="https://labverse.co.za" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>Labverse Speed Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Source+Code+Pro&family=Exo+2:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --matrix-blue: #00b7eb;
      --cosmic-magenta: #ff00cc;
      --cosmic-gold: #ffd700;
      --cosmic-cyan: #00ffff;
      --light-aura: #e6f0ff;
      --dark-bg: #000000; /* Space black */
      --card-bg: rgba(8, 8, 26, 0.85);
      --glow-radius: 15px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Source Code Pro', monospace;
    }

    html, body {
      height: 100vh;
      width: 100%;
      background: var(--dark-bg);
      color: var(--light-aura);
      overflow: hidden; /* No scrolling */
    }

    #vanta-bg {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      z-index: -1;
      opacity: 0.5;
    }

    #background-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.8;
    }

    .container {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 1rem;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.5rem, 5vw, 3rem);
      text-transform: uppercase;
      color: var(--cosmic-cyan);
      margin-bottom: 0.5rem;
      text-shadow: 0 0 15px var(--cosmic-cyan);
      letter-spacing: 0.2rem;
      font-weight: 700;
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 15px var(--cosmic-cyan); }
      to { text-shadow: 0 0 30px var(--cosmic-magenta); }
    }

    .ip-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      width: 100%;
      max-width: 400px;
    }

    .ip-display {
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(1.2rem, 3vw, 2rem);
      color: var(--light-aura);
      background: var(--card-bg);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 2px solid var(--matrix-blue);
      box-shadow: 0 0 15px var(--matrix-blue);
      text-shadow: 0 0 10px var(--matrix-blue);
      word-break: break-all;
      flex-shrink: 0;
    }

    .copy-btn {
      background: var(--matrix-blue);
      color: var(--light-aura);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      text-transform: uppercase;
      box-shadow: 0 0 var(--glow-radius) var(--matrix-blue);
      transition: all 0.3s ease;
      margin-left: 0.5rem;
    }

    .copy-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 calc(var(--glow-radius) * 1.5) var(--cosmic-magenta);
      background: linear-gradient(90deg, var(--matrix-blue), var(--cosmic-magenta));
    }

    .network-info {
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(0.6rem, 1vw, 0.8rem);
      color: var(--light-aura);
      max-width: 300px;
      line-height: 1.4;
      text-shadow: 0 0 5px var(--matrix-blue);
      margin-bottom: 0.5rem;
    }

    .error-message {
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(0.6rem, 1vw, 0.8rem);
      color: #ff5555;
      margin-top: 0.5rem;
      text-shadow: 0 0 5px var(--matrix-blue);
      display: none;
    }

    .btn {
      background: var(--matrix-blue);
      color: var(--light-aura);
      border: none;
      padding: 0.5rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      text-transform: uppercase;
      box-shadow: 0 0 var(--glow-radius) var(--matrix-blue);
      transition: all 0.3s ease;
      margin: 0.3rem;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 calc(var(--glow-radius) * 1.5) var(--cosmic-magenta);
      background: linear-gradient(90deg, var(--matrix-blue), var(--cosmic-magenta));
    }

    .speed-test-container {
      display: none;
      background: var(--card-bg);
      border-radius: 8px;
      border: 2px solid var(--matrix-blue);
      box-shadow: 0 0 20px var(--matrix-blue);
      padding: 0.5rem;
      width: 90%;
      max-width: 500px;
      transition: opacity 0.5s ease;
    }

    .speed-test-container.active {
      display: block;
      opacity: 1;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 0.5rem;
      margin: 0.5rem 0;
    }

    .metric {
      background: rgba(0, 183, 235, 0.1);
      padding: 0.5rem;
      border-radius: 8px;
      text-align: center;
    }

    .metric-value {
      font-size: clamp(1rem, 2vw, 1.5rem);
      font-weight: bold;
      color: var(--cosmic-cyan);
      text-shadow: 0 0 8px var(--cosmic-cyan);
    }

    .metric-label {
      font-size: clamp(0.6rem, 1vw, 0.8rem);
      color: var(--light-aura);
    }

    .metric-unit {
      font-size: clamp(0.5rem, 0.8vw, 0.7rem);
      color: var(--cosmic-gold);
    }

    .progress-container {
      margin: 0.5rem 0;
      position: relative;
      height: 15px;
      background: #1a1a3d;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
    }

    .laser-progress {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--matrix-blue), var(--cosmic-magenta));
      box-shadow: 0 0 15px var(--matrix-blue), 0 0 20px var(--cosmic-magenta);
      animation: laserGlow 1s infinite alternate;
      transition: width 0.1s linear;
    }

    @keyframes laserGlow {
      from { box-shadow: 0 0 15px var(--matrix-blue), 0 0 20px var(--cosmic-magenta); }
      to { box-shadow: 0 0 20px var(--cosmic-cyan), 0 0 25px var(--matrix-blue); }
    }

    .progress-speed, .progress-percentage {
      font-size: clamp(0.5rem, 0.8vw, 0.7rem);
      position: absolute;
      top: -20px;
      color: var(--cosmic-cyan);
      text-shadow: 0 0 5px var(--matrix-blue);
    }

    .progress-speed { left: 0; }
    .progress-percentage { right: 0; }

    .progress-stats {
      display: flex;
      justify-content: space-between;
      font-size: clamp(0.5rem, 0.8vw, 0.7rem);
      color: var(--light-aura);
      padding: 0.3rem 0;
    }

    .graph-container {
      margin: 0.5rem 0;
      position: relative;
      width: 100%;
      height: 100px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--matrix-blue);
      border-radius: 8px;
      overflow: hidden;
    }

    #speed-graph {
      width: 100%;
      height: 100%;
    }

    .iframe-container {
      display: none;
      position: relative;
      width: 100%;
      height: 200px;
      border-radius: 8px;
      overflow: hidden;
      margin-top: 0.5rem;
    }

    .iframe-container.active {
      display: block;
    }

    .iframe-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 183, 235, 0.3); /* Neon blue overlay */
      z-index: 1;
      pointer-events: none;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 8px;
      position: relative;
      z-index: 0;
    }

    footer {
      position: absolute;
      bottom: 0.5rem;
      width: 100%;
      text-align: center;
      font-size: clamp(0.5rem, 0.8vw, 0.7rem);
      color: var(--light-aura);
      z-index: 10;
      text-shadow: 0 0 5px var(--matrix-blue);
    }

    footer a {
      color: var(--cosmic-cyan);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .container { padding: 0.5rem; }
      h1 { font-size: clamp(1.2rem, 4vw, 2rem); }
      .ip-display { font-size: clamp(1rem, 2.5vw, 1.5rem); }
      .network-info { font-size: clamp(0.5rem, 0.8vw, 0.7rem); }
      .btn, .copy-btn { font-size: clamp(0.6rem, 1vw, 0.8rem); }
      .graph-container { height: 80px; }
      .iframe-container { height: 150px; }
    }

    @media (max-width: 480px) {
      h1 { font-size: clamp(1rem, 3vw, 1.5rem); }
      .ip-container { gap: 0.3rem; }
      .ip-display { font-size: clamp(0.8rem, 2vw, 1.2rem); }
      .metrics { grid-template-columns: 1fr; }
      .iframe-container { height: 120px; }
    }
  </style>
</head>
<body>
  <div id="vanta-bg"></div>
  <canvas id="background-canvas"></canvas>

  <div class="container">
    <h1>Labverse Speed Test</h1>
    <div class="ip-container">
      <div class="ip-display" id="ip-display">Fetching IP...</div>
      <button class="copy-btn" id="copy-ip-btn" aria-label="Copy IP address">Copy IP</button>
    </div>
    <div class="network-info" id="network-info">Fetching network info...</div>
    <div class="error-message" id="error-message">Animations failed to load. Please check your browser settings.</div>
    <button class="btn" id="start-speed-test" aria-label="Start network speed test">Test Speed</button>

    <div class="speed-test-container" id="speed-test-container" role="region" aria-label="Speed test results">
      <div class="metrics">
        <div class="metric">
          <div class="metric-label">Download Speed</div>
          <div class="metric-value" id="download-value">0.0</div>
          <div class="metric-unit">Mbps</div>
        </div>
        <div class="metric">
          <div class="metric-label">Ping</div>
          <div class="metric-value" id="ping-value">0</div>
          <div class="metric-unit">ms</div>
        </div>
      </div>
      <div class="progress-container">
        <div class="progress-speed" id="current-speed">0.00 Mbps</div>
        <div class="progress-percentage" id="progress-percent">0%</div>
        <div class="laser-progress" id="laser-progress"></div>
      </div>
      <div class="progress-stats">
        <span id="data-transferred">0 MB</span>
        <span id="time-elapsed">00:00</span>
      </div>
      <div class="graph-container">
        <canvas id="speed-graph" aria-label="Live speed graph"></canvas>
      </div>
      <div class="button-container">
        <button class="btn" id="more-info" style="display: none;" aria-label="More info">More Info</button>
      </div>
      <div class="iframe-container" id="iframe-container">
        <iframe id="speedFrame" src=""></iframe>
      </div>
    </div>
  </div>

  <footer>
    © 2025 Labverse | Powered by <a href="https://onefar.co.za" target="_blank" rel="noopener">onefar.co.za (1FAR)</a>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.net.min.js"></script>
  <script>
    // Initialize Vanta.js background (space black)
    VANTA.NET({
      el: "#vanta-bg",
      mouseControls: true,
      touchControls: true,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 1.00,
      scaleMobile: 1.00,
      color: 0x00ffff, // Cyan connections
      backgroundColor: 0x000000 // Space black
    });

    // Utility Functions
    function log(message) {
      console.log('[DEBUG] ' + message);
    }

    function formatBytes(bytes, decimals = 2) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024, dm = decimals < 0 ? 0 : decimals;
      const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).catch(() => {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
      });
    }

    // Particle Animations with Big Bang Explosion
    let particles = [], mousePos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    const canvas = document.getElementById('background-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    document.addEventListener('mousemove', (e) => {
      mousePos.x = e.clientX;
      mousePos.y = e.clientY;
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      if (e.touches.length > 0) {
        mousePos.x = e.touches[0].clientX;
        mousePos.y = e.touches[0].clientY;
      }
    }, { passive: true });

    function createParticle(index) {
      const phi = (1 + Math.sqrt(5)) / 2;
      const theta = index * 2 * Math.PI * phi;
      const r = Math.sqrt(index) * 10;
      return {
        x: canvas.width / 2 + r * Math.cos(theta),
        y: canvas.height / 2 + r * Math.sin(theta),
        vx: (Math.random() - 0.5) * 2,
        vy: (Math.random() - 0.5) * 2,
        life: 600,
        color: `hsl(${Math.random() * 360}, 70%, 70%)`
      };
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < 20; i++) {
        particles.push(createParticle(i));
      }
    }
    initParticles();

    function triggerBigBang() {
      log('Triggering Big Bang...');
      particles = [];
      ctx.fillStyle = 'blue';
      ctx.fillRect(canvas.width / 2 - 50, canvas.height / 2 - 50, 100, 100);
      setTimeout(() => ctx.clearRect(canvas.width / 2 - 50, canvas.height / 2 - 50, 100, 100), 1000);

      for (let i = 0; i < 50; i++) {
        const theta = i * 2 * Math.PI * ((1 + Math.sqrt(5)) / 2);
        const r = Math.sqrt(i) * 15;
        particles.push({
          x: canvas.width / 2,
          y: canvas.height / 2,
          vx: r * Math.cos(theta) * 0.05,
          vy: r * Math.sin(theta) * 0.05,
          life: 300,
          color: `hsl(${Math.random() * 360}, 70%, 70%)`
        });
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = particles.filter(p => {
        if (p.life <= 0) return false;
        p.life--;
        p.x += p.vx + (mousePos.x - canvas.width / 2) * 0.0001;
        p.y += p.vy + (mousePos.y - canvas.height / 2) * 0.0001;
        p.vx *= 0.98;
        p.vy *= 0.98;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life / 600;
        ctx.fill();
        return true;
      });

      if (particles.length < 20 && Math.random() < 0.1) {
        particles.push(createParticle(particles.length));
      }

      particles.forEach(p1 => {
        particles.forEach(p2 => {
          if (p1 !== p2) {
            const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
            if (dist < 50 && Math.random() < 0.05) {
              ctx.beginPath();
              ctx.moveTo(p1.x, p1.y);
              ctx.lineTo(p2.x, p2.y);
              ctx.strokeStyle = p1.color;
              ctx.globalAlpha = 0.3;
              ctx.stroke();
            }
          }
        });
      });

      ctx.globalAlpha = 1;
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      initParticles();
    }, { passive: true });

    // Network Functions
    async function fetchIP() {
      log('Fetching public IP...');
      try {
        const response = await fetch('https://api.ipify.org?format=json');
        const data = await response.json();
        const ip = data.ip;
        log('Public IP fetched: ' + ip);
        document.getElementById('ip-display').textContent = ip;
        return ip;
      } catch (error) {
        log('IP fetch error: ' + error.message);
        document.getElementById('ip-display').textContent = 'IP unavailable';
        throw error;
      }
    }

    async function fetchLocationInfo() {
      log('Fetching network location info...');
      try {
        const response = await fetch('https://ip-api.com/json'); // Fixed to HTTPS
        const data = await response.json();
        const info = {
          isp: data.isp || 'Unknown',
          city: data.city || 'Unknown',
          country: data.country || 'Unknown'
        };
        log('Network info fetched: ' + JSON.stringify(info));
        document.getElementById('network-info').innerHTML = `ISP: ${info.isp}<br>Location: ${info.city}, ${info.country}`;
        return info;
      } catch (error) {
        log('Location fetch error: ' + error.message);
        document.getElementById('network-info').innerHTML = 'Network info unavailable';
        throw error;
      }
    }

    // Graph Functions
    function initializeGraph() {
      const canvas = document.getElementById('speed-graph');
      const ctx = canvas.getContext('2d');
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;

      const maxSpeed = 100;
      let downloadData = [];

      function drawGraph() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw axes
        ctx.strokeStyle = 'rgba(0, 183, 235, 0.5)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(20, 5);
        ctx.lineTo(20, canvas.height - 10);
        ctx.lineTo(canvas.width - 5, canvas.height - 10);
        ctx.stroke();

        // Draw Y-axis labels (Mbps)
        ctx.fillStyle = '#ffffff';
        ctx.font = '10px Exo 2';
        ctx.textAlign = 'right';
        for (let i = 0; i <= 5; i++) {
          const y = canvas.height - 10 - (i * (canvas.height - 20) / 5);
          const speed = (i * maxSpeed / 5).toFixed(0);
          ctx.fillText(speed, 15, y + 3);
        }
        ctx.fillText('Mbps', 15, 10);

        // Draw live speed line
        if (downloadData.length < 2) return;
        ctx.strokeStyle = '#00b7eb';
        ctx.lineWidth = 2;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.beginPath();
        downloadData.forEach((speed, i) => {
          const x = 20 + (i / (downloadData.length - 1)) * (canvas.width - 25);
          const y = canvas.height - 10 - (speed / maxSpeed) * (canvas.height - 20);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.stroke();
        ctx.shadowColor = '#00b7eb';
        ctx.shadowBlur = 10;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      return {
        addDownloadSpeed(speed) {
          if (typeof speed !== 'number' || isNaN(speed)) return;
          downloadData.push(Math.min(speed, maxSpeed));
          if (downloadData.length > canvas.width / 5) downloadData.shift();
          drawGraph();
        },
        reset() {
          downloadData = [];
          drawGraph();
        }
      };
    }

    // Speed Test Functions
    const CONFIG = {
      testServer: {
        downloadUrl: 'https://speed.cloudflare.com/__down?bytes=25000000',
        pingResource: 'https://labverse.co.za/assets/ping-test.txt',
      },
      testDurations: { download: 10000, ping: 3000 },
    };

    function initializeSpeedTest() {
      const speedTest = {
        testRunning: false,
        testAborted: false,
        graph: initializeGraph(),
        currentResults: null,

        setupEvents() {
          document.getElementById('start-speed-test').addEventListener('click', () => this.toggleTest());
          document.getElementById('more-info').addEventListener('click', () => this.showMoreInfo());
        },

        toggleTest() {
          const container = document.getElementById('speed-test-container');
          const button = document.getElementById('start-speed-test');
          if (container.classList.contains('active')) {
            container.classList.remove('active');
            button.textContent = 'Test Speed';
            this.abortTest();
          } else {
            container.classList.add('active');
            button.textContent = 'Stop Test';
            this.startTest();
          }
        },

        async startTest() {
          if (this.testRunning) return;
          this.testRunning = true;
          this.testAborted = false;
          const button = document.getElementById('start-speed-test');
          button.disabled = true;

          // Reset UI
          ['download-value', 'ping-value'].forEach(id => document.getElementById(id).textContent = '0');
          document.getElementById('laser-progress').style.width = '0%';
          document.getElementById('progress-percent').textContent = '0%';
          document.getElementById('current-speed').textContent = '0.00 Mbps';
          document.getElementById('data-transferred').textContent = '0 MB';
          document.getElementById('time-elapsed').textContent = '00:00';
          document.getElementById('more-info').style.display = 'none';
          document.getElementById('iframe-container').classList.remove('active');
          this.graph.reset();

          let pingResults = { ping: 999 };
          try {
            pingResults = await this.runPingTest();
          } catch (error) {
            log('Ping test failed, continuing with default values: ' + error.message);
          }

          let downloadSpeed = 0;
          if (!this.testAborted) {
            try {
              downloadSpeed = await this.runDownloadTest();
              this.currentResults = { ...pingResults, downloadSpeed };
            } catch (error) {
              log('Download test failed: ' + error.message);
              throw error;
            }
          }

          if (!this.testAborted && this.currentResults) {
            this.displayResults();
            triggerBigBang();
          } else if (!this.testAborted) {
            document.getElementById('error-message').style.display = 'block';
            document.getElementById('error-message').textContent = 'Speed test failed. Please try again.';
          }

          this.testRunning = false;
          button.disabled = false;
          button.textContent = 'Test Speed';
        },

        async runPingTest() {
          log('Starting ping test to local server...');
          const pingValue = document.getElementById('ping-value');
          const progress = document.getElementById('laser-progress');
          const progressPercent = document.getElementById('progress-percent');
          const currentSpeed = document.getElementById('current-speed');
          const timeElapsed = document.getElementById('time-elapsed');

          const pingTimes = [];
          const totalPackets = 10;

          for (let i = 0; i < totalPackets; i++) {
            if (this.testAborted) break;
            let ping = 999;
            try {
              const start = performance.now();
              await fetch(CONFIG.testServer.pingResource + '?t=' + Date.now(), { cache: 'no-store' });
              ping = performance.now() - start;
              pingTimes.push(ping);
              log(`Ping #${i+1}: ${ping.toFixed(2)}ms`);
            } catch (error) {
              pingTimes.push(ping);
              log(`Ping #${i+1} failed: ${error.message}`);
            }
            const progressPercentage = ((i + 1) / totalPackets) * 50;
            progress.style.width = `${progressPercentage}%`;
            progressPercent.textContent = `${progressPercentage.toFixed(1)}%`;
            currentSpeed.textContent = `${pingTimes[pingTimes.length - 1].toFixed(2)} ms`;
            timeElapsed.textContent = `${i + 1}/${totalPackets}`;
            await new Promise(r => setTimeout(r, 300));
          }

          const successfulPings = pingTimes.filter(t => t !== 999);
          const avgPing = successfulPings.length ? successfulPings.reduce((sum, t) => sum + t, 0) / successfulPings.length : 999;
          pingValue.textContent = avgPing.toFixed(0);
          return { ping: avgPing };
        },

        async runDownloadTest() {
          log('Starting download test from Cloudflare Johannesburg server...');
          const downloadValue = document.getElementById('download-value');
          const progress = document.getElementById('laser-progress');
          const progressPercent = document.getElementById('progress-percent');
          const currentSpeed = document.getElementById('current-speed');
          const dataTransferred = document.getElementById('data-transferred');
          const timeElapsed = document.getElementById('time-elapsed');

          let totalBytes = 0, startTime = performance.now();
          const maxTime = CONFIG.testDurations.download;
          const updateInterval = 100;

          try {
            const response = await fetch(CONFIG.testServer.downloadUrl, { cache: 'no-store' });
            const reader = response.body.getReader();
            let lastUpdate = startTime;

            while (true) {
              const { done, value } = await reader.read();
              if (done || this.testAborted) break;
              totalBytes += value.length;
              const elapsed = (performance.now() - startTime) / 1000;
              if (performance.now() - lastUpdate >= updateInterval) {
                const speed = ((totalBytes * 8) / elapsed) / (1024 * 1024);
                downloadValue.textContent = speed.toFixed(1);
                const progressPercentage = 50 + (elapsed / (maxTime / 1000)) * 50;
                progress.style.width = `${Math.min(100, progressPercentage)}%`;
                progressPercent.textContent = `${Math.min(100, progressPercentage).toFixed(1)}%`;
                currentSpeed.textContent = `${speed.toFixed(2)} Mbps`;
                dataTransferred.textContent = formatBytes(totalBytes);
                timeElapsed.textContent = formatTime(elapsed);
                this.graph.addDownloadSpeed(speed);
                lastUpdate = performance.now();
              }
              if (elapsed >= maxTime / 1000) break;
            }
          } catch (error) {
            log('Download error: ' + error.message);
            throw error;
          }

          const totalTime = (performance.now() - startTime) / 1000;
          const finalSpeed = ((totalBytes * 8) / totalTime) / (1024 * 1024);
          downloadValue.textContent = finalSpeed.toFixed(1);
          this.graph.addDownloadSpeed(finalSpeed);
          return finalSpeed;
        },

        displayResults() {
          if (!this.currentResults) return;
          document.getElementById('more-info').style.display = 'inline-block';
        },

        showMoreInfo() {
          const iframeContainer = document.getElementById('iframe-container');
          const iframe = document.getElementById('speedFrame');
          iframe.src = 'https://speed.cloudflare.com';
          iframeContainer.classList.add('active');
        },

        abortTest() {
          this.testAborted = true;
        },
      };

      speedTest.setupEvents();
      return speedTest;
    }

    // Main Initialization
    document.addEventListener('DOMContentLoaded', async () => {
      const speedTest = initializeSpeedTest();
      await Promise.all([fetchIP(), fetchLocationInfo()]);

      document.getElementById('copy-ip-btn').addEventListener('click', () => {
        const ip = document.getElementById('ip-display').textContent;
        if (ip !== 'Fetching IP...' && ip !== 'IP unavailable') {
          copyToClipboard(ip);
          triggerBigBang();
          alert('IP copied to clipboard!');
        }
      });
    });
  </script>
</body>
