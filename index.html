<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="View your public IP and test network speed with cosmic Fibonacci particle animations." />
  <meta name="keywords" content="Public IP, Network Speed Test, Fibonacci, Quantum Particles" />
  <meta name="author" content="Labverse Team" />
  <meta property="og:title" content="Your Public IP & Speed Test" />
  <meta property="og:description" content="Discover your public IP address, network info, and test your network speed with mesmerizing sacred geometry animations." />
  <meta property="og:image" content="https://labverse.co.za/assets/labverse-og-image.png" />
  <meta property="og:url" content="https://labverse.co.za" />
  <meta name="twitter:card" content="summary_large_image" />

  <title>Your Public IP & Speed Test</title>

  <!-- Favicon -->
  <link rel="icon" href="favicon.ico" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Source+Code+Pro&display=swap" rel="stylesheet">

  <!-- Style -->
  <style>
    :root {
      --matrix-blue: #00b7eb;
      --cosmic-magenta: #ff00cc;
      --cosmic-gold: #ffd700;
      --cosmic-cyan: #00ffff;
      --light-aura: #e6f0ff;
      --glow-radius: 15px;
      --neon-purple: #bf00ff;
      --neon-blue: #0066ff;
      --dark-bg: #05051a;
      --text-color: #e6f0ff;
      --bg-color: #000000;
      --card-bg: rgba(8, 8, 26, 0.85);
    }

    [data-theme="light"] {
      --text-color: #333333;
      --bg-color: #ffffff;
      --card-bg: rgba(255, 255, 255, 0.85);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Source Code Pro', monospace;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: var(--bg-color);
      color: var(--text-color);
      overflow: hidden;
      margin: 0;
      transition: background 0.3s ease, color 0.3s ease;
    }

    #background-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: block;
      opacity: 1;
    }

    #fallback-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: none;
      opacity: 1;
    }

    .css-particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: none;
      pointer-events: none;
    }

    .css-particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: var(--matrix-blue);
      border-radius: 50%;
      animation: cssParticleMove 8s linear infinite;
      opacity: 0.8;
    }

    @keyframes cssParticleMove {
      0% { transform: translate(0, 0); opacity: 0.8; }
      50% { opacity: 1; }
      100% { transform: translate(100vw, 100vh); opacity: 0; }
    }

    .adsense-container {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      text-align: center;
      width: 100%;
      padding: clamp(0.5rem, 1vw, 1rem);
    }

    .container {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: clamp(1rem, 3vw, 1.5rem);
      padding-top: clamp(4rem, 10vh, 6rem);
      padding-bottom: clamp(2rem, 5vh, 3rem);
      overflow-y: auto;
    }

    h1 {
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(2rem, 6vw, 4rem);
      text-transform: uppercase;
      color: var(--text-color);
      margin-bottom: clamp(1rem, 3vw, 1.5rem);
      text-shadow: 0 0 5px var(--matrix-blue);
      letter-spacing: 0.2rem;
      font-weight: 700;
    }

    .ip-display {
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(1.5rem, 4vw, 2.8rem);
      color: var(--text-color);
      background: var(--card-bg);
      padding: clamp(0.8rem, 2vw, 1rem) clamp(1.5rem, 3vw, 2.5rem);
      border-radius: 12px;
      border: 2px solid var(--matrix-blue);
      box-shadow: 0 0 20px var(--matrix-blue);
      margin-bottom: clamp(0.5rem, 1.5vw, 0.8rem);
      text-shadow: 0 0 10px var(--matrix-blue);
      word-break: break-all;
    }

    .network-info {
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(0.7rem, 1.5vw, 1rem);
      color: var(--text-color);
      max-width: clamp(200px, 80vw, 400px);
      line-height: 1.6;
      text-shadow: 0 0 5px var(--matrix-blue);
      margin-bottom: clamp(0.8rem, 2vw, 1.2rem);
      text-align: center;
    }

    .error-message {
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(0.7rem, 1.5vw, 1rem);
      color: #ff5555;
      margin-top: 1rem;
      text-shadow: 0 0 5px var(--matrix-blue);
      display: none;
    }

    .btn {
      background: linear-gradient(90deg, var(--cosmic-cyan), var(--cosmic-magenta));
      color: var(--text-color);
      border: none;
      padding: clamp(0.6rem, 1.5vw, 0.8rem) clamp(1.5rem, 3vw, 2rem);
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(0.8rem, 1.5vw, 1rem);
      text-transform: uppercase;
      box-shadow: 0 0 var(--glow-radius) var(--cosmic-cyan);
      transition: all 0.5s ease;
      margin: clamp(0.3rem, 1vw, 0.5rem);
      position: relative;
      z-index: 20;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 calc(var(--glow-radius) * 1.5) var(--cosmic-magenta);
      background: linear-gradient(90deg, var(--cosmic-magenta), var(--cosmic-cyan));
    }

    .btn.active {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1.1);
      box-shadow: 0 0 calc(var(--glow-radius) * 2) var(--cosmic-cyan);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 var(--glow-radius) var(--cosmic-cyan); }
      50% { box-shadow: 0 0 calc(var(--glow-radius) * 2) var(--cosmic-magenta); }
      100% { box-shadow: 0 0 var(--glow-radius) var(--cosmic-cyan); }
    }

    .speed-test-container {
      display: none;
      background: var(--card-bg);
      border-radius: 12px;
      border: 2px solid var(--matrix-blue);
      box-shadow: 0 0 20px var(--matrix-blue);
      padding: clamp(1rem, 2vw, 1.5rem);
      margin-top: clamp(0.5rem, 1.5vw, 0.8rem);
      max-width: clamp(300px, 80vw, 600px);
      width: 100%;
      max-height: 50vh;
      overflow-y: auto;
    }

    .speed-test-container.active {
      display: block;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: clamp(0.5rem, 1vw, 0.8rem);
      margin: clamp(0.5rem, 1vw, 1rem) 0;
    }

    .metric {
      background: rgba(0, 183, 235, 0.1);
      padding: clamp(0.5rem, 1vw, 0.8rem);
      border-radius: 5px;
      text-align: center;
    }

    .metric-value {
      font-size: clamp(1rem, 2vw, 1.5rem);
      font-weight: bold;
      color: var(--cosmic-cyan);
      margin: clamp(0.2rem, 0.5vw, 0.3rem) 0;
      text-shadow: 0 0 5px var(--cosmic-cyan);
    }

    .metric-label {
      color: var(--text-color);
      font-size: clamp(0.6rem, 1vw, 0.8rem);
      text-shadow: 0 0 3px var(--matrix-blue);
    }

    .metric-unit {
      color: var(--cosmic-gold);
      font-size: clamp(0.6rem, 1vw, 0.8rem);
    }

    .progress-container {
      margin: clamp(1rem, 2vw, 1.5rem) 0;
      position: relative;
    }

    .progress {
      height: 14px;
      background: var(--dark-bg);
      border-radius: 7px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(0, 183, 235, 0.3);
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
      position: relative;
      box-shadow: 0 0 15px var(--neon-blue);
      transition: width 0.1s linear;
    }

    .progress-bar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent);
    }

    .progress-bar::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      right: 0;
      width: 5px;
      background: rgba(255,255,255,0.8);
      box-shadow: 0 0 10px 5px var(--cosmic-cyan);
      border-radius: 3px;
    }

    .progress-stats {
      display: flex;
      justify-content: space-between;
      font-size: clamp(0.6rem, 1vw, 0.7rem);
      color: var(--text-color);
      padding: 5px 2px;
    }

    .progress-percentage {
      position: absolute;
      top: -18px;
      right: 0;
      font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      color: var(--cosmic-cyan);
      text-shadow: 0 0 5px var(--matrix-blue);
    }

    .progress-speed {
      position: absolute;
      top: -18px;
      left: 0;
      font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      color: var(--cosmic-magenta);
      text-shadow: 0 0 5px var(--matrix-blue);
    }

    .speed-graph {
      width: 100%;
      height: clamp(150px, 30vw, 200px);
      background: rgba(0, 0, 0, 0.5);
      border-radius: 5px;
      margin: clamp(0.5rem, 1vw, 1rem) 0;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(0, 183, 235, 0.3);
    }

    .results-display {
      display: none;
      text-align: center;
      color: var(--text-color);
      font-size: clamp(0.8rem, 1.5vw, 1rem);
      line-height: 1.6;
      padding: clamp(0.5rem, 1vw, 0.8rem);
    }

    .results-display.active {
      display: block;
    }

    .button-container {
      display: flex;
      justify-content: center;
      gap: clamp(0.5rem, 1vw, 0.8rem);
      margin-top: clamp(0.5rem, 1vw, 0.8rem);
    }

    .log-overlay, .history-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 1000;
      padding: clamp(1rem, 2vw, 1.5rem);
      overflow-y: auto;
    }

    .log-overlay.active, .history-overlay.active {
      display: block;
    }

    .log-content, .history-content {
      background: var(--card-bg);
      border: 2px solid var(--matrix-blue);
      border-radius: 12px;
      padding: clamp(1rem, 2vw, 1.5rem);
      max-width: clamp(300px, 80vw, 600px);
      margin: 0 auto;
      color: var(--text-color);
      font-size: clamp(0.6rem, 1vw, 0.8rem);
      line-height: 1.6;
      text-shadow: 0 0 3px var(--matrix-blue);
    }

    .history-item {
      margin-bottom: 1rem;
      padding: 0.5rem;
      border-bottom: 1px solid var(--matrix-blue);
    }

    .close-btn {
      background: var(--cosmic-magenta);
      color: var(--text-color);
      border: none;
      padding: clamp(0.4rem, 1vw, 0.6rem) clamp(1rem, 2vw, 1.5rem);
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      text-transform: uppercase;
      box-shadow: 0 0 var(--glow-radius) var(--cosmic-magenta);
      transition: all 0.3s ease;
      margin-top: clamp(0.5rem, 1vw, 0.8rem);
    }

    .close-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 calc(var(--glow-radius) * 1.5) var(--cosmic-cyan);
      background: var(--cosmic-cyan);
    }

    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 1000;
      background: var(--cosmic-cyan);
      padding: 0.5rem;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px var(--cosmic-cyan);
    }

    .server-select {
      margin: 1rem 0;
      padding: 0.5rem;
      background: var(--card-bg);
      border: 1px solid var(--matrix-blue);
      color: var(--text-color);
      border-radius: 5px;
      font-family: 'Source Code Pro', monospace;
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: transparent;
      padding: clamp(0.5rem, 2vw, 1rem);
      text-align: center;
      font-size: clamp(0.7rem, 1.5vw, 0.9rem);
      color: var(--text-color);
      z-index: 10;
      text-shadow: 0 0 5px var(--cosmic-cyan);
    }

    @media (max-width: 768px) {
      .container {
        padding: clamp(0.5rem, 2vw, 1rem);
        padding-top: clamp(3rem, 8vh, 5rem);
        padding-bottom: clamp(2rem, 5vh, 3rem);
      }

      h1 {
        font-size: clamp(1.5rem, 4vw, 2.5rem);
        letter-spacing: 0.15rem;
      }

      .ip-display {
        font-size: clamp(1.2rem, 3vw, 2rem);
        padding: clamp(0.5rem, 1.5vw, 0.8rem) clamp(1rem, 2vw, 1.5rem);
      }

      .network-info, .error-message {
        font-size: clamp(0.6rem, 1.2vw, 0.9rem);
        max-width: 90vw;
      }

      .btn {
        padding: clamp(0.4rem, 1vw, 0.6rem) clamp(1rem, 2vw, 1.5rem);
        font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      }

      .speed-test-container {
        padding: clamp(0.5rem, 1.5vw, 0.8rem);
        max-height: 40vh;
      }

      .speed-graph {
        height: clamp(120px, 25vw, 150px);
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: clamp(1.2rem, 3.5vw, 2rem);
        letter-spacing: 0.1rem;
      }

      .ip-display {
        font-size: clamp(1rem, 2.5vw, 1.5rem);
      }

      .network-info, .error-message {
        font-size: clamp(0.5rem, 1vw, 0.8rem);
      }

      .btn {
        font-size: clamp(0.6rem, 1vw, 0.8rem);
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      .speed-graph {
        height: clamp(100px, 20vw, 120px);
      }
    }
  </style>
</head>

<body>
  <canvas id="background-canvas"></canvas>
  <canvas id="fallback-canvas"></canvas>
  <div class="css-particles" id="css-particles"></div>

  <div class="theme-toggle" id="theme-toggle">🌙</div>

  <div class="container">
    <h1>YOUR PUBLIC IP</h1>
    <div class="ip-display" id="ip-display">Fetching IP...</div>
    <div class="network-info" id="network-info">Fetching network info...</div>
    <div class="error-message" id="error-message">Animations failed to load. Please check your browser settings.</div>
    <button class="btn" id="copy-ip-btn">Copy IP</button>
    <button class="btn" id="start-speed-test">Test Network Speed</button>
    <div class="speed-test-container" id="speed-test-container">
      <select id="server-select" class="server-select">
        <option value="github">GitHub Pages Server</option>
        <option value="local">Local Assets</option>
        <option value="cloudflare">Cloudflare Workers</option>
      </select>
      <div class="metrics">
        <div class="metric">
          <div class="metric-label">Download Speed</div>
          <div class="metric-value" id="download-value">0</div>
          <div class="metric-unit">Mbps</div>
        </div>
        <div class="metric">
          <div class="metric-label">Upload Speed</div>
          <div class="metric-value" id="upload-value">0</div>
          <div class="metric-unit">Mbps</div>
        </div>
        <div class="metric">
          <div class="metric-label">Ping</div>
          <div class="metric-value" id="ping-value">0</div>
          <div class="metric-unit">ms</div>
        </div>
        <div class="metric">
          <div class="metric-label">Jitter</div>
          <div class="metric-value" id="jitter-value">0</div>
          <div class="metric-unit">ms</div>
        </div>
        <div class="metric">
          <div class="metric-label">Packet Loss</div>
          <div class="metric-value" id="packet-loss-value">0</div>
          <div class="metric-unit">%</div>
        </div>
      </div>
      <div class="progress-container">
        <div class="progress-speed" id="current-speed">0.00 Mbps</div>
        <div class="progress-percentage" id="progress-percent">0%</div>
        <div class="progress">
          <div class="progress-bar" id="progress-metor"></div>
        </div>
        <div class="progress-stats">
          <span id="data-transferred">0 MB</span>
          <span id="time-elapsed">00:00</span>
        </div>
      </div>
      <canvas class="speed-graph" id="speed-graph"></canvas>
      <div class="results-display" id="results-display"></div>
      <div class="button-container">
        <button class="btn" id="refresh-test" style="display: none;">Refresh Test</button>
        <button class="btn" id="show-more" style="display: none;">Show More</button>
        <button class="btn" id="share-results" style="display: none;">Share Results</button>
        <button class="btn" id="view-history" style="display: none;">View History</button>
      </div>
    </div>
  </div>

  <div class="log-overlay" id="log-overlay">
    <div class="log-content" id="log-content"></div>
    <button class="close-btn" id="close-log">Close</button>
  </div>

  <div class="history-overlay" id="history-overlay">
    <div class="history-content" id="history-content"></div>
    <button class="close-btn" id="close-history">Close</button>
  </div>

  <footer>
    © 2025 Labverse | Powered by 1FAR | WHAT IS MY IP ADDRESS
  </footer>

  <!-- Three.js with Fallback -->
  <script>
    // Global configuration
    const CONFIG = {
      // List of IP API endpoints to try in order
      ipApis: [
        { 
          url: 'https://api.ipify.org?format=json',
          parser: data => data.ip
        },
        { 
          url: 'https://api64.ipify.org?format=json',
          parser: data => data.ip
        },
        { 
          url: 'https://api.ipgeolocation.io/getip',
          parser: data => data.ip
        },
        { 
          url: 'https://api.ipdata.co/?api-key=test',
          parser: data => data.ip
        },
        { 
          url: 'https://ipwho.is/',
          parser: data => data.ip
        }
      ],
      
      // List of geo location API endpoints to try in order
      geoApis: [
        { 
          url: 'https://ipwho.is/',
          parser: data => ({ 
            isp: data.connection?.isp || 'Unknown', 
            city: data.city || 'Unknown', 
            country: data.country || 'Unknown' 
          })
        },
        { 
          url: 'https://get.geojs.io/v1/ip/geo.json',
          parser: data => ({ 
            isp: data.organization || 'Unknown', 
            city: data.city || 'Unknown', 
            country: data.country || 'Unknown' 
          })
        },
        { 
          url: 'https://ipapi.co/json/',
          parser: data => ({ 
            isp: data.org || 'Unknown', 
            city: data.city || 'Unknown', 
            country: data.country_name || 'Unknown' 
          })
        }
      ],
      
      // Server options for testing
      testServers: {
        github: {
          name: 'GitHub Pages Server',
          pingUrl: '/assets/ping-test.txt',
          downloadUrls: ['/assets/25one.bin', '/assets/25two.bin'],
          uploadUrl: null // GitHub doesn't support upload
        },
        local: {
          name: 'Local Assets',
          pingUrl: '/assets/ping-test.txt',
          downloadUrls: ['/assets/25one.bin', '/assets/25two.bin'],
          uploadUrl: null
        },
        cloudflare: {
          name: 'Cloudflare Workers',
          pingUrl: 'https://ping.workers.dev/ping',
          downloadUrls: ['https://speed.cloudflare.com/25mb.bin'],
          uploadUrl: 'https://speed.cloudflare.com/upload'
        }
      },
      
      // Background test URLs for ping
      pingBackups: [
        'https://www.cloudflare.com/favicon.ico',
        'https://www.google.com/favicon.ico',
        'https://www.microsoft.com/favicon.ico',
        'https://www.apple.com/favicon.ico'
      ],
      
      // Default fileSizes for download tests (in bytes)
      fileSizes: {
        '/assets/25one.bin': 25 * 1024 * 1024,
        '/assets/25two.bin': 25 * 1024 * 1024,
        'https://speed.cloudflare.com/25mb.bin': 25 * 1024 * 1024
      },
      
      // For upload simulations when actual upload not supported
      uploadSimulation: {
        chunkSize: 256 * 1024, // 256KB chunks
        totalSize: 10 * 1024 * 1024 // Simulate 10MB upload
      },
      
      // Test durations (in ms)
      testDurations: {
        download: 8000,
        upload: 5000,
        ping: 3000
      },
      
      // CORS workarounds
      corsProxies: [
        'https://corsproxy.io/?',
        'https://cors-anywhere.herokuapp.com/'
      ]
    };

    // Debug Logging
    const LogSystem = {
      debug: true,
      logs: [],
      backendLogs: [],
      
      log(message) {
        if (this.debug) console.log('[DEBUG] ' + message);
        this.logs.push({
          timestamp: new Date().toISOString(),
          message: message
        });
      },
      
      logBackend(message) {
        const now = new Date().toLocaleTimeString();
        this.backendLogs.push(`[${now}] ${message}`);
        if (this.debug) console.log('[BACKEND] ' + message);
      },
      
      getLogContent() {
        return this.backendLogs.join('<br>');
      },
      
      clearBackendLogs() {
        this.backendLogs = [];
      }
    };

    // Utility functions
    const Utils = {
      sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
      },
      
      formatBytes(bytes, decimals = 2) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const dm = decimals < 0 ? 0 : decimals;
        const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
      },
      
      formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      },
      
      clamp(min, value, max) {
        return Math.min(Math.max(value, min), max);
      },
      
      getRandomArrayElement(array) {
        return array[Math.floor(Math.random() * array.length)];
      },
      
      async fetchWithTimeout(url, options = {}, timeout = 5000) {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);
        
        options.signal = controller.signal;
        
        try {
          const response = await fetch(url, options);
          clearTimeout(id);
          return response;
        } catch (error) {
          clearTimeout(id);
          throw error;
        }
      },
      
      async tryCorsProxies(url, options = {}) {
        // Try direct first
        try {
          const response = await this.fetchWithTimeout(url, options);
          if (response.ok) return response;
        } catch (error) {
          LogSystem.log(`Direct fetch failed for ${url}: ${error.message}`);
        }
        
        // Try each CORS proxy
        for (const proxy of CONFIG.corsProxies) {
          try {
            const proxyUrl = proxy + url;
            const response = await this.fetchWithTimeout(proxyUrl, options);
            if (response.ok) return response;
          } catch (error) {
            LogSystem.log(`Proxy fetch failed for ${proxy}${url}: ${error.message}`);
          }
        }
        
        throw new Error(`All fetch attempts failed for ${url}`);
      },
      
      createWorkerBlob() {
        // Create a worker for background processing
        const blob = new Blob([`
          self.onmessage = function(e) {
            const { action, data } = e.data;
            
            switch(action) {
              case 'simulateUpload':
                simulateUpload(data);
                break;
            }
          };
          
          function simulateUpload({ chunkSize, totalSize, updateInterval }) {
            let uploaded = 0;
            const startTime = Date.now();
            const chunkCount = Math.ceil(totalSize / chunkSize);
            const timePerChunk = updateInterval;
            
            for (let i = 0; i < chunkCount; i++) {
              setTimeout(() => {
                uploaded += chunkSize;
                if (uploaded > totalSize) uploaded = totalSize;
                
                const progress = uploaded / totalSize;
                const elapsedTime = (Date.now() - startTime) / 1000;
                const speed = (uploaded * 8) / elapsedTime / 1024 / 1024;
                
                self.postMessage({
                  type: 'progress',
                  uploaded,
                  totalSize,
                  progress,
                  elapsedTime,
                  speed
                });
                
                if (uploaded >= totalSize) {
                  self.postMessage({
                    type: 'complete',
                    uploaded,
                    elapsedTime,
                    speed
                  });
                }
              }, i * timePerChunk);
            }
          }
        `], { type: 'application/javascript' });
        
        return URL.createObjectURL(blob);
      }
    };

      async runPingTest() {
        LogSystem.logBackend('Starting ping test...');
        
        const pingValue = document.getElementById('ping-value');
        const jitterValue = document.getElementById('jitter-value');
        const packetLossValue = document.getElementById('packet-loss-value');
        const progressBar = document.getElementById('progress-metor');
        const progressPercent = document.getElementById('progress-percent');
        const currentSpeed = document.getElementById('current-speed');
        const timeElapsed = document.getElementById('time-elapsed');
        
        progressBar.style.width = '0%';
        progressPercent.textContent = '0%';
        
        const pingTimes = [];
        let packetLossCount = 0;
        const PING_COUNT = 8;
        
        // Get server selection
        const serverType = document.getElementById('server-select').value;
        const server = CONFIG.testServers[serverType];
        
        // First try the selected server's ping URL
        const pingUrl = new URL(server.pingUrl, window.location.origin).toString();
        const pingTargets = [pingUrl, ...CONFIG.pingBackups];
        
        for (let i = 0; i < PING_COUNT; i++) {
          if (this.testAborted) break;
          
          let pingSuccess = false;
          
          // Try each ping target
          for (const target of pingTargets) {
            if (pingSuccess) break;
            
            try {
              LogSystem.logBackend(`Ping #${i+1} attempt to ${target}`);
              const startTime = performance.now();
              
              const response = await Utils.fetchWithTimeout(target, {
                method: 'HEAD',
                cache: 'no-store',
                headers: { 'Cache-Control': 'no-cache' }
              }, 2000);
              
              const endTime = performance.now();
              const pingTime = endTime - startTime;
              
              pingTimes.push(pingTime);
              pingSuccess = true;
              LogSystem.logBackend(`Ping #${i+1} successful: ${pingTime.toFixed(2)}ms`);
              
              // Update UI
              const percent = ((i + 1) / PING_COUNT) * 100;
              progressBar.style.width = `${percent}%`;
              progressPercent.textContent = `${percent.toFixed(0)}%`;
              timeElapsed.textContent = `${i+1}/${PING_COUNT}`;
              currentSpeed.textContent = `${pingTime.toFixed(2)} ms`;
            } catch (error) {
              LogSystem.logBackend(`Ping #${i+1} failed for ${target}: ${error.message}`);
            }
          }
          
          if (!pingSuccess) {
            packetLossCount++;
            LogSystem.logBackend(`Ping #${i+1} failed on all targets`);
          }
          
          // Delay between pings
          await Utils.sleep(300);
        }
        
        // Calculate ping statistics
        let avgPing = 0;
        let jitter = 0;
        
        if (pingTimes.length > 0) {
          avgPing = pingTimes.reduce((sum, time) => sum + time, 0) / pingTimes.length;
          
          if (pingTimes.length > 1) {
            const deviations = pingTimes.map(time => Math.pow(time - avgPing, 2));
            const variance = deviations.reduce((sum, dev) => sum + dev, 0) / (pingTimes.length - 1);
            jitter = Math.sqrt(variance);
          }
          
          // Update UI
          pingValue.textContent = avgPing.toFixed(0);
          jitterValue.textContent = jitter.toFixed(0);
          progressBar.style.width = '100%';
          progressPercent.textContent = '100%';
        } else {
          pingValue.textContent = 'Error';
          jitterValue.textContent = 'Error';
        }
        
        // Calculate packet loss
        const packetLossPercent = (packetLossCount / PING_COUNT) * 100;
        packetLossValue.textContent = packetLossPercent.toFixed(1);
        
        LogSystem.logBackend(`Ping test complete: Avg=${avgPing.toFixed(2)}ms, Jitter=${jitter.toFixed(2)}ms, Loss=${packetLossPercent.toFixed(1)}%`);
        
        return {
          ping: avgPing,
          jitter: jitter,
          packetLoss: packetLossPercent
        };
      },
      
      async runDownloadTest(graphContext) {
        LogSystem.logBackend('Starting download test...');
        
        const downloadValue = document.getElementById('download-value');
        const progressBar = document.getElementById('progress-metor');
        const progressPercent = document.getElementById('progress-percent');
        const currentSpeed = document.getElementById('current-speed');
        const dataTransferred = document.getElementById('data-transferred');
        const timeElapsed = document.getElementById('time-elapsed');
        
        // Reset progress bar
        progressBar.style.width = '0%';
        progressPercent.textContent = '0%';
        
        // Get server selection
        const serverType = document.getElementById('server-select').value;
        const server = CONFIG.testServers[serverType];
        
        const downloadUrls = server.downloadUrls.map(url => 
          url.startsWith('http') ? url : new URL(url, window.location.origin).toString()
        );
        
        let totalBytes = 0;
        let startTime = performance.now();
        let lastUpdate = startTime;
        let speedHistory = [];
        const maxTime = CONFIG.testDurations.download;
        let fileIndex = 0;
        let completed = false;
        
        while (!completed && !this.testAborted) {
          const url = downloadUrls[fileIndex % downloadUrls.length];
          const fileSize = CONFIG.fileSizes[url] || 25 * 1024 * 1024; // Default 25MB if not specified
          
          try {
            LogSystem.logBackend(`Downloading ${url}...`);
            const response = await fetch(url, {
              cache: 'no-store',
              headers: { 'Cache-Control': 'no-cache' }
            });
            
            if (!response.ok) {
              LogSystem.logBackend(`Download failed for ${url}: ${response.status} ${response.statusText}`);
              fileIndex++;
              continue;
            }
            
            const reader = response.body.getReader();
            
            while (true) {
              if (this.testAborted) break;
              
              const { done, value } = await reader.read();
              if (done) break;
              
              totalBytes += value.length;
              const now = performance.now();
              const elapsedSeconds = (now - startTime) / 1000;
              
              // Update UI every 100ms
              if (now - lastUpdate >= 100) {
                const speedMbps = ((totalBytes * 8) / elapsedSeconds) / (1024 * 1024);
                speedHistory.push(speedMbps);
                
                // Keep last 30 measurements for smoothing
                if (speedHistory.length > 30) speedHistory.shift();
                
                // Calculate moving average for smoother display
                const avgSpeed = speedHistory.reduce((sum, s) => sum + s, 0) / speedHistory.length;
                
                // Update UI
                currentSpeed.textContent = `${avgSpeed.toFixed(2)} Mbps`;
                downloadValue.textContent = avgSpeed.toFixed(1);
                
                const percentComplete = Math.min(100, (elapsedSeconds / (maxTime / 1000)) * 100);
                progressBar.style.width = `${percentComplete}%`;
                progressPercent.textContent = `${percentComplete.toFixed(1)}%`;
                dataTransferred.textContent = Utils.formatBytes(totalBytes);
                timeElapsed.textContent = Utils.formatTime(elapsedSeconds);
                
                // Update graph
                graphContext.updateGraph(avgSpeed, 'download', elapsedSeconds);
                
                lastUpdate = now;
              }
              
              // Check if we've hit the time limit
              if (elapsedSeconds >= maxTime / 1000) {
                completed = true;
                break;
              }
            }
            
            fileIndex++;
            
          } catch (error) {
            LogSystem.logBackend(`Error downloading ${url}: ${error.message}`);
            fileIndex++;
          }
          
          // Check if test should end
          const elapsedTime = (performance.now() - startTime) / 1000;
          if (elapsedTime >= maxTime / 1000) {
            completed = true;
          }
        }
        
        // Calculate final speed
        const endTime = performance.now();
        const totalTime = (endTime - startTime) / 1000;
        const finalSpeed = ((totalBytes * 8) / totalTime) / (1024 * 1024);
        
        // Update UI with final results
        downloadValue.textContent = finalSpeed.toFixed(1);
        progressBar.style.width = '100%';
        progressPercent.textContent = '100%';
        
        LogSystem.logBackend(`Download test complete: ${Utils.formatBytes(totalBytes)} in ${totalTime.toFixed(2)}s`);
        LogSystem.logBackend(`Download speed: ${finalSpeed.toFixed(2)} Mbps`);
        
        return finalSpeed;
      },
      
      async runUploadTest(graphContext) {

        // Real upload test
        let totalBytes = 0;

            return this.simulateUploadTest(graphContext);
          }
          
          // Generate data for upload
          const chunkSize = 256 * 1024; // 256KB chunks
          const data = new ArrayBuffer(chunkSize);
          const totalChunks = Math.ceil((maxTime / 1000) * 2); // ~2 chunks per second
          
          // Start upload test
          for (let i = 0; i < totalChunks; i++) {
            if (this.testAborted) break;
            
            const now = performance.now();
            const elapsedSeconds = (now - startTime) / 1000;
            
            if (elapsedSeconds >= maxTime / 1000) break;
            
            try {
              const blob = new Blob([data]);
              const formData = new FormData();
              formData.append('file', blob, 'speedtest.dat');
              
              const uploadResponse = await fetch(uploadUrl, {
                method: 'POST',
                body: formData,
                cache: 'no-store'
              });
              
              totalBytes += data.byteLength;
              
              // Update UI
              const speedMbps = ((totalBytes * 8) / elapsedSeconds) / (1024 * 1024);

              const avgSpeed = speedHistory.reduce((sum, s) => sum + s, 0) / speedHistory.length;

            } catch (error) {

            // Brief pause between uploads

          }
          
          // Calculate final speed

          // Update UI with final results

          progressBar.style.width = '100%';
          progressPercent.textContent = '100%';
          
          LogSystem.logBackend(`Upload test complete: ${Utils.formatBytes(totalBytes)} in ${totalTime.toFixed(2)}s`);

      simulateUploadTest(graphContext) {
        return new Promise((resolve) => {
          LogSystem.logBackend('Starting upload simulation...');
          
          const uploadValue = document.getElementById('upload-value');
          const progressBar = document.getElementById('progress-metor');
          const progressPercent = document.getElementById('progress-percent');
          const currentSpeed = document.getElementById('current-speed');
          const dataTransferred = document.getElementById('data-transferred');
          const timeElapsed = document.getElementById('time-elapsed');
          
          const { chunkSize, totalSize } = CONFIG.uploadSimulation;
          const startTime = performance.now();
          let finalSpeed = 0;
          
          // Update UI when progress is reported back from the worker
          this.updateUploadProgress = (uploaded, totalSize, progress, elapsedSeconds, speed) => {
            // Update UI
            currentSpeed.textContent = `${speed.toFixed(2)} Mbps`;
            uploadValue.textContent = speed.toFixed(1);
            
            const percentComplete = progress * 100;
            progressBar.style.width = `${percentComplete}%`;
            progressPercent.textContent = `${percentComplete.toFixed(1)}%`;
            dataTransferred.textContent = Utils.formatBytes(uploaded);
            timeElapsed.textContent = Utils.formatTime(elapsedSeconds);
            
            // Update graph
            graphContext.updateGraph(speed, 'upload', elapsedSeconds);
            
            finalSpeed = speed;
          };
          
          // Complete the test
          this.completeUploadTest = (uploaded, elapsedSeconds, speed) => {
            // Update UI with final results
            uploadValue.textContent = speed.toFixed(1);
            progressBar.style.width = '100%';
            progressPercent.textContent = '100%';
            
            LogSystem.logBackend(`Upload simulation complete: ${Utils.formatBytes(uploaded)} in ${elapsedSeconds.toFixed(2)}s`);
            LogSystem.logBackend(`Simulated upload speed: ${speed.toFixed(2)} Mbps`);
            
            // Resolve the promise
            resolve(speed);
          };
          
          // Use worker to run simulation in background
          if (this.worker) {
            this.worker.postMessage({
              action: 'simulateUpload',
              data: {
                chunkSize,
                totalSize,
                updateInterval: 300 // Update every 300ms
              }
            });
          } else {
            // If worker isn't available, use setTimeout-based simulation
            this.simulateUploadLocally(chunkSize, totalSize, graphContext, resolve);
          }
        });
      },
      
      simulateUploadLocally(chunkSize, totalSize, graphContext, resolveCallback) {
        const uploadValue = document.getElementById('upload-value');
        const progressBar = document.getElementById('progress-metor');
        const progressPercent = document.getElementById('progress-percent');
        const currentSpeed = document.getElementById('current-speed');
        const dataTransferred = document.getElementById('data-transferred');
        const timeElapsed = document.getElementById('time-elapsed');
        
        let uploaded = 0;
        const startTime = performance.now();
        const chunkCount = Math.ceil(totalSize / chunkSize);
        const timePerChunk = 300;
        
        // Use a recursive function instead of a loop to avoid blocking
        const simulateChunk = (index) => {
          if (index >= chunkCount || this.testAborted) {
            const elapsedTime = (performance.now() - startTime) / 1000;
            const finalSpeed = ((uploaded * 8) / elapsedTime) / (1024 * 1024);
            
            // Update UI with final results
            uploadValue.textContent = finalSpeed.toFixed(1);
            progressBar.style.width = '100%';
            progressPercent.textContent = '100%';
            
            LogSystem.logBackend(`Upload simulation complete: ${Utils.formatBytes(uploaded)} in ${elapsedTime.toFixed(2)}s`);
            LogSystem.logBackend(`Simulated upload speed: ${finalSpeed.toFixed(2)} Mbps`);
            
            // Resolve the promise
            resolveCallback(finalSpeed);
            return;
          }
          
          uploaded += chunkSize;
          if (uploaded > totalSize) uploaded = totalSize;
          
          const elapsedTime = (performance.now() - startTime) / 1000;
          const speed = ((uploaded * 8) / elapsedTime) / (1024 * 1024);
          const progress = uploaded / totalSize;
          
          // Update UI
          currentSpeed.textContent = `${speed.toFixed(2)} Mbps`;
          uploadValue.textContent = speed.toFixed(1);
          
          const percentComplete = progress * 100;
          progressBar.style.width = `${percentComplete}%`;
          progressPercent.textContent = `${percentComplete.toFixed(1)}%`;
          dataTransferred.textContent = Utils.formatBytes(uploaded);
          timeElapsed.textContent = Utils.formatTime(elapsedTime);
          
          // Update graph
          graphContext.updateGraph(speed, 'upload', elapsedTime);
          
          // Schedule next chunk
          setTimeout(() => simulateChunk(index + 1), timePerChunk);
        };
        
        // Start the simulation
        simulateChunk(0);
      },
      
      initializeGraph() {
        const speedGraph = document.getElementById('speed-graph');
        const ctx = speedGraph.getContext('2d');
        
        // Set canvas dimensions to match display size
        speedGraph.width = speedGraph.offsetWidth;
        speedGraph.height = speedGraph.offsetHeight;
        
        // Data points for download and upload
        const dataPoints = { 
          download: [], 
          upload: [] 
        };
        
        // Speed threshold points for Y-axis
        const speedPoints = [0, 5, 10, 25, 50, 100, 200, 500, 1000];
        let maxSpeed = 50; // Default max
        let lastUpdate = performance.now();
        
        // Helper to find appropriate speed points for the Y-axis
        function selectSpeedPoints(max) {
          const points = speedPoints.filter(p => p <= max);
          if (points[points.length - 1] < max) {
            points.push(speedPoints.find(p => p > max) || max);
          }
          return points;
        }
        
        // Draw the initial empty graph
        function drawGraph() {
          ctx.clearRect(0, 0, speedGraph.width, speedGraph.height);
          ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
          ctx.fillRect(0, 0, speedGraph.width, speedGraph.height);
          
          // Draw Y-axis (Mbps)
          const currentPoints = selectSpeedPoints(maxSpeed);
          ctx.strokeStyle = 'rgba(0, 183, 235, 0.5)';
          ctx.lineWidth = 1;
          ctx.font = `${Utils.clamp(8, 10, 12)}px 'Source Code Pro', monospace`;
          ctx.fillStyle = 'var(--cosmic-cyan)';
          ctx.textAlign = 'right';
          
          currentPoints.forEach(speed => {
            const y = speedGraph.height - (speed / maxSpeed) * speedGraph.height;
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(speedGraph.width, y);
            ctx.stroke();
            ctx.fillText(`${speed} Mbps`, 45, y - 5);
          });
          
          // Draw X-axis (Time)
          ctx.strokeStyle = 'var(--matrix-blue)';
          ctx.beginPath();
          ctx.moveTo(50, 0);
          ctx.lineTo(50, speedGraph.height);
          ctx.stroke();
          
          ctx.textAlign = 'center';
          for (let i = 0; i <= 10; i += 2) {
            const x = 50 + (i / 10) * (speedGraph.width - 60);
            ctx.fillText(`${i}s`, x, speedGraph.height - 5);
          }
        }
        
        // Update graph with new data points
        function updateGraph(speed, type, time) {
          const now = performance.now();
          
          // Throttle updates to avoid excessive drawing
          if (now - lastUpdate < 50) return;
          lastUpdate = now;
          
          // Update max speed if needed
          maxSpeed = Math.max(maxSpeed, speed * 1.1, 50);
          maxSpeed = speedPoints.find(p => p >= maxSpeed) || maxSpeed;
          
          // Add new data point
          dataPoints[type].push({ speed, time });
          
          // Redraw base graph
          drawGraph();
          
          // Draw data lines for both download and upload
          ['download', 'upload'].forEach(t => {
            const points = dataPoints[t];
            if (points.length === 0) return;
            
            // Set color based on test type
            const color = t === 'download' ? 'var(--cosmic-cyan)' : 'var(--cosmic-magenta)';
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.shadowBlur = 10;
            ctx.shadowColor = color;
            
            // Draw line connecting points
            ctx.beginPath();
            points.forEach((p, i) => {
              const x = 50 + (p.time / 10) * (speedGraph.width - 60);
              const y = speedGraph.height - (p.speed / maxSpeed) * speedGraph.height;
              
              if (i === 0) ctx.moveTo(x, y);
              else ctx.lineTo(x, y);
              
              // Draw point circle
              ctx.fillStyle = color;
              ctx.beginPath();
              ctx.arc(x, y, 4, 0, Math.PI * 2);
              ctx.fill();
            });
            
            ctx.stroke();
            ctx.shadowBlur = 0;
          });
        }
        
        // Display test results and hide graph
        function showResults() {
          speedGraph.style.display = 'none';
          document.getElementById('results-display').classList.add('active');
          document.getElementById('refresh-test').style.display = 'inline-block';
          document.getElementById('show-more').style.display = 'inline-block';
          document.getElementById('share-results').style.display = 'inline-block';
          document.getElementById('view-history').style.display = 'inline-block';
        }
        
        // Initialize graph
        drawGraph();
        
        return {
          updateGraph,
          showResults
        };
      },

      initWebGL(canvas) {
        LogSystem.log('Attempting WebGL initialization...');
        
        try {
          // Check if THREE.js is available
          if (typeof THREE === 'undefined') {
            LogSystem.log('THREE.js not available, creating fallback version');
            
            // Create a minimal THREE compatibility layer
            window.THREE = this.createMinimalTHREE();
          }
          
          // Check if WebGL is supported
          const testContext = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
          if (!testContext) {
            LogSystem.log('WebGL not supported');
            return false;
          }
          
          // Set up scene
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          
          const scene = new THREE.Scene();
          const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
          const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
          
          renderer.setSize(window.innerWidth, window.innerHeight);
          renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
          renderer.setClearColor(0x000000, 0);
          
          camera.position.z = 50;
          
          // Particle system
          let particles = [];
          let mousePos = { x: 0, y: 0 };
          
          // Track mouse movement
          document.addEventListener('mousemove', (e) => {
            mousePos.x = (e.clientX / window.innerWidth) * 2 - 1;
            mousePos.y = -(e.clientY / window.innerHeight) * 2 + 1;
          }, { passive: true });
          
          document.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
              mousePos.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
              mousePos.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
            }
          }, { passive: true });
          
          // Create a particle with Fibonacci distribution
          function createParticle(index, offset, life = 10, velocity = new THREE.Vector3(0, 0, 0), color = 0x00b7eb) {
            const phi = (1 + Math.sqrt(5)) / 2;
            const theta = index * 2 * Math.PI * phi;
            const r = Math.sqrt(index) * 0.8;
            const x = r * Math.cos(theta + offset);
            const y = r * Math.sin(theta + offset);
            
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute([x, y, Math.random() * 0.5], 3));
            
            const material = new THREE.PointsMaterial({
              color,
              size: 0.3,
              transparent: true,
              opacity: 1,
              blending: THREE.AdditiveBlending
            });
            
            const particle = new THREE.Points(geometry, material);
            scene.add(particle);
            
            return { obj: particle, life, index, offset, velocity };
          }
          
          // Initialize with some particles
          function initAnimations() {
            particles = [];
            for (let i = 0; i < 20; i++) {
              particles.push(createParticle(i, Math.random() * 2 * Math.PI));
            }
          }
          
          // Create initial particles
          initAnimations();
          
          // Trigger visual explosion effect
          function triggerBigBangWebGL() {
            // Remove existing particles
            particles.forEach(p => {
              scene.remove(p.obj);
              try {
                p.obj.geometry.dispose();
                p.obj.material.dispose();
              } catch (e) {}
            });
            
            particles = [];
            
            // Create explosion of particles
            const colors = [0x00b7eb, 0xff00cc, 0x00ffff, 0xffd700];
            
            for (let i = 0; i < 50; i++) {
              const theta = i * 2 * Math.PI * ((1 + Math.sqrt(5)) / 2);
              const r = Math.sqrt(i) * 1.2;
              
              const velocity = new THREE.Vector3(
                r * Math.cos(theta) * 0.15,
                r * Math.sin(theta) * 0.15,
                (Math.random() - 0.5) * 0.08
              );
              
              particles.push(createParticle(
                i,
                Math.random() * 2 * Math.PI,
                5,
                velocity,
                colors[Math.floor(Math.random() * colors.length)]
              ));
            }
          }
          
          // Update particle positions and properties
          function updateAnimations() {
            particles = particles.filter(p => {
              if (p.life <= 0) {
                scene.remove(p.obj);
                try {
                  p.obj.geometry.dispose();
                  p.obj.material.dispose();
                } catch (e) {}
                return false;
              }
              
              p.life -= 1 / 60;
              p.obj.material.opacity = p.life / 10 * 1;
              
              // Add mouse influence
              p.obj.position.x += p.velocity.x + mousePos.x * 0.03;
              p.obj.position.y += p.velocity.y + mousePos.y * 0.03;
              p.obj.position.z += p.velocity.z;
              
              // Slow down particles
              p.velocity.multiplyScalar(0.98);
              
              return true;
            });
            
            // Add new particles occasionally
            if (particles.length < 20 && Math.random() < 0.1) {
              particles.push(createParticle(
                Math.floor(Math.random() * 20),
                Math.random() * 2 * Math.PI
              ));
            }
          }
          
          // Animation loop
          function animate() {
            try {
              requestAnimationFrame(animate);
              updateAnimations();
              renderer.render(scene, camera);
            } catch (error) {
              LogSystem.log('WebGL Render Error: ' + error.message);
            }
          }
          
          // Start animation loop
          animate();
          
          // Handle window resize
          window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
          }, { passive: true });
          
          // Set our explosion effect function for use elsewhere
          window.triggerVisualEffect = triggerBigBangWebGL;
          
          this.animationMode = 'webgl';
          LogSystem.log('WebGL animation initialized successfully');
          return true;
          
        } catch (error) {
          LogSystem.log('WebGL Initialization Error: ' + error.message);
          return false;
        }
      },
      
      createMinimalTHREE() {
        // Create a minimal THREE.js compatibility layer for basic particles
        const THREE = {
          Vector3: class Vector3 {
            constructor(x = 0, y = 0, z = 0) {
              this.x = x;
              this.y = y;
              this.z = z;
            }
            
            multiplyScalar(scalar) {
              this.x *= scalar;
              this.y *= scalar;
              this.z *= scalar;
              return this;
            }
          },
          
          BufferGeometry: class BufferGeometry {
            constructor() {
              this.attributes = {};
            }
            
            setAttribute(name, attribute) {
              this.attributes[name] = attribute;
              return this;
            }
            
            dispose() {
              this.attributes = {};
            }
          },
          
          Float32BufferAttribute: class Float32BufferAttribute {
            constructor(array, itemSize) {
              this.array = array;
              this.itemSize = itemSize;
            }
          },
          
          PointsMaterial: class PointsMaterial {
            constructor(parameters) {
              this.color = parameters.color || 0xffffff;
              this.size = parameters.size || 1;
              this.transparent = parameters.transparent || false;
              this.opacity = parameters.opacity !== undefined ? parameters.opacity : 1;
              this.blending = parameters.blending || 'normal';
            }
            
            dispose() {}
          },
          
          Points: class Points {
            constructor(geometry, material) {
              this.geometry = geometry;
              this.material = material;
              this.position = new THREE.Vector3();
            }
          },
          
          Scene: class Scene {
            constructor() {
              this.children = [];
            }
            
            add(object) {
              this.children.push(object);
              return this;
            }
            
            remove(object) {
              const index = this.children.indexOf(object);
              if (index !== -1) this.children.splice(index, 1);
            }
          },
          
          PerspectiveCamera: class PerspectiveCamera {
            constructor(fov, aspect, near, far) {
              this.fov = fov;
              this.aspect = aspect;
              this.near = near;
              this.far = far;
              this.position = new THREE.Vector3();
            }
            
            updateProjectionMatrix() {}
          },
          
          WebGLRenderer: class WebGLRenderer {
            constructor(parameters) {
              this.domElement = parameters.canvas;
              this.context = this.domElement.getContext('2d');
            }
            
            setSize(width, height) {
              this.domElement.width = width;
              this.domElement.height = height;
            }
            
            setPixelRatio(ratio) {}
            
            setClearColor(color, alpha) {}
            
            render(scene, camera) {
              const ctx = this.context;
              ctx.clearRect(0, 0, this.domElement.width, this.domElement.height);
              
              scene.children.forEach(child => {
                if (child.geometry && child.geometry.attributes.position) {
                  const positions = child.geometry.attributes.position.array;
                  const x = positions[0] * 50 + this.domElement.width / 2 + child.position.x;
                  const y = positions[1] * 50 + this.domElement.height / 2 + child.position.y;
                  
                  ctx.beginPath();
                  ctx.arc(x, y, child.material.size * 5, 0, Math.PI * 2);
                  ctx.fillStyle = this.colorToRGBA(child.material.color, child.material.opacity);
                  ctx.fill();
                }
              });
            }
            
            colorToRGBA(color, opacity) {
              const hexColor = color.toString(16).padStart(6, '0');
              const r = parseInt(hexColor.substring(0, 2), 16);
              const g = parseInt(hexColor.substring(2, 4), 16);
              const b = parseInt(hexColor.substring(4, 6), 16);
              return `rgba(${r}, ${g}, ${b}, ${opacity})`;
            }
          },
          
          AdditiveBlending: 'additive'
        };
        
        return THREE;
      },
      
      init2DCanvas(canvas) {
        LogSystem.log('Attempting 2D canvas initialization...');
        
        try {
          const ctx = canvas.getContext('2d');
          if (!ctx) {
            LogSystem.log('2D canvas context not available');
            return false;
          }
          
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          
          // Particle system
          let particles = [];
          let mousePos = { x: canvas.width / 2, y: canvas.height / 2 };
          
          // Track mouse movement
          document.addEventListener('mousemove', (e) => {
            mousePos.x = e.clientX;
            mousePos.y = e.clientY;
          }, { passive: true });
          
          document.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
              mousePos.x = e.touches[0].clientX;
              mousePos.y = e.touches[0].clientY;
            }
          }, { passive: true });
          
          // Create a particle with Fibonacci distribution
          function createParticle(index) {
            const phi = (1 + Math.sqrt(5)) / 2;
            const theta = index * 2 * Math.PI * phi;
            const r = Math.sqrt(index) * 10;
            
            return {
              x: canvas.width / 2 + r * Math.cos(theta),
              y: canvas.height / 2 + r * Math.sin(theta),
              vx: (Math.random() - 0.5) * 2,
              vy: (Math.random() - 0.5) * 2,
              life: 600,
              color: `hsl(${Math.random() * 360}, 70%, 70%)`
            };
          }
          
          // Initialize particles
          function initParticles() {
            particles = [];
            for (let i = 0; i < 20; i++) {
              particles.push(createParticle(i));
            }
          }
          
          // Create initial particles
          initParticles();
          
          // Trigger visual explosion effect
          function triggerBigBang2D() {
            particles = [];
            
            // Visual effect
            ctx.fillStyle = 'blue';
            ctx.fillRect(canvas.width / 2 - 50, canvas.height / 2 - 50, 100, 100);
            setTimeout(() => ctx.clearRect(canvas.width / 2 - 50, canvas.height / 2 - 50, 100, 100), 1000);
            
            // Create explosion of particles
            for (let i = 0; i < 50; i++) {
              const theta = i * 2 * Math.PI * ((1 + Math.sqrt(5)) / 2);
              const r = Math.sqrt(i) * 15;
              
              particles.push({
                x: canvas.width / 2,
                y: canvas.height / 2,
                vx: r * Math.cos(theta) * 0.05,
                vy: r * Math.sin(theta) * 0.05,
                life: 300,
                color: `hsl(${Math.random() * 360}, 70%, 70%)`
              });
            }
          }
          
          // Animation loop
          function animate2D() {
            try {
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              
              // Update and render particles
              particles = particles.filter(p => {
                if (p.life <= 0) return false;
                
                p.life--;
                p.x += p.vx + (mousePos.x - canvas.width / 2) * 0.0001;
                p.y += p.vy + (mousePos.y - canvas.height / 2) * 0.0001;
                p.vx *= 0.98;
                p.vy *= 0.98;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 600;
                ctx.fill();
                
                return true;
              });
              
              // Add new particles occasionally
              if (particles.length < 20 && Math.random() < 0.1) {
                particles.push(createParticle(particles.length));
              }
              
              // Draw connections between nearby particles
              particles.forEach(p1 => {
                particles.forEach(p2 => {
                  if (p1 !== p2) {
                    const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
                    if (dist < 50 && Math.random() < 0.05) {
                      ctx.beginPath();
                      ctx.moveTo(p1.x, p1.y);
                      ctx.lineTo(p2.x, p2.y);
                      ctx.strokeStyle = p1.color;
                      ctx.globalAlpha = 0.3;
                      ctx.stroke();
                    }
                  }
                });
              });
              
              ctx.globalAlpha = 1;
              requestAnimationFrame(animate2D);
              
            } catch (error) {
              LogSystem.log('2D Canvas Render Error: ' + error.message);
            }
          }
          
          // Start animation loop
          animate2D();
          
          // Handle window resize
          window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
          }, { passive: true });
          
          // Set our explosion effect function for use elsewhere
          window.triggerVisualEffect = triggerBigBang2D;
          
          this.animationMode = '2d';
          LogSystem.log('2D canvas animation initialized successfully');
          return true;
          
        } catch (error) {
          LogSystem.log('2D Canvas Initialization Error: ' + error.message);
          return false;
        }
      },
      
      initCSSAnimations() {
        LogSystem.log('Attempting CSS animation initialization...');
        
        try {
          const cssParticles = document.getElementById('css-particles');
          cssParticles.style.display = 'block';
          cssParticles.innerHTML = '';
          
          // Create initial particles
          for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'css-particle';
            particle.style.left = `${Math.random() * 100}vw`;
            particle.style.top = `${Math.random() * 100}vh`;
            particle.style.animationDelay = `${Math.random() * 8}s`;
            particle.style.background = `hsl(${Math.random() * 360}, 70%, 70%)`;
            cssParticles.appendChild(particle);
          }
          
          // Trigger visual explosion effect
          function triggerBigBangCSS() {
            cssParticles.innerHTML = '';
            
            // Create explosion of particles
            for (let i = 0; i < 50; i++) {
              const particle = document.createElement('div');
              particle.className = 'css-particle';
              particle.style.left = `${50 + (Math.random() - 0.5) * 20}vw`;
              particle.style.top = `${50 + (Math.random() - 0.5) * 20}vh`;
              particle.style.animationDuration = '2s';
              particle.style.background = `hsl(${Math.random() * 360}, 70%, 70%)`;
              cssParticles.appendChild(particle);
              
              // Remove particle after animation completes
              setTimeout(() => particle.remove(), 2000);
            }
          }
          
          // Set our explosion effect function for use elsewhere
          window.triggerVisualEffect = triggerBigBangCSS;
          
          this.animationMode = 'css';
          LogSystem.log('CSS animation initialized successfully');
          return true;
          
        } catch (error) {
          LogSystem.log('CSS Animation Initialization Error: ' + error.message);
          return false;
        }
      }
    };

    // Copy IP to Clipboard
    function copyIP() {
      try {
        const ip = document.getElementById('ip-display').textContent;
        if (!ip || ip === 'IP unavailable') return;
        
        navigator.clipboard.writeText(ip).then(() => {
          triggerVisualEffect();
        }).catch(err => {
          // Fallback for browsers that don't support clipboard API
          const textarea = document.createElement('textarea');
          textarea.value = ip;
          document.body.appendChild(textarea);
          textarea.select();
          
          try {
            document.execCommand('copy');
            triggerVisualEffect();
          } catch (e) {
            LogSystem.log('Copy fallback failed: ' + e.message);
          }
          
          document.body.removeChild(textarea);
        });
      } catch (error) {
        LogSystem.log('Copy IP Error: ' + error.message);
      }
    }

    // Theme system
    const ThemeSystem = {
      initialize() {
        const themeToggle = document.getElementById('theme-toggle');
        
        // Load saved theme preference
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeToggle.textContent = savedTheme === 'dark' ? '🌙' : '☀️';
        
        // Toggle theme when button is clicked
        themeToggle.addEventListener('click', () => {
          const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
          const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
          
          document.documentElement.setAttribute('data-theme', newTheme);
          themeToggle.textContent = newTheme === 'dark' ? '🌙' : '☀️';
          localStorage.setItem('theme', newTheme);
        });
      }
    };

    // Main initialization
    document.addEventListener('DOMContentLoaded', async () => {
      // Initialize UI Components
      ThemeSystem.initialize();
      
      // Set up copy IP button
      document.getElementById('copy-ip-btn').addEventListener('click', copyIP);
      
      // Initialize background animations
      AnimationSystem.initialize();
      
      // Fetch IP and network info
      try {
        await Promise.all([
          NetworkInfoSystem.fetchIP(),
          NetworkInfoSystem.fetchLocationInfo()
        ]);
      } catch (error) {
        LogSystem.log('Error initializing network info: ' + error.message);
      }
      
      // Initialize speed test system
      SpeedTestSystem.initialize();
      
      // Add keyboard shortcut for explosion effect
      window.addEventListener('keydown', (e) => {
        if (e.key === 'e') {
          LogSystem.log('Manual explosion triggered via "e" key');
          triggerVisualEffect();
        }
      });
      
      // Default visual effect if not defined by animation system
      if (typeof window.triggerVisualEffect !== 'function') {
        window.triggerVisualEffect = () => {
          LogSystem.log('Default visual effect triggered (no animation available)');
        };
      }
    });
  </script>
</body>
