<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #0a0a2a, #000);
            overflow: hidden;
            height: 100vh;
            cursor: none;
        }
        #canvas {
            width: 100%;
            height: 100%;
            background: radial-gradient(rgba(0, 0, 51, 0.3), rgba(0, 0, 0, 0.7));
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; filter: brightness(1); }
            50% { transform: scale(1.2); opacity: 1; filter: brightness(1.5); }
            100% { transform: scale(1); opacity: 0.7; filter: brightness(1); }
        }
        @keyframes interference {
            0% { opacity: 0.5; filter: hue-rotate(0deg); }
            50% { opacity: 1; filter: hue-rotate(180deg); }
            100% { opacity: 0.5; filter: hue-rotate(360deg); }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: true });
        let energy = 0;
        let coherence = 0;
        let angle = 0;
        let mouse = { x: canvas.width / 2, y: canvas.height / 2, clicked: false, clickStrength: 0, lastClick: 0 };
        let audioContext, oscillator, gainNode;
        let particlePool = [];
        let geometryPool = [];
        let particles = [];
        let geometries = [];
        let slitPattern = [];
        let sceneProgress = 0;
        const sceneDuration = 3000; // Frames per phase (~50 seconds at 60 FPS)
        const maxParticles = 500; // Cap for memory safety
        const maxGeometries = 1000; // Cap for memory safety

        // Canvas Setup
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.globalCompositeOperation = 'lighter';
            mouse.x = canvas.width / 2;
            mouse.y = canvas.height / 2;
            initPools();
            initScene();
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Object Pooling for Particles and Geometries
        function initPools() {
            // Particle Pool
            particlePool.length = 0;
            for (let i = 0; i < maxParticles; i++) {
                particlePool.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    vx: (Math.random() - 0.5) * 2,
                    vy: -(Math.random() * 2 + 1),
                    size: Math.random() * 2 + 1,
                    hue: Math.random() * 360,
                    opacity: 1,
                    wave: Math.random() * 2 * Math.PI,
                    state: Math.floor(Math.random() * 2), // 0 = particle, 1 = wave
                    active: i === 0 // Start with 1 active particle
                });
            }
            particles = particlePool.filter(p => p.active);

            // Geometry Pool
            geometryPool.length = 0;
            for (let i = 0; i < maxGeometries; i++) {
                geometryPool.push({
                    type: 'circle',
                    x: 0,
                    y: 0,
                    r: 0,
                    hue: 0,
                    opacity: 1,
                    pulsing: false,
                    x1: 0,
                    y1: 0,
                    x2: 0,
                    y2: 0,
                    points: [],
                    width: 0,
                    vx: 0,
                    vy: 0,
                    depth: 0,
                    active: false
                });
            }
        }

        // Energy-Driven Particle Expansion
        function spawnParticles() {
            const activeCount = particles.filter(p => p.active).length;
            const spawnCount = Math.min(Math.floor(energy / 100), maxParticles - activeCount);
            let spawned = 0;
            for (let i = 0; i < particlePool.length && spawned < spawnCount; i++) {
                if (!particlePool[i].active) {
                    particlePool[i].x = canvas.width / 2;
                    particlePool[i].y = canvas.height / 2;
                    particlePool[i].vx = (Math.random() - 0.5) * 2;
                    particlePool[i].vy = -(Math.random() * 2 + 1);
                    particlePool[i].size = Math.random() * 2 + 1;
                    particlePool[i].hue = Math.random() * 360;
                    particlePool[i].opacity = 1;
                    particlePool[i].wave = Math.random() * 2 * Math.PI;
                    particlePool[i].state = Math.floor(Math.random() * 2);
                    particlePool[i].active = true;
                    spawned++;
                }
            }
            particles = particlePool.filter(p => p.active);
        }

        function drawParticles() {
            particles.forEach(p => {
                if (!p.active) return;
                p.x += p.vx * (1 + energy / 10000);
                p.y += p.vy * (1 + energy / 10000);
                p.wave += 0.03 * (1 + coherence / 1000);
                p.vy += 0.01; // Gravity effect
                if (p.x < 0 || p.x > canvas.width) p.vx *= -0.9;
                if (p.y > canvas.height || p.y < 0) {
                    p.x = canvas.width / 2;
                    p.y = canvas.height / 2;
                    p.vx = (Math.random() - 0.5) * 2;
                    p.vy = -(Math.random() * 2 + 1);
                }
                const dx = mouse.x - p.x;
                const dy = mouse.y - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 250 && mouse.clicked) {
                    p.vx += dx * 0.01 * mouse.clickStrength;
                    p.vy += dy * 0.01 * mouse.clickStrength;
                    p.opacity = Math.min(p.opacity + 0.02, 1);
                    p.state = 1;
                } else if (dist > 300) {
                    p.opacity = Math.max(p.opacity - 0.01, 0.4);
                    p.state = 0;
                }
                const slitX = (p.x - canvas.width * 0.4) / (canvas.width * 0.2);
                if (slitX >= 0 && slitX <= 1 && p.y > canvas.height * 0.5) {
                    const interference = Math.sin(slitX * 10 * Math.PI + angle) * 0.5 + 0.5;
                    p.opacity *= interference;
                    p.vx += Math.cos(slitX * 10 * Math.PI) * 0.01;
                }
                ctx.beginPath();
                if (p.state === 0) {
                    ctx.arc(p.x, p.y, p.size, 0, 2 * Math.PI);
                } else {
                    ctx.moveTo(p.x - p.size, p.y);
                    ctx.bezierCurveTo(p.x, p.y - p.size * 2, p.x, p.y + p.size * 2, p.x + p.size, p.y);
                }
                const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                gradient.addColorStop(0, `hsla(${p.hue}, 70%, 50%, ${p.opacity})`);
                gradient.addColorStop(1, `hsla(${p.hue}, 70%, 50%, 0)`);
                ctx.fillStyle = gradient;
                ctx.fill();
            });
        }

        // Double Slit Pattern
        function updateSlitPattern() {
            slitPattern = [];
            for (let x = canvas.width * 0.4; x < canvas.width * 0.6; x += 5) {
                for (let y = canvas.height * 0.5; y < canvas.height * 0.7; y += 5) {
                    const slitX = (x - canvas.width * 0.4) / (canvas.width * 0.2);
                    const interference = Math.sin(slitX * 10 * Math.PI + angle) * 0.5 + 0.5;
                    if (interference > 0.3) {
                        slitPattern.push({ x, y, intensity: interference });
                    }
                }
            }
        }

        function drawSlitPattern() {
            slitPattern.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, 2 * s.intensity, 0, 2 * Math.PI);
                ctx.fillStyle = `hsla(240, 70%, 50%, ${s.intensity * 0.5})`;
                ctx.fill();
            });
        }

        // Audio Setup
        function initAudio(baseFreq) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioContext.createOscillator();
            gainNode = audioContext.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.value = baseFreq;
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.start();
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
        }

        function stopAudio() {
            if (oscummondator) oscillator.stop();
            if (audioContext) audioContext.close();
        }

        function updateAudio() {
            if (gainNode) {
                gainNode.gain.setValueAtTime(0.1 + (coherence / 2000), audioContext.currentTime);
                oscillator.frequency.setValueAtTime(baseFrequencies[Math.floor(sceneProgress / sceneDuration) % 5] + (energy / 200), audioContext.currentTime);
            }
        }
        const baseFrequencies = [432, 528, 432, 0, 963];

        // Unified Cosmic Scene with Energy-Driven Growth
        function initScene() {
            // Reset active geometries
            geometryPool.forEach(g => g.active = false);
            geometries = [];
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const phase = Math.floor(sceneProgress / sceneDuration) % 5;
            let activeCount = 0;

            // Flower of Life (Phase 0)
            if (phase === 0) {
                const radius = Math.min(canvas.width, canvas.height) / 20;
                function generateFlower(x, y, r, depth) {
                    if (depth > Math.min(3 + Math.floor(energy / 1000), 5) || activeCount >= maxGeometries) return;
                    let g = geometryPool[activeCount++];
                    g.type = 'circle';
                    g.x = x;
                    g.y = y;
                    g.r = r * (1 + Math.sin(angle + x / 50) * 0.1);
                    g.hue = 180 + depth * 30;
                    g.opacity = 1;
                    g.pulsing = true;
                    g.active = true;
                    for (let i = 0; i < 6; i++) {
                        if (activeCount >= maxGeometries) break;
                        const a = (2 * Math.PI / 6) * i + angle;
                        const newX = x + r * Math.cos(a);
                        const newY = y + r * Math.sin(a);
                        let line = geometryPool[activeCount++];
                        line.type = 'line';
                        line.x1 = x;
                        line.y1 = y;
                        line.x2 = newX;
                        line.y2 = newY;
                        line.hue = 180 + depth * 30;
                        line.opacity = 1;
                        line.active = true;
                        generateFlower(newX, newY, r * 0.7, depth + 1);
                    }
                }
                generateFlower(cx, cy, radius, 0);
            }

            // Golden Spiral (Phase 1)
            if (phase === 1) {
                let phi = (1 + Math.sqrt(5)) / 2;
                let r = 5, a = 0;
                const points = [];
                const steps = Math.min(500 + Math.floor(energy / 20), 800);
                for (let i = 0; i < steps; i++) {
                    a += 0.1;
                    r = 5 * Math.pow(phi, a / (Math.PI / 2)) * (1 + energy / 10000);
                    const x = cx + r * Math.cos(a + angle);
                    const y = cy + r * Math.sin(a + angle);
                    points.push({ x, y });
                    if (i % 10 === 0 && activeCount < maxGeometries) {
                        let g = geometryPool[activeCount++];
                        g.type = 'circle';
                        g.x = x;
                        g.y = y;
                        g.r = 10 * (coherence / 100 + 1);
                        g.hue = 60 + i * 0.2;
                        g.opacity = 1;
                        g.pulsing = true;
                        g.active = true;
                    }
                }
                if (activeCount < maxGeometries) {
                    let spiral = geometryPool[activeCount++];
                    spiral.type = 'spiral';
                    spiral.points = points;
                    spiral.hue = 60;
                    spiral.opacity = 1;
                    spiral.active = true;
                }
                if (activeCount < maxGeometries) {
                    let center = geometryPool[activeCount++];
                    center.type = 'circle';
                    center.x = cx;
                    center.y = cy;
                    center.r = 20 + energy / 50;
                    center.hue = 60;
                    center.opacity = 1;
                    center.pulsing = true;
                    center.active = true;
                }
            }

            // Seed of Life (Phase 2)
            if (phase === 2) {
                const radius = Math.min(canvas.width, canvas.height) / 15;
                if (activeCount < maxGeometries) {
                    let center = geometryPool[activeCount++];
                    center.type = 'circle';
                    center.x = cx;
                    center.y = cy;
                    center.r = radius;
                    center.hue = 180;
                    center.opacity = 1;
                    center.pulsing = true;
                    center.active = true;
                }
                for (let i = 0; i < 6; i++) {
                    if (activeCount >= maxGeometries) break;
                    const a = (2 * Math.PI / 6) * i + angle;
                    const x = cx + radius * Math.cos(a);
                    const y = cy + radius * Math.sin(a);
                    let g = geometryPool[activeCount++];
                    g.type = 'circle';
                    g.x = x;
                    g.y = y;
                    g.r = radius;
                    g.hue = 180 + i * 30;
                    g.opacity = 1;
                    g.pulsing = true;
                    g.active = true;
                    let line = geometryPool[activeCount++];
                    line.type = 'line';
                    line.x1 = cx;
                    line.y1 = cy;
                    line.x2 = x;
                    line.y2 = y;
                    line.hue = 180 + i * 30;
                    line.opacity = 1;
                    line.active = true;
                }
            }

            // Quantum Field with Double Slit (Phase 3)
            if (phase === 3) {
                const count = Math.min(100 + Math.floor(energy / 50), 200);
                for (let i = 0; i < count; i++) {
                    if (activeCount >= maxGeometries) break;
                    const x = cx + (Math.random() - 0.5) * canvas.width * 0.8;
                    const y = cy - canvas.height * 0.4;
                    let g = geometryPool[activeCount++];
                    g.type = 'circle';
                    g.x = x;
                    g.y = y;
                    g.r = 5 * (1 + coherence / 1000);
                    g.hue = 240 + Math.random() * 60;
                    g.opacity = 0.7;
                    g.pulsing = true;
                    g.vx = (Math.random() - 0.5) * 2;
                    g.vy = Math.random() * 2 + 1;
                    g.active = true;
                }
                if (activeCount < maxGeometries) {
                    let slit1 = geometryPool[activeCount++];
                    slit1.type = 'rect';
                    slit1.x = canvas.width * 0.45;
                    slit1.y = canvas.height * 0.5;
                    slit1.w = 10;
                    slit1.h = canvas.height * 0.3;
                    slit1.hue = 240;
                    slit1.opacity = 0.8;
                    slit1.active = true;
                }
                if (activeCount < maxGeometries) {
                    let slit2 = geometryPool[activeCount++];
                    slit2.type = 'rect';
                    slit2.x = canvas.width * 0.55;
                    slit2.y = canvas.height * 0.5;
                    slit2.w = 10;
                    slit2.h = canvas.height * 0.3;
                    slit2.hue = 240;
                    slit2.opacity = 0.8;
                    slit2.active = true;
                }
            }

            // Torus Flow (Phase 4)
            if (phase === 4) {
                const innerR = 50 + energy / 20;
                const outerR = 150 + energy / 100;
                for (let i = 0; i < 360; i += 3) {
                    if (activeCount >= maxGeometries) break;
                    const a = (i * Math.PI / 180) + angle;
                    const x = cx + (outerR + innerR * Math.cos(a)) * Math.cos(a);
                    const y = cy + (outerR + innerR * Math.cos(a)) * Math.sin(a);
                    let g = geometryPool[activeCount++];
                    g.type = 'circle';
                    g.x = x;
                    g.y = y;
                    g.r = 5 * (1 + Math.sin(a + angle) * 0.3);
                    g.hue = i + energy * 0.01;
                    g.opacity = 1;
                    g.pulsing = true;
                    g.active = true;
                }
                for (let i = 0; i < 360; i += 15) {
                    if (activeCount >= maxGeometries) break;
                    const a1 = (i * Math.PI / 180) + angle;
                    const a2 = ((i + 15) * Math.PI / 180) + angle;
                    const x1 = cx + outerR * Math.cos(a1);
                    const y1 = cy + outerR * Math.sin(a1);
                    const x2 = cx + outerR * Math.cos(a2);
                    const y2 = cy + outerR * Math.sin(a2);
                    let line = geometryPool[activeCount++];
                    line.type = 'line';
                    line.x1 = x1;
                    line.y1 = y1;
                    line.x2 = x2;
                    line.y2 = y2;
                    line.hue = i + energy * 0.01;
                    line.opacity = 1;
                    line.width = 2 + energy / 100;
                    line.active = true;
                }
            }

            geometries = geometryPool.filter(g => g.active);
        }

        // Draw Geometries
        function drawGeometries() {
            geometries.forEach(g => {
                if (!g.active) return;
                ctx.globalAlpha = g.opacity;
                if (g.type === 'circle') {
                    ctx.beginPath();
                    const pulseScale = g.pulsing ? (1 + Math.sin(Date.now() / 500 + g.x / 50 + g.y / 50) * 0.2 * (1 + energy / 5000)) : 1;
                    ctx.arc(g.x, g.y, g.r * pulseScale, 0, 2 * Math.PI);
                    const gradient = ctx.createRadialGradient(g.x, g.y, 0, g.x, g.y, g.r * pulseScale);
                    gradient.addColorStop(0, `hsla(${g.hue}, 70%, 50%, ${0.8 * (1 + coherence / 1000)})`);
                    gradient.addColorStop(1, `hsla(${g.hue}, 70%, 50%, 0)`);
                    ctx.fillStyle = gradient;
                    ctx.strokeStyle = `hsla(${g.hue}, 70%, 50%, ${g.opacity})`;
                    ctx.lineWidth = 2;
                    ctx.fill();
                    ctx.stroke();
                    if (g.vx) {
                        g.x += g.vx * (1 + energy / 10000);
                        g.y += g.vy * (1 + energy / 10000);
                        g.vy += 0.005;
                        if (g.x < 0 || g.x > canvas.width) g.vx *= -0.9;
                        if (g.y > canvas.height) {
                            g.y = canvas.height;
                            g.vy *= -0.7;
                        }
                        const dx = mouse.x - g.x;
                        const dy = mouse.y - g.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 200 && mouse.clicked) {
                            g.vx += dx * 0.01 * mouse.clickStrength;
                            g.vy += dy * 0.01 * mouse.clickStrength;
                        }
                    }
                } else if (g.type === 'line') {
                    ctx.beginPath();
                    ctx.moveTo(g.x1, g.y1);
                    ctx.lineTo(g.x2, g.y2);
                    ctx.strokeStyle = `hsla(${g.hue}, 70%, 50%, ${g.opacity * 0.3 * (1 + energy / 5000)})`;
                    ctx.lineWidth = (g.width || 1);
                    ctx.stroke();
                } else if (g.type === 'spiral') {
                    ctx.beginPath();
                    ctx.moveTo(g.points[0].x, g.points[0].y);
                    for (let i = 1; i < g.points.length; i++) {
                        ctx.lineTo(g.points[i].x, g.points[i].y);
                    }
                    ctx.strokeStyle = `hsla(${g.hue}, 70%, 50%, ${g.opacity})`;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                } else if (g.type === 'rect') {
                    ctx.fillStyle = `hsla(${g.hue}, 70%, 50%, ${g.opacity})`;
                    ctx.fillRect(g.x, g.y, g.w, g.h);
                }
            });
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            angle += 0.01 * (1 + energy / 10000);
            sceneProgress += 1;
            if (sceneProgress % sceneDuration === 0) {
                stopAudio();
                initScene();
                initAudio(baseFrequencies[Math.floor(sceneProgress / sceneDuration) % 5]);
            }
            updateSlitPattern();
            spawnParticles();
            drawParticles();
            drawSlitPattern();
            drawGeometries();
            updateEnergy();
            updateAudio();
        }

        // Mouse/Touch Interaction
        function handleInput(e, isTouch = false) {
            const rect = canvas.getBoundingClientRect();
            const x = isTouch ? e.touches[0].clientX : e.clientX;
            const y = isTouch ? e.touches[0].clientY : e.clientY;
            mouse.x = x - rect.left;
            mouse.y = y - rect.top;
            energy += Math.sin(distToCenter(mouse.x, mouse.y) / 100) * 0.5 * (1 + coherence / 1000);
            angle += (mouse.x - canvas.width / 2) / 10000 * (1 + energy / 5000);
        }

        canvas.addEventListener('mousemove', handleInput, { passive: true });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            handleInput(e, true);
        }, { passive: false });

        canvas.addEventListener('mousedown', () => {
            mouse.clicked = true;
            const now = Date.now();
            mouse.clickStrength = Math.min((now - mouse.lastClick) / 1000, 5);
            mouse.lastClick = now;
            energy += 100 * mouse.clickStrength * (1 + energy / 10000);
            coherence += mouse.clickStrength * 10 * (1 + energy / 1000);
            spawnParticles();
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInput(e, true);
            mouse.clicked = true;
            const now = Date.now();
            mouse.clickStrength = Math.min((now - mouse.lastClick) / 1000, 5);
            mouse.lastClick = now;
            energy += 100 * mouse.clickStrength * (1 + energy / 10000);
            coherence += mouse.clickStrength * 10 * (1 + energy / 1000);
            spawnParticles();
        }, { passive: false });

        canvas.addEventListener('mouseup', () => {
            mouse.clicked = false;
        });

        canvas.addEventListener('touchend', () => {
            mouse.clicked = false;
        });

        function distToCenter(x, y) {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            return Math.sqrt((x - cx) * (x - cx) + (y - cy) * (y - cy));
        }

        function updateEnergy() {
            const phase = Math.floor(sceneProgress / sceneDuration) % 5;
            const energyGain = {
                0: Math.PI * Math.pow(10, 2) * (coherence / 100 + 1) * 0.001,
                1: 0.1 * Math.pow((1 + Math.sqrt(5)) / 2, 0.01) * (coherence / 100 + 1),
                2: (4 / 3 * Math.PI * Math.pow(10, 3)) * (mouse.clickStrength + 1) * 0.0001,
                3: 6.626e-34 * (coherence / 100 + 1) * (1 + energy / 10000),
                4: Math.pow(1, 2) * 1 * (energy / 10000 + 1) * (1 + coherence / 500)
            }[phase] || 0;
            energy += energyGain * (1 + Math.random() * 0.1);
            if (energy > 10000) {
                energy = 5000;
                particles.forEach(p => p.hue = (p.hue + 180) % 360);
                geometries.forEach(g => g.hue = (g.hue + 90) % 360);
            }
        }

        // Start
        initPools();
        initScene();
        initAudio(432);
        animate();
    </script>
</body>
</html>
