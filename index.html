<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Labverse Speed Test - Check your IP and network speed with stunning visuals.">
  <meta property="og:title" content="Labverse Speed Test">
  <meta property="og:description" content="Test your network speed with mesmerizing WebGL animations!">
  <meta property="og:image" content="https://labverse.co.za/og-image.png">
  <meta property="og:url" content="https://labverse.co.za">
  <meta name="twitter:card" content="summary_large_image">
  <title>Labverse Speed Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-blue: #00b7eb;
      --neon-magenta: #ff00cc;
      --neon-cyan: #00ffff;
      --dark-bg: #0a0a1f;
      --card-bg: rgba(10, 10, 31, 0.9);
      --text-color: #e6f0ff;
      --glow-radius: 12px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Exo 2', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--dark-bg);
      color: var(--text-color);
      overflow: hidden;
    }

    #background-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.7;
    }

    .container {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
      overflow-y: auto;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      text-transform: uppercase;
      background: linear-gradient(45deg, var(--neon-cyan), var(--neon-magenta));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 10px var(--neon-blue);
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px var(--neon-blue); }
      to { text-shadow: 0 0 20px var(--neon-magenta); }
    }

    .ip-display {
      font-size: clamp(1.5rem, 3vw, 2rem);
      background: var(--card-bg);
      padding: 1rem 2rem;
      border-radius: 10px;
      border: 2px solid var(--neon-blue);
      box-shadow: 0 0 15px var(--neon-blue);
      margin: 1rem 0;
      transition: transform 0.3s ease;
    }

    .ip-display:hover {
      transform: scale(1.05);
    }

    .network-info {
      font-size: clamp(0.9rem, 1.5vw, 1.1rem);
      max-width: 500px;
      line-height: 1.5;
      text-shadow: 0 0 5px var(--neon-blue);
    }

    .error-message {
      font-size: 1rem;
      color: #ff5555;
      display: none;
    }

    .btn {
      background: linear-gradient(45deg, var(--neon-blue), var(--neon-magenta));
      color: var(--text-color);
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      text-transform: uppercase;
      box-shadow: 0 0 var(--glow-radius) var(--neon-blue);
      transition: all 0.3s ease;
      margin: 0.5rem;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px var(--neon-magenta);
      background: linear-gradient(45deg, var(--neon-magenta), var(--neon-blue));
    }

    .speed-test-container {
      display: none;
      background: var(--card-bg);
      border-radius: 12px;
      border: 2px solid var(--neon-blue);
      box-shadow: 0 0 20px var(--neon-blue);
      padding: 1.5rem;
      max-width: 600px;
      width: 100%;
      max-height: 60vh;
      overflow-y: auto;
      transition: opacity 0.5s ease;
    }

    .speed-test-container.active {
      display: block;
      opacity: 1;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 1rem;
      margin: 1rem 0;
    }

    .metric {
      background: rgba(0, 183, 235, 0.1);
      padding: 0.8rem;
      border-radius: 8px;
      text-align: center;
    }

    .metric-value {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--neon-cyan);
      text-shadow: 0 0 5px var(--neon-cyan);
    }

    .metric-label {
      font-size: 0.9rem;
      color: var(--text-color);
    }

    .metric-unit {
      font-size: 0.8rem;
      color: #ffd700;
    }

    .progress-container {
      margin: 1rem 0;
    }

    .progress {
      height: 16px;
      background: #1a1a3d;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(45deg, var(--neon-blue), var(--neon-magenta));
      box-shadow: 0 0 15px var(--neon-blue);
      transition: width 0.2s ease;
    }

    .progress-speed, .progress-percentage {
      font-size: 0.9rem;
      position: absolute;
      top: -20px;
      color: var(--neon-cyan);
      text-shadow: 0 0 5px var(--neon-blue);
    }

    .progress-speed { left: 0; }
    .progress-percentage { right: 0; }

    .progress-stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--text-color);
      padding: 0.5rem 0;
    }

    .history-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      padding: 2rem;
      overflow-y: auto;
    }

    .history-overlay.active {
      display: block;
    }

    .history-content {
      background: var(--card-bg);
      border: 2px solid var(--neon-blue);
      border-radius: 12px;
      padding: 1.5rem;
      max-width: 600px;
      margin: 0 auto;
      font-size: 0.9rem;
    }

    .history-item {
      margin-bottom: 1rem;
      padding: 0.5rem;
      border-bottom: 1px solid var(--neon-blue);
    }

    .close-btn {
      background: var(--neon-magenta);
      color: var(--text-color);
      border: none;
      padding: 0.6rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      box-shadow: 0 0 var(--glow-radius) var(--neon-magenta);
      transition: all 0.3s ease;
    }

    .close-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px var(--neon-cyan);
      background: var(--neon-cyan);
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: 1rem;
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-color);
      text-shadow: 0 0 5px var(--neon-cyan);
    }

    footer a {
      color: var(--neon-cyan);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .container { padding: 1rem; }
      h1 { font-size: clamp(2rem, 4vw, 3rem); }
      .ip-display { font-size: clamp(1.2rem, 2.5vw, 1.5rem); }
      .btn { font-size: 0.9rem; padding: 0.6rem 1.2rem; }
      .speed-test-container { max-height: 50vh; }
    }

    @media (max-width: 480px) {
      h1 { font-size: clamp(1.5rem, 3.5vw, 2rem); }
      .metrics { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <canvas id="background-canvas" aria-hidden="true"></canvas>
  <div class="container">
    <h1>Labverse Speed Test</h1>
    <div class="ip-display" id="ip-display" aria-live="polite">Fetching IP...</div>
    <div class="network-info" id="network-info" aria-live="polite">Fetching network info...</div>
    <div class="error-message" id="error-message" role="alert" aria-hidden="true"></div>
    <div class="button-container">
      <button class="btn" id="copy-ip-btn" aria-label="Copy IP address">Copy IP</button>
      <button class="btn" id="start-speed-test" aria-label="Start network speed test">Test Speed</button>
    </div>
    <div class="speed-test-container" id="speed-test-container" role="region" aria-label="Speed test results">
      <div class="metrics">
        <div class="metric">
          <div class="metric-label">Download Speed</div>
          <div class="metric-value" id="download-value">0.0</div>
          <div class="metric-unit">Mbps</div>
        </div>
        <div class="metric">
          <div class="metric-label">Upload Speed</div>
          <div class="metric-value" id="upload-value">0.0</div>
          <div class="metric-unit">Mbps</div>
        </div>
        <div class="metric">
          <div class="metric-label">Ping</div>
          <div class="metric-value" id="ping-value">0</div>
          <div class="metric-unit">ms</div>
        </div>
        <div class="metric">
          <div class="metric-label">Jitter</div>
          <div class="metric-value" id="jitter-value">0</div>
          <div class="metric-unit">ms</div>
        </div>
        <div class="metric">
          <div class="metric-label">Packet Loss</div>
          <div class="metric-value" id="packet-loss-value">0</div>
          <div class="metric-unit">%</div>
        </div>
      </div>
      <div class="progress-container">
        <div class="progress-speed" id="current-speed">0.00 Mbps</div>
        <div class="progress-percentage" id="progress-percent">0%</div>
        <div class="progress">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="progress-stats">
          <span id="data-transferred">0 MB</span>
          <span id="time-elapsed">00:00</span>
        </div>
      </div>
      <div class="button-container">
        <button class="btn" id="refresh-test" style="display: none;" aria-label="Refresh test">Refresh</button>
        <button class="btn" id="share-results" style="display: none;" aria-label="Share results">Share</button>
        <button class="btn" id="view-history" style="display: none;" aria-label="View history">History</button>
      </div>
    </div>
  </div>
  <div class="history-overlay" id="history-overlay" role="dialog" aria-label="Test history">
    <div class="history-content" id="history-content"></div>
    <button class="close-btn" id="close-history" aria-label="Close history">Close</button>
  </div>
  <footer>
    © 2025 Labverse | Powered by <a href="https://onefar.co.za" target="_blank" rel="noopener">1FAR</a>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    // Utility Functions
    function log(message) {
      console.log('[DEBUG] ' + message);
    }

    function formatBytes(bytes, decimals = 2) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024, dm = decimals < 0 ? 0 : decimals;
      const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).catch(() => {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
      });
    }

    // Animations
    function initializeAnimations() {
      const canvas = document.getElementById('background-canvas');
      let scene, camera, renderer, particles = [];

      try {
        // Initialize WebGL
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        camera.position.z = 50;

        // Particle system using Fibonacci spiral
        const createParticle = (index) => {
          const phi = (1 + Math.sqrt(5)) / 2;
          const theta = index * 2 * Math.PI * phi;
          const r = Math.sqrt(index) * 0.8;
          const geometry = new THREE.BufferGeometry();
          geometry.setAttribute('position', new THREE.Float32BufferAttribute([r * Math.cos(theta), r * Math.sin(theta), 0], 3));
          const material = new THREE.PointsMaterial({
            color: 0x00b7eb,
            size: 0.3,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
          });
          const particle = new THREE.Points(geometry, material);
          scene.add(particle);
          return { obj: particle, life: 10, velocity: new THREE.Vector3(0, 0, 0) };
        };

        for (let i = 0; i < 100; i++) {
          particles.push(createParticle(i));
        }

        // Animation loop
        const animate = () => {
          requestAnimationFrame(animate);
          particles.forEach(p => {
            p.life -= 1 / 60;
            if (p.life <= 0) {
              scene.remove(p.obj);
              p.obj.geometry.dispose();
              p.obj.material.dispose();
              particles.splice(particles.indexOf(p), 1);
              particles.push(createParticle(particles.length));
            }
            p.obj.position.add(p.velocity);
            p.obj.material.opacity = p.life / 10;
            p.velocity.multiplyScalar(0.98);
          });
          renderer.render(scene, camera);
        };
        animate();

        // Resize handler
        window.addEventListener('resize', () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        }, { passive: true });

        // Visual effect trigger
        window.triggerVisualEffect = () => {
          particles.forEach(p => scene.remove(p.obj));
          particles = [];
          const colors = [0x00b7eb, 0xff00cc, 0x00ffff, 0xffd700];
          for (let i = 0; i < 200; i++) {
            const theta = i * 2 * Math.PI * ((1 + Math.sqrt(5)) / 2);
            const r = Math.sqrt(i) * 1.5;
            const particle = createParticle(i);
            particle.velocity = new THREE.Vector3(r * Math.cos(theta) * 0.1, r * Math.sin(theta) * 0.1, 0);
            particle.obj.material.color.set(colors[Math.floor(Math.random() * colors.length)]);
            particles.push(particle);
          }
          gsap.to(canvas, { opacity: 1, duration: 0.5 });
        };
      } catch (error) {
        log('WebGL Error: ' + error.message);
        document.getElementById('error-message').style.display = 'block';
        document.getElementById('error-message').textContent = 'Failed to load animations. Please try a different browser.';
      }
    }

    // Network Functions
    const CONFIG = {
      ipApis: [
        { url: 'https://api.ipify.org?format=json', parser: data => data.ip },
        { url: 'https://api.ipgeolocation.io/getip', parser: data => data.ip },
      ],
      geoApis: [
        {
          url: 'https://ipwho.is/',
          parser: data => ({
            isp: data.connection?.isp || 'Unknown',
            city: data.city || 'Unknown',
            country: data.country || 'Unknown',
          }),
        },
      ],
      testServer: {
        pingUrl: '/assets/ping-test.txt',
        downloadUrl: '/assets/25mb.bin',
        uploadSimulation: { chunkSize: 256 * 1024, totalSize: 10 * 1024 * 1024 },
      },
      testDurations: { download: 8000, upload: 5000, ping: 3000 },
    };

    async function fetchIP() {
      log('Fetching public IP...');
      // Since GitHub may not allow CORS, use a fallback IP
      const ip = '192.168.1.1'; // Fallback IP
      log('Using fallback IP due to CORS restrictions: ' + ip);
      document.getElementById('ip-display').textContent = ip;
      return ip;
    }

    async function fetchLocationInfo() {
      log('Fetching network location info...');
      // Since GitHub may not allow CORS, use fallback info
      const info = { isp: 'Local ISP', city: 'Local City', country: 'Local Country' };
      log('Using fallback network info due to CORS restrictions');
      document.getElementById('network-info').innerHTML = `ISP: ${info.isp}<br>Location: ${info.city}, ${info.country}`;
      return info;
    }

    // Speed Test Functions
    function initializeSpeedTest() {
      const speedTest = {
        testHistory: JSON.parse(localStorage.getItem('testHistory') || '[]'),
        currentResults: null,
        testRunning: false,
        testAborted: false,

        setupEvents() {
          document.getElementById('start-speed-test').addEventListener('click', () => this.toggleTest());
          document.getElementById('refresh-test').addEventListener('click', () => this.startTest());
          document.getElementById('share-results').addEventListener('click', () => this.shareResults());
          document.getElementById('view-history').addEventListener('click', () => this.showHistory());
          document.getElementById('close-history').addEventListener('click', () => document.getElementById('history-overlay').classList.remove('active'));
        },

        toggleTest() {
          const container = document.getElementById('speed-test-container');
          const button = document.getElementById('start-speed-test');
          if (container.classList.contains('active')) {
            container.classList.remove('active');
            button.textContent = 'Test Speed';
            this.abortTest();
          } else {
            container.classList.add('active');
            button.textContent = 'Stop Test';
            this.startTest();
          }
        },

        async startTest() {
          if (this.testRunning) return;
          this.testRunning = true;
          this.testAborted = false;
          const button = document.getElementById('start-speed-test');
          button.disabled = true;

          // Reset UI
          ['download-value', 'upload-value', 'ping-value', 'jitter-value', 'packet-loss-value'].forEach(id => document.getElementById(id).textContent = '0');
          document.getElementById('progress-bar').style.width = '0%';
          document.getElementById('progress-percent').textContent = '0%';
          document.getElementById('current-speed').textContent = '0.00 Mbps';
          document.getElementById('data-transferred').textContent = '0 MB';
          document.getElementById('time-elapsed').textContent = '00:00';
          ['refresh-test', 'share-results', 'view-history'].forEach(id => document.getElementById(id).style.display = 'none');

          try {
            const pingResults = await this.runPingTest();
            if (!this.testAborted) {
              const downloadSpeed = await this.runDownloadTest();
              this.currentResults = { ...pingResults, downloadSpeed };
            }
            if (!this.testAborted) {
              const uploadSpeed = await this.runUploadTest();
              this.currentResults = { ...this.currentResults, uploadSpeed };
            }
            if (!this.testAborted && this.currentResults) {
              this.displayResults();
              triggerVisualEffect();
              this.saveResult();
            }
          } catch (error) {
            log('Test error: ' + error.message);
            document.getElementById('error-message').style.display = 'block';
            document.getElementById('error-message').textContent = 'Speed test failed. Please try again.';
          } finally {
            this.testRunning = false;
            button.disabled = false;
            button.textContent = 'Test Speed';
          }
        },

        async runPingTest() {
          log('Starting ping test...');
          const pingValue = document.getElementById('ping-value');
          const jitterValue = document.getElementById('jitter-value');
          const packetLossValue = document.getElementById('packet-loss-value');
          const progressBar = document.getElementById('progress-bar');
          const progressPercent = document.getElementById('progress-percent');
          const currentSpeed = document.getElementById('current-speed');
          const timeElapsed = document.getElementById('time-elapsed');

          const pingTimes = [];
          let packetsLost = 0;
          const totalPackets = 10;

          for (let i = 0; i < totalPackets; i++) {
            if (this.testAborted) break;
            try {
              const start = performance.now();
              await fetch(CONFIG.testServer.pingUrl, { method: 'HEAD', cache: 'no-store' });
              const ping = performance.now() - start;
              pingTimes.push(ping);
              log(`Ping #${i+1}: ${ping.toFixed(2)}ms`);
            } catch (error) {
              log(`Ping #${i+1} failed: ${error.message}`);
              packetsLost++;
            }
            progressBar.style.width = `${((i + 1) / totalPackets) * 100}%`;
            progressPercent.textContent = `${((i + 1) / totalPackets) * 100}%`;
            currentSpeed.textContent = `${pingTimes.length ? (pingTimes[pingTimes.length - 1]).toFixed(2) : 0} ms`;
            timeElapsed.textContent = `${i + 1}/${totalPackets}`;
            await new Promise(r => setTimeout(r, 300));
          }

          const avgPing = pingTimes.length ? pingTimes.reduce((sum, t) => sum + t, 0) / pingTimes.length : 0;
          const jitter = pingTimes.length > 1 ? Math.sqrt(pingTimes.map(t => Math.pow(t - avgPing, 2)).reduce((sum, d) => sum + d, 0) / (pingTimes.length - 1)) : 0;
          const packetLoss = (packetsLost / totalPackets) * 100;

          pingValue.textContent = avgPing.toFixed(0);
          jitterValue.textContent = jitter.toFixed(0);
          packetLossValue.textContent = packetLoss.toFixed(0);

          return { ping: avgPing, jitter, packetLoss };
        },

        async runDownloadTest() {
          log('Starting download test...');
          const downloadValue = document.getElementById('download-value');
          const progressBar = document.getElementById('progress-bar');
          const progressPercent = document.getElementById('progress-percent');
          const currentSpeed = document.getElementById('current-speed');
          const dataTransferred = document.getElementById('data-transferred');
          const timeElapsed = document.getElementById('time-elapsed');

          let totalBytes = 0, startTime = performance.now();
          const maxTime = CONFIG.testDurations.download;

          try {
            const response = await fetch(CONFIG.testServer.downloadUrl, { cache: 'no-store' });
            const reader = response.body.getReader();
            while (true) {
              const { done, value } = await reader.read();
              if (done || this.testAborted) break;
              totalBytes += value.length;
              const elapsed = (performance.now() - startTime) / 1000;
              const speed = ((totalBytes * 8) / elapsed) / (1024 * 1024);
              downloadValue.textContent = speed.toFixed(1);
              progressBar.style.width = `${Math.min(100, (elapsed / (maxTime / 1000)) * 100)}%`;
              progressPercent.textContent = `${Math.min(100, (elapsed / (maxTime / 1000)) * 100).toFixed(1)}%`;
              currentSpeed.textContent = `${speed.toFixed(2)} Mbps`;
              dataTransferred.textContent = formatBytes(totalBytes);
              timeElapsed.textContent = formatTime(elapsed);
              if (elapsed >= maxTime / 1000) break;
            }
          } catch (error) {
            log('Download error: ' + error.message);
            throw error;
          }

          const totalTime = (performance.now() - startTime) / 1000;
          const finalSpeed = ((totalBytes * 8) / totalTime) / (1024 * 1024);
          downloadValue.textContent = finalSpeed.toFixed(1);
          return finalSpeed;
        },

        async runUploadTest() {
          log('Simulating upload test...');
          const uploadValue = document.getElementById('upload-value');
          const progressBar = document.getElementById('progress-bar');
          const progressPercent = document.getElementById('progress-percent');
          const currentSpeed = document.getElementById('current-speed');
          const dataTransferred = document.getElementById('data-transferred');
          const timeElapsed = document.getElementById('time-elapsed');

          const { chunkSize, totalSize } = CONFIG.testServer.uploadSimulation;
          let uploaded = 0, startTime = performance.now();

          while (uploaded < totalSize && !this.testAborted) {
            uploaded += chunkSize;
            const elapsed = (performance.now() - startTime) / 1000;
            const speed = ((uploaded * 8) / elapsed) / (1024 * 1024);
            uploadValue.textContent = speed.toFixed(1);
            progressBar.style.width = `${(uploaded / totalSize) * 100}%`;
            progressPercent.textContent = `${(uploaded / totalSize) * 100}%`;
            currentSpeed.textContent = `${speed.toFixed(2)} Mbps`;
            dataTransferred.textContent = formatBytes(uploaded);
            timeElapsed.textContent = formatTime(elapsed);
            await new Promise(r => setTimeout(r, 300));
          }

          const totalTime = (performance.now() - startTime) / 1000;
          const finalSpeed = ((uploaded * 8) / totalTime) / (1024 * 1024);
          uploadValue.textContent = finalSpeed.toFixed(1);
          return finalSpeed;
        },

        displayResults() {
          if (!this.currentResults) return;
          const { ping, jitter, packetLoss, downloadSpeed, uploadSpeed } = this.currentResults;
          ['refresh-test', 'share-results', 'view-history'].forEach(id => document.getElementById(id).style.display = 'inline-block');
        },

        saveResult() {
          if (!this.currentResults) return;
          const result = {
            timestamp: new Date().toLocaleString(),
            download: this.currentResults.downloadSpeed.toFixed(1),
            upload: this.currentResults.uploadSpeed.toFixed(1),
            ping: this.currentResults.ping.toFixed(0),
            jitter: this.currentResults.jitter.toFixed(0),
            packetLoss: this.currentResults.packetLoss.toFixed(0),
          };
          this.testHistory.push(result);
          if (this.testHistory.length > 10) this.testHistory.shift();
          localStorage.setItem('testHistory', JSON.stringify(this.testHistory));
        },

        shareResults() {
          if (!this.currentResults) return;
          const { ping, jitter, packetLoss, downloadSpeed, uploadSpeed } = this.currentResults;
          const text = `Labverse Speed Test\nDownload: ${downloadSpeed.toFixed(1)} Mbps\nUpload: ${uploadSpeed.toFixed(1)} Mbps\nPing: ${ping.toFixed(0)} ms\nJitter: ${jitter.toFixed(0)} ms\nPacket Loss: ${packetLoss.toFixed(0)}%\nTest at https://labverse.co.za`;
          if (navigator.share) {
            navigator.share({ title: 'Labverse Speed Test', text, url: 'https://labverse.co.za' });
          } else {
            copyToClipboard(text);
            alert('Results copied to clipboard!');
          }
        },

        showHistory() {
          const content = document.getElementById('history-content');
          content.innerHTML = this.testHistory.length ? this.testHistory.map(r => `
            <div class="history-item">
              <strong>${r.timestamp}</strong><br>
              Download: ${r.download} Mbps<br>
              Upload: ${r.upload} Mbps<br>
              Ping: ${r.ping} ms<br>
              Jitter: ${r.jitter} ms<br>
              Packet Loss: ${r.packetLoss}%
            </div>
          `).join('') : 'No test history.';
          document.getElementById('history-overlay').classList.add('active');
        },

        abortTest() {
          this.testAborted = true;
        },
      };

      speedTest.setupEvents();
      return speedTest;
    }

    // Main Initialization
    document.addEventListener('DOMContentLoaded', async () => {
      initializeAnimations();
      const speedTest = initializeSpeedTest();
      await Promise.all([fetchIP(), fetchLocationInfo()]);

      document.getElementById('copy-ip-btn').addEventListener('click', () => {
        const ip = document.getElementById('ip-display').textContent;
        if (ip !== 'Fetching IP...' && ip !== 'IP unavailable') {
          copyToClipboard(ip);
          triggerVisualEffect();
          alert('IP copied to clipboard!');
        }
      });
    });
  </script>
</body>
</html>
