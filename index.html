<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Labverse Speed Test - Check your IP and network speed with stunning cosmic animations." />
  <meta name="keywords" content="Public IP, Speed Test, Fibonacci, Quantum Particles" />
  <meta name="author" content="Labverse Team" />
  <meta property="og:title" content="Labverse Speed Test" />
  <meta property="og:description" content="Discover your public IP and test your network speed with mesmerizing sacred geometry animations." />
  <meta property="og:image" content="https://labverse.co.za/assets/labverse-og-image.png" />
  <meta property="og:url" content="https://labverse.co.za" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>Labverse Speed Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Source+Code+Pro&family=Exo+2:wght@400;700&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --matrix-blue: #00b7eb;
      --cosmic-magenta: #ff00cc;
      --cosmic-gold: #ffd700;
      --cosmic-cyan: #00ffff;
      --light-aura: #e6f0ff;
      --dark-bg: #070b1a;
      --card-bg: rgba(13, 20, 43, 0.7);
      --glow-radius: 15px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Source Code Pro', monospace;
    }

    html, body {
      height: 100vh;
      width: 100%;
      background: var(--dark-bg);
      color: var(--light-aura);
      overflow: hidden;
    }

    #vanta-bg {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      z-index: 1;
      opacity: 0.5;
    }

    #background-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      opacity: 0.8;
    }

    .container {
      position: relative;
      z-index: 10;
      height: 100vh;
      width: 90%;
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 1rem;
    }

    header {
      text-align: center;
      padding: 0.5rem 0;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      text-transform: uppercase;
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 15px var(--cosmic-cyan); }
      to { text-shadow: 0 0 30px var(--cosmic-magenta); }
    }

    .ip-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      width: 100%;
      max-width: 400px;
    }

    .ip-display {
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(1.2rem, 3vw, 2rem);
      color: var(--light-aura);
      background: var(--card-bg);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid rgba(79, 172, 254, 0.3);
      box-shadow: 0 0 15px var(--matrix-blue);
      text-shadow: 0 0 10px var(--matrix-blue);
      word-break: break-all;
    }

    .copy-btn {
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      color: var(--dark-bg);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      text-transform: uppercase;
      box-shadow: 0 0 20px rgba(73, 115, 255, 0.4);
      transition: all 0.3s ease;
    }

    .copy-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(73, 115, 255, 0.6);
    }

    .network-info {
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(0.6rem, 1vw, 0.8rem);
      color: #8492b4;
      max-width: 300px;
      line-height: 1.4;
      margin-bottom: 0.5rem;
    }

    .error-message {
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(0.6rem, 1vw, 0.8rem);
      color: #ff5555;
      margin-top: 0.5rem;
      display: none;
    }

    .speed-test-card {
      background: var(--card-bg);
      border-radius: 15px;
      padding: 1rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), 0 0 50px rgba(73, 115, 255, 0.15) inset;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(79, 172, 254, 0.3);
      width: 100%;
      max-height: 50vh;
      overflow: hidden;
    }

    .test-type {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1rem, 2vw, 1.5rem);
      text-align: center;
      margin-bottom: 0.5rem;
      color: #00f2fe;
    }

    .progress-bar {
      height: 6px;
      width: 100%;
      background: rgba(13, 25, 50, 0.7);
      border-radius: 3px;
      overflow: hidden;
      margin: 0.5rem 0;
    }

    .progress {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      border-radius: 3px;
      transition: width 0.3s linear;
      box-shadow: 0 0 10px rgba(73, 115, 255, 0.6);
    }

    .speedometer {
      position: relative;
      width: 200px;
      height: 120px;
      margin: 0 auto 0.5rem;
      overflow: hidden;
    }

    .gauge {
      width: 100%;
      height: 160px;
      border-radius: 100px 100px 0 0;
      background: linear-gradient(145deg, #091328, #0a1730);
      box-shadow: 10px 10px 20px rgba(0, 0, 0, 0.2), -10px -10px 20px rgba(15, 30, 60, 0.2);
      position: relative;
      overflow: hidden;
    }

    .gauge::before {
      content: '';
      position: absolute;
      top: 10%;
      left: 10%;
      right: 10%;
      bottom: 0;
      background: #070b1a;
      border-radius: 100px 100px 0 0;
      z-index: 2;
    }

    .gauge-fill {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      clip-path: polygon(50% 100%, 0% 0%, 100% 0%);
      transform-origin: center bottom;
      transform: rotate(180deg);
      z-index: 1;
      transition: transform 0.3s ease-out;
    }

    .gauge-needle {
      position: absolute;
      width: 40%;
      height: 4px;
      background: linear-gradient(90deg, rgba(224, 224, 255, 0.3), #e0e0ff);
      bottom: 0;
      left: 50%;
      transform-origin: center bottom;
      transform: rotate(180deg);
      border-radius: 2px;
      z-index: 4;
      transition: transform 0.3s ease-out;
      box-shadow: 0 0 10px rgba(224, 224, 255, 0.8);
    }

    .gauge-needle::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #e0e0ff;
      right: -6px;
      top: -4px;
      box-shadow: 0 0 10px rgba(224, 224, 255, 0.8);
    }

    .speed-value {
      position: absolute;
      bottom: -5px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: clamp(1rem, 2vw, 1.5rem);
      font-weight: 700;
      color: #e0e0ff;
      z-index: 5;
      text-shadow: 0 0 10px rgba(73, 115, 255, 0.8);
    }

    .speed-unit {
      position: absolute;
      bottom: -20px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: clamp(0.5rem, 0.8vw, 0.7rem);
      color: #8492b4;
      z-index: 5;
    }

    .speed-label {
      position: absolute;
      top: 10%;
      left: 0;
      right: 0;
      text-align: center;
      font-size: clamp(0.6rem, 1vw, 0.8rem);
      color: #8492b4;
      z-index: 5;
    }

    .graph-container {
      height: 150px;
      position: relative;
      margin: 0.5rem 0;
      border-left: 1px solid rgba(73, 115, 255, 0.4);
      border-bottom: 1px solid rgba(73, 115, 255, 0.4);
      padding: 5px 5px 5px 35px;
    }

    .y-axis {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: #8492b4;
      font-size: clamp(0.5rem, 0.8vw, 0.7rem);
      text-align: right;
      padding-right: 5px;
    }

    .y-axis-label {
      position: absolute;
      right: 5px;
      transform: translateY(-50%);
    }

    .graph {
      position: relative;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    .graph-line {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 3px;
      background: linear-gradient(90deg, rgba(73, 115, 255, 0.8) 0%, rgba(0, 242, 254, 0.8) 50%, rgba(73, 115, 255, 0.8) 100%);
      background-size: 20px 100%;
      box-shadow: 0 0 10px rgba(73, 115, 255, 0.8);
      border-radius: 2px;
      transition: width 0.05s linear;
    }

    .graph-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      background: linear-gradient(to top, rgba(73, 115, 255, 0.2), rgba(0, 242, 254, 0.05));
      border-radius: 0 5px 0 0;
      transition: width 0.05s linear, height 0.05s linear;
    }

    .grid-lines {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
    }

    .grid-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(73, 115, 255, 0.1);
    }

    .results {
      display: flex;
      justify-content: space-around;
      margin-top: 0.5rem;
    }

    .result-box {
      text-align: center;
      padding: 0.5rem;
      border-radius: 8px;
      background: rgba(13, 25, 50, 0.7);
      width: 45%;
      border: 1px solid rgba(73, 115, 255, 0.2);
    }

    .result-label {
      font-size: clamp(0.6rem, 1vw, 0.8rem);
      color: #8492b4;
      margin-bottom: 0.3rem;
    }

    .result-value {
      font-size: clamp(0.8rem, 1.5vw, 1.2rem);
      font-weight: bold;
      color: #e0e0ff;
    }

    .start-button {
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      border: none;
      color: var(--dark-bg);
      padding: 0.5rem 1.5rem;
      font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      font-weight: bold;
      border-radius: 20px;
      cursor: pointer;
      margin: 0.5rem auto;
      display: block;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(73, 115, 255, 0.4);
    }

    .start-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(73, 115, 255, 0.6);
    }

    .start-button:active {
      transform: translateY(1px);
    }

    .hidden {
      display: none;
    }

    .iframe-container {
      display: none;
      position: relative;
      width: 100%;
      height: 150px;
      border-radius: 8px;
      overflow: hidden;
      margin-top: 0.5rem;
    }

    .iframe-container.active {
      display: block;
    }

    .iframe-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 183, 235, 0.3);
      z-index: 1;
      pointer-events: none;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 8px;
      position: relative;
      z-index: 0;
    }

    footer {
      position: absolute;
      bottom: 0.5rem;
      width: 100%;
      text-align: center;
      font-size: clamp(0.5rem, 0.8vw, 0.7rem);
      color: #8492b4;
      z-index: 10;
    }

    footer a {
      color: #00f2fe;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .container { padding: 0.5rem; }
      h1 { font-size: clamp(1.2rem, 4vw, 2rem); }
      .ip-display { font-size: clamp(1rem, 2.5vw, 1.5rem); }
      .network-info { font-size: clamp(0.5rem, 0.8vw, 0.7rem); }
      .start-button { font-size: clamp(0.6rem, 1vw, 0.8rem); }
      .speedometer { width: 150px; height: 90px; }
      .gauge { height: 120px; }
      .graph-container { height: 100px; }
      .iframe-container { height: 120px; }
      .y-axis { width: 25px; font-size: 0.6rem; }
    }

    @media (max-width: 480px) {
      h1 { font-size: clamp(1rem, 3vw, 1.5rem); }
      .ip-container { gap: 0.3rem; }
      .ip-display { font-size: clamp(0.8rem, 2vw, 1.2rem); }
      .results { flex-direction: column; gap: 0.5rem; }
      .result-box { width: 100%; }
      .speedometer { width: 120px; height: 70px; }
      .gauge { height: 100px; }
      .iframe-container { height: 100px; }
      .y-axis { width: 20px; font-size: 0.5rem; }
    }
  </style>
</head>
<body>
  <div id="vanta-bg"></div>
  <canvas id="background-canvas"></canvas>

  <div class="container">
    <header>
      <h1>Labverse Speed Test</h1>
    </header>
    <div class="ip-container">
      <div class="ip-display" id="ip-display">Fetching IP...</div>
      <button class="copy-btn" id="copy-ip-btn" aria-label="Copy IP address">Copy IP</button>
    </div>
    <div class="network-info" id="network-info">Fetching network info...</div>
    <div class="error-message" id="error-message">Animations failed to load. Please check your browser settings.</div>

    <div class="speed-test-card">
      <div class="test-type" id="testType">Speedtest</div>
      <div class="progress-bar">
        <div class="progress" id="progressBar"></div>
      </div>
      <div class="speedometer hidden" id="speedometer">
        <div class="gauge">
          <div class="gauge-fill" id="gaugeFill"></div>
          <div class="gauge-needle" id="gaugeNeedle"></div>
        </div>
        <div class="speed-label" id="speedLabel">Download</div>
        <div class="speed-value" id="speedValue">0</div>
        <div class="speed-unit">Mbps</div>
      </div>
      <div class="graph-container hidden" id="graphContainer">
        <div class="y-axis" id="yAxis"></div>
        <div class="grid-lines" id="gridLines"></div>
        <div class="graph" id="graph">
          <div class="graph-fill" id="graphFill"></div>
          <div class="graph-line" id="graphLine"></div>
        </div>
      </div>
      <div class="results hidden" id="resultsContainer">
        <div class="result-box">
          <div class="result-label">Download</div>
          <div class="result-value" id="downloadResult">0 Mbps</div>
        </div>
        <div class="result-box">
          <div class="result-label">Ping</div>
          <div class="result-value" id="pingResult">0 ms</div>
        </div>
      </div>
      <button class="start-button" id="startButton">Start Test</button>
      <div class="iframe-container" id="iframe-container">
        <iframe id="speedFrame" src=""></iframe>
      </div>
    </div>
  </div>

  <footer>
    © 2025 Labverse | Powered by <a href="https://onefar.co.za" target="_blank" rel="noopener">1FAR</a>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.net.min.js"></script>
  <script>
    // Initialize Vanta.js background
    VANTA.NET({
      el: "#vanta-bg",
      mouseControls: true,
      touchControls: true,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 1.00,
      scaleMobile: 1.00,
      color: 0x00ffff,
      backgroundColor: 0x070b1a
    });

    // Utility Functions
    function log(message) {
      console.log('[DEBUG] ' + message);
    }

    function formatBytes(bytes, decimals = 2) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024, dm = decimals < 0 ? 0 : decimals;
      const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).catch(() => {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
      });
    }

    // Particle Animations with Big Bang Explosion
    let particles = [], mousePos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    const canvas = document.getElementById('background-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    document.addEventListener('mousemove', (e) => {
      mousePos.x = e.clientX;
      mousePos.y = e.clientY;
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      if (e.touches.length > 0) {
        mousePos.x = e.touches[0].clientX;
        mousePos.y = e.touches[0].clientY;
      }
    }, { passive: true });

    function createParticle(index) {
      const phi = (1 + Math.sqrt(5)) / 2;
      const theta = index * 2 * Math.PI * phi;
      const r = Math.sqrt(index) * 10;
      return {
        x: canvas.width / 2 + r * Math.cos(theta),
        y: canvas.height / 2 + r * Math.sin(theta),
        vx: (Math.random() - 0.5) * 2,
        vy: (Math.random() - 0.5) * 2,
        life: 600,
        color: `hsl(${Math.random() * 360}, 70%, 70%)`
      };
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < 20; i++) {
        particles.push(createParticle(i));
      }
    }
    initParticles();

    function triggerBigBang() {
      log('Triggering Big Bang...');
      particles = [];
      
      for (let i = 0; i < 50; i++) {
        const theta = i * 2 * Math.PI * ((1 + Math.sqrt(5)) / 2);
        const r = Math.sqrt(i) * 15;
        particles.push({
          x: canvas.width / 2,
          y: canvas.height / 2,
          vx: r * Math.cos(theta) * 0.05,
          vy: r * Math.sin(theta) * 0.05,
          life: 300,
          color: `hsl(${Math.random() * 360}, 70%, 70%)`
        });
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = particles.filter(p => {
        if (p.life <= 0) return false;
        p.life--;
        p.x += p.vx + (mousePos.x - canvas.width / 2) * 0.0001;
        p.y += p.vy + (mousePos.y - canvas.height / 2) * 0.0001;
        p.vx *= 0.98;
        p.vy *= 0.98;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life / 600;
        ctx.fill();
        return true;
      });

      if (particles.length < 20 && Math.random() < 0.1) {
        particles.push(createParticle(particles.length));
      }

      particles.forEach(p1 => {
        particles.forEach(p2 => {
          if (p1 !== p2) {
            const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
            if (dist < 50 && Math.random() < 0.05) {
              ctx.beginPath();
              ctx.moveTo(p1.x, p1.y);
              ctx.lineTo(p2.x, p2.y);
              ctx.strokeStyle = p1.color;
              ctx.globalAlpha = 0.3;
              ctx.stroke();
            }
          }
        });
      });

      ctx.globalAlpha = 1;
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      initParticles();
    }, { passive: true });

    // Network Functions
    async function fetchIP() {
      log('Fetching public IP...');
      try {
        const ipServices = [
          'https://api.ipify.org?format=json',
          'https://api.seeip.org/jsonip',
          'https://api.myip.com',
          'https://ipinfo.io/json'
        ];
        
        for (const service of ipServices) {
          try {
            const response = await fetch(service, { signal: AbortSignal.timeout(3000) });
            const data = await response.json();
            const ip = data.ip || data.query || data.YourFuckingIPAddress || '';
            
            if (ip && ip.match(/^(?:\d{1,3}\.){3}\d{1,3}$|^([0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}$/)) {
              log('Public IP fetched: ' + ip);
              document.getElementById('ip-display').textContent = ip;
              return ip;
            }
          } catch (err) {
            log(`IP service ${service} failed: ${err.message}`);
            continue;
          }
        }
        
        throw new Error("All IP services failed");
      } catch (error) {
        log('IP fetch error: ' + error.message);
        document.getElementById('ip-display').textContent = 'IP unavailable';
        throw error;
      }
    }

    async function fetchLocationInfo(ip) {
      log('Fetching network location info...');
      try {
        const geoServices = [
          `https://ipinfo.io/${ip}/json`,
          'https://ipapi.co/json/',
          'https://extreme-ip-lookup.com/json/',
          'https://freegeoip.app/json/'
        ];
        
        for (const service of geoServices) {
          try {
            const response = await fetch(service, { signal: AbortSignal.timeout(3000) });
            const data = await response.json();
            
            const info = {
              isp: data.org || data.as || data.isp || 'Unknown ISP',
              city: data.city || data.location?.city || 'Unknown City',
              country: data.country || data.country_name || 'Unknown Country'
            };
            
            if (info.isp.includes('AS')) {
              info.isp = info.isp.split(' ').slice(1).join(' ').trim() || 'Unknown ISP';
            }
            
            if (info.city && info.country) {
              log('Network info fetched: ' + JSON.stringify(info));
              document.getElementById('network-info').innerHTML = `ISP: ${info.isp}<br>Location: ${info.city}, ${info.country}`;
              return info;
            }
          } catch (err) {
            log(`Geo service ${service} failed: ${err.message}`);
            continue;
          }
        }
        
        throw new Error("All geo services failed");
      } catch (error) {
        log('Location fetch error: ' + error.message);
        const fallbackInfo = { isp: 'Dimension Data', city: 'Johannesburg', country: 'South Africa' };
        document.getElementById('network-info').innerHTML = `ISP: ${fallbackInfo.isp}<br>Location: ${fallbackInfo.city}, ${fallbackInfo.country}`;
        return fallbackInfo;
      }
    }

    // Speed Test Functions
    const CONFIG = {
      testServer: {
        downloadUrl: 'https://speed.cloudflare.com/__down?bytes=25000000',
        pingResource: 'https://labverse.co.za/assets/ping-test.txt',
      },
      testDurations: { download: 10000, ping: 3000 },
      maxTestTimeout: 20000,
      watchdogTimeout: 25000,
    };

    function initializeSpeedTest() {
      const startButton = document.getElementById('startButton');
      const progressBar = document.getElementById('progressBar');
      const testType = document.getElementById('testType');
      const speedometer = document.getElementById('speedometer');
      const graphContainer = document.getElementById('graphContainer');
      const graph = document.getElementById('graph');
      let graphLine = document.getElementById('graphLine');
      let graphFill = document.getElementById('graphFill');
      const gaugeFill = document.getElementById('gaugeFill');
      const gaugeNeedle = document.getElementById('gaugeNeedle');
      const speedValue = document.getElementById('speedValue');
      const speedLabel = document.getElementById('speedLabel');
      const resultsContainer = document.getElementById('resultsContainer');
      const downloadResult = document.getElementById('downloadResult');
      const pingResult = document.getElementById('pingResult');
      const yAxis = document.getElementById('yAxis');
      const gridLines = document.getElementById('gridLines');
      const iframeContainer = document.getElementById('iframe-container');
      const iframe = document.getElementById('speedFrame');

      let currentTest = null;
      let testData = [];
      let currentSpeed = 0;
      let maxSpeed = 0;
      let finalDownloadSpeed = 0;
      let finalPing = 0;
      let startTime = 0;
      let testDuration = CONFIG.testDurations.download;
      let animationFrame = null;
      let testActive = false;
      let controller = null;
      let watchdogTimer = null;

      // Precise Y-axis scale with logarithmic distribution
      const Y_AXIS_LABELS = [0, 10, 25, 50, 100, 200, 500, 1000];
      const Y_AXIS_POSITIONS = [0, 20, 40, 60, 70, 80, 90, 100];

      function setupYAxis() {
        yAxis.innerHTML = '';
        Y_AXIS_LABELS.forEach((label, index) => {
          const labelDiv = document.createElement('div');
          labelDiv.className = 'y-axis-label';
          labelDiv.style.bottom = `${Y_AXIS_POSITIONS[index]}%`;
          labelDiv.textContent = label;
          yAxis.appendChild(labelDiv);
        });
      }

      function speedToHeight(speed) {
        if (speed <= 0) return 0;
        if (speed >= 1000) return 100;

        // Find the exact position between two Y-axis markers
        for (let i = 0; i < Y_AXIS_LABELS.length - 1; i++) {
          if (speed >= Y_AXIS_LABELS[i] && speed <= Y_AXIS_LABELS[i + 1]) {
            const lowerLabel = Y_AXIS_LABELS[i];
            const upperLabel = Y_AXIS_LABELS[i + 1];
            const lowerPos = Y_AXIS_POSITIONS[i];
            const upperPos = Y_AXIS_POSITIONS[i + 1];
            
            // Calculate exact position with logarithmic interpolation
            const logLower = Math.log10(lowerLabel || 1);
            const logUpper = Math.log10(upperLabel);
            const logSpeed = Math.log10(speed);
            const fraction = (logSpeed - logLower) / (logUpper - logLower);
            return lowerPos + fraction * (upperPos - lowerPos);
          }
        }
        return 0;
      }

      function setupGridLines() {
        gridLines.innerHTML = '';
        Y_AXIS_POSITIONS.forEach(pos => {
          const gridLine = document.createElement('div');
          gridLine.className = 'grid-line';
          gridLine.style.bottom = `${pos}%`;
          gridLines.appendChild(gridLine);
        });
      }

      function updateSpeedometer(speed) {
        // Logarithmic scale for better low-speed visibility
        const maxScale = 1000;
        const logSpeed = Math.log10(speed || 1);
        const logMax = Math.log10(maxScale);
        const percent = logSpeed / logMax;
        const angle = 180 + (percent * 180);
        
        gaugeFill.style.transform = `rotate(${angle}deg)`;
        gaugeNeedle.style.transform = `rotate(${angle}deg)`;
        speedValue.textContent = speed.toFixed(1);
      }

      function updateGraph(percentage, speed) {
        const heightPercentage = speedToHeight(speed);
        graphLine.style.width = `${percentage * 100}%`;
        graphFill.style.width = `${percentage * 100}%`;
        graphFill.style.height = `${heightPercentage}%`;
      }

      async function runPingTest() {
        log('Starting ping test to local server...');
        const pingTimes = [];
        const totalPackets = 10;

        for (let i = 0; i < totalPackets; i++) {
          if (!testActive) break;
          let ping = 999;
          try {
            const start = performance.now();
            await fetch(CONFIG.testServer.pingResource + '?t=' + Date.now(), { cache: 'no-store', signal: AbortSignal.timeout(2000) });
            ping = performance.now() - start;
            pingTimes.push(ping);
            log(`Ping #${i+1}: ${ping.toFixed(2)}ms`);
          } catch (error) {
            pingTimes.push(ping);
            log(`Ping #${i+1} failed: ${error.message}`);
          }
          await new Promise(r => setTimeout(r, 300));
        }

        const successfulPings = pingTimes.filter(t => t !== 999);
        const avgPing = successfulPings.length ? successfulPings.reduce((sum, t) => sum + t, 0) / successfulPings.length : 999;
        finalPing = avgPing;
        pingResult.textContent = `${avgPing.toFixed(0)} ms`;
        return avgPing;
      }

      async function runDownloadTest(callback) {
        log('Starting download test from Cloudflare Johannesburg server...');
        let totalBytes = 0;
        startTime = performance.now();
        const updateInterval = 100; // Update every 100ms for smooth animation
        let lastUpdate = startTime;
        let lastBytes = 0;
        let lastTime = startTime;
        let speeds = [];

        const overallTimeout = setTimeout(() => {
          log('Download test timed out after 20 seconds');
          testActive = false;
          if (controller) controller.abort();
          finalizeTest();
        }, CONFIG.maxTestTimeout);

        try {
          controller = new AbortController();
          const signal = controller.signal;
          const response = await fetch(CONFIG.testServer.downloadUrl, { cache: 'no-store', signal });
          if (!response.ok) throw new Error('Failed to fetch download resource: ' + response.statusText);
          const reader = response.body.getReader();

          while (testActive) {
            let result;
            try {
              result = await reader.read();
            } catch (error) {
              log('Reader error: ' + error.message);
              throw error;
            }
            const { done, value } = result;
            if (done || !testActive) {
              controller.abort();
              break;
            }
            totalBytes += value ? value.length : 0;
            const currentTime = performance.now();
            const elapsed = (currentTime - startTime) / 1000;
            
            if (currentTime - lastUpdate >= updateInterval) {
              const elapsedSinceLast = (currentTime - lastTime) / 1000;
              const bytesSinceLast = totalBytes - lastBytes;
              const speed = elapsedSinceLast > 0 ? ((bytesSinceLast * 8) / elapsedSinceLast) / (1024 * 1024) : 0;
              
              // Store the speed for averaging
              speeds.push(speed);
              
              // Calculate moving average of last 3 speeds for smoother display
              const windowSize = 3;
              const recentSpeeds = speeds.slice(-windowSize);
              const avgSpeed = recentSpeeds.reduce((sum, s) => sum + s, 0) / recentSpeeds.length;
              
              callback(elapsed, avgSpeed);
              
              lastUpdate = currentTime;
              lastBytes = totalBytes;
              lastTime = currentTime;
              
              // Keep only the last 50 data points
              if (testData.length > 50) testData.shift();
            }
            
            if (elapsed >= testDuration / 1000) {
              controller.abort();
              break;
            }
          }
        } catch (error) {
          log('Download error: ' + error.message);
          const totalTime = (performance.now() - startTime) / 1000;
          const finalSpeed = totalTime > 0 ? ((totalBytes * 8) / totalTime) / (1024 * 1024) : 0;
          testData.push({ time: totalTime, speed: finalSpeed });
        } finally {
          clearTimeout(overallTimeout);
          controller = null;
        }

        const totalTime = (performance.now() - startTime) / 1000;
        const finalSpeed = totalTime > 0 ? ((totalBytes * 8) / totalTime) / (1024 * 1024) : 0;
        return finalSpeed;
      }

      function finalizeTest() {
        clearTimeout(watchdogTimer);
        testActive = false;
        if (controller) {
          controller.abort();
          controller = null;
        }

        const dataPoints = testData.length;
        if (dataPoints === 0) {
          document.getElementById('error-message').style.display = 'block';
          document.getElementById('error-message').textContent = 'Speed test failed. Please try again.';
          finalDownloadSpeed = 0;
        } else {
          // Calculate weighted average with more weight to recent measurements
          let weightedSum = 0, weightSum = 0;
          for (let i = 0; i < dataPoints; i++) {
            const weight = 0.5 + 0.5 * (i / dataPoints); // Linear weighting from 0.5 to 1.0
            weightedSum += testData[i].speed * weight;
            weightSum += weight;
          }
          finalDownloadSpeed = weightedSum / weightSum;
        }

        downloadResult.textContent = `${finalDownloadSpeed.toFixed(1)} Mbps`;
        resultsContainer.classList.remove('hidden');
        startButton.textContent = 'More Info';
        startButton.disabled = false;
        currentTest = null;
        triggerBigBang();
      }

      function runTest(testType) {
        if (animationFrame) {
          cancelAnimationFrame(animationFrame);
        }

        testData = [];
        currentSpeed = 0;
        maxSpeed = 0;
        startTime = Date.now();
        graph.innerHTML = '';
        const newGraphLine = document.createElement('div');
        newGraphLine.className = 'graph-line';
        newGraphLine.id = 'graphLine';
        const newGraphFill = document.createElement('div');
        newGraphFill.className = 'graph-fill';
        newGraphFill.id = 'graphFill';
        graph.appendChild(newGraphFill);
        graph.appendChild(newGraphLine);
        graphLine = document.getElementById('graphLine');
        graphFill = document.getElementById('graphFill');
        testActive = true;

        watchdogTimer = setTimeout(() => {
          log('Watchdog triggered: Test did not complete within 25 seconds');
          finalizeTest();
        }, CONFIG.watchdogTimeout);

        runPingTest().then(() => {
          if (!testActive) {
            finalizeTest();
            return;
          }
          runDownloadTest((elapsed, speed) => {
            if (!testActive) return;
            const progress = Math.min(elapsed / (testDuration / 1000), 1);
            currentSpeed = speed;
            maxSpeed = Math.max(maxSpeed, currentSpeed);
            testData.push({ time: elapsed, speed: currentSpeed });
            progressBar.style.width = `${progress * 100}%`;
            updateSpeedometer(currentSpeed);
            updateGraph(progress, currentSpeed);

            if (progress >= 1) {
              progressBar.style.width = '100%';
              finalizeTest();
            }
          }).finally(() => {
            finalizeTest();
          });
        }).catch(() => {
          finalizeTest();
        });
      }

      setupYAxis();
      setupGridLines();

      startButton.addEventListener('click', () => {
        if (startButton.textContent === 'More Info') {
          iframe.src = 'https://speed.cloudflare.com';
          iframeContainer.classList.add('active');
          return;
        }

        if (!currentTest && startButton.textContent === 'Start Test') {
          progressBar.style.width = '0';
          speedometer.classList.remove('hidden');
          graphContainer.classList.remove('hidden');
          resultsContainer.classList.add('hidden');
          iframeContainer.classList.remove('active');
          iframe.src = '';
          startButton.disabled = true;
          startButton.textContent = 'Testing...';
          currentTest = 'download';
          testType.textContent = 'Testing Download Speed';
          speedLabel.textContent = 'Download';
          runTest('download');
        }
      });

      window.addEventListener('beforeunload', () => {
        testActive = false;
        if (controller) controller.abort();
        clearTimeout(watchdogTimer);
      });
    }

    // Main Initialization
    document.addEventListener('DOMContentLoaded', async () => {
      let ip = '';
      try {
        ip = await fetchIP();
        await fetchLocationInfo(ip);
      } catch (error) {
        log('Initialization error: ' + error.message);
      }

      initializeSpeedTest();

      document.getElementById('copy-ip-btn').addEventListener('click', () => {
        const ip = document.getElementById('ip-display').textContent;
        if (ip !== 'Fetching IP...' && ip !== 'IP unavailable') {
          copyToClipboard(ip);
          triggerBigBang();
          alert('IP copied to clipboard!');
        }
      });
    });
  </script>
</body>
