<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Focus: Double-Slit Manifestation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(180deg, #1a1a3a, #000);
            overflow: hidden;
            height: 100vh;
            cursor: crosshair;
            font-family: 'Courier New', monospace;
        }
        canvas {
            width: 100%;
            height: 100%;
            background: radial-gradient(rgba(0, 0, 51, 0.4), rgba(0, 0, 0, 0.8));
        }
        #energy-meter {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #0ff;
            font-size: 16px;
            opacity: 0.8;
            pointer-events: none;
            text-shadow: 0 0 5px #0ff;
        }
        @keyframes quantum-pulse {
            0% { transform: scale(1); opacity: 0.6; filter: brightness(1); }
            50% { transform: scale(1.3); opacity: 1; filter: brightness(1.8); }
            100% { transform: scale(1); opacity: 0.6; filter: brightness(1); }
        }
        @keyframes wave-interference {
            0% { opacity: 0.4; filter: hue-rotate(0deg); }
            50% { opacity: 0.9; filter: hue-rotate(120deg); }
            100% { opacity: 0.4; filter: hue-rotate(240deg); }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="energy-meter">Quantum Energy: 0 | Focus: 0%</div>

    <script>
        // WebGL Setup
        const canvas = document.getElementById('canvas');
        const gl = canvas.getContext('webgl2', { alpha: true });
        const energyMeter = document.getElementById('energy-meter');
        if (!gl) {
            console.warn('WebGL2 unavailable. Using 2D canvas.');
        }
        const ctx = canvas.getContext('2d'); // Fallback for rendering

        // State Variables
        let quantumEnergy = 0; // Tracks user-driven energy
        let focusLevel = 0; // Percentage of user focus
        let wavePhase = 0; // Drives quantum wave animations
        let mouse = { x: canvas.width / 2, y: canvas.height / 2, clicked: false, lastClick: 0, focusDuration: 0 };
        let touch = { x: 0, y: 0, active: false };
        let particles = [];
        let interferencePatterns = [];
        let quantumField = [];
        let audioContext, oscillator, gainNode, analyser;
        const maxParticles = 1500;
        const maxPatterns = 1000;
        const slitWidth = 100; // Virtual slit width for double-slit simulation
        const slitSeparation = 200; // Distance between slits

        // Canvas Initialization
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (gl) gl.viewport(0, 0, canvas.width, canvas.height);
            mouse.x = canvas.width / 2;
            mouse.y = canvas.height / 2;
            initQuantumField();
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Particle System (Quantum Particles)
        function initParticles() {
            particles = [];
            for (let i = 0; i < maxParticles; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    vx: (Math.random() - 0.5) * 3,
                    vy: -(Math.random() * 2 + 1),
                    size: Math.random() * 1.5 + 0.5,
                    hue: Math.random() * 360,
                    opacity: 0.5,
                    phase: Math.random() * 2 * Math.PI,
                    state: 0, // 0 = particle, 1 = wave
                    energy: 0,
                    active: false
                });
            }
        }
        initParticles();

        // Quantum Field for Interference
        function initQuantumField() {
            quantumField = [];
            const gridSize = 20;
            for (let x = 0; x < canvas.width; x += gridSize) {
                for (let y = 0; y < canvas.height; y += gridSize) {
                    quantumField.push({ x, y, amplitude: 0, phase: 0 });
                }
            }
        }

        // Double-Slit Simulation
        function simulateDoubleSlit() {
            interferencePatterns = [];
            const slitY = canvas.height * 0.3; // Slit plane
            const screenY = canvas.height * 0.7; // Observation screen
            const slit1X = canvas.width / 2 - slitSeparation / 2;
            const slit2X = canvas.width / 2 + slitSeparation / 2;

            particles.forEach(p => {
                if (!p.active || p.y < slitY || p.y > screenY) return;
                const dx1 = p.x - slit1X;
                const dx2 = p.x - slit2X;
                const dy = p.y - slitY;
                const dist1 = Math.sqrt(dx1 * dx1 + dy * dy);
                const dist2 = Math.sqrt(dx2 * dx2 + dy * dy);
                const waveLength = 50 * (1 + focusLevel / 100); // Focus modulates wavelength
                const phaseDiff = (2 * Math.PI * (dist2 - dist1)) / waveLength;
                const amplitude = Math.cos(phaseDiff / 2) * p.energy * focusLevel;
                p.opacity = Math.abs(amplitude);
                p.hue = (p.hue + phaseDiff * 10) % 360;
                p.state = 1; // Wave state in interference zone

                if (p.y > screenY - 10 && Math.abs(amplitude) > 0.2) {
                    interferencePatterns.push({
                        x: p.x,
                        y: p.y,
                        intensity: Math.abs(amplitude),
                        hue: p.hue
                    });
                }
            });
        }

        // Particle Spawning (Law of Attraction)
        function spawnParticles() {
            const activeCount = particles.filter(p => p.active).length;
            const spawnCount = Math.min(Math.floor(quantumEnergy / 20), maxParticles - activeCount);
            for (let i = 0; i < particles.length && spawnCount > 0; i++) {
                if (!particles[i].active) {
                    particles[i].x = mouse.x;
                    particles[i].y = mouse.y;
                    particles[i].vx = (Math.random() - 0.5) * 3;
                    particles[i].vy = -(Math.random() * 2 + 1);
                    particles[i].size = Math.random() * 1.5 + 0.5;
                    particles[i].hue = Math.random() * 360;
                    particles[i].opacity = 0.5;
                    particles[i].phase = Math.random() * 2 * Math.PI;
                    particles[i].state = 0;
                    particles[i].energy = quantumEnergy / 100;
                    particles[i].active = true;
                    break;
                }
            }
        }

        // Update Particles
        function updateParticles() {
            particles.forEach(p => {
                if (!p.active) return;
                const dx = mouse.x - p.x;
                const dy = mouse.y - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 200 && focusLevel > 0) {
                    p.energy += focusLevel * 0.02;
                    p.vx += (dx / dist) * p.energy * 0.05;
                    p.vy += (dy / dist) * p.energy * 0.05;
                    p.opacity = Math.min(p.opacity + 0.03, 1);
                    p.state = 1;
                } else {
                    p.energy = Math.max(p.energy - 0.01, 0);
                    p.opacity = Math.max(p.opacity - 0.02, 0.3);
                    p.state = 0;
                }
                const wave = Math.sin(p.phase + wavePhase) * p.energy;
                p.x += p.vx + wave * 0.3;
                p.y += p.vy + wave * 0.3;
                p.phase += 0.05 * (1 + focusLevel / 100);
                p.vy += 0.02; // Simulated gravity
                if (p.x < 0 || p.x > canvas.width || p.y > canvas.height) {
                    p.active = false;
                }
            });
            particles = particles.filter(p => p.active);
        }

        // Audio Feedback
        function initAudio(baseFreq = 432) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioContext.createOscillator();
            gainNode = audioContext.createGain();
            analyser = audioContext.createAnalyser();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(baseFreq, audioContext.currentTime);
            oscillator.connect(gainNode);
            gainNode.connect(analyser);
            analyser.connect(audioContext.destination);
            analyser.fftSize = 512;
            gainNode.gain.setValueAtTime(0.05, audioContext.currentTime);
            oscillator.start();
        }

        function updateAudio() {
            if (!audioContext) return 0;
            const freq = 432 + (quantumEnergy / 50);
            oscillator.frequency.setValueAtTime(freq, audioContext.currentTime);
            gainNode.gain.setValueAtTime(0.05 + (focusLevel / 2000), audioContext.currentTime);
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);
            return dataArray.reduce((a, b) => a + b) / bufferLength / 255;
        }

        // 2D Canvas Rendering (Fallback)
        function render2D() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'lighter';

            // Draw Quantum Field
            quantumField.forEach(f => {
                if (f.amplitude > 0.1) {
                    ctx.beginPath();
                    ctx.arc(f.x, f.y, f.amplitude * 5, 0, 2 * Math.PI);
                    ctx.fillStyle = `hsla(${f.phase % 360}, 80%, 50%, ${f.amplitude * 0.3})`;
                    ctx.fill();
                }
            });

            // Draw Particles
            particles.forEach(p => {
                if (!p.active) return;
                ctx.beginPath();
                if (p.state === 0) {
                    ctx.arc(p.x, p.y, p.size, 0, 2 * Math.PI);
                } else {
                    ctx.moveTo(p.x - p.size, p.y);
                    ctx.bezierCurveTo(
                        p.x, p.y - p.size * 2,
                        p.x, p.y + p.size * 2,
                        p.x + p.size, p.y
                    );
                }
                const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                gradient.addColorStop(0, `hsla(${p.hue}, 80%, 50%, ${p.opacity})`);
                gradient.addColorStop(1, `hsla(${p.hue}, 80%, 50%, 0)`);
                ctx.fillStyle = gradient;
                ctx.fill();
            });

            // Draw Interference Patterns
            interferencePatterns.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.intensity * 3, 0, 2 * Math.PI);
                ctx.fillStyle = `hsla(${p.hue}, 80%, 50%, ${p.intensity * 0.5})`;
                ctx.fill();
            });

            // Draw Slits
            const slitY = canvas.height * 0.3;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.fillRect(canvas.width / 2 - slitSeparation / 2 - slitWidth / 2, slitY - 10, slitWidth, 20);
            ctx.fillRect(canvas.width / 2 + slitSeparation / 2 - slitWidth / 2, slitY - 10, slitWidth, 20);
        }

        // Input Handling
        canvas.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            focusLevel = Math.min(focusLevel + 0.1, 100);
            quantumEnergy += 0.2;
            mouse.focusDuration += 16; // Approx. ms per frame
        });

        canvas.addEventListener('mousedown', () => {
            mouse.clicked = true;
            mouse.lastClick = Date.now();
            quantumEnergy += 100;
            focusLevel = Math.min(focusLevel + 20, 100);
            spawnParticles();
            if (!audioContext) initAudio();
        });

        canvas.addEventListener('mouseup', () => {
            mouse.clicked = false;
        });

        // Touch Support
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            touch.x = e.touches[0].clientX;
            touch.y = e.touches[0].clientY;
            touch.active = true;
            mouse.x = touch.x;
            mouse.y = touch.y;
            quantumEnergy += 100;
            focusLevel = Math.min(focusLevel + 20, 100);
            spawnParticles();
            if (!audioContext) initAudio();
        });

        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            touch.x = e.touches[0].clientX;
            touch.y = e.touches[0].clientY;
            mouse.x = touch.x;
            mouse.y = touch.y;
            focusLevel = Math.min(focusLevel + 0.1, 100);
            quantumEnergy += 0.2;
        });

        canvas.addEventListener('touchend', () => {
            touch.active = false;
        });

        // Animation Loop
        function animate() {
            wavePhase += 0.02;
            quantumEnergy = Math.max(quantumEnergy - 0.1, 0);
            focusLevel = Math.max(focusLevel - 0.05, 0);
            updateParticles();
            simulateDoubleSlit();
            const audioFeedback = updateAudio();
            quantumEnergy += audioFeedback * 20;

            // Update Quantum Field
            quantumField.forEach(f => {
                const dx = mouse.x - f.x;
                const dy = mouse.y - f.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                f.amplitude = dist < 300 ? (300 - dist) / 300 * focusLevel / 100 : 0;
                f.phase = wavePhase + dist / 50;
            });

            if (gl) {
                // WebGL rendering placeholder
                gl.clearColor(0, 0, 0, 0);
                gl.clear(gl.COLOR_BUFFER_BIT);
                render2D(); // Temporary fallback
            } else {
                render2D();
            }

            energyMeter.textContent = `Quantum Energy: ${Math.floor(quantumEnergy)} | Focus: ${Math.floor(focusLevel)}%`;
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
