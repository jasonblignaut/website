<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Dodecahedron LED</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Dodecahedron geometry
        const geometry = new THREE.DodecahedronGeometry(1);
        const material = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                color1: { value: new THREE.Color('#ff0066') },
                color2: { value: new THREE.Color('#00ccff') }
            },
            vertexShader: `
                varying vec3 vNormal;
                void main() {
                    vNormal = normal;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform float time;
                uniform vec3 color1;
                uniform vec3 color2;
                varying vec3 vNormal;
                void main() {
                    float t = sin(time * 0.5) * 0.5 + 0.5;
                    vec3 color = mix(color1, color2, t);
                    float glow = abs(dot(vNormal, vec3(0, 0, 1))) * 0.5 + 0.5;
                    gl_FragColor = vec4(color * glow, 1.0);
                }
            `,
            side: THREE.DoubleSide
        });

        const dodecahedron = new THREE.Mesh(geometry, material);
        scene.add(dodecahedron);

        // Reflective environment (simplified infinite effect)
        const cubeRenderTarget = new THREE.WebGLCubeRenderTarget(128);
        const cubeCamera = new THREE.CubeCamera(0.1, 1000, cubeRenderTarget);
        scene.add(cubeCamera);
        dodecahedron.material.envMap = cubeRenderTarget.texture;

        // Camera position
        camera.position.z = 3;

        // Animation loop
        function animate(time) {
            requestAnimationFrame(animate);
            dodecahedron.rotation.x += 0.01;
            dodecahedron.rotation.y += 0.01;
            material.uniforms.time.value = time * 0.001;
            cubeCamera.update(renderer, scene);
            renderer.render(scene, camera);
        }
        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
