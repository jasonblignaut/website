<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite LED Dodecahedron - Vibrant</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        #bgCanvas { position: absolute; top: 0; left: 0; z-index: -1; }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Post-processing
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            0.8, // Vibrant bloom
            0.5, // radius
            0.75 // threshold
        );
        composer.addPass(bloomPass);

        // Outer dodecahedron
        const outerGeometry = new THREE.DodecahedronGeometry(1, 0);
        const outerMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                uColor1: { value: new THREE.Color('#ff4d94') },
                uColor2: { value: new THREE.Color('#4dffeb') },
                uEnvMap: { value: null }
            },
            vertexShader: `
                varying vec3 vNormal;
                varying vec3 vViewDir;
                varying vec3 vWorldPos;
                void main() {
                    vNormal = normalize(normalMatrix * normal);
                    vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
                    vViewDir = normalize(cameraPosition - vWorldPos);
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform float time;
                uniform vec3 uColor1;
                uniform vec3 uColor2;
                uniform samplerCube uEnvMap;
                varying vec3 vNormal;
                varying vec3 vViewDir;

                void main() {
                    float fresnel = pow(1.0 - dot(vNormal, vViewDir), 3.5);
                    float t = sin(time * 0.5) * 0.5 + 0.5;
                    vec3 color = mix(uColor1, uColor2, t);
                    vec3 reflectDir = reflect(-vViewDir, vNormal);
                    vec4 reflectColor = textureCube(uEnvMap, reflectDir);
                    vec3 finalColor = mix(reflectColor.rgb, color, 0.2);
                    finalColor += fresnel * color * 0.9;
                    gl_FragColor = vec4(finalColor, 0.97); // Near-transparent
                }
            `,
            transparent: true,
            side: THREE.DoubleSide
        });

        const outerDodecahedron = new THREE.Mesh(outerGeometry, outerMaterial);
        scene.add(outerDodecahedron);

        // Inner dodecahedron
        const innerGeometry = new THREE.DodecahedronGeometry(0.5, 0);
        const innerMaterial = new THREE.ShaderMaterial({
            uniforms: outerMaterial.uniforms,
            vertexShader: outerMaterial.vertexShader,
            fragmentShader: `
                uniform float time;
                uniform vec3 uColor1;
                uniform vec3 uColor2;
                uniform samplerCube uEnvMap;
                varying vec3 vNormal;
                varying vec3 vViewDir;

                void main() {
                    float fresnel = pow(1.0 - dot(vNormal, vViewDir), 3.0);
                    float t = sin(time * 0.5) * 0.5 + 0.5;
                    vec3 color = mix(uColor2, uColor1, t);
                    vec3 reflectDir = reflect(-vViewDir, vNormal);
                    vec4 reflectColor = textureCube(uEnvMap, reflectDir);
                    vec3 finalColor = mix(reflectColor.rgb, color, 0.3);
                    finalColor += fresnel * color * 0.8;
                    gl_FragColor = vec4(finalColor, 0.95);
                }
            `,
            transparent: true,
            side: THREE.DoubleSide
        });

        const innerDodecahedron = new THREE.Mesh(innerGeometry, innerMaterial);
        outerDodecahedron.add(innerDodecahedron);

        // LED strips
        const edgesGeometry = new THREE.EdgesGeometry(outerGeometry);
        const ledMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                uColor1: { value: new THREE.Color('#ff4d94') },
                uColor2: { value: new THREE.Color('#4dffeb') },
                uColor3: { value: new THREE.Color('#cc66ff') },
                uColor4: { value: new THREE.Color('#66ff99') }
            },
            vertexShader: `
                varying vec3 vPosition;
                void main() {
                    vPosition = position;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform float time;
                uniform vec3 uColor1;
                uniform vec3 uColor2;
                uniform vec3 uColor3;
                uniform vec3 uColor4;
                varying vec3 vPosition;

                void main() {
                    float t1 = sin(time * 0.6) * 0.5 + 0.5;
                    float t2 = sin(time * 0.4) * 0.5 + 0.5;
                    vec3 color = mix(uColor1, uColor2, t1);
                    color = mix(color, uColor3, t2);
                    color = mix(color, uColor4, sin(time * 0.3) * 0.5 + 0.5);
                    float glow = sin(time * 2.0 + vPosition.x) * 0.5 + 0.5;
                    gl_FragColor = vec4(color * (0.9 + glow * 0.6), 1.0);
                }
            `,
            transparent: true
        });
        const ledEdges = new THREE.LineSegments(edgesGeometry, ledMaterial);
        outerDodecahedron.add(ledEdges);

        // Inner LED particles
        const ledCount = 150;
        const ledGeometry = new THREE.BufferGeometry();
        const ledPositions = new Float32Array(ledCount * 3);
        const ledOffsets = new Float32Array(ledCount);
        for (let i = 0; i < ledCount; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = Math.pow(Math.random(), 1/3) * 0.7;
            ledPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            ledPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            ledPositions[i * 3 + 2] = r * Math.cos(phi);
            ledOffsets[i] = Math.random() * Math.PI * 2;
        }
        ledGeometry.setAttribute('position', new THREE.BufferAttribute(ledPositions, 3));
        ledGeometry.setAttribute('offset', new THREE.BufferAttribute(ledOffsets, 1));
        const ledParticleMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                uColor1: { value: new THREE.Color('#ff4d94') },
                uColor2: { value: new THREE.Color('#4dffeb') },
                uColor3: { value: new THREE.Color('#cc66ff') }
            },
            vertexShader: `
                attribute float offset;
                varying float vOffset;
                void main() {
                    vOffset = offset;
                    gl_PointSize = 7.0;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform float time;
                uniform vec3 uColor1;
                uniform vec3 uColor2;
                uniform vec3 uColor3;
                varying float vOffset;
                void main() {
                    float pulse = sin(time * 2.5 + vOffset) * 0.5 + 0.5;
                    float t = sin(time * 0.5) * 0.5 + 0.5;
                    vec3 color = mix(uColor1, uColor2, t);
                    color = mix(color, uColor3, sin(time * 0.3) * 0.5 + 0.5);
                    vec2 coord = gl_PointCoord - vec2(0.5);
                    float dist = length(coord);
                    if (dist > 0.5) discard;
                    float alpha = smoothstep(0.5, 0.2, dist);
                    gl_FragColor = vec4(color * (0.6 + pulse), alpha);
                }
            `,
            transparent: true
        });
        const ledParticles = new THREE.Points(ledGeometry, ledParticleMaterial);
        outerDodecahedron.add(ledParticles);

        // Reflective environment
        const cubeRenderTarget = new THREE.WebGLCubeRenderTarget(512, {
            generateMipmaps: true,
            minFilter: THREE.LinearMipmapLinearFilter
        });
        const cubeCamera = new THREE.CubeCamera(0.1, 1000, cubeRenderTarget);
        outerMaterial.uniforms.uEnvMap.value = cubeRenderTarget.texture;
        innerMaterial.uniforms.uEnvMap.value = cubeRenderTarget.texture;

        // Flower of Life background (2D canvas)
        const bgCanvas = document.getElementById('bgCanvas');
        bgCanvas.width = window.innerWidth;
        bgCanvas.height = window.innerHeight;
        const ctx = bgCanvas.getContext('2d');
        function drawFlowerOfLife() {
            ctx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            ctx.strokeStyle = 'rgba(100, 200, 255, 0.3)';
            ctx.lineWidth = 1;
            const centerX = bgCanvas.width / 2;
            const centerY = bgCanvas.height / 2;
            const radius = 50;
            const offset = radius * Math.sqrt(3);
            const time = performance.now() * 0.0002;
            for (let i = -2; i <= 2; i++) {
                for (let j = -2; j <= 2; j++) {
                    const x = centerX + i * offset + Math.sin(time + i) * 10;
                    const y = centerY + j * offset + Math.cos(time + j) * 10;
                    ctx.beginPath();
                    ctx.arc(x, y, radius, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }
        }

        // Energy atom particles
        const atomCount = 50;
        const atomGeometry = new THREE.BufferGeometry();
        const atomPositions = new Float32Array(atomCount * 3);
        const atomVelocities = new Float32Array(atomCount * 3);
        const atomLifetimes = new Float32Array(atomCount);
        const phi = (1 + Math.sqrt(5)) / 2; // Golden ratio
        for (let i = 0; i < atomCount; i++) {
            atomPositions[i * 3] = (Math.random() - 0.5) * 20;
            atomPositions[i * 3 + 1] = (Math.random() - 0.5) * 20;
            atomPositions[i * 3 + 2] = (Math.random() - 0.5) * 20;
            atomVelocities[i * 3] = (Math.random() - 0.5) * 0.1;
            atomVelocities[i * 3 + 1] = (Math.random() - 0.5) * 0.1;
            atomVelocities[i * 3 + 2] = (Math.random() - 0.5) * 0.1;
            atomLifetimes[i] = Math.random() * 5;
        }
        atomGeometry.setAttribute('position', new THREE.BufferAttribute(atomPositions, 3));
        atomGeometry.setAttribute('offset', new THREE.BufferAttribute(new Float32Array(atomCount).map(() => Math.random()), 1));
        const atomMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 }
            },
            vertexShader: `
                attribute float offset;
                varying float vOffset;
                void main() {
                    vOffset = offset;
                    gl_PointSize = 5.0;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform float time;
                varying float vOffset;
                void main() {
                    float t = sin(time * 2.0 + vOffset) * 0.5 + 0.5;
                    vec3 color = vec3(0.5 + 0.5 * sin(t * 3.1416), 0.5 + 0.5 * cos(t * 3.1416), 1.0);
                    vec2 coord = gl_PointCoord - vec2(0.5);
                    float dist = length(coord);
                    if (dist > 0.5) discard;
                    float alpha = smoothstep(0.5, 0.3, dist);
                    gl_FragColor = vec4(color, alpha * (0.5 + t));
                }
            `,
            transparent: true
        });
        const atomParticles = new THREE.Points(atomGeometry, atomMaterial);
        scene.add(atomParticles);

        // Interactivity
        let mouseX = 0, mouseY = 0;
        let targetRotationX = 0, targetRotationY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
            targetRotationY = mouseX * Math.PI;
            targetRotationX = mouseY * Math.PI * 0.5;
        });
        document.addEventListener('click', () => {
            const burstCount = 20;
            const burstPositions = new Float32Array(burstCount * 3);
            for (let i = 0; i < burstCount; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = 0.5;
                burstPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                burstPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                burstPositions[i * 3 + 2] = r * Math.cos(phi);
            }
            const burstGeometry = new THREE.BufferGeometry();
            burstGeometry.setAttribute('position', new THREE.BufferAttribute(burstPositions, 3));
            const burstMaterial = new THREE.PointsMaterial({
                size: 8,
                color: new THREE.Color(`hsl(${Math.random() * 360}, 100%, 70%)`),
                transparent: true,
                opacity: 0.8
            });
            const burst = new THREE.Points(burstGeometry, burstMaterial);
            outerDodecahedron.add(burst);
            setTimeout(() => scene.remove(burst), 1000); // Remove after 1s
        });

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 1.5, 10);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // Animation loop
        function animate(time) {
            requestAnimationFrame(animate);
            drawFlowerOfLife();

            // Update energy atoms
            for (let i = 0; i < atomCount; i++) {
                atomPositions[i * 3] += atomVelocities[i * 3] * phi; // Golden ratio influence
                atomPositions[i * 3 + 1] += atomVelocities[i * 3 + 1] * phi;
                atomPositions[i * 3 + 2] += atomVelocities[i * 3 + 2];
                atomLifetimes[i] -= 0.016;
                if (atomLifetimes[i] <= 0) {
                    atomPositions[i * 3] = (Math.random() - 0.5) * 20;
                    atomPositions[i * 3 + 1] = (Math.random() - 0.5) * 20;
                    atomPositions[i * 3 + 2] = (Math.random() - 0.5) * 20;
                    atomVelocities[i * 3] = (Math.random() - 0.5) * 0.1;
                    atomVelocities[i * 3 + 1] = (Math.random() - 0.5) * 0.1;
                    atomVelocities[i * 3 + 2] = (Math.random() - 0.5) * 0.1;
                    atomLifetimes[i] = Math.random() * 5;
                }
            }
            atomGeometry.attributes.position.needsUpdate = true;

            // Update rotations
            outerDodecahedron.rotation.y += (targetRotationY - outerDodecahedron.rotation.y) * 0.05;
            outerDodecahedron.rotation.x += (targetRotationX - outerDodecahedron.rotation.x) * 0.05;
            innerDodecahedron.rotation.x -= 0.004;
            innerDodecahedron.rotation.y -= 0.004;
            outerMaterial.uniforms.time.value = time * 0.001;
            innerMaterial.uniforms.time.value = time * 0.001;
            ledMaterial.uniforms.time.value = time * 0.001;
            ledParticleMaterial.uniforms.time.value = time * 0.001;
            atomMaterial.uniforms.time.value = time * 0.001;

            // Two-pass rendering
            outerDodecahedron.visible = false;
            innerDodecahedron.visible = false;
            cubeCamera.position.copy(outerDodecahedron.position);
            cubeCamera.update(renderer, scene);
            outerDodecahedron.visible = true;
            innerDodecahedron.visible = true;

            composer.render();
        }
        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
