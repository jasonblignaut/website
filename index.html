<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #0a0a2a, #000);
            overflow: hidden;
            height: 100vh;
            cursor: none;
        }
        #canvas {
            width: 100%;
            height: 100%;
            background: radial-gradient(rgba(0, 0, 51, 0.3), rgba(0, 0, 0, 0.7));
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; filter: brightness(1); }
            50% { transform: scale(1.2); opacity: 1; filter: brightness(1.5); }
            100% { transform: scale(1); opacity: 0.7; filter: brightness(1); }
        }
        @keyframes interference {
            0% { opacity: 0.5; filter: hue-rotate(0deg); }
            50% { opacity: 1; filter: hue-rotate(180deg); }
            100% { opacity: 0.5; filter: hue-rotate(360deg); }
        }
        @keyframes moire {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        // Core Setup
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: true });
        let manifestationEnergy = 0; // Tracks user's focused intent
        let coherence = 0; // Alignment of energy
        let focusStrength = 0; // Intensity of user focus
        let angle = 0;
        let zoomLevel = 1;
        let mouse = { x: canvas.width / 2, y: canvas.height / 2, clicked: false, clickStrength: 0, lastClick: 0, focusTime: 0 };
        let audioContext, oscillator, gainNode, analyser;
        let particlePool = [];
        let geometryPool = [];
        let particles = [];
        let geometries = [];
        let slitPattern = [];
        let moirePattern = [];
        let sceneProgress = 0;
        const sceneDuration = 3000; // Frames per phase (~50 seconds at 60 FPS)
        const maxParticles = 1000;
        const maxGeometries = 2000;

        // Canvas Initialization
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.globalCompositeOperation = 'lighter';
            mouse.x = canvas.width / 2;
            mouse.y = canvas.height / 2;
            initPools();
            initScene();
            initMoirePattern();
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Object Pooling for Particles and Geometries
        function initPools() {
            // Particle Pool with Manifestation Properties
            particlePool.length = 0;
            for (let i = 0; i < maxParticles; i++) {
                particlePool.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    vx: (Math.random() - 0.5) * 2,
                    vy: -(Math.random() * 2 + 1),
                    size: Math.random() * 2 + 1,
                    hue: Math.random() * 360,
                    opacity: 1,
                    wave: Math.random() * 2 * Math.PI,
                    state: Math.floor(Math.random() * 2), // 0 = particle, 1 = wave
                    focusAttraction: 0, // Attraction to user focus
                    active: i === 0 // Start with 1 particle
                });
            }
            particles = particlePool.filter(p => p.active);

            // Geometry Pool with Manifestation Growth
            geometryPool.length = 0;
            for (let i = 0; i < maxGeometries; i++) {
                geometryPool.push({
                    type: 'circle',
                    x: 0,
                    y: 0,
                    r: 0,
                    hue: 0,
                    opacity: 1,
                    pulsing: false,
                    x1: 0,
                    y1: 0,
                    x2: 0,
                    y2: 0,
                    points: [],
                    width: 0,
                    vx: 0,
                    vy: 0,
                    depth: 0,
                    manifestationShift: Math.random() * 2 * Math.PI, // For manifestation effects
                    active: false
                });
            }
        }

        // Manifestation-Driven Particle Spawning
        function spawnParticles() {
            const activeCount = particles.filter(p => p.active).length;
            const spawnCount = Math.min(Math.floor(manifestationEnergy / 50), maxParticles - activeCount);
            let spawned = 0;
            for (let i = 0; i < particlePool.length && spawned < spawnCount; i++) {
                if (!particlePool[i].active) {
                    particlePool[i].x = mouse.x; // Spawn at focus point
                    particlePool[i].y = mouse.y;
                    particlePool[i].vx = (Math.random() - 0.5) * 2;
                    particlePool[i].vy = -(Math.random() * 2 + 1);
                    particlePool[i].size = Math.random() * 2 + 1;
                    particlePool[i].hue = Math.random() * 360;
                    particlePool[i].opacity = 1;
                    particlePool[i].wave = Math.random() * 2 * Math.PI;
                    particlePool[i].state = Math.floor(Math.random() * 2);
                    particlePool[i].focusAttraction = 0;
                    particlePool[i].active = true;
                    spawned++;
                }
            }
            particles = particlePool.filter(p => p.active);
        }

        function drawParticles() {
            particles.forEach(p => {
                if (!p.active) return;
                // Law of Attraction: Particles are drawn to user focus
                const dx = mouse.x - p.x;
                const dy = mouse.y - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 300) {
                    p.focusAttraction += focusStrength * 0.01;
                    p.vx += (dx / dist) * p.focusAttraction;
                    p.vy += (dy / dist) * p.focusAttraction;
                    p.opacity = Math.min(p.opacity + 0.02, 1);
                    p.state = 1; // Wave state when focused
                } else {
                    p.focusAttraction = Math.max(p.focusAttraction - 0.01, 0);
                    p.opacity = Math.max(p.opacity - 0.01, 0.4);
                    p.state = 0; // Particle state when not focused
                }
                // Quantum Wave Function
                const waveFunction = Math.sin(p.wave + angle) * Math.cos(p.wave + angle);
                p.x += p.vx * (1 + manifestationEnergy / 10000) + waveFunction * 0.5;
                p.y += p.vy * (1 + manifestationEnergy / 10000) + waveFunction * 0.5;
                p.wave += 0.03 * (1 + coherence / 1000);
                p.vy += 0.01; // Gravity effect
                if (p.x < 0 || p.x > canvas.width) p.vx *= -0.9;
                if (p.y > canvas.height || p.y < 0) {
                    p.x = mouse.x;
                    p.y = mouse.y;
                    p.vx = (Math.random() - 0.5) * 2;
                    p.vy = -(Math.random() * 2 + 1);
                }
                // Double Slit: Focus Influences Pattern
                const slitX = (p.x - canvas.width * 0.4) / (canvas.width * 0.2);
                if (slitX >= 0 && slitX <= 1 && p.y > canvas.height * 0.5) {
                    const focusSide = mouse.x < canvas.width / 2 ? -1 : 1; // -1 for left, 1 for right
                    const interference = Math.sin(slitX * 10 * Math.PI + angle) * 0.5 + 0.5;
                    const focusBias = focusSide * (slitX - 0.5) * focusStrength; // Bias pattern toward focus
                    p.opacity *= interference + focusBias;
                    p.vx += Math.cos(slitX * 10 * Math.PI) * 0.01 + focusBias * 0.05;
                }
                ctx.beginPath();
                if (p.state === 0) {
                    ctx.arc(p.x / zoomLevel, p.y / zoomLevel, p.size, 0, 2 * Math.PI);
                } else {
                    ctx.moveTo(p.x / zoomLevel - p.size, p.y / zoomLevel);
                    ctx.bezierCurveTo(
                        p.x / zoomLevel, (p.y - p.size * 2) / zoomLevel,
                        p.x / zoomLevel, (p.y + p.size * 2) / zoomLevel,
                        (p.x + p.size) / zoomLevel, p.y / zoomLevel
                    );
                }
                const gradient = ctx.createRadialGradient(p.x / zoomLevel, p.y / zoomLevel, 0, p.x / zoomLevel, p.y / zoomLevel, p.size);
                gradient.addColorStop(0, `hsla(${p.hue}, 70%, 50%, ${p.opacity})`);
                gradient.addColorStop(1, `hsla(${p.hue}, 70%, 50%, 0)`);
                ctx.fillStyle = gradient;
                ctx.fill();
            });
        }

        // Optical Illusion: Moiré Pattern
        function initMoirePattern() {
            moirePattern = [];
            const spacing = 10;
            for (let x = 0; x < canvas.width; x += spacing) {
                for (let y = 0; y < canvas.height; y += spacing) {
                    moirePattern.push({ x, y, angle: Math.random() * 2 * Math.PI });
                }
            }
        }

        function drawMoirePattern() {
            moirePattern.forEach(m => {
                const dx = mouse.x - m.x;
                const dy = mouse.y - m.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 300) {
                    ctx.save();
                    ctx.translate(m.x / zoomLevel, m.y / zoomLevel);
                    ctx.rotate(m.angle + angle);
                    ctx.beginPath();
                    ctx.moveTo(-5, 0);
                    ctx.lineTo(5, 0);
                    ctx.strokeStyle = `hsla(${dist % 360}, 70%, 50%, ${1 - dist / 300})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    ctx.restore();
                }
            });
        }

        // Double Slit Pattern with Focus Influence
        function updateSlitPattern() {
            slitPattern = [];
            for (let x = canvas.width * 0.4; x < canvas.width * 0.6; x += 5) {
                for (let y = canvas.height * 0.5; y < canvas.height * 0.7; y += 5) {
                    const slitX = (x - canvas.width * 0.4) / (canvas.width * 0.2);
                    const focusSide = mouse.x < canvas.width / 2 ? -1 : 1;
                    const interference = Math.sin(slitX * 10 * Math.PI + angle) * 0.5 + 0.5;
                    const focusBias = focusSide * (slitX - 0.5) * focusStrength;
                    if (interference + focusBias > 0.3) {
                        slitPattern.push({ x, y, intensity: interference + focusBias });
                    }
                }
            }
        }

        function drawSlitPattern() {
            slitPattern.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x / zoomLevel, s.y / zoomLevel, 2 * s.intensity, 0, 2 * Math.PI);
                ctx.fillStyle = `hsla(240, 70%, 50%, ${s.intensity * 0.5})`;
                ctx.fill();
            });
        }

        // Audio Setup with Manifestation Resonance
        function initAudio(baseFreq) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioContext.createOscillator();
            gainNode = audioContext.createGain();
            analyser = audioContext.createAnalyser();
            oscillator.type = 'sine';
            oscillator.frequency.value = baseFreq;
            oscillator.connect(gainNode);
            gainNode.connect(analyser);
            analyser.connect(audioContext.destination);
            analyser.fftSize = 256;
            oscillator.start();
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
        }

        function stopAudio() {
            if (oscillator) oscillator.stop();
            if (audioContext) audioContext.close();
        }

        function updateAudio() {
            if (gainNode) {
                gainNode.gain.setValueAtTime(0.1 + (coherence / 2000), audioContext.currentTime);
                oscillator.frequency.setValueAtTime(baseFrequencies[Math.floor(sceneProgress / sceneDuration) % 5] + (manifestationEnergy / 200), audioContext.currentTime);
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                analyser.getByteFrequencyData(dataArray);
                const avgFrequency = dataArray.reduce((a, b) => a + b) / bufferLength;
                return avgFrequency / 255;
            }
            return 0;
        }
        const baseFrequencies = [432, 528, 432, 0, 963];

        // Unified Scene with Manifestation-Driven Growth
        function initScene() {
            geometryPool.forEach(g => g.active = false);
            geometries = [];
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const phase = Math.floor(sceneProgress / sceneDuration) % 5;
            let activeCount = 0;

            // Flower of Life (Phase 0) - Hexagonal Growth via Focus
            if (phase === 0) {
                const radius = Math.min(canvas.width, canvas.height) / 20;
                function generateFlower(x, y, r, depth) {
                    if (depth > Math.min(3 + Math.floor(manifestationEnergy / 1000), 5) || activeCount >= maxGeometries) return;
                    let g = geometryPool[activeCount++];
                    g.type = 'circle';
                    g.x = x;
                    g.y = y;
                    g.r = r * (1 + Math.sin(angle + x / 50) * 0.1);
                    g.hue = 180 + depth * 30;
                    g.opacity = 1;
                    g.pulsing = true;
                    g.manifestationShift = Math.random() * 2 * Math.PI;
                    g.active = true;
                    for (let i = 0; i < 6; i++) {
                        if (activeCount >= maxGeometries) break;
                        const a = (2 * Math.PI / 6) * i;
                        const newX = x + Math.cos(a) * r * Math.sqrt(3);
                        const newY = y + Math.sin(a) * r * Math.sqrt(3);
                        generateFlower(newX, newY, r, depth + 1);
                    }
                }
                generateFlower(cx, cy, radius, 0);
            }

            // Golden Spiral (Phase 1) - Expanding with Focus
            else if (phase === 1) {
                const points = 200;
                let a = 0.1;
                let b = 0.2;
                for (let i = 0; i < points && activeCount < maxGeometries; i++) {
                    let theta = i * 0.5;
                    let r = a * Math.exp(b * theta);
                    let x = cx + r * Math.cos(theta);
                    let y = cy + r * Math.sin(theta);
                    let g = geometryPool[activeCount++];
                    g.type = 'circle';
                    g.x = x;
                    g.y = y;
                    g.r = 5 + Math.sin(theta + angle) * 2;
                    g.hue = (theta * 30) % 360;
                    g.opacity = 1;
                    g.pulsing = true;
                    g.active = true;
                }
            }

            // Quantum Field Grid (Phase 2) - Dynamic grid influenced by coherence
            else if (phase === 2) {
                const spacing = 50;
                for (let x = spacing; x < canvas.width; x += spacing) {
                    for (let y = spacing; y < canvas.height; y += spacing) {
                        if (activeCount >= maxGeometries) break;
                        let g = geometryPool[activeCount++];
                        g.type = 'line';
                        g.x1 = x - 10 + Math.sin(angle + y / 100) * 20;
                        g.y1 = y;
                        g.x2 = x + 10 + Math.cos(angle + x / 100) * 20;
                        g.y2 = y;
                        g.hue = (x + y + angle * 50) % 360;
                        g.opacity = 0.8;
                        g.active = true;
                    }
                }
            }

            // Interference Circles (Phase 3)
            else if (phase === 3) {
                for (let i = 0; i < 100 && activeCount < maxGeometries; i++) {
                    let g = geometryPool[activeCount++];
                    g.type = 'circle';
                    g.x = Math.random() * canvas.width;
                    g.y = Math.random() * canvas.height;
                    g.r = 20 + Math.random() * 50;
                    g.hue = Math.random() * 360;
                    g.opacity = 0.5 + Math.random() * 0.5;
                    g.pulsing = true;
                    g.active = true;
                }
            }

            // Collapse - Coherence and manifestation condensing into a point (Phase 4)
            else if (phase === 4) {
                let centerX = canvas.width / 2;
                let centerY = canvas.height / 2;
                for (let i = 0; i < 300 && activeCount < maxGeometries; i++) {
                    let g = geometryPool[activeCount++];
                    g.type = 'line';
                    g.x1 = centerX;
                    g.y1 = centerY;
                    g.x2 = centerX + Math.cos(i) * (100 + manifestationEnergy / 10);
                    g.y2 = centerY + Math.sin(i) * (100 + manifestationEnergy / 10);
                    g.hue = (i * 12 + angle * 100) % 360;
                    g.opacity = 0.7;
                    g.active = true;
                }
            }
        }

        function drawGeometries() {
            geometries = geometryPool.filter(g => g.active);
            geometries.forEach(g => {
                ctx.beginPath();
                if (g.type === 'circle') {
                    ctx.arc(g.x / zoomLevel, g.y / zoomLevel, g.r, 0, 2 * Math.PI);
                } else if (g.type === 'line') {
                    ctx.moveTo(g.x1 / zoomLevel, g.y1 / zoomLevel);
                    ctx.lineTo(g.x2 / zoomLevel, g.y2 / zoomLevel);
                }
                ctx.strokeStyle = `hsla(${g.hue}, 70%, 50%, ${g.opacity})`;
                ctx.lineWidth = 1 + Math.sin(angle + g.manifestationShift) * 0.5;
                ctx.stroke();
            });
        }

        // Mouse Interaction for Focus
        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener('mousedown', () => {
            mouse.clicked = true;
            mouse.clickStrength = 1;
            mouse.lastClick = Date.now();
            mouse.focusTime = 0;
            if (!audioContext) initAudio(432);
        });

        canvas.addEventListener('mouseup', () => {
            mouse.clicked = false;
        });

        // Main Render Loop
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            angle += 0.005;
            sceneProgress++;

            if (mouse.clicked) {
                mouse.focusTime += 1;
                manifestationEnergy += 0.5;
                coherence += 0.2;
                focusStrength = Math.min(mouse.focusTime / 100, 1);
            } else {
                focusStrength = Math.max(focusStrength - 0.01, 0);
                manifestationEnergy = Math.max(manifestationEnergy - 0.2, 0);
                coherence = Math.max(coherence - 0.1, 0);
            }

            updateSlitPattern();
            spawnParticles();
            drawParticles();
            drawSlitPattern();
            drawMoirePattern();
            drawGeometries();

            updateAudio();

            requestAnimationFrame(animate);
        }
        animate();

    </script>
</body>
</html>
