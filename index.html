<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Discover your public IP and test network speed with mesmerizing cosmic animations.">
  <meta name="keywords" content="Public IP, Network Speed Test, Cyberpunk, WebGL, Performance">
  <meta name="author" content="Labverse Team">
  <meta property="og:title" content="Labverse: Cosmic Speed Test">
  <meta property="og:description" content="Test your network speed with stunning WebGL animations and share your results!">
  <meta property="og:image" content="https://labverse.co.za/assets/og-image.png">
  <meta property="og:url" content="https://labverse.co.za">
  <meta name="twitter:card" content="summary_large_image">
  <title>Labverse: Cosmic Speed Test</title>
  <link rel="icon" href="/assets/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <canvas id="background-canvas" aria-hidden="true"></canvas>
  <div class="theme-toggle" id="theme-toggle" role="button" aria-label="Toggle theme" tabindex="0">🌙</div>
  <div class="container">
    <h1>Labverse Speed Test</h1>
    <div class="ip-display" id="ip-display" aria-live="polite">Fetching IP...</div>
    <div class="network-info" id="network-info" aria-live="polite">Fetching network info...</div>
    <div class="error-message" id="error-message" role="alert" aria-hidden="true">Animations failed to load.</div>
    <div class="button-container">
      <button class="btn" id="copy-ip-btn" aria-label="Copy IP address">Copy IP</button>
      <button class="btn" id="start-speed-test" aria-label="Start network speed test">Test Speed</button>
    </div>
    <div class="speed-test-container" id="speed-test-container" role="region" aria-label="Speed test results">
      <select id="server-select" class="server-select" aria-label="Select test server">
        <option value="cloudflare">Cloudflare Workers</option>
        <option value="local">Local Assets</option>
      </select>
      <div class="metrics">
        <div class="metric">
          <div class="metric-label">Download</div>
          <div class="metric-value" id="download-value">0</div>
          <div class="metric-unit">Mbps</div>
        </div>
        <div class="metric">
          <div class="metric-label">Upload</div>
          <div class="metric-value" id="upload-value">0</div>
          <div class="metric-unit">Mbps</div>
        </div>
        <div class="metric">
          <div class="metric-label">Ping</div>
          <div class="metric-value" id="ping-value">0</div>
          <div class="metric-unit">ms</div>
        </div>
        <div class="metric">
          <div class="metric-label">Jitter</div>
          <div class="metric-value" id="jitter-value">0</div>
          <div class="metric-unit">ms</div>
        </div>
      </div>
      <div class="progress-container">
        <div class="progress-speed" id="current-speed">0.00 Mbps</div>
        <div class="progress-percentage" id="progress-percent">0%</div>
        <div class="progress">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="progress-stats">
          <span id="data-transferred">0 MB</span>
          <span id="time-elapsed">00:00</span>
        </div>
      </div>
      <canvas class="speed-graph" id="speed-graph" aria-hidden="true"></canvas>
      <div class="results-display" id="results-display" aria-live="polite"></div>
      <div class="button-container">
        <button class="btn" id="refresh-test" style="display: none;" aria-label="Refresh test">Refresh</button>
        <button class="btn" id="share-results" style="display: none;" aria-label="Share results">Share</button>
        <button class="btn" id="view-history" style="display: none;" aria-label="View history">History</button>
      </div>
    </div>
  </div>
  <div class="history-overlay" id="history-overlay" role="dialog" aria-label="Test history">
    <div class="history-content" id="history-content"></div>
    <button class="close-btn" id="close-history" aria-label="Close history">Close</button>
  </div>
  <footer>
    © 2025 Labverse | Powered by <a href="https://x.ai" target="_blank" rel="noopener">xAI</a>
  </footer>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
