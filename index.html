<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cyberpunk Cosmic Genesis - Forge a neon universe with your IP.">
    <title>Cyberpunk Cosmic Genesis | Labverse Cybernetics</title>
    <link rel="icon" href="https://labverse.co.za/favicon.ico" type="image/x-icon">
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a1a; font-family: 'Orbitron', sans-serif; }
        canvas { display: block; }
        #copy-ip-btn {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 10px 20px; background: #00ffcc; color: #0a0a1a; border: none;
            font-size: 16px; cursor: pointer; border-radius: 5px; box-shadow: 0 0 10px #00ffcc;
            transition: all 0.3s; z-index: 10;
        }
        #copy-ip-btn:hover { background: #ff00cc; box-shadow: 0 0 20px #ff00cc; }
        #mute-btn {
            position: absolute; top: 20px; right: 20px; padding: 10px;
            background: #ff00cc; color: #0a0a1a; border: none; font-size: 14px;
            cursor: pointer; border-radius: 5px; box-shadow: 0 0 10px #ff00cc; z-index: 10;
        }
        #controls {
            position: absolute; bottom: 20px; left: 20px; color: #00ffcc;
            font-size: 14px; z-index: 10; background: rgba(10, 10, 26, 0.8);
            padding: 10px; border-radius: 5px; display: none;
        }
        .glow { filter: drop-shadow(0 0 5px #00ffcc); }
        @media (max-width: 768px) {
            #copy-ip-btn { font-size: 14px; padding: 8px 16px; }
            #mute-btn { font-size: 12px; padding: 8px; }
        }
    </style>
</head>
<body>
    <button id="copy-ip-btn">Copy IP & Ignite Cosmos</button>
    <button id="mute-btn">Mute</button>
    <div id="controls">
        <label><input type="checkbox" id="toggle-forces"> Toggle Forces</label><br>
        <label>Trail Glow: <input type="range" id="trail-glow" min="0.1" max="1" value="0.5" step="0.1"></label>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script>
        // [DEBUG] Toggle debug logs (set to false in production)
        const DEBUG = true;
        const log = DEBUG ? console.log.bind(console, '[DEBUG]') : () => {};

        // Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 50;
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // Adaptive Quality
        const isLowEnd = !renderer.capabilities.isWebGL2 || performance.now() > 16; // Detect < 60 FPS
        const PARTICLE_COUNT = isLowEnd ? 30 : 50;
        const TRAIL_LENGTH = isLowEnd ? 20 : 30;
        const GLOW_INTENSITY = isLowEnd ? 0.3 : 0.5;

        // Background: Starry Cosmos
        const starGeometry = new THREE.BufferGeometry();
        const starMaterial = new THREE.PointsMaterial({ color: 0xaaaaaa, size: 0.1, transparent: true });
        const starPositions = new Float32Array(1000 * 3);
        for (let i = 0; i < 1000; i++) {
            starPositions[i * 3] = (Math.random() - 0.5) * 200;
            starPositions[i * 3 + 1] = (Math.random() - 0.5) * 200;
            starPositions[i * 3 + 2] = (Math.random() - 0.5) * 200;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);

        // Neon Grid
        const gridGeometry = new THREE.BufferGeometry();
        const gridMaterial = new THREE.LineBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.2 });
        const gridLines = [];
        for (let i = -50; i <= 50; i += 5) {
            gridLines.push(i, 0, -50, i, 0, 50, -50, 0, i, 50, 0, i);
        }
        gridGeometry.setAttribute('position', new THREE.Float32BufferAttribute(gridLines, 3));
        const grid = new THREE.LineSegments(gridGeometry, gridMaterial);
        grid.position.z = -50;
        scene.add(grid);

        // Particles and Trails
        const particles = [];
        const trails = [];
        const colors = [0x00ffcc, 0xff00cc, 0x00ccff, 0xffff00]; // Neon palette
        class Particle {
            constructor(x, y, z, type, ipSeed) {
                this.position = new THREE.Vector3(x, y, z);
                this.velocity = new THREE.Vector3(0, 0, 0);
                this.type = type; // planet, life, energy, object
                this.seed = ipSeed; // For unique patterns
                this.trail = [];
                this.forceParams = this.initForces();
                this.geometry = new THREE.SphereGeometry(0.2, 8, 8);
                this.material = new THREE.MeshBasicMaterial({
                    color: colors[Math.floor(Math.random() * colors.length)],
                    transparent: true,
                    opacity: 0.8
                });
                this.mesh = new THREE.Mesh(this.geometry, this.material);
                scene.add(this.mesh);
            }
            initForces() {
                const seed = this.seed;
                return {
                    gravity: 0.01 * (1 + (seed % 100) / 100),
                    electromagnetism: 0.02 * (1 + ((seed >> 1) % 100) / 100),
                    darkMatter: 0.005 * (1 + ((seed >> 2) % 100) / 100),
                    chaos: Math.random() < 0.1 // 10% chance for chaotic behavior
                };
            }
            update() {
                // Region-based behavior
                const t = Date.now() / 1000;
                const pos = this.position;
                if (this.type === 'planet') {
                    // Elliptical orbits (top-left)
                    const a = 10 + this.seed % 5;
                    const b = a * (0.5 + (this.seed % 100) / 200);
                    const theta = t * this.forceParams.gravity;
                    pos.x = -20 + a * Math.cos(theta);
                    pos.y = 20 + b * Math.sin(theta);
                } else if (this.type === 'life') {
                    // Fractal branching (center-right)
                    const angle = t * this.forceParams.electromagnetism;
                    pos.x = 20 + 5 * Math.sin(angle) + Math.cos(t * 0.5) * (this.seed % 3);
                    pos.y = 5 * Math.cos(angle * 1.5) + Math.sin(t * 0.3) * (this.seed % 2);
                } else if (this.type === 'energy') {
                    // Logarithmic spirals (bottom-left)
                    const r = 5 * Math.exp(0.1 * t * this.forceParams.darkMatter);
                    const theta = t * 0.5;
                    pos.x = -20 + r * Math.cos(theta);
                    pos.y = -20 + r * Math.sin(theta);
                } else if (this.type === 'object') {
                    // Polyhedral lattices (top-center)
                    const n = this.seed % 4 + 3;
                    const phi = (1 + Math.sqrt(5)) / 2;
                    pos.x = 5 * Math.cos(t * this.forceParams.gravity * phi);
                    pos.y = 20 + 5 * Math.sin(t * this.forceParams.electromagnetism * n);
                }
                // Quantum tunneling
                if (Math.random() < 0.01) {
                    pos.x += (Math.random() - 0.5) * 10;
                    pos.y += (Math.random() - 0.5) * 10;
                }
                // Chaos theory (Lorenz attractor influence)
                if (this.forceParams.chaos) {
                    const dt = 0.01;
                    const sigma = 10, rho = 28, beta = 8 / 3;
                    pos.x += dt * sigma * (pos.y - pos.x);
                    pos.y += dt * (pos.x * (rho - pos.z) - pos.y);
                    pos.z += dt * (pos.x * pos.y - beta * pos.z);
                }
                // Update trail
                this.trail.push(pos.clone());
                if (this.trail.length > TRAIL_LENGTH) this.trail.shift();
                this.mesh.position.copy(pos);
            }
        }

        // Trail Rendering (Instanced)
        const trailGeometry = new THREE.BufferGeometry();
        const trailPositions = new Float32Array(PARTICLE_COUNT * TRAIL_LENGTH * 3);
        const trailColors = new Float32Array(PARTICLE_COUNT * TRAIL_LENGTH * 3);
        trailGeometry.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
        trailGeometry.setAttribute('color', new THREE.BufferAttribute(trailColors, 3));
        const trailMaterial = new THREE.ShaderMaterial({
            vertexShader: `
                attribute vec3 color;
                varying vec3 vColor;
                void main() {
                    vColor = color;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                uniform float glow;
                void main() {
                    gl_FragColor = vec4(vColor, 0.05 * glow);
                }
            `,
            uniforms: { glow: { value: GLOW_INTENSITY } },
            transparent: true,
            blending: THREE.AdditiveBlending
        });
        const trailMesh = new THREE.LineSegments(trailGeometry, trailMaterial);
        scene.add(trailMesh);

        // Big Bang Animation
        let bigBangTriggered = false;
        function triggerBigBang(ip) {
            if (bigBangTriggered) return;
            bigBangTriggered = true;
            log('Big Bang ignited with IP:', ip);
            const ipSeed = ip.split('.').reduce((sum, octet) => sum + parseInt(octet), 0);
            const types = ['planet', 'life', 'energy', 'object'];
            // Fibonacci spiral spawn
            const phi = (1 + Math.sqrt(5)) / 2;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const a = i / PARTICLE_COUNT;
                const r = Math.sqrt(a) * 10;
                const theta = 2 * Math.PI * a * phi;
                const x = r * Math.cos(theta);
                const y = r * Math.sin(theta);
                const type = types[Math.floor(i / (PARTICLE_COUNT / 4)) % 4];
                particles.push(new Particle(x, y, 0, type, ipSeed + i));
            }
            // Cinematic camera
            gsap.to(camera.position, { z: 40, duration: 10, ease: 'power2.out' });
            gsap.to(camera.rotation, { y: Math.PI / 4, duration: 10, ease: 'sine.inOut' });
            // Play Big Bang sound
            if (!muted) bigBangSound.play();
        }

        // Sparse Spawning
        function sparseSpawn() {
            if (particles.length < PARTICLE_COUNT && Math.random() < 0.01) {
                const types = ['planet', 'life', 'energy', 'object'];
                const type = types[Math.floor(Math.random() * types.length)];
                particles.push(new Particle(0, 0, 0, type, Math.random() * 1000));
                log('Sparse particle spawned:', type);
            }
        }

        // IP Fetching
        async function fetchIP() {
            const apis = [
                'https://api.ipify.org?format=json',
                'https://ipapi.co/json/',
                'https://api.seeip.org/jsonip'
            ];
            for (const api of apis) {
                try {
                    const res = await fetch(api, { mode: 'cors' });
                    const data = await res.json();
                    return data.ip || data.ip_address;
                } catch (e) {
                    log('API failed:', api, e);
                }
            }
            return '127.0.0.1'; // Offline fallback
        }

        // Copy IP and Trigger
        const copyIpBtn = document.getElementById('copy-ip-btn');
        copyIpBtn.addEventListener('click', async () => {
            const ip = await fetchIP();
            navigator.clipboard.writeText(ip);
            triggerBigBang(ip);
            copyIpBtn.textContent = 'IP Copied! Cosmos Ignited';
            copyIpBtn.disabled = true;
        });

        // Audio
        let muted = false;
        const bigBangSound = new Audio('https://labverse.co.za/assets/bigbang.mp3'); // Replace with actual synth sound
        const ambientSound = new Audio('https://labverse.co.za/assets/ambient.mp3'); // Replace with actual ambient track
        ambientSound.loop = true;
        document.getElementById('mute-btn').addEventListener('click', () => {
            muted = !muted;
            if (muted) {
                bigBangSound.pause();
                ambientSound.pause();
            } else {
                ambientSound.play();
            }
            document.getElementById('mute-btn').textContent = muted ? 'Unmute' : 'Mute';
        });

        // Interactivity (Gestures)
        const hammer = new Hammer(renderer.domElement);
        hammer.get('pinch').set({ enable: true });
        hammer.get('pan').set({ direction: Hammer.DIRECTION_ALL });
        hammer.on('pinch', (e) => {
            camera.position.z /= e.scale;
            camera.position.z = Math.max(20, Math.min(100, camera.position.z));
        });
        hammer.on('pan', (e) => {
            particles.forEach(p => {
                p.velocity.x += e.deltaX * 0.001;
                p.velocity.y -= e.deltaY * 0.001;
            });
        });

        // Controls
        document.getElementById('toggle-forces').addEventListener('change', (e) => {
            particles.forEach(p => {
                p.forceParams.gravity = e.target.checked ? 0.01 : 0;
                p.forceParams.electromagnetism = e.target.checked ? 0.02 : 0;
            });
        });
        document.getElementById('trail-glow').addEventListener('input', (e) => {
            trailMaterial.uniforms.glow.value = parseFloat(e.target.value);
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            sparseSpawn();
            particles.forEach(p => p.update());
            // Update trails
            let posIdx = 0, colIdx = 0;
            particles.forEach(p => {
                p.trail.forEach((pos, i) => {
                    trailPositions[posIdx++] = pos.x;
                    trailPositions[posIdx++] = pos.y;
                    trailPositions[posIdx++] = pos.z;
                    const color = new THREE.Color(p.material.color);
                    trailColors[colIdx++] = color.r;
                    trailColors[colIdx++] = color.g;
                    trailColors[colIdx++] = color.b;
                });
            });
            trailGeometry.attributes.position.needsUpdate = true;
            trailGeometry.attributes.color.needsUpdate = true;
            // Parallax stars
            stars.rotation.y += 0.0001;
            renderer.render(scene, camera);
        }
        animate();

        // Resize Handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Cleanup
        window.addEventListener('unload', () => {
            particles.forEach(p => {
                scene.remove(p.mesh);
                p.geometry.dispose();
                p.material.dispose();
            });
            renderer.dispose();
        });

        // GSAP for animations (CDN)
        const gsapScript = document.createElement('script');
        gsapScript.src = 'https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js';
        document.head.appendChild(gsapScript);
    </script>
</body>
</html>
