<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Odyssey</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Orbitron', sans-serif;
            background: radial-gradient(circle, #0a0a2a, #000);
            color: #00ffcc;
            overflow: hidden;
            height: 100vh;
            cursor: crosshair;
        }
        #container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px;
            border-radius: 15px;
            border: 3px solid #00ffcc;
            font-size: 16px;
            z-index: 20;
            box-shadow: 0 0 50px #00ffcc;
            transition: box-shadow 0.5s;
        }
        #hud.glow {
            box-shadow: 0 0 100px #ff00cc;
        }
        #canvasContainer {
            width: 100%;
            height: 100%;
        }
        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 15px;
            z-index: 20;
        }
        button {
            padding: 15px 30px;
            background: linear-gradient(45deg, #00ffcc, #ff00cc, #00ccff);
            border: none;
            border-radius: 10px;
            color: #0a0a2a;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px #ff00cc;
        }
        #log {
            position: absolute;
            right: -420px;
            top: 10px;
            width: 400px;
            height: 600px;
            background: rgba(0, 0, 0, 0.85);
            padding: 20px;
            border-radius: 15px;
            border: 3px solid #ff00cc;
            overflow-y: auto;
            font-size: 14px;
            box-shadow: 0 0 50px #ff00cc;
            transition: right 0.5s;
        }
        #log.visible {
            right: 10px;
        }
        #logToggle {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 30;
            padding: 10px;
            background: #ff00cc;
            color: #0a0a2a;
            border-radius: 5px;
            cursor: pointer;
        }
        #sceneSelector {
            position: absolute;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            z-index: 20;
        }
        #sceneSelector button {
            display: block;
            margin: 10px 0;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        @keyframes bloom {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }
        .blooming {
            animation: bloom 2s forwards;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="container">
        <div id="logToggle">Toggle Log</div>
        <div id="hud">
            Scene: <span id="sceneName">Golden Spiral</span> | Energy: <span id="energy">0</span> | Coherence: <span id="coherence">0</span> | Progress: <span id="progress">0%</span>
        </div>
        <div id="canvasContainer"></div>
        <canvas id="particleCanvas"></canvas>
        <div id="controls">
            <button onclick="interact()">Focus Intent</button>
            <button onclick="nextScene()">Next Scene</button>
            <button onclick="resetJourney()">Reset Journey</button>
        </div>
        <div id="log">
            <h3>Universal Log</h3>
            <div id="logContent"></div>
        </div>
        <div id="sceneSelector">
            <button onclick="setScene(1)">Golden Spiral</button>
            <button onclick="setScene(2)">Seed of Life</button>
            <button onclick="setScene(3)">Flower of Life</button>
            <button onclick="setScene(4)">Quantum Field</button>
            <button onclick="setScene(5)">Torus</button>
        </div>
    </div>

    <script>
        let sceneNum = 1;
        let energy = 0;
        let coherence = 0;
        let progress = 0;
        let angle = 0;
        let mouse = { x: 0, y: 0, clicked: false, clickStrength: 0 };
        let audioContext, oscillator, gainNode;
        let camera, scene3D, renderer, controls;
        let objects = [];
        let particles = [];
        let transitionOpacity = 1;
        let transitioning = false;

        // Initialize Three.js
        function initThreeJS() {
            scene3D = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvasContainer').appendChild(renderer.domElement);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableZoom = true;
            controls.enableRotate = true;
            // Add Lighting
            const ambientLight = new THREE.AmbientLight(0x404040);
            scene3D.add(ambientLight);
            const pointLight = new THREE.PointLight(0xffffff, 1, 100);
            pointLight.position.set(5, 5, 5);
            scene3D.add(pointLight);
            window.addEventListener('resize', () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
            }, false);
        }

        // Particle System (2D Fallback)
        const particleCanvas = document.getElementById('particleCanvas');
        const particleCtx = particleCanvas.getContext('2d');
        function initParticles() {
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = window.innerHeight;
            for (let i = 0; i < 500; i++) {
                particles.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    size: Math.random() * 3 + 1,
                    wave: Math.random() * 2 * Math.PI,
                    opacity: 0.5
                });
            }
            animateParticles();
        }

        function animateParticles() {
            particleCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.wave += 0.05;
                if (p.x < 0 || p.x > particleCanvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > particleCanvas.height) p.vy *= -1;
                const dx = mouse.x - p.x;
                const dy = mouse.y - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 200) {
                    p.vx += dx * 0.02 * (mouse.clicked ? mouse.clickStrength + 1 : 1);
                    p.vy += dy * 0.02 * (mouse.clicked ? mouse.clickStrength + 1 : 1);
                    p.opacity = Math.min(p.opacity + 0.01, 1);
                } else {
                    p.opacity = Math.max(p.opacity - 0.01, 0.5);
                }
                particleCtx.beginPath();
                particleCtx.arc(p.x, p.y, p.size, 0, 2 * Math.PI);
                particleCtx.fillStyle = `rgba(0, 255, 204, ${p.opacity})`;
                particleCtx.fill();
            });
            requestAnimationFrame(animateParticles);
        }

        // Audio Setup
        function initAudio(frequency) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioContext.createOscillator();
            gainNode = audioContext.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.value = frequency;
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.start();
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
        }

        function stopAudio() {
            if (oscillator) oscillator.stop();
            if (audioContext) audioContext.close();
        }

        function updateAudio() {
            if (gainNode) {
                gainNode.gain.setValueAtTime(0.1 + (coherence / 1000), audioContext.currentTime);
                oscillator.frequency.setValueAtTime(528 + (energy / 100), audioContext.currentTime);
            }
        }

        // Scene Management with Transitions
        function setScene(newScene) {
            if (transitioning) return;
            transitioning = true;
            transitionOpacity = 1;
            stopAudio();
            sceneNum = newScene;
            scene3D.clear();
            objects = [];
            const transition = setInterval(() => {
                transitionOpacity -= 0.05;
                if (transitionOpacity <= 0) {
                    clearInterval(transition);
                    initScene();
                    const fadeIn = setInterval(() => {
                        transitionOpacity += 0.05;
                        if (transitionOpacity >= 1) {
                            clearInterval(fadeIn);
                            transitioning = false;
                        }
                    }, 50);
                }
            }, 50);
            updateHUD();
        }

        function nextScene() {
            setScene((sceneNum % 5) + 1);
        }

        // Scene 1: Golden Spiral - Genesis
        function initScene1() {
            initAudio(528); // Solfeggio 528Hz
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            let phi = (1 + Math.sqrt(5)) / 2;
            let r = 0.1, a = 0;
            for (let i = 0; i < 1000; i++) {
                a += 0.1;
                r = 0.1 * Math.pow(phi, a / (Math.PI / 2));
                const x = r * Math.cos(a + angle);
                const y = r * Math.sin(a + angle);
                positions.push(x, y, 0);
                if (i % 10 === 0) {
                    const flower = new THREE.CircleGeometry(0.05 * (coherence / 100 + 1), 32);
                    const material = new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0 });
                    const mesh = new THREE.Mesh(flower, material);
                    mesh.position.set(x, y, 0);
                    mesh.userData = { opacity: 0 };
                    mesh.className = 'blooming';
                    scene3D.add(mesh);
                    objects.push(mesh);
                }
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            const material = new THREE.LineBasicMaterial({ color: 0x00ffcc });
            const line = new THREE.Line(geometry, material);
            scene3D.add(line);
            objects.push(line);
            // Cosmic Pulses
            const pulseGeometry = new THREE.SphereGeometry(0.1, 32, 32);
            const pulseMaterial = new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.5 });
            const pulse = new THREE.Mesh(pulseGeometry, pulseMaterial);
            pulse.position.set(0, 0, 0);
            pulse.userData = { scale: 1 };
            scene3D.add(pulse);
            objects.push(pulse);
            // 3D Particles
            for (let i = 0; i < 100; i++) {
                const particle = new THREE.SphereGeometry(0.02, 8, 8);
                const particleMaterial = new THREE.MeshBasicMaterial({ color: 0x00ccff });
                const particleMesh = new THREE.Mesh(particle, particleMaterial);
                particleMesh.position.set((Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10);
                particleMesh.userData = { vx: (Math.random() - 0.5) * 0.1, vy: (Math.random() - 0.5) * 0.1, vz: (Math.random() - 0.5) * 0.1 };
                scene3D.add(particleMesh);
                objects.push(particleMesh);
            }
        }

        // Scene 2: Seed of Life - Formation
        function initScene2() {
            initAudio(432); // 432Hz
            const sphereGeometry = new THREE.SphereGeometry(0.5, 32, 32);
            const material = new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true, transparent: true, opacity: 0 });
            for (let i = 0; i < 7; i++) {
                const sphere = new THREE.Mesh(sphereGeometry, material);
                const a = (2 * Math.PI / 6) * i + angle;
                sphere.position.set(Math.cos(a), Math.sin(a), 0).multiplyScalar(1.5);
                sphere.userData = { opacity: 0 };
                sphere.className = 'blooming';
                scene3D.add(sphere);
                objects.push(sphere);
                // Metatron’s Cube
                if (i > 0) {
                    const line = new THREE.Line(
                        new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), sphere.position]),
                        new THREE.LineBasicMaterial({ color: 0xff00cc, transparent: true, opacity: 0 })
                    );
                    line.userData = { opacity: 0 };
                    line.className = 'blooming';
                    scene3D.add(line);
                    objects.push(line);
                }
            }
            // Light Flow
            const light = new THREE.PointLight(0xff00cc, 1, 100);
            light.position.set(0, 0, 0);
            light.userData = { intensity: 1 };
            scene3D.add(light);
            objects.push(light);
            // 3D Particles
            for (let i = 0; i < 50; i++) {
                const particle = new THREE.SphereGeometry(0.03, 8, 8);
                const particleMaterial = new THREE.MeshBasicMaterial({ color: 0xffd700 });
                const particleMesh = new THREE.Mesh(particle, particleMaterial);
                particleMesh.position.set((Math.random() - 0.5) * 5, (Math.random() - 0.5) * 5, (Math.random() - 0.5) * 5);
                particleMesh.userData = { vx: (Math.random() - 0.5) * 0.05, vy: (Math.random() - 0.5) * 0.05, vz: (Math.random() - 0.5) * 0.05 };
                scene3D.add(particleMesh);
                objects.push(particleMesh);
            }
        }

        // Scene 3: Flower of Life - Cosmic Blueprint
        function initScene3() {
            initAudio(432); // Pythagorean tuning
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const cx = 0, cy = 0;
            for (let i = 0; i < 19; i++) {
                const r = i < 7 ? 1 : (i < 13 ? 2 : 3);
                const a = (2 * Math.PI / (i < 7 ? 6 : i < 13 ? 12 : 18)) * (i % (i < 7 ? 6 : i < 13 ? 12 : 18)) + angle;
                const x = cx + r * Math.cos(a);
                const y = cy + r * Math.sin(a);
                positions.push(x, y, 0);
                const circle = new THREE.CircleGeometry(0.5, 32);
                const material = new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0 });
                const mesh = new THREE.Mesh(circle, material);
                mesh.position.set(x, y, 0);
                mesh.userData = { opacity: 0 };
                mesh.className = 'blooming';
                scene3D.add(mesh);
                objects.push(mesh);
            }
            // Torus Field
            const torusGeometry = new THREE.TorusGeometry(2, 0.5, 16, 100);
            const torusMaterial = new THREE.MeshBasicMaterial({ color: 0x00ccff, wireframe: true, transparent: true, opacity: 0 });
            const torus = new THREE.Mesh(torusGeometry, torusMaterial);
            torus.userData = { opacity: 0 };
            torus.className = 'blooming';
            scene3D.add(torus);
            objects.push(torus);
            // 3D Particles
            for (let i = 0; i < 80; i++) {
                const particle = new THREE.SphereGeometry(0.02, 8, 8);
                const particleMaterial = new THREE.MeshBasicMaterial({ color: 0x00ffcc });
                const particleMesh = new THREE.Mesh(particle, particleMaterial);
                particleMesh.position.set((Math.random() - 0.5) * 8, (Math.random() - 0.5) * 8, (Math.random() - 0.5) * 8);
                particleMesh.userData = { vx: (Math.random() - 0.5) * 0.07, vy: (Math.random() - 0.5) * 0.07, vz: (Math.random() - 0.5) * 0.07 };
                scene3D.add(particleMesh);
                objects.push(particleMesh);
            }
        }

        // Scene 4: Quantum Field - Void of Potential
        function initScene4() {
            initAudio(0); // White noise
            for (let i = 0; i < 200; i++) {
                const geometry = new THREE.SphereGeometry(0.05, 8, 8);
                const material = new THREE.MeshBasicMaterial({ color: 0xff00cc, transparent: true, opacity: 0 });
                const sphere = new THREE.Mesh(geometry, material);
                sphere.position.set((Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10);
                sphere.userData = { opacity: 0, vx: (Math.random() - 0.5) * 0.1, vy: (Math.random() - 0.5) * 0.1, vz: (Math.random() - 0.5) * 0.1 };
                sphere.className = 'blooming';
                scene3D.add(sphere);
                objects.push(sphere);
            }
            // Fractal Patterns
            const fractalGeometry = new THREE.BufferGeometry();
            const fractalPositions = [];
            for (let i = 0; i < 1000; i++) {
                const x = Math.sin(i + angle) * Math.cos(i * 0.5);
                const y = Math.cos(i + angle) * Math.sin(i * 0.5);
                fractalPositions.push(x, y, 0);
            }
            fractalGeometry.setAttribute('position', new THREE.Float32BufferAttribute(fractalPositions, 3));
            const fractalMaterial = new THREE.LineBasicMaterial({ color: 0x00ccff, transparent: true, opacity: 0 });
            const fractalLine = new THREE.Line(fractalGeometry, fractalMaterial);
            fractalLine.userData = { opacity: 0 };
            fractalLine.className = 'blooming';
            scene3D.add(fractalLine);
            objects.push(fractalLine);
            // 3D Particles
            for (let i = 0; i < 100; i++) {
                const particle = new THREE.SphereGeometry(0.03, 8, 8);
                const particleMaterial = new THREE.MeshBasicMaterial({ color: 0xffd700 });
                const particleMesh = new THREE.Mesh(particle, particleMaterial);
                particleMesh.position.set((Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10);
                particleMesh.userData = { vx: (Math.random() - 0.5) * 0.1, vy: (Math.random() - 0.5) * 0.1, vz: (Math.random() - 0.5) * 0.1 };
                scene3D.add(particleMesh);
                objects.push(particleMesh);
            }
        }

        // Scene 5: Torus - Infinite Flow
        function initScene5() {
            initAudio(963); // 963Hz
            const torusGeometry = new THREE.TorusGeometry(2, 0.5, 16, 100);
            const torusMaterial = new THREE.MeshBasicMaterial({ color: 0xff00cc, wireframe: true, transparent: true, opacity: 0 });
            const torus = new THREE.Mesh(torusGeometry, torusMaterial);
            torus.userData = { opacity: 0 };
            torus.className = 'blooming';
            scene3D.add(torus);
            objects.push(torus);
            // Energy Flows
            const curve = new THREE.CatmullRomCurve3([
                new THREE.Vector3(0, 0, 0),
                new THREE.Vector3(1, 1, 0),
                new THREE.Vector3(0, 2, 0),
                new THREE.Vector3(-1, 1, 0),
                new THREE.Vector3(0, 0, 0)
            ]);
            const tubeGeometry = new THREE.TubeGeometry(curve, 64, 0.1, 8, false);
            const tubeMaterial = new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0 });
            const tube = new THREE.Mesh(tubeGeometry, tubeMaterial);
            tube.userData = { opacity: 0 };
            tube.className = 'blooming';
            scene3D.add(tube);
            objects.push(tube);
            // 3D Particles
            for (let i = 0; i < 120; i++) {
                const particle = new THREE.SphereGeometry(0.02, 8, 8);
                const particleMaterial = new THREE.MeshBasicMaterial({ color: 0x00ffcc });
                const particleMesh = new THREE.Mesh(particle, particleMaterial);
                particleMesh.position.set((Math.random() - 0.5) * 6, (Math.random() - 0.5) * 6, (Math.random() - 0.5) * 6);
                particleMesh.userData = { vx: (Math.random() - 0.5) * 0.08, vy: (Math.random() - 0.5) * 0.08, vz: (Math.random() - 0.5) * 0.08 };
                scene3D.add(particleMesh);
                objects.push(particleMesh);
            }
        }

        // Initialize Scene
        function initScene() {
            switch (sceneNum) {
                case 1: initScene1(); break;
                case 2: initScene2(); break;
                case 3: initScene3(); break;
                case 4: initScene4(); break;
                case 5: initScene5(); break;
            }
            camera.position.set(0, 0, 5);
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            angle += 0.01 + (energy / 10000);
            controls.update();
            objects.forEach(obj => {
                if (obj.userData.opacity !== undefined) {
                    obj.material.opacity = transitionOpacity * (obj.userData.opacity + (coherence / 1000));
                }
                if (obj.userData.scale) {
                    obj.scale.setScalar(obj.userData.scale * (1 + Math.sin(Date.now() / 500) * 0.1));
                }
                if (obj.userData.intensity) {
                    obj.intensity = obj.userData.intensity * (1 + (energy / 5000));
                }
                if (obj.userData.vx) {
                    obj.position.x += obj.userData.vx;
                    obj.position.y += obj.userData.vy;
                    obj.position.z += obj.userData.vz;
                    const dist = obj.position.length();
                    if (dist > 10) {
                        obj.position.setLength(10);
                        obj.userData.vx *= -1;
                        obj.userData.vy *= -1;
                        obj.userData.vz *= -1;
                    }
                    const dx = mouse.x - (window.innerWidth / 2 + obj.position.x * 50);
                    const dy = mouse.y - (window.innerHeight / 2 + obj.position.y * 50);
                    const distMouse = Math.sqrt(dx * dx + dy * dy);
                    if (distMouse < 200) {
                        obj.userData.vx += dx * 0.0001 * (mouse.clicked ? mouse.clickStrength + 1 : 1);
                        obj.userData.vy += dy * 0.0001 * (mouse.clicked ? mouse.clickStrength + 1 : 1);
                    }
                }
                if (obj.rotation) {
                    obj.rotation.x += 0.01 * (mouse.x / window.innerWidth);
                    obj.rotation.y += 0.01 * (mouse.y / window.innerHeight);
                }
            });
            renderer.render(scene3D, camera);
            updateEnergy();
            updateAudio();
            updateHUD();
        }

        // Mouse Interaction
        let lastClickTime = 0;
        renderer.domElement.addEventListener('mousemove', (e) => {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
            energy += Math.sin(distToCenter(mouse.x, mouse.y) / 100) * 0.5;
            angle += (mouse.x - rect.width / 2) / 10000;
            objects.forEach(obj => {
                if (obj.rotation) {
                    obj.rotation.x = (mouse.y - rect.height / 2) / 1000;
                    obj.rotation.y = (mouse.x - rect.width / 2) / 1000;
                }
            });
        }, { passive: true });

        renderer.domElement.addEventListener('mousedown', (e) => {
            mouse.clicked = true;
            const now = Date.now();
            mouse.clickStrength = Math.min((now - lastClickTime) / 1000, 5);
            lastClickTime = now;
            const log = document.getElementById('logContent');
            log.innerHTML += `<p>Intent Focused at (${mouse.x}, ${mouse.y}) - Strength: ${mouse.clickStrength.toFixed(2)}</p>`;
            energy += 100 * mouse.clickStrength;
            coherence += mouse.clickStrength * 10;
        });

        renderer.domElement.addEventListener('mouseup', () => {
            mouse.clicked = false;
        });

        renderer.domElement.addEventListener('wheel', (e) => {
            e.preventDefault();
            camera.position.z += e.deltaY * 0.01;
            camera.updateProjectionMatrix();
        }, { passive: false });

        function distToCenter(x, y) {
            const rect = renderer.domElement.getBoundingClientRect();
            const cx = rect.width / 2;
            const cy = rect.height / 2;
            return Math.sqrt((x - cx) * (x - cx) + (y - cy) * (y - cy));
        }

        // User Interaction
        function interact() {
            energy += 100;
            coherence += Math.random() * 20;
            const log = document.getElementById('logContent');
            log.innerHTML += `<p>Amplified Intent - Energy: +100, Coherence: +${Math.floor(Math.random() * 20)}</p>`;
            if (energy > 5000 && coherence > 200) progress += 1;
            updateHUD();
        }

        function resetJourney() {
            energy = 0;
            coherence = 0;
            progress = 0;
            document.getElementById('logContent').innerHTML = '<h3>Universal Log</h3>';
            setScene(1);
        }

        function updateEnergy() {
            switch (sceneNum) {
                case 1:
                    energy += 0.1 * Math.pow((1 + Math.sqrt(5)) / 2, 0.01) * (coherence / 100 + 1); // Fibonacci growth
                    break;
                case 2:
                    energy += (4 / 3 * Math.PI * Math.pow(0.5, 3)) * (mouse.clickStrength + 1); // Sphere volume
                    break;
                case 3:
                    energy += Math.PI * Math.pow(0.5, 2) * (energy / 1000 + 1); // Circle area
                    break;
                case 4:
                    energy += 6.626e-34 * (coherence / 100 + 1); // Planck’s constant
                    break;
                case 5:
                    energy += Math.pow(1, 2) * 1 * (progress / 100 + 1); // Torus energy flow
                    break;
            }
            if (progress > 95 && energy > 10000) {
                const log = document.getElementById('logContent');
                log.innerHTML += '<p>Consciousness-Driven Singularity Achieved! Universal Law Discovered!</p>';
                alert('You’ve unlocked a new reality! Share with the world!');
            }
        }

        function updateHUD() {
            document.getElementById('sceneName').textContent = ['Golden Spiral', 'Seed of Life', 'Flower of Life', 'Quantum Field', 'Torus'][sceneNum - 1];
            document.getElementById('energy').textContent = Math.floor(energy);
            document.getElementById('coherence').textContent = Math.floor(coherence);
            document.getElementById('progress').textContent = Math.min(progress, 100).toFixed(1) + '%';
            document.getElementById('hud').classList.toggle('glow', energy > 5000);
        }

        // Log Toggle
        document.getElementById('logToggle').addEventListener('click', () => {
            document.getElementById('log').classList.toggle('visible');
        });

        // Start
        initThreeJS();
        initParticles();
        setScene(1);
        animate();
    </script>
</body>
</html>
