<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate 5MB Test File</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        button:hover {
            background-color: #45a049;
        }
        .note {
            background-color: #f8f9fa;
            border-left: 4px solid #2196F3;
            padding: 10px 15px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>Generate 5MB Test File</h1>
    
    <p>Click the button below to generate and download a 5MB binary file for your speed test.</p>
    
    <div class="note">
        <p><strong>Note:</strong> After downloading, place this file in your repository's <code>/assets/</code> directory with the name <code>download-test.bin</code>.</p>
    </div>
    
    <button id="generate">Generate and Download 5MB File</button>
    
    <script>
        document.getElementById('generate').addEventListener('click', function() {
            // Create a 5MB array of random bytes
            const SIZE = 5 * 1024 * 1024; // 5MB
            const data = new Uint8Array(SIZE);
            
            // Fill with random data
            for (let i = 0; i < SIZE; i++) {
                data[i] = Math.floor(Math.random() * 256);
            }
            
            // Create blob and download link
            const blob = new Blob([data], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'download-test.bin';
            document.body.appendChild(a);
            a.click();
            
            // Clean up
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
        });
    </script>
</body>
</html>
