<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Labverse Speed Test - Check your IP and network speed with stunning cinematic visuals.">
  <meta property="og:title" content="Labverse Speed Test">
  <meta property="og:description" content="Test your network speed with mesmerizing WebGL animations!">
  <meta property="og:image" content="https://labverse.co.za/og-image.png">
  <meta property="og:url" content="https://labverse.co.za">
  <meta name="twitter:card" content="summary_large_image">
  <title>Labverse Speed Test</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Exo+2:wght@400;700&display=swap"/>
  <style>
    :root {
      --neon-blue: #00b7eb;
      --neon-magenta: #ff00cc;
      --neon-cyan: #00ffff;
      --dark-bg: #0a0a23;
      --card-bg: rgba(17, 17, 17, 0.9);
      --text-color: #fff;
      --glow-radius: 12px;
    }

    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: var(--dark-bg);
      color: var(--text-color);
      overflow-x: hidden;
      overflow-y: auto;
    }

    #vanta-bg {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      z-index: -1;
    }

    .header {
      text-align: center;
      font-size: 3em;
      color: var(--neon-cyan);
      margin-top: 40px;
      text-shadow: 0 0 15px var(--neon-cyan);
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 15px var(--neon-cyan); }
      to { text-shadow: 0 0 30px var(--neon-magenta); }
    }

    .info-box {
      margin: 30px auto;
      width: 90%;
      max-width: 400px;
      background-color: var(--card-bg);
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 0 10px var(--neon-blue);
      text-align: center;
      font-family: 'Exo 2', sans-serif;
      font-size: 1em;
    }

    .ip-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .ip-container span {
      background: #1a1a3d;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--neon-blue);
      box-shadow: 0 0 10px var(--neon-blue);
    }

    .button {
      margin-top: 10px;
      padding: 10px 20px;
      background: var(--neon-blue);
      color: var(--text-color);
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      text-transform: uppercase;
      box-shadow: 0 0 var(--glow-radius) var(--neon-blue);
      transition: all 0.3s ease;
    }

    .button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px var(--neon-magenta);
      background: linear-gradient(45deg, var(--neon-magenta), var(--neon-blue));
    }

    #speedResults {
      margin: 20px auto;
      width: 90%;
      max-width: 800px;
      padding: 20px;
      border-radius: 15px;
      background-color: var(--card-bg);
      box-shadow: 0 0 15px var(--neon-magenta);
      position: relative;
    }

    .iframe-container {
      position: relative;
      width: 100%;
      height: 400px;
      border-radius: 10px;
      overflow: hidden;
    }

    .iframe-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 10, 35, 0.8); /* Dark semi-transparent overlay */
      z-index: 1;
      pointer-events: none; /* Allows interaction with iframe */
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 10px;
      filter: brightness(0.9) contrast(1.1); /* Adjust iframe appearance */
      mix-blend-mode: screen; /* Blend iframe with dark background */
      position: relative;
      z-index: 0;
    }

    .graph-container {
      margin: 1rem 0;
      position: relative;
      width: 100%;
      height: 250px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--neon-blue);
      border-radius: 8px;
      overflow: hidden;
      display: none; /* Hidden until test starts */
    }

    #speed-graph {
      width: 100%;
      height: 100%;
    }

    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.9rem;
      color: var(--text-color);
      text-shadow: 0 0 5px var(--neon-cyan);
      margin-top: 2rem;
    }

    footer a {
      color: var(--neon-cyan);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .header { font-size: 2em; }
      .info-box { width: 90%; padding: 15px; }
      .iframe-container { height: 350px; }
      .graph-container { height: 150px; }
    }

    @media (max-width: 480px) {
      .header { font-size: 1.5em; }
      .ip-container { flex-direction: column; gap: 0.5rem; }
      .iframe-container { height: 300px; }
    }
  </style>
</head>
<body>
  <div id="vanta-bg"></div>

  <div class="header">Labverse Speed Test</div>

  <div class="info-box">
    <div class="ip-container">
      <p><strong>Your IP:</strong> <span id="ip">Loading...</span></p>
      <button class="button" id="copy-ip-btn" aria-label="Copy IP address">Copy IP</button>
    </div>
    <p><strong>ISP:</strong> <span id="isp">Loading...</span></p>
    <p><strong>Location:</strong> <span id="loc">Loading...</span></p>
    <button class="button" id="run-speed-test" onclick="runSpeedTest()">Run Speed Test</button>
  </div>

  <div id="speedResults">
    <div class="graph-container" id="graph-container">
      <canvas id="speed-graph" aria-label="Live speed graph"></canvas>
    </div>
    <div class="iframe-container">
      <iframe id="speedFrame" src=""></iframe>
    </div>
  </div>

  <footer>
    © 2025 Labverse | Powered by <a href="https://onefar.co.za" target="_blank" rel="noopener">onefar.co.za (1FAR)</a>
  </footer>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
  <script>
    // Initialize Vanta.js background
    VANTA.NET({
      el: "#vanta-bg",
      mouseControls: true,
      touchControls: true,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 1.00,
      scaleMobile: 1.00,
      color: 0x00ffff,
      backgroundColor: 0x0a0a23
    });

    // Utility Functions
    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).catch(() => {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
      });
    }

    // Get IP and Geo Info
    fetch("https://ipapi.co/json/")
      .then(res => res.json())
      .then(data => {
        document.getElementById("ip").textContent = data.ip;
        document.getElementById("isp").textContent = data.org || "Unavailable";
        document.getElementById("loc").textContent = `${data.city}, ${data.region}, ${data.country_name}`;
      })
      .catch(() => {
        document.getElementById("ip").textContent = "Error";
        document.getElementById("isp").textContent = "Error";
        document.getElementById("loc").textContent = "Error";
      });

    // Copy IP Button
    document.getElementById('copy-ip-btn').addEventListener('click', () => {
      const ip = document.getElementById('ip').textContent;
      if (ip !== 'Loading...' && ip !== 'Error') {
        copyToClipboard(ip);
        alert('IP copied to clipboard!');
      }
    });

    // Graph Functions
    function initializeGraph() {
      const canvas = document.getElementById('speed-graph');
      const ctx = canvas.getContext('2d');
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;

      const maxSpeed = 100; // Max Mbps on Y-axis
      const downloadData = [];
      const uploadData = [];

      function drawGraph() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw axes
        ctx.strokeStyle = 'rgba(0, 183, 235, 0.5)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(30, 10);
        ctx.lineTo(30, canvas.height - 20);
        ctx.lineTo(canvas.width - 10, canvas.height - 20);
        ctx.stroke();

        // Draw Y-axis labels (white, static MB values)
        ctx.fillStyle = '#ffffff';
        ctx.font = '12px Exo 2';
        ctx.textAlign = 'right';
        for (let i = 0; i <= 5; i++) {
          const y = canvas.height - 20 - (i * (canvas.height - 40) / 5);
          const speed = (i * maxSpeed / 5).toFixed(0);
          ctx.fillText(speed, 25, y + 4);
        }
        ctx.fillText('Mbps', 25, 15);

        // Draw smooth lines with neon colors
        const drawLine = (data, color) => {
          if (data.length < 2) return;
          ctx.strokeStyle = color;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.lineJoin = 'round';
          ctx.lineCap = 'round';
          data.forEach((speed, i) => {
            const x = 30 + (i / (data.length - 1)) * (canvas.width - 40);
            const y = canvas.height - 20 - (speed / maxSpeed) * (canvas.height - 40);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          });
          ctx.stroke();
          // Add glow effect
          ctx.shadowColor = color;
          ctx.shadowBlur = 10;
          ctx.stroke();
          ctx.shadowBlur = 0;
        };

        drawLine(downloadData, '#00b7eb'); // Neon blue for download
        drawLine(uploadData, '#ff00cc'); // Neon magenta for upload
      }

      return {
        addDownloadSpeed(speed) {
          downloadData.push(Math.min(speed, maxSpeed));
          if (downloadData.length > canvas.width / 5) downloadData.shift();
          drawGraph();
        },
        addUploadSpeed(speed) {
          uploadData.push(Math.min(speed, maxSpeed));
          if (uploadData.length > canvas.width / 5) uploadData.shift();
          drawGraph();
        },
        reset() {
          downloadData.length = 0;
          uploadData.length = 0;
          drawGraph();
        },
        animateSimulatedSpeeds() {
          this.reset();
          let time = 0;
          const duration = 10000; // 10 seconds to match typical speed test duration
          const maxDownload = 100; // Max simulated download speed (Mbps)
          const maxUpload = 50;   // Max simulated upload speed (Mbps)

          const interval = setInterval(() => {
            time += 100;
            if (time > duration) {
              clearInterval(interval);
              return;
            }

            // Simulate download speed (ramping up, then stabilizing)
            const downloadProgress = Math.min(time / (duration / 2), 1);
            const downloadSpeed = maxDownload * downloadProgress * (0.8 + Math.random() * 0.4);
            this.addDownloadSpeed(downloadSpeed);

            // Simulate upload speed (starts after 5 seconds)
            if (time > duration / 2) {
              const uploadProgress = Math.min((time - duration / 2) / (duration / 2), 1);
              const uploadSpeed = maxUpload * uploadProgress * (0.8 + Math.random() * 0.4);
              this.addUploadSpeed(uploadSpeed);
            }
          }, 100);
        }
      };
    }

    // Speed Test Function
    const graph = initializeGraph();
    function runSpeedTest() {
      const iframe = document.getElementById('speedFrame');
      const graphContainer = document.getElementById('graph-container');
      const button = document.getElementById('run-speed-test');

      // Toggle test state
      if (iframe.src) {
        iframe.src = '';
        graphContainer.style.display = 'none';
        button.textContent = 'Run Speed Test';
      } else {
        iframe.src = 'https://speed.cloudflare.com';
        graphContainer.style.display = 'block';
        button.textContent = 'Stop Test';
        graph.animateSimulatedSpeeds(); // Animate the graph during the test
      }
    }
  </script>
</body>
</html>
