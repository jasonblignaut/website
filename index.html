<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Discover your public IP and internet speed with a glowing LED cube and sacred Flower of Life animations.">
  <meta name="keywords" content="Public IP, Internet Speed Test, Flower of Life, Fibonacci, Quantum Physics">
  <meta name="author" content="Labverse Team">
  <meta property="og:title" content="Labverse: IP & Speed Insights">
  <meta property="og:description" content="Explore your network with a vibrant LED cube and precise sacred geometry.">
  <meta property="og:image" content="https://labverse.co.za/assets/labverse-og-image.png">
  <meta property="og:url" content="https://labverse.co.za">
  <meta name="twitter:card" content="summary_large_image">

  <title>Labverse: IP & Speed Insights</title>

  <!-- Favicon -->
  <link rel="icon" href="favicon.ico">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">

  <!-- Style -->
  <style>
    :root {
      --cosmic-blue: #00b7eb;
      --cosmic-magenta: #ff4d94;
      --cosmic-cyan: #4dffeb;
      --cosmic-purple: #cc66ff;
      --cosmic-gold: #ffb700;
      --light-aura: #e6f0ff;
      --glow-radius: 10px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Source Code Pro', monospace;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: #000;
      color: var(--light-aura);
      overflow: hidden;
      touch-action: none;
    }

    #background-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    #webgl-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: clamp(1rem, 3vw, 1.5rem);
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      text-transform: uppercase;
      color: var(--light-aura);
      margin-bottom: clamp(1rem, 2.5vw, 1.5rem);
      text-shadow: 0 0 8px var(--cosmic-blue);
      letter-spacing: 0.15rem;
      animation: pulse-glow 4s infinite alternate;
    }

    @keyframes pulse-glow {
      0% { text-shadow: 0 0 8px var(--cosmic-blue); }
      50% { text-shadow: 0 0 15px var(--cosmic-magenta); }
      100% { text-shadow: 0 0 12px var(--cosmic-cyan); }
    }

    .ip-display {
      font-size: clamp(1.5rem, 3.5vw, 2.5rem);
      color: var(--light-aura);
      background: rgba(8, 8, 26, 0.9);
      padding: clamp(0.8rem, 2vw, 1rem) clamp(1.5rem, 3vw, 2rem);
      border-radius: 10px;
      border: 2px solid var(--cosmic-blue);
      box-shadow: 0 0 15px var(--cosmic-blue);
      margin-bottom: clamp(0.5rem, 1.5vw, 0.8rem);
      text-shadow: 0 0 8px var(--cosmic-blue);
      word-break: break-all;
      position: relative;
      overflow: hidden;
    }

    .ip-display::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at center, rgba(77, 255, 235, 0.2) 0%, rgba(0, 0, 0, 0) 70%);
      animation: ripple 5s infinite ease-in-out;
      pointer-events: none;
    }

    @keyframes ripple {
      0% { transform: scale(0.5); opacity: 0.5; }
      50% { transform: scale(1); opacity: 0.2; }
      100% { transform: scale(0.5); opacity: 0.5; }
    }

    .network-info {
      font-size: clamp(0.8rem, 1.8vw, 1.1rem);
      color: var(--light-aura);
      max-width: clamp(200px, 80vw, 400px);
      line-height: 1.5;
      text-shadow: 0 0 5px var(--cosmic-blue);
      margin-bottom: clamp(0.5rem, 1vw, 0.8rem);
      position: relative;
    }

    .network-info::before {
      content: '⚡';
      margin-right: 0.5rem;
      color: var(--cosmic-gold);
      text-shadow: 0 0 5px var(--cosmic-gold);
    }

    .speed-results {
      font-size: clamp(0.7rem, 1.5vw, 0.9rem);
      color: var(--cosmic-cyan);
      max-width: clamp(200px, 80vw, 400px);
      line-height: 1.5;
      text-shadow: 0 0 5px var(--cosmic-cyan);
      margin-bottom: clamp(0.5rem, 1vw, 0.8rem);
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .speed-results.show {
      opacity: 1;
    }

    .speed-test-container {
      text-align: center;
      margin-bottom: clamp(0.5rem, 1vw, 0.8rem);
      width: 100%;
      max-width: 600px;
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 15px var(--cosmic-purple);
    }

    .speed-test-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.7) 100%);
    }

    .speed-test-container div {
      min-height: 180px;
      position: relative;
      width: 100%;
      height: 0;
      padding-bottom: 50%;
    }

    .speed-test-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      min-height: 180px;
      border: none;
      overflow: hidden !important;
      filter: hue-rotate(40deg) brightness(0.9);
    }

    .speed-test-attribution {
      font-size: clamp(0.6rem, 1.2vw, 0.8rem);
      color: var(--cosmic-cyan);
      text-shadow: 0 0 5px var(--cosmic-cyan);
    }

    .speed-test-attribution a {
      color: var(--cosmic-cyan);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .speed-test-attribution a:hover {
      color: var(--cosmic-magenta);
      text-shadow: 0 0 8px var(--cosmic-magenta);
    }

    .error-message {
      font-size: clamp(0.7rem, 1.5vw, 0.9rem);
      color: #ff5555;
      margin-top: 1rem;
      text-shadow: 0 0 5px var(--cosmic-blue);
      display: none;
    }

    .btn {
      background: linear-gradient(90deg, var(--cosmic-blue), var(--cosmic-magenta));
      color: var(--light-aura);
      border: none;
      padding: clamp(0.6rem, 1.5vw, 0.8rem) clamp(1.5rem, 3vw, 2rem);
      border-radius: 8px;
      cursor: pointer;
      font-size: clamp(0.8rem, 1.5vw, 1rem);
      text-transform: uppercase;
      box-shadow: 0 0 var(--glow-radius) var(--cosmic-blue);
      transition: all 0.3s ease;
      margin-top: clamp(0.5rem, 1vw, 0.8rem);
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.2) 0%, rgba(0, 0, 0, 0) 70%);
      transform: scale(0);
      opacity: 0;
      transition: transform 0.5s, opacity 0.5s;
      pointer-events: none;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 calc(var(--glow-radius) * 1.5) var(--cosmic-magenta);
      background: linear-gradient(90deg, var(--cosmic-magenta), var(--cosmic-cyan));
    }

    .btn:hover::before {
      transform: scale(1);
      opacity: 1;
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: clamp(0.5rem, 1.5vw, 1rem);
      text-align: center;
      font-size: clamp(0.7rem, 1.5vw, 0.9rem);
      color: var(--light-aura);
      z-index: 10;
      text-shadow: 0 0 5px var(--cosmic-blue);
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
    }

    @media (max-width: 768px) {
      .container {
        padding: clamp(0.5rem, 2vw, 1rem);
      }

      h1 {
        font-size: clamp(1.5rem, 4vw, 2.5rem);
      }

      .ip-display {
        font-size: clamp(1.2rem, 3vw, 2rem);
        padding: clamp(0.5rem, 1.5vw, 0.8rem) clamp(1rem, 2vw, 1.5rem);
      }

      .network-info, .speed-results, .error-message {
        font-size: clamp(0.6rem, 1.2vw, 0.9rem);
        max-width: 90vw;
      }

      .speed-test-container div {
        min-height: 150px;
      }

      .speed-test-container iframe {
        min-height: 150px;
      }

      .btn {
        padding: clamp(0.4rem, 1vw, 0.6rem) clamp(1rem, 2vw, 1.5rem);
        font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: clamp(1.2rem, 3.5vw, 2rem);
      }

      .ip-display {
        font-size: clamp(1rem, 2.5vw, 1.5rem);
      }

      .network-info, .speed-results, .error-message {
        font-size: clamp(0.5rem, 1vw, 0.8rem);
      }

      .speed-test-container div {
        min-height: 120px;
      }

      .speed-test-container iframe {
        min-height: 120px;
      }
    }

    /* CSS to hide OpenSpeedTest logo */
    .speed-test-container iframe {
      margin-top: -40px; /* Push content up to hide top bar */
    }

    /* Custom CSS loader for initial loading */
    .quantum-loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80px;
      height: 80px;
      z-index: 20;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .quantum-loader .dot {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--cosmic-cyan);
      animation: quantum-spin 3s linear infinite;
    }

    @keyframes quantum-spin {
      0% { 
        transform: rotate(0deg) translateX(20px) rotate(0deg);
        background-color: var(--cosmic-cyan);
      }
      33% { 
        background-color: var(--cosmic-purple);
      }
      66% { 
        background-color: var(--cosmic-magenta);
      }
      100% { 
        transform: rotate(360deg) translateX(20px) rotate(-360deg); 
        background-color: var(--cosmic-cyan);
      }
    }
  </style>
</head>

<body>
  <canvas id="background-canvas"></canvas>
  <canvas id="webgl-canvas"></canvas>

  <div class="container">
    <h1>Labverse: Network Insights</h1>
    <div class="ip-display" id="ip-display">Fetching IP...</div>
    <div class="network-info" id="network-info">Fetching network info...</div>
    <div class="speed-test-container">
      <div>
        <iframe id="speedtest-frame" src="https://openspeedtest.com/speedtest?start=true" allowfullscreen></iframe>
        <div class="speed-test-overlay"></div>
        <div class="quantum-loader" id="quantum-loader">
          <!-- Dots will be generated by JS -->
        </div>
      </div>
      <div class="speed-test-attribution">Powered by <a href="https://labverse.co.za" target="_blank">Labverse SpeedTest</a></div>
    </div>
    <div class="error-message" id="error-message">Animations failed. Please check your browser settings.</div>
    <button class="btn" id="copy-ip-btn">Copy IP</button>
  </div>

  <footer>
    © 2025 Labverse | Powered by 1FAR | WHAT IS MY IP ADDRESS
  </footer>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // Constants for mathematical patterns
    const PHI = (1 + Math.sqrt(5)) / 2; // Golden ratio
    const TAU = Math.PI * 2;            // Full circle in radians
    const SQRT3 = Math.sqrt(3);         // Square root of 3 for perfect hexagons

    // Debug Logging
    function logDebug(message) {
      console.log('[DEBUG] ' + message);
    }

    // Create quantum loader animation
    function createQuantumLoader() {
      const loader = document.getElementById('quantum-loader');
      const dotCount = 8;
      
      for (let i = 0; i < dotCount; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.style.animationDelay = `${i * (3 / dotCount)}s`;
        loader.appendChild(dot);
      }
      
      // Hide loader when speedtest is ready
      const speedtestFrame = document.getElementById('speedtest-frame');
      speedtestFrame.addEventListener('load', () => {
        setTimeout(() => {
          loader.style.display = 'none';
        }, 2000); // Give a bit of time for the speedtest to initialize
      });
    }

    // Fetch Public IP with improved error handling
    async function fetchPublicIP() {
      const endpoints = [
        'https://api.ipify.org?format=json',
        'https://api.ip.sb/jsonip',
        'https://api.myip.com'
      ];
      
      for (const endpoint of endpoints) {
        try {
          const response = await fetch(endpoint);
          if (!response.ok) continue;
          const data = await response.json();
          const ip = data.ip || data.myip || 'IP unavailable';
          document.getElementById('ip-display').textContent = ip;
          return ip;
        } catch (error) {
          logDebug(`IP Fetch Error (${endpoint}): ${error.message}`);
        }
      }
      
      document.getElementById('ip-display').textContent = 'IP unavailable';
      return null;
    }

    // Fetch Network Info
    async function fetchNetworkInfo() {
      const endpoints = [
        { url: 'https://get.geojs.io/v1/ip/geo.json', parser: (data) => ({
          isp: data.organization_name || 'Unknown',
          city: data.city || 'Unknown',
          country: data.country || 'Unknown'
        }) },
        { url: 'https://ipinfo.io/json', parser: (data) => ({
          isp: data.org?.split(' ').slice(1).join(' ') || 'Unknown',
          city: data.city || 'Unknown',
          country: data.country || 'Unknown'
        }) }
      ];
      
      for (const { url, parser } of endpoints) {
        try {
          const response = await fetch(url);
          if (!response.ok) continue;
          const data = await response.json();
          const networkData = parser(data);
          document.getElementById('network-info').innerHTML = `ISP: ${networkData.isp}<br>Location: ${networkData.city}, ${networkData.country}`;
          return;
        } catch (error) {
          logDebug(`Network Info Fetch Error (${url}): ${error.message}`);
        }
      }
      document.getElementById('network-info').innerHTML = `ISP: Unknown<br>Location: Unknown`;
    }

    // Flower of Life Background with improved mathematical accuracy
    function initBackgroundCanvas() {
      try {
        const canvas = document.getElementById('background-canvas');
        const ctx = canvas.getContext('2d');
        if (!ctx) throw new Error('2D canvas context not supported');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Constants for Flower of Life
        const VESICA_RATIO = SQRT3 / 2; // Perfect ratio for Vesica Piscis formation

        function drawFlowerOfLife(time) {
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          // Deep Space Gradient
          const gradient = ctx.createRadialGradient(
            canvas.width / 2, canvas.height / 2, 0,
            canvas.width / 2, canvas.height / 2, Math.max(canvas.width, canvas.height)
          );
          gradient.addColorStop(0, 'rgba(10, 10, 30, 1)');
          gradient.addColorStop(0.3, 'rgba(15, 40, 70, 0.9)');
          gradient.addColorStop(0.6, 'rgba(8, 20, 50, 0.8)');
          gradient.addColorStop(1, 'rgba(0, 0, 0, 1)');
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          // Fibonacci Spiral Stars
          let phi = 0;
          const starCount = 300;
          for (let i = 0; i < starCount; i++) {
            // Golden angle progression
            phi += TAU * (1 - 1/PHI);
            
            // Fibonacci distance from center
            const distance = Math.sqrt(i) * 3;
            const x = Math.cos(phi) * distance;
            const y = Math.sin(phi) * distance;
            
            // Star size based on fibonacci sequence
            const starSize = ((i % 5 === 0) ? 1.5 : 0.8) * Math.random();
            
            // Star brightness with time pulsation
            const brightness = 0.3 + 0.4 * Math.sin(time * 0.0004 + i * 0.1);
            
            ctx.fillStyle = `rgba(255, 255, 255, ${brightness})`;
            ctx.beginPath();
            ctx.arc(
              canvas.width / 2 + x,
              canvas.height / 2 + y,
              starSize,
              0, TAU
            );
            ctx.fill();
          }

          // Mathematically accurate Flower of Life
          const centerX = canvas.width / 2;
          const centerY = canvas.height / 2;
          const baseRadius = Math.min(canvas.width, canvas.height) / 10;
          const pulseRadius = baseRadius * (1 + 0.05 * Math.sin(time * 0.001));
          
          // Define the base circle pattern points
          // These are precise points that form a perfect Flower of Life
          const seedPoints = [
            { x: 0, y: 0 }, // Center circle
          ];
          
          // First ring - 6 circles
          for (let i = 0; i < 6; i++) {
            const angle = i * TAU / 6;
            seedPoints.push({
              x: pulseRadius * Math.cos(angle),
              y: pulseRadius * Math.sin(angle)
            });
          }
          
          // Second ring - 12 circles at intersections
          for (let i = 0; i < 12; i++) {
            const angle = (i * TAU / 12) + (TAU / 24); // Offset to place at intersections
            const r = pulseRadius * SQRT3; // Perfect distance for second ring
            seedPoints.push({
              x: r * Math.cos(angle),
              y: r * Math.sin(angle)
            });
          }
          
          // Draw each circle with a dynamic glow and opacity
          seedPoints.forEach((pos, index) => {
            // Layer effect with multiple circles at slightly different opacities
            for (let layer = 3; layer >= 0; layer--) {
              const layerRadius = pulseRadius * (1 + layer * 0.03);
              const opacity = 0.1 + (0.1 * (3 - layer)) + 0.05 * Math.sin(time * 0.001 + index * 0.2);
              
              // Dynamic color cycling for sacred geometry effect
              const hue = (time * 0.02 + index * 15) % 360;
              ctx.strokeStyle = `hsla(${hue}, 80%, 70%, ${opacity})`;
              ctx.lineWidth = 1 + 0.5 * Math.sin(time * 0.0005 + index * 0.3);
              
              ctx.beginPath();
              ctx.arc(
                centerX + pos.x,
                centerY + pos.y,
                layerRadius,
                0, TAU
              );
              ctx.stroke();
            }
          });
          
          // Central Vesica Piscis for special emphasis
          const vesica = {
            x1: centerX - pulseRadius * 0.5,
            y1: centerY,
            x2: centerX + pulseRadius * 0.5,
            y2: centerY
          };
          
          // Draw vesica piscis with dynamic glow
          const vesicaGlow = Math.sin(time * 0.001) * 0.3 + 0.6;
          ctx.strokeStyle = `rgba(180, 220, 255, ${vesicaGlow})`;
          ctx.lineWidth = 2;
          
          ctx.beginPath();
          ctx.arc(vesica.x1, vesica.y1, pulseRadius, 0, TAU);
          ctx.stroke();
          
          ctx.beginPath();
          ctx.arc(vesica.x2, vesica.y2, pulseRadius, 0, TAU);
          ctx.stroke();
        }

        function animateBackground(time) {
          requestAnimationFrame(animateBackground);
          drawFlowerOfLife(time);
        }
        animateBackground(0);

        window.addEventListener('resize', () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }, { passive: true });

        return true;
      } catch (error) {
        logDebug('Background Canvas Initialization Error: ' + error.message);
        document.getElementById('error-message').style.display = 'block';
        return false;
      }
    }

    // WebGL Cube with LED Particles - Enhanced
    function initWebGL() {
      try {
        const canvas = document.getElementById('webgl-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 2.5);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);

        // Post-processing with enhanced bloom
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);
        const bloomPass = new UnrealBloomPass(
          new THREE.Vector2(window.innerWidth, window.innerHeight),
          0.8,
          0.4,
          0.7
        );
        bloomPass.threshold = 0.2;
        bloomPass.strength = 1.2;
        bloomPass.radius = 0.7;
        composer.addPass(bloomPass);

        // Cube with Metatron's Cube inspired geometry
        const cubeGeometry = new THREE.BoxGeometry(1, 1, 1);
        const cubeMaterial = new THREE.MeshBasicMaterial({
          color: 0x000000,
          transparent: true,
          opacity: 0.1,
          wireframe: true
        });
        const cube = new THREE.Mesh(cubeGeometry, cubeMaterial);
        scene.add(cube);

        // Cube Edges with Quantum Fluctuation Effect
        const edgeGeometry = new THREE.EdgesGeometry(cubeGeometry);
        const edgeMaterial = new THREE.ShaderMaterial({
          uniforms: {
            time: { value: 0 },
            uColor1: { value: new THREE.Color('#ff4d94') },
            uColor2: { value: new THREE.Color('#4dffeb') },
            uColor3: { value: new THREE.Color('#cc66ff') }
          },
          vertexShader: `
            varying vec3 vPosition;
            uniform float time;
            
            void main() {
              vPosition = position;
              
              // Add subtle quantum fluctuation to edges
              vec3 pos = position;
              float fluctuation = sin(time * 2.0 + position.x * 10.0) * 0.01 * sin(position.y * 15.0);
              pos += normalize(position) * fluctuation;
              
              gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
          `,
          fragmentShader: `
            uniform float time;
            uniform vec3 uColor1;
            uniform vec3 uColor2;
            uniform vec3 uColor3;
            varying vec3 vPosition;
            
            // Simplex noise function for quantum randomness
            vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }
            
            float snoise(vec2 v) {
              const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
