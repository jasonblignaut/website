<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Infinite LED Dodecahedron - Science & Math Showcase</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        canvas { display: block; }
        #bgCanvas { position: absolute; top: 0; left: 0; z-index: -1; }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 2.5);
        camera.lookAt(0, 0, 0);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);
        document.body.appendChild(renderer.domElement);

        // Post-processing
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            0.7, // Balanced for cinematic glow
            0.4, // radius
            0.75 // threshold
        );
        composer.addPass(bloomPass);

        // Outer dodecahedron
        const outerGeometry = new THREE.DodecahedronGeometry(1, 0);
        const outerMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                uColor1: { value: new THREE.Color(1, 0.3, 0.58) }, // #ff4d94
                uColor2: { value: new THREE.Color(0.3, 1, 0.92) }, // #4dffeb
                uColor3: { value: new THREE.Color(0.8, 0.4, 1) }, // #cc66ff
                uEnvMap: { value: null }
            },
            vertexShader: `
                varying vec3 vNormal;
                varying vec3 vViewDir;
                varying vec3 vWorldPos;
                void main() {
                    vNormal = normalize(normalMatrix * normal);
                    vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
                    vViewDir = normalize(cameraPosition - vWorldPos);
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform float time;
                uniform vec3 uColor1;
                uniform vec3 uColor2;
                uniform vec3 uColor3;
                uniform samplerCube uEnvMap;
                varying vec3 vNormal;
                varying vec3 vViewDir;

                void main() {
                    float fresnel = pow(1.0 - dot(vNormal, vViewDir), 4.0); // Physically accurate Fresnel
                    float t1 = sin(time * 0.6 + 3.14159) * 0.5 + 0.5;
                    float t2 = sin(time * 0.4) * 0.5 + 0.5;
                    vec3 color = mix(uColor1, uColor2, t1);
                    color = mix(color, uColor3, t2);
                    // Dynamic RGB for 16M+ colors
                    float r = 0.5 + 0.5 * sin(time * 0.3 + vWorldPos.x);
                    float g = 0.5 + 0.5 * sin(time * 0.5 + vWorldPos.y);
                    float b = 0.5 + 0.5 * sin(time * 0.7 + vWorldPos.z);
                    vec3 ledColor = mix(color, vec3(r, g, b), 0.3);
                    vec3 reflectDir = reflect(-vViewDir, vNormal);
                    vec4 reflectColor = uEnvMap ? textureCube(uEnvMap, reflectDir) : vec4(0.0);
                    vec3 finalColor = mix(reflectColor.rgb, ledColor, 0.15);
                    finalColor += fresnel * ledColor * 1.3;
                    gl_FragColor = vec4(finalColor, 0.95);
                }
            `,
            transparent: true,
            side: THREE.DoubleSide
        });

        const outerDodecahedron = new THREE.Mesh(outerGeometry, outerMaterial);
        outerDodecahedron.position.set(0, 0, 0);
        scene.add(outerDodecahedron);

        // Middle dodecahedron
        const middleGeometry = new THREE.DodecahedronGeometry(0.65, 0);
        const middleMaterial = new THREE.ShaderMaterial({
            uniforms: outerMaterial.uniforms,
            vertexShader: outerMaterial.vertexShader,
            fragmentShader: `
                uniform float time;
                uniform vec3 uColor1;
                uniform vec3 uColor2;
                uniform vec3 uColor3;
                uniform samplerCube uEnvMap;
                varying vec3 vNormal;
                varying vec3 vViewDir;

                void main() {
                    float fresnel = pow(1.0 - dot(vNormal, vViewDir), 3.5);
                    float t1 = sin(time * 0.5 + 1.5708) * 0.5 + 0.5;
                    float t2 = sin(time * 0.3) * 0.5 + 0.5;
                    vec3 color = mix(uColor2, uColor3, t1);
                    color = mix(color, uColor1, t2);
                    float r = 0.5 + 0.5 * sin(time * 0.4 + vWorldPos.x * 1.618);
                    float g = 0.5 + 0.5 * sin(time * 0.6 + vWorldPos.y * 1.618);
                    float b = 0.5 + 0.5 * sin(time * 0.8 + vWorldPos.z * 1.618);
                    vec3 ledColor = mix(color, vec3(r, g, b), 0.35);
                    vec3 reflectDir = reflect(-vViewDir, vNormal);
                    vec4 reflectColor = uEnvMap ? textureCube(uEnvMap, reflectDir) : vec4(0.0);
                    vec3 finalColor = mix(reflectColor.rgb, ledColor, 0.2);
                    finalColor += fresnel * ledColor * 1.1;
                    gl_FragColor = vec4(finalColor, 0.93);
                }
            `,
            transparent: true,
            side: THREE.DoubleSide
        });

        const middleDodecahedron = new THREE.Mesh(middleGeometry, middleMaterial);
        outerDodecahedron.add(middleDodecahedron);

        // Inner dodecahedron
        const innerGeometry = new THREE.DodecahedronGeometry(0.35, 0);
        const innerMaterial = new THREE.ShaderMaterial({
            uniforms: outerMaterial.uniforms,
            vertexShader: outerMaterial.vertexShader,
            fragmentShader: `
                uniform float time;
                uniform vec3 uColor1;
                uniform vec3 uColor2;
                uniform vec3 uColor3;
                uniform samplerCube uEnvMap;
                varying vec3 vNormal;
                varying vec3 vViewDir;

                void main() {
                    float fresnel = pow(1.0 - dot(vNormal, vViewDir), 3.0);
                    float t1 = sin(time * 0.7 + 4.71239) * 0.5 + 0.5;
                    float t2 = sin(time * 0.2) * 0.5 + 0.5;
                    vec3 color = mix(uColor3, uColor1, t1);
                    color = mix(color, uColor2, t2);
                    float r = 0.5 + 0.5 * sin(time * 0.5 + vWorldPos.x * 2.0);
                    float g = 0.5 + 0.5 * sin(time * 0.7 + vWorldPos.y * 2.0);
                    float b = 0.5 + 0.5 * sin(time * 0.9 + vWorldPos.z * 2.0);
                    vec3 ledColor = mix(color, vec3(r, g, b), 0.4);
                    vec3 reflectDir = reflect(-vViewDir, vNormal);
                    vec4 reflectColor = uEnvMap ? textureCube(uEnvMap, reflectDir) : vec4(0.0);
                    vec3 finalColor = mix(reflectColor.rgb, ledColor, 0.25);
                    finalColor += fresnel * ledColor * 1.0;
                    gl_FragColor = vec4(finalColor, 0.9);
                }
            `,
            transparent: true,
            side: THREE.DoubleSide
        });

        const innerDodecahedron = new THREE.Mesh(innerGeometry, innerMaterial);
        middleDodecahedron.add(innerDodecahedron);

        // LED strips
        const createLEDEdges = (geometry) => {
            const edgesGeometry = new THREE.EdgesGeometry(geometry);
            const ledMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    uColor1: { value: new THREE.Color(1, 0.3, 0.58) },
                    uColor2: { value: new THREE.Color(0.3, 1, 0.92) },
                    uColor3: { value: new THREE.Color(0.8, 0.4, 1) },
                    uColor4: { value: new THREE.Color(0.4, 1, 0.6) } // #66ff99
                },
                vertexShader: `
                    varying vec3 vPosition;
                    void main() {
                        vPosition = position;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float time;
                    uniform vec3 uColor1;
                    uniform vec3 uColor2;
                    uniform vec3 uColor3;
                    uniform vec3 uColor4;
                    varying vec3 vPosition;

                    void main() {
                        float t1 = sin(time * 0.8) * 0.5 + 0.5;
                        float t2 = sin(time * 0.5 + 3.14159) * 0.5 + 0.5;
                        float t3 = sin(time * 0.3) * 0.5 + 0.5;
                        vec3 color = mix(uColor1, uColor2, t1);
                        color = mix(color, uColor3, t2);
                        color = mix(color, uColor4, t3);
                        // Dynamic RGB for infinite colors
                        float r = 0.5 + 0.5 * sin(time * 1.0 + vPosition.x * 1.618);
                        float g = 0.5 + 0.5 * sin(time * 1.2 + vPosition.y * 1.618);
                        float b = 0.5 + 0.5 * sin(time * 1.4 + vPosition.z * 1.618);
                        vec3 ledColor = mix(color, vec3(r, g, b), 0.5);
                        float glow = sin(time * 2.5 + vPosition.x * 0.5) * 0.5 + 0.5;
                        gl_FragColor = vec4(ledColor * (1.0 + glow * 1.0), 1.0);
                    }
                `,
                transparent: true
            });
            return new THREE.LineSegments(edgesGeometry, ledMaterial);
        };

        outerDodecahedron.add(createLEDEdges(outerGeometry));
        middleDodecahedron.add(createLEDEdges(middleGeometry));
        innerDodecahedron.add(createLEDEdges(innerGeometry));

        // Internal LED particles
        const ledCount = 250;
        const ledGeometry = new THREE.BufferGeometry();
        const ledPositions = new Float32Array(ledCount * 3);
        const ledOffsets = new Float32Array(ledCount);
        for (let i = 0; i < ledCount; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = Math.pow(Math.random(), 1/3) * 0.85;
            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta);
            const z = r * Math.cos(phi);
            ledPositions[i * 3] = isFinite(x) ? x : 0;
            ledPositions[i * 3 + 1] = isFinite(y) ? y : 0;
            ledPositions[i * 3 + 2] = isFinite(z) ? z : 0;
            ledOffsets[i] = Math.random() * Math.PI * 2;
        }
        ledGeometry.setAttribute('position', new THREE.BufferAttribute(ledPositions, 3));
        ledGeometry.setAttribute('offset', new THREE.BufferAttribute(ledOffsets, 1));
        const ledParticleMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                uColor1: { value: new THREE.Color(1, 0.3, 0.58) },
                uColor2: { value: new THREE.Color(0.3, 1, 0.92) },
                uColor3: { value: new THREE.Color(0.8, 0.4, 1) },
                uColor4: { value: new THREE.Color(0.4, 1, 0.6) }
            },
            vertexShader: `
                attribute float offset;
                varying float vOffset;
                void main() {
                    vOffset = offset;
                    gl_PointSize = 11.0;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform float time;
                uniform vec3 uColor1;
                uniform vec3 uColor2;
                uniform vec3 uColor3;
                uniform vec3 uColor4;
                varying float vOffset;
                void main() {
                    float pulse = sin(time * 3.0 + vOffset) * 0.5 + 0.5;
                    float t1 = sin(time * 0.6) * 0.5 + 0.5;
                    float t2 = sin(time * 0.4 + 3.14159) * 0.5 + 0.5;
                    vec3 color = mix(uColor1, uColor2, t1);
                    color = mix(color, uColor3, t2);
                    color = mix(color, uColor4, sin(time * 0.2) * 0.5 + 0.5);
                    float r = 0.5 + 0.5 * sin(time * 0.8 + vOffset * 1.618);
                    float g = 0.5 + 0.5 * sin(time * 1.0 + vOffset * 1.618);
                    float b = 0.5 + 0.5 * sin(time * 1.2 + vOffset * 1.618);
                    vec3 ledColor = mix(color, vec3(r, g, b), 0.6);
                    vec2 coord = gl_PointCoord - vec2(0.5);
                    float dist = length(coord);
                    if (dist > 0.5) discard;
                    float alpha = smoothstep(0.5, 0.2, dist);
                    gl_FragColor = vec4(ledColor * (1.0 + pulse), alpha);
                }
            `,
            transparent: true
        });
        const ledParticles = new THREE.Points(ledGeometry, ledParticleMaterial);
        outerDodecahedron.add(ledParticles);

        // Reflective environment
        const cubeRenderTarget = new THREE.WebGLCubeRenderTarget(512, {
            generateMipmaps: true,
            minFilter: THREE.LinearMipmapLinearFilter
        });
        const cubeCamera = new THREE.CubeCamera(0.1, 1000, cubeRenderTarget);
        outerMaterial.uniforms.uEnvMap.value = cubeRenderTarget.texture;
        middleMaterial.uniforms.uEnvMap.value = cubeRenderTarget.texture;
        innerMaterial.uniforms.uEnvMap.value = cubeRenderTarget.texture;

        // Cosmic Flower of Life background
        const bgCanvas = document.getElementById('bgCanvas');
        bgCanvas.width = window.innerWidth;
        bgCanvas.height = window.innerHeight;
        const ctx = bgCanvas.getContext('2d');
        function drawCosmicBackground(time) {
            ctx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            // Cosmic nebulae gradient
            const gradient = ctx.createRadialGradient(
                bgCanvas.width / 2, bgCanvas.height / 2, 0,
                bgCanvas.width / 2, bgCanvas.height / 2, Math.max(bgCanvas.width, bgCanvas.height)
            );
            gradient.addColorStop(0, 'rgba(15, 15, 40, 1)');
            gradient.addColorStop(0.3, 'rgba(30, 60, 100, 0.9)');
            gradient.addColorStop(0.7, 'rgba(10, 20, 50, 0.7)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 1)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
            // Stars
            for (let i = 0; i < 150; i++) {
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.6 + 0.3})`;
                ctx.beginPath();
                ctx.arc(
                    Math.random() * bgCanvas.width,
                    Math.random() * bgCanvas.height,
                    Math.random() * 2,
                    0, Math.PI * 2
                );
                ctx.fill();
            }
            // Flower of Life (19 circles, hexagonal grid)
            ctx.strokeStyle = `rgba(100, 200, 255, ${0.35 + Math.sin(time * 0.001) * 0.25})`;
            ctx.lineWidth = 2.5;
            const centerX = bgCanvas.width / 2;
            const centerY = bgCanvas.height / 2;
            const radius = Math.min(bgCanvas.width, bgCanvas.height) / 12;
            const offset = radius * Math.sqrt(3); // Exact geometric constant
            const anim = Math.sin(time * 0.0005) * 6;
            for (let i = -2; i <= 2; i++) {
                for (let j = -2; j <= 2; j++) {
                    if (Math.abs(i) + Math.abs(j) <= 3 && !(i === 0 && j === 0)) {
                        const x = centerX + (i * offset + j * offset / 2) + anim;
                        const y = centerY + j * offset * 0.8660254 + anim; // sqrt(3)/2
                        ctx.beginPath();
                        ctx.arc(x, y, radius, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                }
            }
            ctx.beginPath();
            ctx.arc(centerX + anim, centerY + anim, radius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(centerX + anim, centerY + anim, radius * 3.4641016, 0, Math.PI * 2); // 2*sqrt(3)
            ctx.stroke();
        }

        // Energy atom particles
        const atomCount = 70;
        const atomGeometry = new THREE.BufferGeometry();
        const atomPositions = new Float32Array(atomCount * 3);
        const atomVelocities = new Float32Array(atomCount * 3);
        const atomLifetimes = new Float32Array(atomCount);
        const atomOffsets = new Float32Array(atomCount);
        const phi = (1 + Math.sqrt(5)) / 2;
        for (let i = 0; i < atomCount; i++) {
            const theta = Math.random() * Math.PI * 2;
            const r = Math.random() * 12 + 6;
            const x = r * Math.cos(theta);
            const y = r * Math.sin(theta);
            const z = (Math.random() - 0.5) * 10;
            atomPositions[i * 3] = isFinite(x) ? x : 0;
            atomPositions[i * 3 + 1] = isFinite(y) ? y : 0;
            atomPositions[i * 3 + 2] = isFinite(z) ? z : 0;
            atomVelocities[i * 3] = (Math.random() - 0.5) * 0.05;
            atomVelocities[i * 3 + 1] = (Math.random() - 0.5) * 0.05;
            atomVelocities[i * 3 + 2] = (Math.random() - 0.5) * 0.05;
            atomLifetimes[i] = Math.random() * 4 + 1;
            atomOffsets[i] = Math.random() * Math.PI * 2;
        }
        atomGeometry.setAttribute('position', new THREE.BufferAttribute(atomPositions, 3));
        atomGeometry.setAttribute('offset', new THREE.BufferAttribute(atomOffsets, 1));
        const atomMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 }
            },
            vertexShader: `
                attribute float offset;
                varying float vOffset;
                void main() {
                    vOffset = offset;
                    gl_PointSize = 9.0 + sin(offset) * 4.0;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform float time;
                varying float vOffset;
                void main() {
                    float t = sin(time * 2.0 + vOffset) * 0.5 + 0.5;
                    // Quantum-inspired colors
                    vec3 color = vec3(
                        0.5 + 0.5 * sin(t * 3.141592653589793 + 2.0),
                        0.5 + 0.5 * cos(t * 3.141592653589793 + 1.0),
                        0.7 + 0.3 * sin(t * 3.141592653589793)
                    );
                    vec2 coord = gl_PointCoord - vec2(0.5);
                    float dist = length(coord);
                    if (dist > 0.5) discard;
                    float alpha = smoothstep(0.5, 0.2, dist) * (0.8 + t * 0.2);
                    gl_FragColor = vec4(color, alpha);
                }
            `,
            transparent: true
        });
        const atomParticles = new THREE.Points(atomGeometry, atomMaterial);
        scene.add(atomParticles);

        // Interactivity
        let mouseX = 0, mouseY = 0;
        let touchX = 0, touchY = 0;
        let targetRotationX = 0, targetRotationY = 0;
        let isDragging = false;

        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
            if (!isDragging) {
                targetRotationY = mouseX * Math.PI * 1.5;
                targetRotationX = mouseY * Math.PI * 0.75;
            }
        });
        document.addEventListener('mousedown', () => { isDragging = true; });
        document.addEventListener('mouseup', () => { isDragging = false; });
        document.addEventListener('click', triggerParticleBurst);

        document.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            touchX = (touch.clientX / window.innerWidth) * 2 - 1;
            touchY = -(touch.clientY / window.innerHeight) * 2 + 1;
            isDragging = true;
            triggerParticleBurst();
        }, { passive: false });
        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const newTouchX = (touch.clientX / window.innerWidth) * 2 - 1;
            const newTouchY = -(touch.clientY / window.innerHeight) * 2 + 1;
            if (isDragging) {
                targetRotationY += (newTouchX - touchX) * Math.PI * 2;
                targetRotationX += (newTouchY - touchY) * Math.PI;
                touchX = newTouchX;
                touchY = newTouchY;
            }
        }, { passive: false });
        document.addEventListener('touchend', () => { isDragging = false; });

        function triggerParticleBurst() {
            const burstCount = 30;
            const burstPositions = new Float32Array(burstCount * 3);
            const burstVelocities = new Float32Array(burstCount * 3);
            for (let i = 0; i < burstCount; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = Math.random() * 0.6;
                const x = r * Math.sin(phi) * Math.cos(theta);
                const y = r * Math.sin(phi) * Math.sin(theta);
                const z = r * Math.cos(phi);
                burstPositions[i * 3] = isFinite(x) ? x : 0;
                burstPositions[i * 3 + 1] = isFinite(y) ? y : 0;
                burstPositions[i * 3 + 2] = isFinite(z) ? z : 0;
                burstVelocities[i * 3] = (Math.random() - 0.5) * 0.1;
                burstVelocities[i * 3 + 1] = (Math.random() - 0.5) * 0.1;
                burstVelocities[i * 3 + 2] = (Math.random() - 0.5) * 0.1;
            }
            const burstGeometry = new THREE.BufferGeometry();
            burstGeometry.setAttribute('position', new THREE.BufferAttribute(burstPositions, 3));
            const burstMaterial = new THREE.PointsMaterial({
                size: 14,
                color: new THREE.Color(
                    Math.random(), // R [0, 1]
                    Math.random(), // G [0, 1]
                    Math.random()  // B [0, 1]
                ),
                transparent: true,
                opacity: 0.9
            });
            const burst = new THREE.Points(burstGeometry, burstMaterial);
            outerDodecahedron.add(burst);
            let burstTime = 0;
            const animateBurst = () => {
                burstTime += 0.016;
                burstMaterial.opacity = Math.max(0, 0.9 - burstTime * 0.9);
                if (burstTime < 1) {
                    for (let i = 0; i < burstCount; i++) {
                        burstPositions[i * 3] += burstVelocities[i * 3];
                        burstPositions[i * 3 + 1] += burstVelocities[i * 3 + 1];
                        burstPositions[i * 3 + 2] += burstVelocities[i * 3 + 2];
                    }
                    burstGeometry.attributes.position.needsUpdate = true;
                    requestAnimationFrame(animateBurst);
                } else {
                    scene.remove(burst);
                }
            };
            animateBurst();
        }

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 0.9);
        scene.add(ambientLight);
        const pointLight1 = new THREE.PointLight(0xffffff, 2.2, 10);
        pointLight1.position.set(5, 5, 5);
        scene.add(pointLight1);
        const pointLight2 = new THREE.PointLight(0xffffff, 1.8, 10);
        pointLight2.position.set(-5, -5, -5);
        scene.add(pointLight2);

        // Animation loop
        function animate(time) {
            requestAnimationFrame(animate);
            drawCosmicBackground(time);

            // Update energy atoms (wave equations)
            for (let i = 0; i < atomCount; i++) {
                const t = time * 0.001 + atomOffsets[i];
                const omega = 1.618033988749895; // Phi for frequency
                let x = atomPositions[i * 3] + atomVelocities[i * 3] * 0.05 * Math.sin(omega * t);
                let y = atomPositions[i * 3 + 1] + atomVelocities[i * 3 + 1] * 0.05 * Math.cos(omega * t);
                let z = atomPositions[i * 3 + 2] + atomVelocities[i * 3 + 2] * 0.05 * Math.sin(omega * t * phi);
                atomPositions[i * 3] = isFinite(x) ? x : 0;
                atomPositions[i * 3 + 1] = isFinite(y) ? y : 0;
                atomPositions[i * 3 + 2] = isFinite(z) ? z : 0;
                atomLifetimes[i] -= 0.016;
                if (atomLifetimes[i] <= 0) {
                    const theta = Math.random() * Math.PI * 2;
                    const r = Math.random() * 12 + 6;
                    x = r * Math.cos(theta);
                    y = r * Math.sin(theta);
                    z = (Math.random() - 0.5) * 10;
                    atomPositions[i * 3] = isFinite(x) ? x : 0;
                    atomPositions[i * 3 + 1] = isFinite(y) ? y : 0;
                    atomPositions[i * 3 + 2] = isFinite(z) ? z : 0;
                    atomVelocities[i * 3] = (Math.random() - 0.5) * 0.05;
                    atomVelocities[i * 3 + 1] = (Math.random() - 0.5) * 0.05;
                    atomVelocities[i * 3 + 2] = (Math.random() - 0.5) * 0.05;
                    atomLifetimes[i] = Math.random() * 4 + 1;
                }
            }
            atomGeometry.attributes.position.needsUpdate = true;

            // Update rotations
            outerDodecahedron.rotation.y += (targetRotationY - outerDodecahedron.rotation.y) * 0.1;
            outerDodecahedron.rotation.x += (targetRotationX - outerDodecahedron.rotation.x) * 0.1;
            middleDodecahedron.rotation.x -= 0.003;
            middleDodecahedron.rotation.y -= 0.003;
            innerDodecahedron.rotation.x += 0.004;
            innerDodecahedron.rotation.y += 0.004;
            outerMaterial.uniforms.time.value = time * 0.001;
            middleMaterial.uniforms.time.value = time * 0.001;
            innerMaterial.uniforms.time.value = time * 0.001;
            ledParticleMaterial.uniforms.time.value = time * 0.001;
            atomMaterial.uniforms.time.value = time * 0.001;

            outerDodecahedron.children.forEach(child => {
                if (child.material && child.material.uniforms) {
                    child.material.uniforms.time.value = time * 0.001;
                }
            });
            middleDodecahedron.children.forEach(child => {
                if (child.material && child.material.uniforms) {
                    child.material.uniforms.time.value = time * 0.001;
                }
            });
            innerDodecahedron.children.forEach(child => {
                if (child.material && child.material.uniforms) {
                    child.material.uniforms.time.value = time * 0.001;
                }
            });

            // Two-pass rendering
            outerDodecahedron.visible = false;
            middleDodecahedron.visible = false;
            innerDodecahedron.visible = false;
            cubeCamera.position.copy(outerDodecahedron.position);
            cubeCamera.update(renderer, scene);
            outerDodecahedron.visible = true;
            middleDodecahedron.visible = true;
            innerDodecahedron.visible = true;

            composer.render();
        }
        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
