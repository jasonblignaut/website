<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite LED Dodecahedron - Futuristic</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Post-processing
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            0.7, // Strong bloom for neon glow
            0.4, // radius
            0.8 // threshold
        );
        composer.addPass(bloomPass);

        // Outer dodecahedron (reflective, semi-transparent)
        const outerGeometry = new THREE.DodecahedronGeometry(1, 0);
        const outerMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                uColor1: { value: new THREE.Color('#ff4d94') },
                uColor2: { value: new THREE.Color('#4dffeb') },
                uEnvMap: { value: null }
            },
            vertexShader: `
                varying vec3 vNormal;
                varying vec3 vViewDir;
                varying vec3 vWorldPos;
                void main() {
                    vNormal = normalize(normalMatrix * normal);
                    vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
                    vViewDir = normalize(cameraPosition - vWorldPos);
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform float time;
                uniform vec3 uColor1;
                uniform vec3 uColor2;
                uniform samplerCube uEnvMap;
                varying vec3 vNormal;
                varying vec3 vViewDir;
                varying vec3 vWorldPos;

                void main() {
                    float fresnel = pow(1.0 - dot(vNormal, vViewDir), 3.0);
                    float t = sin(time * 0.4) * 0.5 + 0.5;
                    vec3 color = mix(uColor1, uColor2, t);
                    vec3 reflectDir = reflect(-vViewDir, vNormal);
                    vec4 reflectColor = textureCube(uEnvMap, reflectDir);
                    vec3 finalColor = mix(reflectColor.rgb, color, 0.3);
                    finalColor += fresnel * color * 0.8;
                    gl_FragColor = vec4(finalColor, 0.95); // Highly transparent
                }
            `,
            transparent: true,
            side: THREE.DoubleSide
        });

        const outerDodecahedron = new THREE.Mesh(outerGeometry, outerMaterial);
        scene.add(outerDodecahedron);

        // Inner dodecahedron (smaller, reflective)
        const innerGeometry = new THREE.DodecahedronGeometry(0.6, 0);
        const innerMaterial = new THREE.ShaderMaterial({
            uniforms: outerMaterial.uniforms, // Reuse for consistency
            vertexShader: outerMaterial.vertexShader,
            fragmentShader: `
                uniform float time;
                uniform vec3 uColor1;
                uniform vec3 uColor2;
                uniform samplerCube uEnvMap;
                varying vec3 vNormal;
                varying vec3 vViewDir;

                void main() {
                    float fresnel = pow(1.0 - dot(vNormal, vViewDir), 2.5);
                    float t = sin(time * 0.4) * 0.5 + 0.5;
                    vec3 color = mix(uColor2, uColor1, t); // Reversed for contrast
                    vec3 reflectDir = reflect(-vViewDir, vNormal);
                    vec4 reflectColor = textureCube(uEnvMap, reflectDir);
                    vec3 finalColor = mix(reflectColor.rgb, color, 0.4);
                    finalColor += fresnel * color * 0.7;
                    gl_FragColor = vec4(finalColor, 0.9);
                }
            `,
            transparent: true,
            side: THREE.DoubleSide
        });

        const innerDodecahedron = new THREE.Mesh(innerGeometry, innerMaterial);
        outerDodecahedron.add(innerDodecahedron);

        // LED strips (glowing edges)
        const edgesGeometry = new THREE.EdgesGeometry(outerGeometry);
        const ledMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                uColor1: { value: new THREE.Color('#ff4d94') },
                uColor2: { value: new THREE.Color('#4dffeb') },
                uColor3: { value: new THREE.Color('#cc66ff') }
            },
            vertexShader: `
                varying vec3 vPosition;
                void main() {
                    vPosition = position;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform float time;
                uniform vec3 uColor1;
                uniform vec3 uColor2;
                uniform vec3 uColor3;
                varying vec3 vPosition;

                void main() {
                    float t = sin(time * 0.5) * 0.5 + 0.5;
                    vec3 color = mix(uColor1, uColor2, t);
                    color = mix(color, uColor3, sin(time * 0.3) * 0.5 + 0.5);
                    float glow = sin(time * 1.5 + vPosition.x * 0.5) * 0.5 + 0.5;
                    gl_FragColor = vec4(color * (0.8 + glow * 0.5), 1.0);
                }
            `,
            transparent: true
        });
        const ledEdges = new THREE.LineSegments(edgesGeometry, ledMaterial);
        outerDodecahedron.add(ledEdges);

        // Inner LED particles (glowing points)
        const ledCount = 100;
        const ledGeometry = new THREE.BufferGeometry();
        const ledPositions = new Float32Array(ledCount * 3);
        const ledOffsets = new Float32Array(ledCount);
        for (let i = 0; i < ledCount; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = Math.pow(Math.random(), 1/3) * 0.8; // Between outer and inner
            ledPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            ledPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            ledPositions[i * 3 + 2] = r * Math.cos(phi);
            ledOffsets[i] = Math.random() * Math.PI * 2;
        }
        ledGeometry.setAttribute('position', new THREE.BufferAttribute(ledPositions, 3));
        ledGeometry.setAttribute('offset', new THREE.BufferAttribute(ledOffsets, 1));
        const ledParticleMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                uColor1: { value: new THREE.Color('#ff4d94') },
                uColor2: { value: new THREE.Color('#4dffeb') }
            },
            vertexShader: `
                attribute float offset;
                varying float vOffset;
                void main() {
                    vOffset = offset;
                    gl_PointSize = 6.0;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform float time;
                uniform vec3 uColor1;
                uniform vec3 uColor2;
                varying float vOffset;
                void main() {
                    float pulse = sin(time * 2.0 + vOffset) * 0.5 + 0.5;
                    float t = sin(time * 0.4) * 0.5 + 0.5;
                    vec3 color = mix(uColor1, uColor2, t);
                    vec2 coord = gl_PointCoord - vec2(0.5);
                    float dist = length(coord);
                    if (dist > 0.5) discard;
                    float alpha = smoothstep(0.5, 0.3, dist);
                    gl_FragColor = vec4(color * (0.5 + pulse), alpha);
                }
            `,
            transparent: true
        });
        const ledParticles = new THREE.Points(ledGeometry, ledParticleMaterial);
        outerDodecahedron.add(ledParticles);

        // Reflective environment
        const cubeRenderTarget = new THREE.WebGLCubeRenderTarget(512, {
            generateMipmaps: true,
            minFilter: THREE.LinearMipmapLinearFilter
        });
        const cubeCamera = new THREE.CubeCamera(0.1, 1000, cubeRenderTarget);
        outerMaterial.uniforms.uEnvMap.value = cubeRenderTarget.texture;
        innerMaterial.uniforms.uEnvMap.value = cubeRenderTarget.texture;

        // Background particles
        const bgGeometry = new THREE.BufferGeometry();
        const bgCount = 300;
        const bgPositions = new Float32Array(bgCount * 3);
        for (let i = 0; i < bgCount * 3; i++) {
            bgPositions[i] = (Math.random() - 0.5) * 50;
        }
        bgGeometry.setAttribute('position', new THREE.BufferAttribute(bgPositions, 3));
        const bgMaterial = new THREE.PointsMaterial({
            size: 0.1,
            color: '#66ccff',
            transparent: true,
            opacity: 0.3
        });
        const bgParticles = new THREE.Points(bgGeometry, bgMaterial);
        scene.add(bgParticles);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 1.2, 10);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // Camera animation
        camera.position.set(0, 0, 2.2);
        let cameraAngle = 0;

        // Animation loop
        function animate(time) {
            requestAnimationFrame(animate);

            // Camera orbit
            cameraAngle += 0.003;
            camera.position.x = 2.2 * Math.sin(cameraAngle);
            camera.position.z = 2.2 * Math.cos(cameraAngle);
            camera.lookAt(0, 0, 0);

            // Update rotations and time
            outerDodecahedron.rotation.x += 0.005;
            outerDodecahedron.rotation.y += 0.005;
            innerDodecahedron.rotation.x -= 0.003;
            innerDodecahedron.rotation.y -= 0.003;
            outerMaterial.uniforms.time.value = time * 0.001;
            innerMaterial.uniforms.time.value = time * 0.001;
            ledMaterial.uniforms.time.value = time * 0.001;
            ledParticleMaterial.uniforms.time.value = time * 0.001;

            // Two-pass rendering
            outerDodecahedron.visible = false;
            innerDodecahedron.visible = false;
            cubeCamera.position.copy(outerDodecahedron.position);
            cubeCamera.update(renderer, scene);
            outerDodecahedron.visible = true;
            innerDodecahedron.visible = true;

            composer.render();
        }
        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
