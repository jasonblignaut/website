<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Cinematic Speed Test - Check your IP, ISP & speed in style." />
  <title>Labverse Speed Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Exo+2:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-blue: #00eaff;
      --neon-pink: #ff00cc;
      --glass-bg: rgba(20, 20, 40, 0.75);
      --text-color: #e6f0ff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Exo 2', sans-serif;
    }

    body, html {
      height: 100%;
      background: #0a0a1f;
      color: var(--text-color);
      overflow-x: hidden;
    }

    #vanta-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .container {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      color: var(--neon-blue);
      text-shadow: 0 0 20px var(--neon-blue);
      margin-bottom: 1.5rem;
      animation: pulse 2s infinite alternate;
    }

    @keyframes pulse {
      from { text-shadow: 0 0 20px var(--neon-blue); }
      to { text-shadow: 0 0 40px var(--neon-pink); }
    }

    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(8px);
      border: 2px solid var(--neon-blue);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 0 25px var(--neon-blue);
      max-width: 600px;
      width: 100%;
      margin-bottom: 2rem;
    }

    .info {
      font-size: 1.3rem;
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .btn {
      background: linear-gradient(45deg, var(--neon-blue), var(--neon-pink));
      color: #000;
      padding: 0.9rem 2rem;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 0 20px var(--neon-blue);
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px var(--neon-pink);
    }

    .speedtest-container {
      display: none;
      margin-top: 2rem;
      width: 100%;
      max-width: 800px;
      height: 600px;
      border: 2px solid var(--neon-pink);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 30px var(--neon-pink);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.85rem;
      color: var(--neon-blue);
      text-shadow: 0 0 5px var(--neon-blue);
    }

    @media (max-width: 600px) {
      .card, .speedtest-container {
        width: 90%;
        height: auto;
      }

      iframe {
        height: 400px;
      }
    }
  </style>
</head>
<body>
  <div id="vanta-bg"></div>
  <div class="container">
    <h1>Labverse Speed Test</h1>

    <div class="card">
      <div class="info" id="ip">Fetching your IP address...</div>
      <div class="info" id="isp">Loading ISP info...</div>
      <div class="info" id="location"></div>
    </div>

    <button class="btn" onclick="showSpeedtest()">Run Speed Test</button>

    <div class="speedtest-container" id="speedtest">
      <iframe src="https://speed.cloudflare.com" allow="geolocation"></iframe>
    </div>

    <footer>
      &copy; 2025 Labverse | Made with 🧠 + ⚡
    </footer>
  </div>

  <!-- Vanta Background Script -->
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
  <script>
    VANTA.NET({
      el: "#vanta-bg",
      mouseControls: true,
      touchControls: true,
      gyroControls: false,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 1.00,
      scaleMobile: 1.00,
      color: 0x00eaff,
      backgroundColor: 0x0a0a1f,
      points: 12.00,
      maxDistance: 20.00,
      spacing: 16.00
    })
  </script>

  <!-- IP Info Script -->
  <script>
    fetch("https://ipapi.co/json/")
      .then(res => res.json())
      .then(data => {
        document.getElementById("ip").textContent = `Your IP: ${data.ip}`;
        document.getElementById("isp").textContent = `ISP: ${data.org}`;
        document.getElementById("location").textContent = `Location: ${data.city}, ${data.region}, ${data.country_name}`;
      })
      .catch(() => {
        document.getElementById("ip").textContent = "Unable to fetch IP.";
        document.getElementById("isp").textContent = "Unable to fetch ISP info.";
      });

    function showSpeedtest() {
      document.getElementById("speedtest").style.display = "block";
      window.scrollTo({ top: document.getElementById("speedtest").offsetTop, behavior: 'smooth' });
    }
  </script>
</body>
</html>
