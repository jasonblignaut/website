<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Labverse Speed Test - Experience the ultimate network speed test with cosmic visuals and instant public IP display.">
  <meta name="keywords" content="Public IP, Speed Test, Futuristic, Cosmic Animation">
  <meta name="author" content="Labverse Team">
  <meta property="og:title" content="Labverse Speed Test">
  <meta property="og:description" content="Test your network speed with a futuristic interface, instant IP display, and mesmerizing cosmic animations.">
  <meta property="og:image" content="/assets/labverse-og-image.png">
  <meta property="og:url" content="https://labverse.co.za">
  <meta name="twitter:card" content="summary_large_image">
  <title>Labverse Speed Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Source+Code+Pro:wght@400;700&family=Exo+2:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-blue: #00ddeb;
      --neon-magenta: #ff00ff;
      --neon-cyan: #00f2fe;
      --light-aura: #e6f0ff;
      --dark-space: #0a0e22;
      --card-bg: rgba(20, 30, 60, 0.85);
      --glow-radius: 20px;
      --neon-border: rgba(0, 242, 254, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Source Code Pro', monospace;
    }

    html, body {
      height: 100vh;
      width: 100%;
      background: var(--dark-space);
      color: var(--light-aura);
      overflow-x: hidden;
    }

    #vanta-bg {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      z-index: 1;
      opacity: 0.7;
    }

    #background-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      opacity: 0.9;
    }

    .container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      width: 90%;
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 1rem;
      gap: 1rem;
    }

    header {
      padding: 0.5rem 0;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 3px;
      animation: glow 1.5s ease-in-out infinite alternate;
      text-shadow: 0 0 20px var(--neon-cyan);
    }

    @keyframes glow {
      from { text-shadow: 0 0 20px var(--neon-cyan), 0 0 30px var(--neon-blue); }
      to { text-shadow: 0 0 30px var(--neon-magenta), 0 0 40px var(--neon-cyan); }
    }

    .ip-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      width: 100%;
      max-width: 450px;
      background: rgba(20, 30, 60, 0.5);
      padding: 1rem;
      border-radius: 12px;
      border: 1px solid var(--neon-border);
      box-shadow: 0 0 25px rgba(0, 242, 254, 0.3);
      backdrop-filter: blur(5px);
    }

    .ip-label {
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(0.8rem, 1vw, 1rem);
      color: var(--light-aura);
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.8;
    }

    .ip-display {
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(1.2rem, 2.5vw, 1.8rem);
      color: var(--neon-cyan);
      background: rgba(10, 20, 40, 0.8);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--neon-border);
      box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
      word-break: break-all;
      transition: all 0.3s ease;
    }

    .ip-display:hover {
      box-shadow: 0 0 30px rgba(0, 242, 254, 0.6);
      transform: scale(1.02);
    }

    .copy-btn {
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-cyan));
      color: var(--dark-space);
      border: none;
      padding: 0.5rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.8rem, 1.2vw, 1rem);
      text-transform: uppercase;
      box-shadow: 0 0 25px rgba(0, 242, 254, 0.5);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .copy-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 35px rgba(0, 242, 254, 0.7);
    }

    .copy-btn:active {
      transform: scale(0.95);
    }

    .network-info {
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(0.8rem, 1vw, 1rem);
      color: var(--light-aura);
      max-width: 350px;
      line-height: 1.5;
      opacity: 0.8;
      text-shadow: 0 0 5px rgba(0, 242, 254, 0.3);
    }

    .error-message {
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(0.8rem, 1vw, 1rem);
      color: #ff5555;
      margin-top: 0.5rem;
      display: none;
      text-shadow: 0 0 5px rgba(255, 85, 85, 0.5);
    }

    .speed-test-card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 1.5rem;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5), 0 0 60px rgba(0, 242, 254, 0.2) inset;
      backdrop-filter: blur(15px);
      border: 2px solid var(--neon-border);
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: visible;
      animation: card-pulse 5s infinite ease-in-out;
    }

    @keyframes card-pulse {
      0% { box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5), 0 0 60px rgba(0, 242, 254, 0.2) inset; }
      50% { box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5), 0 0 80px rgba(0, 242, 254, 0.4) inset; }
      100% { box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5), 0 0 60px rgba(0, 242, 254, 0.2) inset; }
    }

    .test-type {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1rem, 2vw, 1.5rem);
      text-align: center;
      margin-bottom: 1rem;
      color: var(--neon-cyan);
      text-shadow: 0 0 15px var(--neon-cyan);
      letter-spacing: 2px;
    }

    .progress-bar {
      height: 8px;
      width: 100%;
      background: rgba(20, 30, 60, 0.8);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 1.5rem;
      border: 1px solid var(--neon-border);
    }

    .progress {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-cyan));
      border-radius: 4px;
      transition: width 0.3s linear;
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.8);
    }

    .speedometer {
      position: relative;
      width: clamp(250px, 60vw, 350px);
      height: clamp(125px, 30vw, 175px);
      margin: 0 auto 2.5rem;
      visibility: visible;
    }

    .speedometer-canvas {
      width: 100%;
      height: 100%;
      display: block;
      visibility: visible;
    }

    .speed-value {
      position: absolute;
      bottom: -2.5rem;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.5rem, 2.5vw, 2rem);
      font-weight: 700;
      color: var(--neon-cyan);
      z-index: 5;
      text-shadow: 0 0 20px var(--neon-cyan);
    }

    .speed-unit {
      position: absolute;
      bottom: -3.5rem;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(0.8rem, 1vw, 1rem);
      color: var(--light-aura);
      opacity: 0.8;
      z-index: 5;
    }

    .graph-container {
      position: relative;
      height: 200px;
      width: 100%;
      margin: 1.5rem 0;
      background: rgba(20, 30, 60, 0.5);
      border-radius: 10px;
      padding: 15px;
      border: 1px solid var(--neon-border);
      box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
    }

    .graph-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .results {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      gap: 1rem;
      margin-top: 1rem;
      width: 100%;
    }

    .result-box {
      text-align: center;
      padding: 1rem;
      border-radius: 10px;
      background: rgba(20, 30, 60, 0.7);
      flex: 1;
      min-width: 120px;
      border: 1px solid var(--neon-border);
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
      transition: all 0.3s ease;
    }

    .result-box:hover {
      box-shadow: 0 0 25px rgba(0, 242, 254, 0.5);
      transform: scale(1.03);
    }

    .result-label {
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(0.8rem, 1.2vw, 1rem);
      color: var(--light-aura);
      opacity: 0.8;
      margin-bottom: 0.5rem;
    }

    .result-value {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1rem, 1.8vw, 1.5rem);
      font-weight: bold;
      color: var(--neon-cyan);
      text-shadow: 0 0 10px var(--neon-cyan);
    }

    .button-container {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin: 1.5rem 0;
      width: 100%;
    }

    .start-button, .test-again-button {
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-cyan));
      border: none;
      color: var(--dark-space);
      padding: 0.7rem 2rem;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.9rem, 1.4vw, 1.1rem);
      font-weight: bold;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 25px rgba(0, 242, 254, 0.5);
      position: relative;
      overflow: hidden;
    }

    .start-button:hover, .test-again-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 40px rgba(0, 242, 254, 0.7);
    }

    .start-button:active, .test-again-button:active {
      transform: translateY(1px);
    }

    .start-button::after, .test-again-button::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: 0.5s;
    }

    .start-button:hover::after, .test-again-button:hover::after {
      left: 100%;
    }

    .hidden {
      display: none !important;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 0.5rem;
    }

    .loading img {
      width: 48px;
      height: 48px;
      filter: drop-shadow(0 0 10px var(--neon-cyan));
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 14, 34, 0.95);
      z-index: 100;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      padding: 1rem;
    }

    .overlay.active {
      display: flex;
    }

    .overlay iframe {
      width: 100%;
      height: 80%;
      max-width: 900px;
      border: 2px solid var(--neon-border);
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(0, 242, 254, 0.5);
    }

    .close-button {
      background: linear-gradient(90deg, #ff5555, #ff7777);
      border: none;
      color: var(--light-aura);
      padding: 0.5rem 1.5rem;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.8rem, 1.2vw, 1rem);
      font-weight: bold;
      border-radius: 25px;
      cursor: pointer;
      margin-top: 1rem;
      transition: all 0.3s ease;
      box-shadow: 0 0 25px rgba(255, 85, 85, 0.5);
    }

    .close-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 40px rgba(255, 85, 85, 0.7);
    }

    footer {
      position: relative;
      width: 100%;
      text-align: center;
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(0.6rem, 0.8vw, 0.8rem);
      color: var(--light-aura);
      padding: 1.5rem 0;
      margin-top: auto;
      opacity: 0.7;
    }

    footer a {
      color: var(--neon-cyan);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    footer a:hover {
      text-decoration: none;
      text-shadow: 0 0 15px var(--neon-cyan);
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    .fade-out {
      animation: fadeOut 1s ease-in-out forwards;
    }

    @keyframes explode {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.5; }
      100% { transform: scale(2); opacity: 0; }
    }

    @media (max-width: 768px) {
      .container {
        padding: 1rem 0.5rem;
      }

      h1 {
        font-size: clamp(1.2rem, 3vw, 1.8rem);
      }

      .ip-container {
        gap: 0.3rem;
        margin-bottom: 0.8rem;
      }

      .ip-display {
        font-size: clamp(1rem, 2vw, 1.5rem);
        padding: 0.4rem 0.8rem;
      }

      .network-info {
        font-size: clamp(0.7rem, 0.8vw, 0.9rem);
      }

      .speed-test-card {
        padding: 1rem;
      }

      .speedometer {
        width: clamp(200px, 70vw, 300px);
        height: clamp(100px, 35vw, 150px);
        margin-bottom: 3rem;
      }

      .speed-value {
        font-size: clamp(1.2rem, 2vw, 1.8rem);
        bottom: -2.2rem;
      }

      .speed-unit {
        font-size: clamp(0.7rem, 0.8vw, 0.9rem);
        bottom: -3.2rem;
      }

      .graph-container {
        height: 160px;
        margin: 1.2rem 0;
      }

      .button-container {
        flex-direction: row;
        gap: 1rem;
        margin-top: 1.2rem;
      }

      .start-button, .test-again-button {
        font-size: clamp(0.8rem, 1.2vw, 1rem);
        padding: 0.5rem 1.5rem;
        min-width: 120px;
      }
    }

    @media (max-width: 480px) {
      .container {
        width: 95%;
        padding: 0.8rem 0.5rem;
      }

      .speed-test-card {
        padding: 0.8rem;
      }

      .speedometer {
        width: clamp(180px, 80vw, 220px);
        height: clamp(90px, 40vw, 110px);
        margin-bottom: 3.5rem;
      }

      .button-container {
        flex-direction: column;
        gap: 0.8rem;
        align-items: center;
      }

      .start-button, .test-again-button {
        width: 90%;
        font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      }

      .result-box {
        padding: 0.8rem;
        min-width: 100px;
      }
    }
  </style>
</head>
<body>
  <div id="vanta-bg"></div>
  <canvas id="background-canvas"></canvas>

  <div class="container">
    <header>
      <h1>Labverse Speed Test</h1>
    </header>
    <div class="ip-container">
      <div class="ip-label">YOUR PUBLIC IP</div>
      <div class="ip-display" id="ip-display" aria-live="polite">Fetching IP...</div>
      <button class="copy-btn" id="copy-ip-btn" aria-label="Copy IP address">COPY IP</button>
    </div>
    <div class="network-info" id="network-info" aria-live="polite">Fetching network info...</div>
    <div class="error-message" id="error-message">Error fetching data</div>
    <div class="speed-test-card">
      <div class="test-type" id="test-type">Ready to Test</div>
      <div class="progress-bar">
        <div class="progress" id="progress-bar"></div>
      </div>
      <div class="speedometer">
        <canvas class="speedometer-canvas" id="speedometer-canvas"></canvas>
        <div class="speed-value" id="speed-value">0.0</div>
        <div class="speed-unit">Mbps</div>
      </div>
      <div class="graph-container hidden" id="graph-container">
        <canvas class="graph-canvas" id="graph-canvas"></canvas>
      </div>
      <div class="results hidden" id="results-container">
        <div class="result-box">
          <div class="result-label">Download</div>
          <div class="result-value" id="download-result">0 Mbps</div>
        </div>
        <div class="result-box">
          <div class="result-label">Ping</div>
          <div class="result-value" id="ping-result">0 ms</div>
        </div>
      </div>
      <div class="button-container">
        <button class="start-button" id="start-button">Start Test</button>
        <button class="test-again-button hidden" id="test-again-button">Test Again</button>
      </div>
      <div class="loading hidden" id="loading">
        <img src="/assets/loading.svg" alt="Loading" class="animate-spin">
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <iframe id="speed-frame" src=""></iframe>
    <button class="close-button" id="close-overlay">Close</button>
  </div>

  <footer>
    © 2025 Labverse | Powered by <a href="https://onefar.co.za" target="_blank" rel="noopener">1FAR</a>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.net.min.js"></script>
  <script>
    // Initialize Vanta.js background with enhanced settings
    VANTA.NET({
      el: "#vanta-bg",
      mouseControls: true,
      touchControls: true,
      minHeight: 200,
      minWidth: 200,
      scale: 1,
      scaleMobile: 1,
      color: 0x00f2fe,
      backgroundColor: 0x0a0e22,
      points: 12,
      maxDistance: 25,
      spacing: 18,
      showDots: true
    });

    // Utility Functions
    const log = (message) => console.log('[DEBUG] ' + message);

    const copyToClipboard = (text) => {
      navigator.clipboard.writeText(text).catch(() => {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
      });
    };

    // Particle Animations
    let particles = [];
    let mousePos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    const particleCanvas = document.getElementById('background-canvas');
    const particleCtx = particleCanvas.getContext('2d');
    const devicePixelRatio = window.devicePixelRatio || 1;

    function resizeParticleCanvas() {
      particleCanvas.width = window.innerWidth * devicePixelRatio;
      particleCanvas.height = window.innerHeight * devicePixelRatio;
      particleCtx.scale(devicePixelRatio, devicePixelRatio);
    }
    resizeParticleCanvas();

    document.addEventListener('mousemove', (e) => {
      mousePos.x = e.clientX;
      mousePos.y = e.clientY;
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      if (e.touches.length > 0) {
        mousePos.x = e.touches[0].clientX;
        mousePos.y = e.touches[0].clientY;
      }
    }, { passive: true });

    function createParticle(index) {
      const phi = (1 + Math.sqrt(5)) / 2;
      const theta = index * 2 * Math.PI * phi;
      const r = Math.sqrt(index) * 12;
      return {
        x: window.innerWidth / 2 + r * Math.cos(theta),
        y: window.innerHeight / 2 + r * Math.sin(theta),
        vx: (Math.random() - 0.5) * 3,
        vy: (Math.random() - 0.5) * 3,
        life: 800,
        color: `hsl(${Math.random() * 360}, 80%, 70%)`,
        size: Math.random() * 3 + 1
      };
    }

    function initParticles() {
      particles = Array.from({ length: 20 }, (_, i) => createParticle(i));
    }
    initParticles();

    function triggerBigBang(x = window.innerWidth / 2, y = window.innerHeight / 2) {
      particles = Array.from({ length: 50 }, (_, i) => {
        const theta = i * 2 * Math.PI * ((1 + Math.sqrt(5)) / 2);
        const r = Math.sqrt(i) * 20;
        return {
          x: x,
          y: y,
          vx: r * Math.cos(theta) * 0.08,
          vy: r * Math.sin(theta) * 0.08,
          life: 400,
          color: `hsl(${Math.random() * 360}, 80%, 70%)`,
          size: Math.random() * 4 + 2
        };
      });
    }

    function animateParticles() {
      particleCtx.clearRect(0, 0, particleCanvas.width / devicePixelRatio, particleCanvas.height / devicePixelRatio);
      particles = particles.filter(p => {
        if (p.life <= 0) return false;
        p.life--;
        p.x += p.vx + (mousePos.x - window.innerWidth / 2) * 0.0002;
        p.y += p.vy + (mousePos.y - window.innerHeight / 2) * 0.0002;
        p.vx *= 0.97;
        p.vy *= 0.97;
        particleCtx.beginPath();
        particleCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        particleCtx.fillStyle = p.color;
        particleCtx.globalAlpha = p.life / 800;
        particleCtx.fill();
        return true;
      });

      if (particles.length < 20 && Math.random() < 0.15) {
        particles.push(createParticle(particles.length));
      }

      particleCtx.globalAlpha = 1;
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // Debounced Resize Handler
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        resizeParticleCanvas();
        initParticles();
        drawSpeedometer(parseFloat(document.getElementById('speed-value').textContent) || 0);
        drawGraph();
      }, 100);
    }, { passive: true });

    // IP and Location Fetch
    async function fetchIP() {
      const ipDisplay = document.getElementById('ip-display');
      try {
        const response = await fetch('https://api.ipify.org?format=json', { signal: AbortSignal.timeout(5000) });
        if (!response.ok) throw new Error('Network error');
        const data = await response.json();
        ipDisplay.textContent = data.ip;
        return data.ip;
      } catch (error) {
        ipDisplay.textContent = 'N/A';
        document.getElementById('error-message').textContent = 'Failed to fetch IP';
        document.getElementById('error-message').style.display = 'block';
        log('IP fetch error: ' + error.message);
        return 'N/A';
      }
    }

    async function fetchLocationInfo() {
      const networkInfo = document.getElementById('network-info');
      try {
        const response = await fetch('https://ipinfo.io/json', { signal: AbortSignal.timeout(5000) });
        const data = await response.json();
        const info = {
          isp: data.org || 'N/A',
          city: data.city || 'N/A',
          country: data.country || 'N/A'
        };
        networkInfo.innerHTML = `ISP: ${info.isp}<br>Location: ${info.city}, ${info.country}`;
        return info;
      } catch (error) {
        log('ipinfo.io fetch error: ' + error.message);
        try {
          const response = await fetch('https://ip-api.com/json/?fields=status,message,country,city,isp', { signal: AbortSignal.timeout(5000) });
          let data = await response.json();
          if (data.status !== 'success') throw new Error(data.message || 'Failed to fetch location info');
          const info = {
            isp: data.isp || 'N/A',
            city: data.city || 'N/A',
            country: data.country || 'N/A'
          };
          networkInfo.innerHTML = `ISP: ${info.isp}<br>Location: ${info.city}, ${info.country}`;
          return info;
        } catch (fallbackError) {
          networkInfo.innerHTML = `ISP: N/A<br>Location: N/A`;
          document.getElementById('error-message').textContent = 'Failed to fetch network info';
          document.getElementById('error-message').style.display = 'block';
          log('ip-api.com fetch error: ' + fallbackError.message);
          return { isp: 'N/A', city: 'N/A', country: 'N/A' };
        }
      }
    }

    // Speedometer
    function drawSpeedometer(speed) {
      const canvas = document.getElementById('speedometer-canvas');
      const ctx = canvas.getContext('2d');
      if (!ctx) {
        log('Speedometer canvas context not available');
        return;
      }
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      canvas.width = width * devicePixelRatio;
      canvas.height = height * devicePixelRatio;
      ctx.scale(devicePixelRatio, devicePixelRatio);

      ctx.clearRect(0, 0, width, height);
      const maxSpeed = 1000;
      const speeds = [0, 1, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50];
      let displaySpeeds = [...speeds];
      if (speed > 55) {
        displaySpeeds = [...speeds, 100, 200, 500, 1000];
      }

      const centerX = width / 2;
      const centerY = height;
      const radius = Math.min(width / 2, height) * 0.85;

      // Draw background arc with gradient
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius, Math.PI, 2 * Math.PI);
      const bgGradient = ctx.createLinearGradient(0, 0, width, 0);
      bgGradient.addColorStop(0, 'rgba(0, 221, 235, 0.3)');
      bgGradient.addColorStop(1, 'rgba(0, 242, 254, 0.3)');
      ctx.strokeStyle = bgGradient;
      ctx.lineWidth = 14;
      ctx.stroke();

      // Calculate angle for speed
      let visualAngle;
      if (speed <= 50) {
        visualAngle = (speed / 50) * Math.PI * 0.5;
      } else {
        const excessSpeed = speed - 50;
        visualAngle = Math.PI * 0.5 + (excessSpeed / (maxSpeed - 50)) * Math.PI * 0.5;
      }

      // Draw speed arc
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius, Math.PI, Math.PI + visualAngle);
      const speedGradient = ctx.createLinearGradient(0, 0, width, 0);
      speedGradient.addColorStop(0, '#00ddeb');
      speedGradient.addColorStop(1, '#00f2fe');
      ctx.strokeStyle = speedGradient;
      ctx.lineWidth = 14;
      ctx.stroke();

      // Add glow effect to speed arc
      ctx.shadowColor = 'rgba(0, 242, 254, 0.9)';
      ctx.shadowBlur = 20;
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Draw needle
      ctx.save();
      ctx.translate(centerX, centerY);
      ctx.rotate(Math.PI + visualAngle);
      ctx.beginPath();
      ctx.moveTo(-6, 0);
      ctx.lineTo(radius - 25, 0);
      ctx.lineTo(0, -6);
      ctx.fillStyle = '#e0e0ff';
      ctx.shadowColor = 'rgba(255, 255, 255, 0.9)';
      ctx.shadowBlur = 15;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.restore();

      // Draw center circle
      ctx.beginPath();
      ctx.arc(centerX, centerY, 10, 0, 2 * Math.PI);
      ctx.fillStyle = '#0a0e22';
      ctx.fill();
      ctx.strokeStyle = '#00f2fe';
      ctx.lineWidth = 3;
      ctx.stroke();

      // Draw speed scale and labels
      ctx.font = `12px 'Exo 2', sans-serif`;
      ctx.fillStyle = '#e0e0ff';
      ctx.textAlign = 'center';

      displaySpeeds.forEach((s) => {
        let tickAngle;
        if (s <= 50) {
          tickAngle = Math.PI + (s / 50) * Math.PI * 0.5;
        } else {
          const excessSpeed = s - 50;
          tickAngle = Math.PI * 1.5 + (excessSpeed / (maxSpeed - 50)) * Math.PI * 0.5;
        }

        const labelRadius = radius + (s === 0 || s === 1000 ? 30 : 25);
        const labelX = centerX + labelRadius * Math.cos(tickAngle);
        const labelY = centerY + labelRadius * Math.sin(tickAngle);

        // Draw tick marks
        const tickStartRadius = radius - 6;
        const tickEndRadius = radius + 6;
        const tickStartX = centerX + tickStartRadius * Math.cos(tickAngle);
        const tickStartY = centerY + tickStartRadius * Math.sin(tickAngle);
        const tickEndX = centerX + tickEndRadius * Math.cos(tickAngle);
        const tickEndY = centerY + tickEndRadius * Math.sin(tickAngle);

        ctx.beginPath();
        ctx.moveTo(tickStartX, tickStartY);
        ctx.lineTo(tickEndX, tickEndY);
        ctx.strokeStyle = '#8492b4';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        let xOffset = 0;
        if (s === 0) xOffset = 15;
        if (s === 1000) xOffset = -15;
        ctx.fillText(s, labelX + xOffset, labelY + 5);
      });
    }

    function animateSpeedometer(targetSpeed) {
      let currentSpeed = parseFloat(document.getElementById('speed-value').textContent) || 0;
      const step = (targetSpeed - currentSpeed) / 30;

      function update() {
        currentSpeed += step;
        if (Math.abs(currentSpeed - targetSpeed) < 0.1) currentSpeed = targetSpeed;
        document.getElementById('speed-value').textContent = currentSpeed.toFixed(1);
        drawSpeedometer(currentSpeed);
        if (Math.abs(currentSpeed - targetSpeed) >= 0.1) {
          requestAnimationFrame(update);
        }
      }
      requestAnimationFrame(update);
    }

    // Graph
    let graphData = [];
    let graphActive = true;

    function drawGraph() {
      if (!graphActive) return;

      const canvas = document.getElementById('graph-canvas');
      const ctx = canvas.getContext('2d');
      if (!ctx) {
        log('Graph canvas context not available');
        return;
      }
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      canvas.width = width * devicePixelRatio;
      canvas.height = height * devicePixelRatio;
      ctx.scale(devicePixelRatio, devicePixelRatio);

      ctx.clearRect(0, 0, width, height);
      const maxSpeed = 1000;
      const maxTime = 45;
      const padding = { left: 60, right: 30, top: 30, bottom: 40 };

      // Draw axes
      ctx.beginPath();
      ctx.moveTo(padding.left, padding.top);
      ctx.lineTo(padding.left, height - padding.bottom);
      ctx.lineTo(width - padding.right, height - padding.bottom);
      ctx.strokeStyle = 'rgba(0, 242, 254, 0.5)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Draw Y-axis labels
      const baseSpeeds = [0, 1, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50];
      let speeds = [...baseSpeeds];
      const maxDataSpeed = Math.max(...graphData.map(d => d.speed), 55);
      if (maxDataSpeed > 55) {
        speeds = [...baseSpeeds, 100, 200, 500, 1000];
      }

      ctx.font = `12px 'Exo 2', sans-serif`;
      ctx.fillStyle = '#e0e0ff';
      ctx.textAlign = 'right';

      speeds.forEach((level) => {
        let y;
        if (level <= 50) {
          y = height - padding.bottom - (level / 50) * (height - padding.top - padding.bottom) * 0.5;
        } else {
          const excessSpeed = level - 50;
          const excessProportion = excessSpeed / (maxSpeed - 50);
          y = (height - padding.bottom - padding.top) * 0.5 - excessProportion * (height - padding.top - padding.bottom) * 0.5;
        }

        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(width - padding.right, y);
        ctx.strokeStyle = 'rgba(0, 242, 254, 0.2)';
        ctx.stroke();

        if ([0, 5, 30, 50, 100, 500, 1000].includes(level)) {
          ctx.fillText(level, padding.left - 10, y + 4);
        }
      });

      // Draw X-axis labels
      ctx.textAlign = 'center';
      for (let t = 0; t <= maxTime; t += 9) {
        const x = padding.left + (t / maxTime) * (width - padding.left - padding.right);
        ctx.fillText(t, x, height - padding.bottom + 20);
      }

      // Plot data
      if (graphData.length > 0) {
        ctx.beginPath();
        let startX = padding.left;
        let startY = height - padding.bottom;

        if (graphData[0].speed > 0) {
          if (graphData[0].speed <= 50) {
            startY = height - padding.bottom - (graphData[0].speed / 50) * (height - padding.top - padding.bottom) * 0.5;
          } else {
            const excessSpeed = graphData[0].speed - 50;
            const excessProportion = excessSpeed / (maxSpeed - 50);
            startY = (height - padding.bottom - padding.top) * 0.5 - excessProportion * (height - padding.top - padding.bottom) * 0.5;
          }
        }

        ctx.moveTo(startX, startY);

        graphData.forEach((point) => {
          const x = padding.left + (point.time / maxTime) * (width - padding.left - padding.right);
          let y;
          if (point.speed <= 50) {
            y = height - padding.bottom - (point.speed / 50) * (height - padding.top - padding.bottom) * 0.5;
          } else {
            const excessSpeed = point.speed - 50;
            const excessProportion = excessSpeed / (maxSpeed - 50);
            y = (height - padding.bottom - padding.top) * 0.5 - excessProportion * (height - padding.top - padding.bottom) * 0.5;
          }
          ctx.lineTo(x, y);
        });

        ctx.strokeStyle = '#00f2fe';
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.shadowColor = 'rgba(0, 242, 254, 0.9)';
        ctx.shadowBlur = 10;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      // Add axis labels
      ctx.font = `14px 'Exo 2', sans-serif`;
      ctx.fillStyle = '#e0e0ff';
      ctx.textAlign = 'center';
      ctx.fillText('Time (seconds)', width / 2, height - 10);

      ctx.save();
      ctx.translate(20, height / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText('Speed (Mbps)', 0, 0);
      ctx.restore();
    }

    function updateGraph(time, speed) {
      if (!graphActive) return;
      graphData.push({ time, speed });
      if (graphData.length > 300) graphData.shift();
      drawGraph();
    }

    function resetGraph() {
      graphData = [{ time: 0, speed: 0 }];
      graphActive = true;
      document.getElementById('graph-container').classList.remove('hidden');
      drawGraph();
    }

    function animateGraphEnd() {
      const canvas = document.getElementById('graph-canvas');
      const graphContainer = document.getElementById('graph-container');
      canvas.classList.add('fade-out');
      setTimeout(() => {
        graphActive = false;
        graphContainer.classList.add('hidden');
        canvas.classList.remove('fade-out');
      }, 1000);
    }

    // Speed Test
    const CONFIG = {
      testServer: {
        downloadUrl: '/assets/25mb.bin',
        pingResource: '/assets/ping-test.txt',
      },
      testDurations: { download: 45000, ping: 5000 },
      maxTestTimeout: 50000,
    };

    function initializeSpeedTest() {
      const startButton = document.getElementById('start-button');
      const testAgainButton = document.getElementById('test-again-button');
      const progressBar = document.getElementById('progress-bar');
      const testType = document.getElementById('test-type');
      const speedValue = document.getElementById('speed-value');
      const graphContainer = document.getElementById('graph-container');
      const resultsContainer = document.getElementById('results-container');
      const downloadResult = document.getElementById('download-result');
      const pingResult = document.getElementById('ping-result');
      const loading = document.getElementById('loading');
      const overlay = document.getElementById('overlay');
      const speedFrame = document.getElementById('speed-frame');
      const closeOverlay = document.getElementById('close-overlay');

      let testActive = false;
      let controller = null;
      let finalDownloadSpeed = 0;
      let finalPing = 0;
      let lastGraphUpdate = 0;

      async function runPingTest() {
        testType.textContent = 'Testing Ping';
        const pingTimes = [];
        for (let i = 0; i < 15 && testActive; i++) {
          try {
            const start = performance.now();
            await fetch(`${CONFIG.testServer.pingResource}?t=${Date.now()}`, { cache: 'no-store', signal: AbortSignal.timeout(2000) });
            const ping = performance.now() - start;
            pingTimes.push(ping);
            log(`Ping #${i + 1}: ${ping.toFixed(2)}ms`);
          } catch (error) {
            pingTimes.push(999);
            log(`Ping #${i + 1} failed: ${error.message}`);
          }
          await new Promise(resolve => setTimeout(resolve, 333));
        }
        const successfulPings = pingTimes.filter(t => t !== 999);
        finalPing = successfulPings.length ? successfulPings.reduce((sum, t) => sum + t, 0) / successfulPings.length : 999;
        pingResult.textContent = `${finalPing.toFixed(0)} ms`;
      }

      async function runDownloadTest() {
        testType.textContent = 'Testing Download Speed';
        let totalBytes = 0;
        let startTime = performance.now();
        const overallTimeout = setTimeout(() => {
          testActive = false;
          if (controller) controller.abort();
          finalizeTest();
        }, CONFIG.maxTestTimeout);

        try {
          controller = new AbortController();
          const response = await fetch(CONFIG.testServer.downloadUrl, {
            cache: 'no-store',
            signal: controller.signal
          });

          if (!response.ok) throw new Error('Failed to fetch download resource');
          const reader = response.body.getReader();
          let lastUpdate = performance.now();

          while (testActive) {
            const { done, value } = await reader.read();
            if (done) break;

            totalBytes += value ? value.length : 0;
            const elapsed = (performance.now() - startTime) / 1000;

            if (performance.now() - lastUpdate >= 100) {
              const speed = elapsed > 0 ? ((totalBytes * 8) / elapsed) / (1024 * 1024) : 0;
              progressBar.style.width = `${Math.min(100, (elapsed / (CONFIG.testDurations.download / 1000)) * 100)}%`;
              speedValue.textContent = speed.toFixed(1);
              animateSpeedometer(speed);
              if (performance.now() - lastGraphUpdate >= 100) {
                updateGraph(elapsed, speed);
                lastGraphUpdate = performance.now();
              }
              lastUpdate = performance.now();
            }

            if (elapsed >= CONFIG.testDurations.download / 1000) break;
          }
        } catch (error) {
          log('Download error: ' + error.message);
        } finally {
          clearTimeout(overallTimeout);
          controller = null;
        }

        const totalTime = (performance.now() - startTime) / 1000;
        finalDownloadSpeed = totalTime > 0 ? ((totalBytes * 8) / totalTime) / (1024 * 1024) : 0;
        downloadResult.textContent = `${finalDownloadSpeed.toFixed(1)} Mbps`;
      }

      function finalizeTest() {
        if (!finalDownloadSpeed && !finalPing) {
          document.getElementById('error-message').textContent = 'Speed test failed. Please try again.';
          document.getElementById('error-message').style.display = 'block';
          startButton.textContent = 'Start Test';
        } else {
          resultsContainer.classList.remove('hidden');
          startButton.textContent = 'More Info';
          testAgainButton.classList.remove('hidden');
          triggerBigBang();
          setTimeout(() => {
            animateSpeedometer(0);
            animateGraphEnd();
          }, 1500);
        }
        startButton.disabled = false;
        testActive = false;
        loading.classList.add('hidden');
      }

      async function runTest() {
        testActive = true;
        startButton.disabled = true;
        startButton.textContent = 'Testing...';
        testAgainButton.classList.add('hidden');
        loading.classList.remove('hidden');
        progressBar.style.width = '0';
        speedValue.textContent = '0.0';
        animateSpeedometer(0);
        resetGraph();
        graphContainer.classList.remove('hidden');
        resultsContainer.classList.add('hidden');
        document.getElementById('error-message').style.display = 'none';

        try {
          await runPingTest();
          if (testActive) await runDownloadTest();
          if (testActive) finalizeTest();
        } catch (error) {
          log('Test error: ' + error.message);
          finalizeTest();
        }
      }

      drawSpeedometer(0);
      drawGraph();

      startButton.addEventListener('click', () => {
        if (startButton.textContent === 'More Info') {
          speedFrame.src = 'https://speed.cloudflare.com';
          overlay.classList.add('active');
        } else {
          runTest();
        }
      });

      testAgainButton.addEventListener('click', runTest);

      closeOverlay.addEventListener('click', () => {
        overlay.classList.remove('active');
        speedFrame.src = '';
      });

      window.addEventListener('beforeunload', () => {
        testActive = false;
        if (controller) controller.abort();
      });
    }

    // Main Initialization
    document.addEventListener('DOMContentLoaded', async () => {
      initializeSpeedTest();
      const ip = await fetchIP();
      await fetchLocationInfo();
      const copyButton = document.getElementById('copy-ip-btn');
      copyButton.addEventListener('click', (e) => {
        if (ip !== 'N/A') {
          copyToClipboard(ip);
          const rect = copyButton.getBoundingClientRect();
          const x = rect.left + rect.width / 2;
          const y = rect.top + rect.height / 2;
          triggerBigBang(x, y);
        }
      });
    });
  </script>
</body>
</html>
