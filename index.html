<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Labverse — Cyber Lab for AI, Hacking, Cybersecurity, and Future Tech Experiments. Unlock the Future." />
  <meta name="keywords" content="Labverse, Cyber Lab, AI, Hacking, Cybersecurity, South Africa, Future Tech, Sandton" />
  <meta name="author" content="Labverse Team" />
  <meta property="og:title" content="Labverse | Cyber Labs of the Future" />
  <meta property="og:description" content="Where AI, Cybersecurity, and Hacking experiments unfold. Welcome to the future." />
  <meta property="og:image" content="https://labverse.co.za/assets/labverse-og-image.png" />
  <meta property="og:url" content="https://labverse.co.za" />
  <meta name="twitter:card" content="summary_large_image" />

  <title>Labverse | View Public IP</title>

  <!-- Favicon -->
  <link rel="icon" href="favicon.ico" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Source+Code+Pro&display=swap" rel="stylesheet">

  <!-- Style -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background: radial-gradient(ellipse at center, #0a0a0a 0%, #000000 100%);
      font-family: 'Orbitron', sans-serif;
      color: white;
      overflow: hidden;
    }

    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 10;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 1rem;
    }

    h1 {
      font-size: 3rem;
      background: linear-gradient(90deg, #00fff7, #8a2be2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
      animation: glow 3s infinite ease-in-out;
    }

    @keyframes glow {
      0% { text-shadow: 0 0 5px #00fff7; }
      50% { text-shadow: 0 0 20px #8a2be2; }
      100% { text-shadow: 0 0 5px #00fff7; }
    }

    p {
      font-family: 'Source Code Pro', monospace;
      font-size: 1.2rem;
      margin-bottom: 2rem;
      color: #d0d0d0;
      max-width: 600px;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      background: #00fff7;
      border: none;
      color: #000;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 1rem;
    }

    .btn:hover {
      background: #8a2be2;
      color: white;
    }

    footer {
      position: absolute;
      bottom: 10px;
      width: 100%;
      text-align: center;
      font-size: 0.9rem;
      color: #888;
      z-index: 10;
    }

    @media (max-width: 600px) {
      h1 { font-size: 2rem; }
      p { font-size: 1rem; }
    }
  </style>

  <!-- Particles.js -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
</head>

<body>
  <div id="particles-js"></div>

  <div class="container">
    <h1>Welcome to Labverse</h1>
    <p>View Public IP.</p>
    
    <button class="btn" onclick="copyToClipboard()">Copy IP</button>
  </div>

  <footer>
    &copy; 2025 Labverse | Powered by 1FAR 🌌
  </footer>

  <!-- Clipboard Script -->
  <script>
    function copyToClipboard() {
      const dummy = document.createElement("textarea");
      dummy.value = "https://labverse.co.za";
      document.body.appendChild(dummy);
      dummy.select();
      document.execCommand("copy");
      document.body.removeChild(dummy);
      alert("URL copied to clipboard!");
    }
  </script>

  <!-- Particle Background Config -->
  <script>
    particlesJS("particles-js", {
      particles: {
        number: { value: 90, density: { enable: true, value_area: 800 } },
        color: { value: "#00fff7" },
        shape: {
          type: "circle",
          stroke: { width: 0, color: "#000" },
        },
        opacity: {
          value: 0.5,
          random: true,
        },
        size: {
          value: 3,
          random: true,
        },
        line_linked: {
          enable: true,
          distance: 150,
          color: "#8a2be2",
          opacity: 0.3,
          width: 1,
        },
        move: {
          enable: true,
          speed: 1.5,
          direction: "none",
          random: false,
          straight: false,
          out_mode: "out",
        },
      },
      interactivity: {
        detect_on: "canvas",
        events: {
          onhover: { enable: true, mode: "repulse" },
          onclick: { enable: true, mode: "push" },
          resize: true,
        },
        modes: {
          repulse: { distance: 100, duration: 0.4 },
          push: { particles_nb: 4 },
        },
      },
      retina_detect: true,
    });
  </script>
</body>
</html>
