<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Discover your public IP and internet speed with a glowing LED cube and sacred Flower of Life animations.">
  <meta name="keywords" content="Public IP, Internet Speed Test, Flower of Life, Fibonacci, Quantum Physics">
  <meta name="author" content="Labverse Team">
  <meta property="og:title" content="Labverse: IP & Speed Insights">
  <meta property="og:description" content="Explore your network with a vibrant LED cube and precise sacred geometry.">
  <meta property="og:image" content="https://labverse.co.za/assets/labverse-og-image.png">
  <meta property="og:url" content="https://labverse.co.za">
  <meta name="twitter:card" content="summary_large_image">

  <title>Labverse: IP & Speed Insights</title>

  <!-- Favicon -->
  <link rel="icon" href="favicon.ico">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">

  <!-- Style -->
  <style>
    :root {
      --cosmic-blue: #00b7eb;
      --cosmic-magenta: #ff4d94;
      --cosmic-cyan: #4dffeb;
      --cosmic-purple: #cc66ff;
      --light-aura: #e6f0ff;
      --glow-radius: 10px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Source Code Pro', monospace;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: #000;
      color: var(--light-aura);
      overflow: hidden;
      touch-action: none;
    }

    #background-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    #webgl-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: clamp(1rem, 3vw, 1.5rem);
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      text-transform: uppercase;
      color: var(--light-aura);
      margin-bottom: clamp(1rem, 2.5vw, 1.5rem);
      text-shadow: 0 0 8px var(--cosmic-blue);
      letter-spacing: 0.15rem;
    }

    .ip-display {
      font-size: clamp(1.5rem, 3.5vw, 2.5rem);
      color: var(--light-aura);
      background: rgba(8, 8, 26, 0.9);
      padding: clamp(0.8rem, 2vw, 1rem) clamp(1.5rem, 3vw, 2rem);
      border-radius: 10px;
      border: 2px solid var(--cosmic-blue);
      box-shadow: 0 0 15px var(--cosmic-blue);
      margin-bottom: clamp(0.5rem, 1.5vw, 0.8rem);
      text-shadow: 0 0 8px var(--cosmic-blue);
      word-break: break-all;
    }

    .network-info {
      font-size: clamp(0.8rem, 1.8vw, 1.1rem);
      color: var(--light-aura);
      max-width: clamp(200px, 80vw, 400px);
      line-height: 1.5;
      text-shadow: 0 0 5px var(--cosmic-blue);
      margin-bottom: clamp(0.5rem, 1vw, 0.8rem);
    }

    .speed-results {
      font-size: clamp(0.7rem, 1.5vw, 0.9rem);
      color: var(--cosmic-cyan);
      max-width: clamp(200px, 80vw, 400px);
      line-height: 1.5;
      text-shadow: 0 0 5px var(--cosmic-cyan);
      margin-bottom: clamp(0.5rem, 1vw, 0.8rem);
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .speed-results.show {
      opacity: 1;
    }

    .speed-test-container {
      text-align: center;
      margin-bottom: clamp(0.5rem, 1vw, 0.8rem);
      width: 100%;
      max-width: 600px;
    }

    .speed-test-container div {
      min-height: 180px;
      position: relative;
      width: 100%;
      height: 0;
      padding-bottom: 50%;
    }

    .speed-test-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      min-height: 180px;
      border: none;
      overflow: hidden !important;
    }

    .speed-test-attribution {
      font-size: clamp(0.6rem, 1.2vw, 0.8rem);
      color: var(--cosmic-cyan);
      text-shadow: 0 0 5px var(--cosmic-cyan);
    }

    .speed-test-attribution a {
      color: var(--cosmic-cyan);
      text-decoration: none;
    }

    .speed-test-attribution a:hover {
      text-decoration: underline;
    }

    .error-message {
      font-size: clamp(0.7rem, 1.5vw, 0.9rem);
      color: #ff5555;
      margin-top: 1rem;
      text-shadow: 0 0 5px var(--cosmic-blue);
      display: none;
    }

    .btn {
      background: linear-gradient(90deg, var(--cosmic-blue), var(--cosmic-magenta));
      color: var(--light-aura);
      border: none;
      padding: clamp(0.6rem, 1.5vw, 0.8rem) clamp(1.5rem, 3vw, 2rem);
      border-radius: 8px;
      cursor: pointer;
      font-size: clamp(0.8rem, 1.5vw, 1rem);
      text-transform: uppercase;
      box-shadow: 0 0 var(--glow-radius) var(--cosmic-blue);
      transition: all 0.3s ease;
      margin-top: clamp(0.5rem, 1vw, 0.8rem);
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 calc(var(--glow-radius) * 1.5) var(--cosmic-magenta);
      background: var(--cosmic-cyan);
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: clamp(0.5rem, 1.5vw, 1rem);
      text-align: center;
      font-size: clamp(0.7rem, 1.5vw, 0.9rem);
      color: var(--light-aura);
      z-index: 10;
      text-shadow: 0 0 5px var(--cosmic-blue);
    }

    @media (max-width: 768px) {
      .container {
        padding: clamp(0.5rem, 2vw, 1rem);
      }

      h1 {
        font-size: clamp(1.5rem, 4vw, 2.5rem);
      }

      .ip-display {
        font-size: clamp(1.2rem, 3vw, 2rem);
        padding: clamp(0.5rem, 1.5vw, 0.8rem) clamp(1rem, 2vw, 1.5rem);
      }

      .network-info, .speed-results, .error-message {
        font-size: clamp(0.6rem, 1.2vw, 0.9rem);
        max-width: 90vw;
      }

      .speed-test-container div {
        min-height: 150px;
      }

      .speed-test-container iframe {
        min-height: 150px;
      }

      .btn {
        padding: clamp(0.4rem, 1vw, 0.6rem) clamp(1rem, 2vw, 1.5rem);
        font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: clamp(1.2rem, 3.5vw, 2rem);
      }

      .ip-display {
        font-size: clamp(1rem, 2.5vw, 1.5rem);
      }

      .network-info, .speed-results, .error-message {
        font-size: clamp(0.5rem, 1vw, 0.8rem);
      }

      .speed-test-container div {
        min-height: 120px;
      }

      .speed-test-container iframe {
        min-height: 120px;
      }
    }
  </style>
</head>

<body>
  <canvas id="background-canvas"></canvas>
  <canvas id="webgl-canvas"></canvas>

  <div class="container">
    <h1>Labverse: Network Insights</h1>
    <div class="ip-display" id="ip-display">Fetching IP...</div>
    <div class="network-info" id="network-info">Fetching network info...</div>
    <div class="speed-test-container">
      <div>
        <iframe src="https://openspeedtest.com/speedtest" allowfullscreen></iframe>
      </div>
      <div class="speed-test-attribution">Powered by <a href="https://labverse.co.za" target="_blank">Labverse SpeedTest</a></div>
    </div>
    <div class="error-message" id="error-message">Animations failed. Please check your browser settings.</div>
    <button class="btn" id="copy-ip-btn">Copy IP</button>
  </div>

  <footer>
    © 2025 Labverse | Powered by 1FAR | WHAT IS MY IP ADDRESS
  </footer>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // Debug Logging
    function logDebug(message) {
      console.log('[DEBUG] ' + message);
    }

    // Fetch Public IP
    async function fetchPublicIP() {
      try {
        const response = await fetch('https://api.ipify.org?format=json');
        if (!response.ok) throw new Error('IP fetch failed');
        const data = await response.json();
        document.getElementById('ip-display').textContent = data.ip;
        return data.ip;
      } catch (error) {
        document.getElementById('ip-display').textContent = 'IP unavailable';
        logDebug('IP Fetch Error: ' + error.message);
        return null;
      }
    }

    // Fetch Network Info
    async function fetchNetworkInfo() {
      const endpoints = [
        { url: 'https://get.geojs.io/v1/ip/geo.json', parser: (data) => ({
          isp: data.organization_name || 'Unknown',
          city: data.city || 'Unknown',
          country: data.country || 'Unknown'
        }) },
        { url: 'https://ipinfo.io/json', parser: (data) => ({
          isp: data.org?.split(' ').slice(1).join(' ') || 'Unknown',
          city: data.city || 'Unknown',
          country: data.country || 'Unknown'
        }) }
      ];
      
      for (const { url, parser } of endpoints) {
        try {
          const response = await fetch(url);
          if (!response.ok) continue;
          const data = await response.json();
          const networkData = parser(data);
          document.getElementById('network-info').innerHTML = `ISP: ${networkData.isp}<br>Location: ${networkData.city}, ${networkData.country}`;
          return;
        } catch (error) {
          logDebug(`Network Info Fetch Error (${url}): ${error.message}`);
        }
      }
      document.getElementById('network-info').innerHTML = `ISP: Unknown<br>Location: Unknown`;
    }

    // Flower of Life Background
    function initBackgroundCanvas() {
      try {
        const canvas = document.getElementById('background-canvas');
        const ctx = canvas.getContext('2d');
        if (!ctx) throw new Error('2D canvas context not supported');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const PI = Math.PI;
        const SQRT3 = Math.sqrt(3);

        function drawFlowerOfLife(time) {
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          // Cosmic Gradient
          const gradient = ctx.createRadialGradient(
            canvas.width / 2, canvas.height / 2, 0,
            canvas.width / 2, canvas.height / 2, Math.max(canvas.width, canvas.height)
          );
          gradient.addColorStop(0, 'rgba(10, 10, 30, 1)');
          gradient.addColorStop(0.4, 'rgba(20, 50, 80, 0.9)');
          gradient.addColorStop(0.8, 'rgba(5, 15, 40, 0.7)');
          gradient.addColorStop(1, 'rgba(0, 0, 0, 1)');
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          // Stars
          for (let i = 0; i < 200; i++) {
            ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.5 + 0.3})`;
            ctx.beginPath();
            ctx.arc(
              Math.random() * canvas.width,
              Math.random() * canvas.height,
              Math.random() * 1.5,
              0, 2 * PI
            );
            ctx.fill();
          }

          // Accurate Flower of Life
          ctx.strokeStyle = `rgba(100, 200, 255, ${0.3 + Math.sin(time * 0.001) * 0.2})`;
          ctx.lineWidth = 1.5;
          const centerX = canvas.width / 2;
          const centerY = canvas.height / 2;
          const radius = Math.min(canvas.width, canvas.height) / 10;
          const anim = Math.sin(time * 0.0004) * 5;
          const positions = [
            { x: 0, y: 0 },
            ...Array.from({ length: 6 }, (_, i) => ({
              x: radius * Math.cos(i * PI / 3),
              y: radius * Math.sin(i * PI / 3)
            })),
            ...Array.from({ length: 12 }, (_, i) => {
              const angle = i * PI / 6;
              const r = radius * SQRT3;
              return {
                x: r * Math.cos(angle),
                y: r * Math.sin(angle)
              };
            })
          ];

          positions.forEach(pos => {
            ctx.beginPath();
            ctx.arc(centerX + pos.x + anim, centerY + pos.y + anim, radius, 0, 2 * PI);
            ctx.stroke();
          });
        }

        function animateBackground(time) {
          requestAnimationFrame(animateBackground);
          drawFlowerOfLife(time);
        }
        animateBackground(0);

        window.addEventListener('resize', () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }, { passive: true });

        return true;
      } catch (error) {
        logDebug('Background Canvas Initialization Error: ' + error.message);
        return false;
      }
    }

    // WebGL Cube with LED Particles
    function initWebGL() {
      try {
        const canvas = document.getElementById('webgl-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 2.5);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);

        // Post-processing
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);
        const bloomPass = new UnrealBloomPass(
          new THREE.Vector2(window.innerWidth, window.innerHeight),
          0.8,
          0.4,
          0.7
        );
        composer.addPass(bloomPass);

        // Cube
        const cubeGeometry = new THREE.BoxGeometry(1, 1, 1);
        const cubeMaterial = new THREE.MeshBasicMaterial({
          color: 0x000000,
          transparent: true,
          opacity: 0.1,
          wireframe: true
        });
        const cube = new THREE.Mesh(cubeGeometry, cubeMaterial);
        scene.add(cube);

        // Cube Edges (LED Lines)
        const edgeGeometry = new THREE.EdgesGeometry(cubeGeometry);
        const edgeMaterial = new THREE.ShaderMaterial({
          uniforms: {
            time: { value: 0 },
            uColor1: { value: new THREE.Color('#ff4d94') },
            uColor2: { value: new THREE.Color('#4dffeb') },
            uColor3: { value: new THREE.Color('#cc66ff') }
          },
          vertexShader: `
            varying vec3 vPosition;
            void main() {
              vPosition = position;
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
          `,
          fragmentShader: `
            uniform float time;
            uniform vec3 uColor1;
            uniform vec3 uColor2;
            uniform vec3 uColor3;
            varying vec3 vPosition;
            void main() {
              float t1 = sin(time * 0.5) * 0.5 + 0.5;
              float t2 = sin(time * 0.3 + 3.141592653589793) * 0.5 + 0.5;
              vec3 color = mix(uColor1, uColor2, t1);
              color = mix(color, uColor3, t2);
              float pulse = sin(time * 2.0 + vPosition.x * 0.5) * 0.5 + 0.5;
              gl_FragColor = vec4(color * (1.0 + pulse), 1.0);
            }
          `,
          transparent: true
        });
        const edges = new THREE.LineSegments(edgeGeometry, edgeMaterial);
        cube.add(edges);

        // LED Particles Inside Cube
        const phi = (1 + Math.sqrt(5)) / 2;
        const particleCount = 50;
        const particleGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const offsets = new Float32Array(particleCount);
        for (let i = 0; i < particleCount; i++) {
          const theta = i * 2 * Math.PI * phi;
          const r = Math.sqrt(i) * 0.3;
          positions[i * 3] = r * Math.cos(theta) * 0.4;
          positions[i * 3 + 1] = r * Math.sin(theta) * 0.4;
          positions[i * 3 + 2] = (Math.random() - 0.5) * 0.4;
          offsets[i] = Math.random() * 2 * Math.PI;
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particleGeometry.setAttribute('offset', new THREE.BufferAttribute(offsets, 1));
        const particleMaterial = new THREE.ShaderMaterial({
          uniforms: {
            time: { value: 0 },
            uColor1: { value: new THREE.Color('#ff4d94') },
            uColor2: { value: new THREE.Color('#4dffeb') },
            uColor3: { value: new THREE.Color('#cc66ff') }
          },
          vertexShader: `
            attribute float offset;
            varying float vOffset;
            void main() {
              vOffset = offset;
              gl_PointSize = 8.0 + sin(offset) * 4.0;
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
          `,
          fragmentShader: `
            uniform float time;
            uniform vec3 uColor1;
            uniform vec3 uColor2;
            uniform vec3 uColor3;
            varying float vOffset;
            void main() {
              float t1 = sin(time * 0.4) * 0.5 + 0.5;
              float t2 = sin(time * 0.2 + 3.141592653589793) * 0.5 + 0.5;
              vec3 color = mix(uColor1, uColor2, t1);
              color = mix(color, uColor3, t2);
              float pulse = sin(time * 2.5 + vOffset) * 0.5 + 0.5;
              vec2 coord = gl_PointCoord - vec2(0.5);
              float dist = length(coord);
              if (dist > 0.5) discard;
              float alpha = smoothstep(0.5, 0.2, dist);
              gl_FragColor = vec4(color * (1.0 + pulse), alpha);
            }
          `,
          transparent: true
        });
        const particles = new THREE.Points(particleGeometry, particleMaterial);
        cube.add(particles);

        // Magnificent Big Bang Burst
        function triggerBigBang() {
          const burstCount = 100;
          const burstPositions = new Float32Array(burstCount * 3);
          const burstOffsets = new Float32Array(burstCount);
          const burstVelocities = new Float32Array(burstCount * 3);
          const goldenAngle = 137.508 * Math.PI / 180; // radians
          for (let i = 0; i < burstCount; i++) {
            const theta = i * goldenAngle;
            const phiAngle = Math.acos(1 - 2 * (i + 0.5) / burstCount);
            const r = 0.01;
            const speed = 0.5 + Math.random() * 0.5;
            burstPositions[i * 3] = r * Math.sin(phiAngle) * Math.cos(theta);
            burstPositions[i * 3 + 1] = r * Math.sin(phiAngle) * Math.sin(theta);
            burstPositions[i * 3 + 2] = r * Math.cos(phiAngle);
            burstVelocities[i * 3] = speed * Math.sin(phiAngle) * Math.cos(theta);
            burstVelocities[i * 3 + 1] = speed * Math.sin(phiAngle) * Math.sin(theta);
            burstVelocities[i * 3 + 2] = speed * Math.cos(phiAngle);
            burstOffsets[i] = Math.random() * 2 * Math.PI;
          }
          const burstGeometry = new THREE.BufferGeometry();
          burstGeometry.setAttribute('position', new THREE.BufferAttribute(burstPositions, 3));
          burstGeometry.setAttribute('offset', new THREE.BufferAttribute(burstOffsets, 1));
          const burstMaterial = new THREE.ShaderMaterial({
            uniforms: {
              time: { value: 0 },
              uColor1: { value: new THREE.Color('#ff4d94') },
              uColor2: { value: new THREE.Color('#4dffeb') },
              uColor3: { value: new THREE.Color('#cc66ff') },
              uColor4: { value: new THREE.Color('#66ff99') }
            },
            vertexShader: `
              attribute float offset;
              uniform float time;
              varying float vOffset;
              varying float vTime;
              void main() {
                vOffset = offset;
                vTime = time;
                vec3 pos = position;
                pos += vec3(
                  position.x * time * 0.5,
                  position.y * time * 0.5,
                  position.z * time * 0.5
                );
                gl_PointSize = 10.0 + sin(offset + time) * 6.0;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
              }
            `,
            fragmentShader: `
              uniform float time;
              uniform vec3 uColor1;
              uniform vec3 uColor2;
              uniform vec3 uColor3;
              uniform vec3 uColor4;
              varying float vOffset;
              varying float vTime;
              void main() {
                float t1 = sin(time * 0.6 + vOffset) * 0.5 + 0.5;
                float t2 = sin(time * 0.4 + vOffset + 3.141592653589793) * 0.5 + 0.5;
                vec3 color = mix(uColor1, uColor2, t1);
                color = mix(color, uColor3, t2);
                color = mix(color, uColor4, sin(time * 0.3) * 0.5 + 0.5);
                vec2 coord = gl_PointCoord - vec2(0.5);
                float dist = length(coord);
                if (dist > 0.5) discard;
                float alpha = smoothstep(0.5, 0.2, dist) * (1.0 - vTime / 2.0);
                gl_FragColor = vec4(color, alpha);
              }
            `,
            transparent: true
          });
          const burst = new THREE.Points(burstGeometry, burstMaterial);
          cube.add(burst);
          let burstTime = 0;
          const animateBurst = () => {
            burstTime += 0.016;
            burstMaterial.uniforms.time.value = burstTime;
            for (let i = 0; i < burstPositions.length; i++) {
              burstGeometry.attributes.position.array[i] +=
                burstVelocities[i] * 0.016;
            }
            burstGeometry.attributes.position.needsUpdate = true;
            if (burstTime < 2) {
              requestAnimationFrame(animateBurst);
            } else {
              cube.remove(burst);
              burstGeometry.dispose();
              burstMaterial.dispose();
            }
          };
          animateBurst();
          logDebug('Big Bang Triggered');
        }

        // Interactivity
        let mouseX = 0, mouseY = 0, touchX = 0, touchY = 0;
        let targetRotationX = 0, targetRotationY = 0;
        let isDragging = false;

        document.addEventListener('mousemove', (e) => {
          mouseX = (e.clientX / window.innerWidth) * 2 - 1;
          mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
          if (!isDragging) {
            targetRotationY = mouseX * Math.PI * 1.5;
            targetRotationX = mouseY * Math.PI * 0.75;
          }
        }, { passive: true });

        document.addEventListener('mousedown', () => { isDragging = true; });
        document.addEventListener('mouseup', () => { isDragging = false; });

        document.addEventListener('touchstart', (e) => {
          if (e.touches.length > 0) {
            const touch = e.touches[0];
            touchX = (touch.clientX / window.innerWidth) * 2 - 1;
            touchY = -(touch.clientY / window.innerHeight) * 2 + 1;
            isDragging = true;
            triggerBigBang();
          }
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
          if (e.touches.length > 0 && isDragging) {
            const touch = e.touches[0];
            const newTouchX = (touch.clientX / window.innerWidth) * 2 - 1;
            const newTouchY = -(touch.clientY / window.innerHeight) * 2 + 1;
            targetRotationY += (newTouch
