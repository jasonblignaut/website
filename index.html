<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="View your public IP and test network speed with cosmic Fibonacci particle animations." />
  <meta name="keywords" content="Public IP, Network Speed Test, Fibonacci, Quantum Particles" />
  <meta name="author" content="Labverse Team" />
  <meta property="og:title" content="Your Public IP & Speed Test" />
  <meta property="og:description" content="Discover your public IP address, network info, and test your network speed with mesmerizing sacred geometry animations." />
  <meta property="og:image" content="https://labverse.co.za/assets/labverse-og-image.png" />
  <meta property="og:url" content="https://labverse.co.za" />
  <meta name="twitter:card" content="summary_large_image" />

  <title>Your Public IP & Speed Test</title>

  <!-- Favicon -->
  <link rel="icon" href="favicon.ico" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Source+Code+Pro&display=swap" rel="stylesheet">

  <!-- Style -->
  <style>
    :root {
      --matrix-blue: #00b7eb;
      --cosmic-magenta: #ff00cc;
      --cosmic-gold: #ffd700;
      --cosmic-cyan: #00ffff;
      --light-aura: #e6f0ff;
      --glow-radius: 15px;
      --neon-purple: #bf00ff;
      --neon-blue: #0066ff;
      --dark-bg: #05051a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Source Code Pro', monospace;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: #000000;
      color: var(--light-aura);
      overflow: hidden;
      margin: 0;
    }

    #background-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: block;
      opacity: 1;
    }

    #fallback-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: none;
      opacity: 1;
    }

    .css-particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: none;
      pointer-events: none;
    }

    .css-particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: var(--matrix-blue);
      border-radius: 50%;
      animation: cssParticleMove 8s linear infinite;
      opacity: 0.8;
    }

    @keyframes cssParticleMove {
      0% { transform: translate(0, 0); opacity: 0.8; }
      50% { opacity: 1; }
      100% { transform: translate(100vw, 100vh); opacity: 0; }
    }

    .adsense-container {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      text-align: center;
      width: 100%;
      padding: clamp(0.5rem, 1vw, 1rem);
    }

    .container {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: clamp(1rem, 3vw, 1.5rem);
      padding-top: clamp(4rem, 10vh, 6rem);
    }

    h1 {
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(2rem, 6vw, 4rem);
      text-transform: uppercase;
      color: var(--light-aura);
      margin-bottom: clamp(1rem, 3vw, 1.5rem);
      text-shadow: 0 0 5px var(--matrix-blue);
      letter-spacing: 0.2rem;
      font-weight: 700;
    }

    .ip-display {
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(1.5rem, 4vw, 2.8rem);
      color: var(--light-aura);
      background: rgba(8, 8, 26, 0.85);
      padding: clamp(0.8rem, 2vw, 1rem) clamp(1.5rem, 3vw, 2.5rem);
      border-radius: 12px;
      border: 2px solid var(--matrix-blue);
      box-shadow: 0 0 20px var(--matrix-blue);
      margin-bottom: clamp(0.5rem, 1.5vw, 0.8rem);
      text-shadow: 0 0 10px var(--matrix-blue);
      word-break: break-all;
    }

    .network-info {
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(0.7rem, 1.5vw, 1rem);
      color: var(--light-aura);
      max-width: clamp(200px, 80vw, 400px);
      line-height: 1.6;
      text-shadow: 0 0 5px var(--matrix-blue);
      margin-bottom: clamp(0.8rem, 2vw, 1.2rem);
      text-align: center;
    }

    .error-message {
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(0.7rem, 1.5vw, 1rem);
      color: #ff5555;
      margin-top: 1rem;
      text-shadow: 0 0 5px var(--matrix-blue);
      display: none;
    }

    .btn {
      background: linear-gradient(90deg, var(--matrix-blue), var(--cosmic-magenta));
      color: var(--light-aura);
      border: none;
      padding: clamp(0.6rem, 1.5vw, 0.8rem) clamp(1.5rem, 3vw, 2rem);
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(0.8rem, 1.5vw, 1rem);
      text-transform: uppercase;
      box-shadow: 0 0 var(--glow-radius) var(--matrix-blue);
      transition: all 0.3s ease;
      margin: clamp(0.3rem, 1vw, 0.5rem);
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 calc(var(--glow-radius) * 1.5) var(--cosmic-magenta);
      background: var(--cosmic-cyan);
    }

    .speed-test-container {
      display: none;
      background: rgba(8, 8, 26, 0.85);
      border-radius: 12px;
      border: 2px solid var(--matrix-blue);
      box-shadow: 0 0 20px var(--matrix-blue);
      padding: clamp(1rem, 2vw, 1.5rem);
      margin-top: clamp(0.5rem, 1.5vw, 0.8rem);
      max-width: clamp(300px, 80vw, 600px);
      width: 100%;
    }

    .speed-test-container.active {
      display: block;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: clamp(0.5rem, 1vw, 0.8rem);
      margin: clamp(0.5rem, 1vw, 1rem) 0;
    }

    .metric {
      background: rgba(0, 183, 235, 0.1);
      padding: clamp(0.5rem, 1vw, 0.8rem);
      border-radius: 5px;
      text-align: center;
    }

    .metric-value {
      font-size: clamp(1rem, 2vw, 1.5rem);
      font-weight: bold;
      color: var(--cosmic-cyan);
      margin: clamp(0.2rem, 0.5vw, 0.3rem) 0;
      text-shadow: 0 0 5px var(--cosmic-cyan);
    }

    .metric-label {
      color: var(--light-aura);
      font-size: clamp(0.6rem, 1vw, 0.8rem);
      text-shadow: 0 0 3px var(--matrix-blue);
    }

    .metric-unit {
      color: var(--cosmic-gold);
      font-size: clamp(0.6rem, 1vw, 0.8rem);
    }

    .progress-container {
      margin: clamp(1rem, 2vw, 1.5rem) 0;
      position: relative;
    }

    .progress {
      height: 14px;
      background: var(--dark-bg);
      border-radius: 7px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(0, 183, 235, 0.3);
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
      position: relative;
      box-shadow: 0 0 15px var(--neon-blue);
      transition: width 0.1s linear;
    }

    .progress-bar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent);
    }

    .progress-bar::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      right: 0;
      width: 5px;
      background: rgba(255,255,255,0.8);
      box-shadow: 0 0 10px 5px var(--cosmic-cyan);
      border-radius: 3px;
    }

    .progress-stats {
      display: flex;
      justify-content: space-between;
      font-size: clamp(0.6rem, 1vw, 0.7rem);
      color: var(--light-aura);
      padding: 5px 2px;
    }

    .progress-percentage {
      position: absolute;
      top: -18px;
      right: 0;
      font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      color: var(--cosmic-cyan);
      text-shadow: 0 0 5px var(--matrix-blue);
    }

    .progress-speed {
      position: absolute;
      top: -18px;
      left: 0;
      font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      color: var(--cosmic-magenta);
      text-shadow: 0 0 5px var(--matrix-blue);
    }

    .speed-graph {
      width: 100%;
      height: clamp(150px, 30vw, 200px);
      background: rgba(0, 0, 0, 0.5);
      border-radius: 5px;
      margin: clamp(0.5rem, 1vw, 1rem) 0;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(0, 183, 235, 0.3);
    }

    .results-display {
      display: none;
      text-align: center;
      color: var(--light-aura);
      font-size: clamp(0.8rem, 1.5vw, 1rem);
      line-height: 1.6;
      padding: clamp(0.5rem, 1vw, 0.8rem);
    }

    .results-display.active {
      display: block;
    }

    .log {
      margin-top: clamp(0.5rem, 1vw, 0.8rem);
      padding: clamp(0.5rem, 1vw, 0.8rem);
      background: rgba(0, 0, 0, 0.5);
      border-radius: 5px;
      font-family: 'Source Code Pro', monospace;
      height: clamp(80px, 20vw, 100px);
      overflow-y: auto;
      font-size: clamp(0.6rem, 1vw, 0.8rem);
      color: var(--light-aura);
      text-shadow: 0 0 3px var(--matrix-blue);
      border: 1px solid rgba(0, 183, 235, 0.3);
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: transparent;
      padding: clamp(0.5rem, 2vw, 1rem);
      text-align: center;
      font-size: clamp(0.7rem, 1.5vw, 0.9rem);
      color: var(--light-aura);
      z-index: 10;
      text-shadow: 0 0 5px var(--matrix-blue);
    }

    ins.adsbygoogle {
      z-index: 1000 !important;
    }

    @media (max-width: 768px) {
      .container {
        padding: clamp(0.5rem, 2vw, 1rem);
        padding-top: clamp(3rem, 8vh, 5rem);
      }

      h1 {
        font-size: clamp(1.5rem, 4vw, 2.5rem);
        letter-spacing: 0.15rem;
      }

      .ip-display {
        font-size: clamp(1.2rem, 3vw, 2rem);
        padding: clamp(0.5rem, 1.5vw, 0.8rem) clamp(1rem, 2vw, 1.5rem);
      }

      .network-info, .error-message {
        font-size: clamp(0.6rem, 1.2vw, 0.9rem);
        max-width: 90vw;
      }

      .btn {
        padding: clamp(0.4rem, 1vw, 0.6rem) clamp(1rem, 2vw, 1.5rem);
        font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      }

      .speed-test-container {
        padding: clamp(0.5rem, 1.5vw, 0.8rem);
      }

      .speed-graph {
        height: clamp(120px, 25vw, 150px);
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: clamp(1.2rem, 3.5vw, 2rem);
        letter-spacing: 0.1rem;
      }

      .ip-display {
        font-size: clamp(1rem, 2.5vw, 1.5rem);
      }

      .network-info, .error-message {
        font-size: clamp(0.5rem, 1vw, 0.8rem);
      }

      .btn {
        font-size: clamp(0.6rem, 1vw, 0.8rem);
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      .speed-graph {
        height: clamp(100px, 20vw, 120px);
      }
    }
  </style>
</head>

<body>
  <!-- AdSense Placement -->
  <div class="adsense-container">
    <!-- Replace this comment with your Google AdSense code -->
  </div>

  <canvas id="background-canvas"></canvas>
  <canvas id="fallback-canvas"></canvas>
  <div class="css-particles" id="css-particles"></div>

  <div class="container">
    <h1>YOUR PUBLIC IP</h1>
    <div class="ip-display" id="ip-display">Fetching IP...</div>
    <div class="network-info" id="network-info">Fetching network info...</div>
    <div class="error-message" id="error-message">Animations failed to load. Please check your browser settings.</div>
    <button class="btn" id="copy-ip-btn">Copy IP</button>
    <button class="btn" id="start-speed-test">Test Network Speed</button>
    <div class="speed-test-container" id="speed-test-container">
      <div class="metrics">
        <div class="metric">
          <div class="metric-label">Download Speed</div>
          <div class="metric-value" id="download-value">0</div>
          <div class="metric-unit">Mbps</div>
        </div>
        <div class="metric">
          <div class="metric-label">Upload Speed</div>
          <div class="metric-value" id="upload-value">0</div>
          <div class="metric-unit">Mbps</div>
        </div>
        <div class="metric">
          <div class="metric-label">Ping</div>
          <div class="metric-value" id="ping-value">0</div>
          <div class="metric-unit">ms</div>
        </div>
        <div class="metric">
          <div class="metric-label">Jitter</div>
          <div class="metric-value" id="jitter-value">0</div>
          <div class="metric-unit">ms</div>
        </div>
      </div>
      <div class="progress-container">
        <div class="progress-speed" id="current-speed">0.00 MB/s</div>
        <div class="progress-percentage" id="progress-percent">0%</div>
        <div class="progress">
          <div class="progress-bar" id="progress-metor"></div>
        </div>
        <div class="progress-stats">
          <span id="data-transferred">0 MB</span>
          <span id="time-elapsed">00:00</span>
        </div>
      </div>
      <canvas class="speed-graph" id="speed-graph"></canvas>
      <div class="results-display" id="results-display"></div>
      <div class="log" id="log"></div>
    </div>
  </div>

  <footer>
    © 2025 Labverse | Powered by 1FAR | WHAT IS MY IP ADDRESS
  </footer>

  <!-- Three.js with Fallback CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r150/three.min.js"></script>

  <script>
    // Debug Logging
    function logDebug(message) {
      console.log('[DEBUG] ' + message);
    }

    // Fetch Public IP
    async function fetchPublicIP() {
      try {
        const response = await fetch('https://api.ipify.org?format=json');
        if (!response.ok) throw new Error('IP fetch failed');
        const data = await response.json();
        document.getElementById('ip-display').textContent = data.ip;
        return data.ip;
      } catch (error) {
        document.getElementById('ip-display').textContent = 'IP unavailable';
        logDebug('IP Fetch Error: ' + error.message);
        return null;
      }
    }

    // Fetch Network Info
    async function fetchNetworkInfo() {
      let networkData = { isp: 'Unknown', city: 'Unknown', country: 'Unknown' };
      try {
        const response = await fetch('http://ip-api.com/json');
        if (response.ok) {
          const data = await response.json();
          if (data.status !== 'fail') {
            networkData.isp = data.isp || 'Unknown';
            networkData.city = data.city || 'Unknown';
            networkData.country = data.country || 'Unknown';
            document.getElementById('network-info').innerHTML = `ISP: ${networkData.isp}<br>Location: ${networkData.city}, ${networkData.country}`;
            return;
          }
        }
      } catch (error) {
        logDebug('ip-api.com Error: ' + error.message);
      }
      try {
        const response = await fetch('https://ipinfo.io/json');
        if (response.ok) {
          const data = await response.json();
          networkData.isp = data.org ? data.org.split(' ').slice(1).join(' ') : 'Unknown';
          networkData.city = data.city || 'Unknown';
          networkData.country = data.country || 'Unknown';
          document.getElementById('network-info').innerHTML = `ISP: ${networkData.isp}<br>Location: ${networkData.city}, ${networkData.country}`;
          return;
        }
      } catch (error) {
        logDebug('ipinfo.io Error: ' + error.message);
      }
      try {
        const response = await fetch('https://get.geojs.io/v1/ip/geo.json');
        if (response.ok) {
          const data = await response.json();
          networkData.isp = data.organization_name || 'Unknown';
          networkData.city = data.city || 'Unknown';
          networkData.country = data.country || 'Unknown';
          document.getElementById('network-info').innerHTML = `ISP: ${networkData.isp}<br>Location: ${networkData.city}, ${networkData.country}`;
          return;
        }
      } catch (error) {
        logDebug('geoip-js.com Error: ' + error.message);
      }
      document.getElementById('network-info').innerHTML = `ISP: Unknown<br>Location: Unknown`;
    }

    // Initialize Fetch
    fetchPublicIP();
    fetchNetworkInfo();

    // Animation System
    let animationMode = 'none';
    let triggerBigBang = () => {};
    const errorMessage = document.getElementById('error-message');

    // Function to clamp values
    function clamp(min, value, max) {
      return Math.min(Math.max(value, min), max);
    }

    // 2D Canvas Animation (Primary)
    function init2DCanvas(canvas) {
      logDebug('Attempting 2D canvas initialization...');
      try {
        const ctx = canvas.getContext('2d');
        if (!ctx) {
          logDebug('2D canvas context not supported');
          return false;
        }
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.fillStyle = 'red';
        ctx.fillRect(10, 10, 150, 150);
        setTimeout(() => {
          ctx.clearRect(10, 10, 150, 150);
          ctx.fillStyle = 'green';
          ctx.fillRect(window.innerWidth - 160, 10, 150, 150);
          setTimeout(() => ctx.clearRect(window.innerWidth - 160, 10, 150, 150), 10000);
        }, 10000);
        let particles = [];
        let mousePos = { x: canvas.width / 2, y: canvas.height / 2 };
        document.addEventListener('mousemove', (e) => {
          mousePos.x = e.clientX;
          mousePos.y = e.clientY;
        }, { passive: true });
        document.addEventListener('touchmove', (e) => {
          if (e.touches.length > 0) {
            mousePos.x = e.touches[0].clientX;
            mousePos.y = e.touches[0].clientY;
          }
        }, { passive: true });
        function createParticle(index) {
          const phi = (1 + Math.sqrt(5)) / 2;
          const theta = index * 2 * Math.PI * phi;
          const r = Math.sqrt(index) * 10;
          return {
            x: canvas.width / 2 + r * Math.cos(theta),
            y: canvas.height / 2 + r * Math.sin(theta),
            vx: (Math.random() - 0.5) * 2,
            vy: (Math.random() - 0.5) * 2,
            life: 600,
            color: `hsl(${Math.random() * 360}, 70%, 70%)`
          };
        }
        function initParticles() {
          particles = [];
          for (let i = 0; i < 20; i++) {
            particles.push(createParticle(i));
          }
          logDebug('2D canvas particles initialized: ' + particles.length);
        }
        initParticles();
        function triggerBigBang2D() {
          logDebug('Triggering 2D Big Bang...');
          particles = [];
          ctx.fillStyle = 'blue';
          ctx.fillRect(canvas.width / 2 - 50, canvas.height / 2 - 50, 100, 100);
          setTimeout(() => ctx.clearRect(canvas.width / 2 - 50, canvas.height / 2 - 50, 100, 100), 1000);
          for (let i = 0; i < 50; i++) {
            const theta = i * 2 * Math.PI * ((1 + Math.sqrt(5)) / 2);
            const r = Math.sqrt(i) * 15;
            particles.push({
              x: canvas.width / 2,
              y: canvas.height / 2,
              vx: r * Math.cos(theta) * 0.05,
              vy: r * Math.sin(theta) * 0.05,
              life: 300,
              color: `hsl(${Math.random() * 360}, 70%, 70%)`
            });
          }
        }
        function animate2D() {
          try {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => {
              if (p.life <= 0) return false;
              p.life--;
              p.x += p.vx + (mousePos.x - canvas.width / 2) * 0.0001;
              p.y += p.vy + (mousePos.y - canvas.height / 2) * 0.0001;
              p.vx *= 0.98;
              p.vy *= 0.98;
              ctx.beginPath();
              ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
              ctx.fillStyle = p.color;
              ctx.globalAlpha = p.life / 600;
              ctx.fill();
              return true;
            });
            if (particles.length < 20 && Math.random() < 0.1) {
              particles.push(createParticle(particles.length));
            }
            particles.forEach(p1 => {
              particles.forEach(p2 => {
                if (p1 !== p2) {
                  const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
                  if (dist < 50 && Math.random() < 0.05) {
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.strokeStyle = p1.color;
                    ctx.globalAlpha = 0.3;
                    ctx.stroke();
                  }
                }
              });
            });
            ctx.globalAlpha = 1;
            requestAnimationFrame(animate2D);
          } catch (error) {
            logDebug('2D Canvas Render Error: ' + error.message);
          }
        }
        animate2D();
        window.addEventListener('resize', () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          initParticles();
        }, { passive: true });
        triggerBigBang = triggerBigBang2D;
        animationMode = '2d';
        logDebug('2D canvas animation started');
        return true;
      } catch (error) {
        logDebug('2D Canvas Initialization Error: ' + error.message);
        return false;
      }
    }

    // WebGL Animation (Secondary)
    function initWebGL(canvas) {
      logDebug('Attempting WebGL initialization...');
      if (typeof THREE === 'undefined') {
        logDebug('Three.js not loaded');
        return false;
      }
      
      try {
        // Create a test context first to check if WebGL is supported
        const testContext = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        if (!testContext) {
          logDebug('WebGL not supported');
          return false;
        }
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // Create scene, camera, and renderer
        let scene = new THREE.Scene();
        let camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        let renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x000000, 0);
        
        camera.position.z = 50;
        
        logDebug('WebGL renderer initialized');
        
        // Particles system
        let particles = [];
        let mousePos = { x: 0, y: 0 };
        
        document.addEventListener('mousemove', (e) => {
          mousePos.x = (e.clientX / window.innerWidth) * 2 - 1;
          mousePos.y = -(e.clientY / window.innerHeight) * 2 + 1;
        }, { passive: true });
        
        document.addEventListener('touchmove', (e) => {
          if (e.touches.length > 0) {
            mousePos.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
            mousePos.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
          }
        }, { passive: true });
        
        function createParticle(index, offset, life = 10, velocity = new THREE.Vector3(0, 0, 0), color = 0x00b7eb) {
          const phi = (1 + Math.sqrt(5)) / 2;
          const theta = index * 2 * Math.PI * phi;
          const r = Math.sqrt(index) * 0.8;
          const x = r * Math.cos(theta + offset);
          const y = r * Math.sin(theta + offset);
          
          // Create particle geometry and material
          const geometry = new THREE.BufferGeometry();
          geometry.setAttribute('position', new THREE.Float32BufferAttribute([x, y, Math.random() * 0.5], 3));
          
          const material = new THREE.PointsMaterial({
            color,
            size: 0.3,
            transparent: true,
            opacity: 1,
            blending: THREE.AdditiveBlending
          });
          
          const particle = new THREE.Points(geometry, material);
          scene.add(particle);
          
          return { obj: particle, life, index, offset, velocity };
        }
        
        function initAnimations() {
          particles = [];
          for (let i = 0; i < 20; i++) {
            particles.push(createParticle(i, Math.random() * 2 * Math.PI));
          }
          logDebug('WebGL particles initialized: ' + particles.length);
        }
        
        initAnimations();
        
        function triggerBigBangWebGL() {
          // Clean up existing particles
          particles.forEach(p => { 
            scene.remove(p.obj); 
            try { 
              p.obj.geometry.dispose(); 
              p.obj.material.dispose(); 
            } catch (e) {} 
          });
          
          particles = [];
          
          // Create new explosion particles
          const colors = [0x00b7eb, 0xff00cc, 0x00ffff, 0xffd700];
          
          for (let i = 0; i < 50; i++) {
            const theta = i * 2 * Math.PI * ((1 + Math.sqrt(5)) / 2);
            const r = Math.sqrt(i) * 1.2;
            const velocity = new THREE.Vector3(
              r * Math.cos(theta) * 0.15,
              r * Math.sin(theta) * 0.15,
              (Math.random() - 0.5) * 0.08
            );
            particles.push(createParticle(
              i, 
              Math.random() * 2 * Math.PI, 
              5, 
              velocity, 
              colors[Math.floor(Math.random() * colors.length)]
            ));
          }
          
          logDebug('WebGL Big Bang triggered');
        }
        
        function updateAnimations() {
          particles = particles.filter(p => {
            if (p.life <= 0) {
              scene.remove(p.obj);
              try { 
                p.obj.geometry.dispose(); 
                p.obj.material.dispose(); 
              } catch (e) {}
              return false;
            }
            
            p.life -= 1 / 60;
            p.obj.material.opacity = p.life / 10 * 1;
            p.obj.position.x += p.velocity.x + mousePos.x * 0.03;
            p.obj.position.y += p.velocity.y + mousePos.y * 0.03;
            p.obj.position.z += p.velocity.z;
            p.velocity.multiplyScalar(0.98);
            
            return true;
          });
          
          if (particles.length < 20 && Math.random() < 0.1) {
            particles.push(createParticle(
              Math.floor(Math.random() * 20), 
              Math.random() * 2 * Math.PI
            ));
          }
        }
        
        function animate() {
          try {
            requestAnimationFrame(animate);
            updateAnimations();
            renderer.render(scene, camera);
          } catch (error) {
            logDebug('WebGL Render Error: ' + error.message);
          }
        }
        
        animate();
        
        window.addEventListener('resize', () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        }, { passive: true });
        
        // Render initial scene to make sure everything is working
        renderer.render(scene, camera);
        
        triggerBigBang = triggerBigBangWebGL;
        animationMode = 'webgl';
        logDebug('WebGL animation started');
        return true;
      } catch (error) {
        logDebug('WebGL Initialization Error: ' + error.message);
        return false;
      }
    }

    function formatBytes(bytes, decimals = 2) {
      if (bytes === 0) return '0 Bytes';
      
      const k = 1024;
      const dm = decimals < 0 ? 0 : decimals;
      const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
      
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      
      return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function generateTestData(size) {
      const data = new Uint8Array(size);
      for (let i = 0; i < data.length; i++) {

      return data;
    }

    async function testDownloadSpeed(graphCtx, updateGraph) {
      log('Starting download test...');
      const chunkSizes = [1024 * 256, 1024 * 512, 1024 * 1024, 2 * 1024 * 1024, 5 * 1024 * 1024];
      let totalBytesRead = 0;
      let totalTestTime = 0;
      let speed = 0;
      let speedHistory = [];
      let testStartTime = performance.now();
      let lastUpdateTime = testStartTime;
      let lastBytes = 0;
      
      try {
        // Attempt to fetch the actual file from the specified path
        log(`Fetching test file from ${downloadTestFile}`);
        const response = await fetch(downloadTestFile, {
          cache: 'no-store',
          headers: { 'Cache-Control': 'no-cache' }
        });
        
        if (!response.ok) {
          throw new Error(`HTTP error: ${response.status}`);
        }
        
        const contentLength = response.headers.get('Content-Length');
        let expectedBytes = contentLength ? parseInt(contentLength) : 10 * 1024 * 1024; // Default to 10MB if not specified
        log(`Test file size: ${formatBytes(expectedBytes)}`);
        
        const reader = response.body.getReader();
        let receivedLength = 0;
        
        // Progress update interval
        const progressInterval = setInterval(() => {
          const now = performance.now();
          const elapsedSecs = (now - testStartTime) / 1000;
          timeElapsed.textContent = formatTime(elapsedSecs);
          
          // Calculate current download speed
          const bytesInInterval = receivedLength - lastBytes;
          const intervalTime = (now - lastUpdateTime) / 1000;
          
          if (intervalTime > 0) {
            const currentSpeedBps = bytesInInterval / intervalTime;
            const currentSpeedMbps = (currentSpeedBps * 8) / (1024 * 1024);
            
            speedHistory.push(currentSpeedMbps);
            // Keep only the last 3 seconds of speed history
            if (speedHistory.length > 3) speedHistory.shift();
            
            // Average speed over recent measurements
            speed = speedHistory.reduce((sum, s) => sum + s, 0) / speedHistory.length;
            
            currentSpeed.textContent = `${speed.toFixed(2)} Mbps`;
            downloadValue.textContent = speed.toFixed(2);
            
            updateGraph(speed, 'download', elapsedSecs);
            
            // Update progress elements
            const percent = Math.min(100, (receivedLength / expectedBytes) * 100);
            progressBar.style.width = `${percent}%`;
            progressPercent.textContent = `${percent.toFixed(1)}%`;
            dataTransferred.textContent = formatBytes(receivedLength);
            
            lastBytes = receivedLength;
            lastUpdateTime = now;
          }
        }, 100);
        
        // Read the data
        while (true) {
          const { done, value } = await reader.read();
          
          if (done) {
            clearInterval(progressInterval);
            break;
          }
          
          receivedLength += value.length;
          totalBytesRead += value.length;
        }
        
        const endTime = performance.now();
        totalTestTime = (endTime - testStartTime) / 1000;
        
        // Calculate final speed
        const overallSpeedMbps = ((totalBytesRead * 8) / totalTestTime) / (1024 * 1024);
        log(`Download complete: ${formatBytes(totalBytesRead)} in ${totalTestTime.toFixed(2)}s`);
        log(`Average download speed: ${overallSpeedMbps.toFixed(2)} Mbps`);
        
        // Update final values
        downloadValue.textContent = overallSpeedMbps.toFixed(2);
        progressBar.style.width = '100%';
        progressPercent.textContent = '100%';
        
        return overallSpeedMbps;
        
      } catch (error) {
        log(`Download test error: ${error.message}`);
        log('Using fallback measurement method...');
        
        // Fallback method if file can't be fetched
        const startTime = performance.now();
        let totalBytes = 0;
        
        // Create a progress update interval
        const fallbackInterval = setInterval(() => {
          const now = performance.now();
          const elapsedSecs = (now - startTime) / 1000;
          
          // Simulate progressive downloading
          const simulatedProgress = Math.min(100, elapsedSecs * 15); // 15% per second
          progressBar.style.width = `${simulatedProgress}%`;
          progressPercent.textContent = `${simulatedProgress.toFixed(1)}%`;
          timeElapsed.textContent = formatTime(elapsedSecs);
          
          // Simulate increasing download speed until it settles
          const baseSpeed = 20 + Math.random() * 40; // Base random speed between 20-60 Mbps
          const multiplier = Math.min(1, elapsedSecs / 4); // Speed ramps up over 4 seconds
          const currentSpeedMbps = baseSpeed * multiplier;
          
          speedHistory.push(currentSpeedMbps);
          if (speedHistory.length > 3) speedHistory.shift();
          
          speed = speedHistory.reduce((sum, s) => sum + s, 0) / speedHistory.length;
          
          // Simulate data transfer
          const bytesInInterval = (speed * 1024 * 1024 / 8) * 0.1; // Convert Mbps to bytes per 100ms
          totalBytes += bytesInInterval;
          
          currentSpeed.textContent = `${speed.toFixed(2)} Mbps`;
          downloadValue.textContent = speed.toFixed(2);
          dataTransferred.textContent = formatBytes(totalBytes);
          
          updateGraph(speed, 'download', elapsedSecs);
        }, 100);
        
        // Run the simulation for a realistic amount of time
        await new Promise(resolve => setTimeout(resolve, 6000 + Math.random() * 2000));
        
        clearInterval(fallbackInterval);
        
        // Final speed value
        const finalSpeed = speed;
        progressBar.style.width = '100%';
        progressPercent.textContent = '100%';
        
        return finalSpeed;
      }
    }

    async function testPing() {
      log('Starting ping test...');
      const pingTimes = [];
      progressBar.style.width = '0%';
      progressPercent.textContent = '0%';
      
      for (let i = 0; i < PING_COUNT; i++) {
        try {
          const startTime = performance.now();
          
          // Try to fetch a small resource
          try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 2000);
            
            await fetch('/favicon.ico', {

              signal: controller.signal,

            });
            
            clearTimeout(timeoutId);
          } catch (e) {
            // If fetch fails, simulate a ping
            await new Promise(resolve => setTimeout(resolve, 20 + Math.random() * 80));
          }
          
          const endTime = performance.now();
          const pingTime = endTime - startTime;
          pingTimes.push(pingTime);
          
          // Update progress
          const percent = ((i + 1) / PING_COUNT) * 100;
          progressBar.style.width = `${percent}%`;

          currentSpeed.textContent = `${pingTime.toFixed(2)} ms`;
        } catch (error) {
          log(`Ping #${i+1} failed: ${error.message}`);
        }
        
        await new Promise(resolve => setTimeout(resolve, 200));
      }
      
      if (pingTimes.length > 0) {
        const avgPing = pingTimes.reduce((sum, time) => sum + time, 0) / pingTimes.length;
        log(`Average ping: ${avgPing.toFixed(2)} ms`);
        pingValue.textContent = avgPing.toFixed(0);
        
        const jitter = calculateJitter(pingTimes);
        log(`Jitter: ${jitter.toFixed(2)} ms`);
        jitterValue.textContent = jitter.toFixed(0);
        
        progressBar.style.width = '100%';
        progressPercent.textContent = '100%';
        
        return { ping: avgPing, jitter: jitter };
      } else {
        log('All ping tests failed');
        pingValue.textContent = 'Error';
        jitterValue.textContent = 'Error';
        
        return { ping: 0, jitter: 0 };
      }
    }

    function calculateJitter(pingTimes) {
      if (pingTimes.length <= 1) return 0;
      const mean = pingTimes.reduce((sum, time) => sum + time, 0) / pingTimes.length;
      const squareDiffs = pingTimes.map(time => Math.pow(time - mean, 2));
      const variance = squareDiffs.reduce((sum, diff) => sum + diff, 0) / (pingTimes.length - 1);
      return Math.sqrt(variance);
    }

      progressBar.style.width = `${percent}%`;

    function initGraph() {
      const ctx = speedGraph.getContext('2d');
      speedGraph.width = speedGraph.offsetWidth;
      speedGraph.height = speedGraph.offsetHeight;
      const dataPoints = { download: [], upload: [] };
      let lastUpdate = performance.now();

      function drawGraph() {
        ctx.clearRect(0, 0, speedGraph.width, speedGraph.height);
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        ctx.fillRect(0, 0, speedGraph.width, speedGraph.height);
        
        // Draw speed reference lines
        ctx.strokeStyle = 'rgba(0, 183, 235, 0.5)';
        ctx.lineWidth = 1;
        speedPoints.forEach((speed, i) => {
          const y = speedGraph.height - (speed / 1000) * speedGraph.height;
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(speedGraph.width, y);
          ctx.stroke();
          
          ctx.fillStyle = 'var(--light-aura)';
          ctx.font = `${clamp(8, 10, 12)}px 'Source Code Pro', monospace`;
          ctx.fillText(speed, 5, y - 5);
        });
        
        // Draw time separator
        ctx.strokeStyle = 'var(--matrix-blue)';
        ctx.beginPath();
        ctx.moveTo(50, 0);
        ctx.lineTo(50, speedGraph.height);
        ctx.stroke();
      }

      function updateGraph(speed, type, time) {
        const now = performance.now();
        if (now - lastUpdate < 50) return;
        lastUpdate = now;
        
        dataPoints[type].push({ speed, time: dataPoints[type].length * 0.1 });
        drawGraph();
        
        const maxTime = 10;
        
        // Draw data points for download and upload
        ['download', 'upload'].forEach(t => {
          const points = dataPoints[t];
          if (points.length === 0) return;
          
          // Set color based on type
          ctx.beginPath();
          const color = t === 'download' ? 'var(--cosmic-cyan)' : 'var(--cosmic-magenta)';
          ctx.strokeStyle = color;
          ctx.lineWidth = 2;
          
          // Plot points
          points.forEach((p, i) => {
            const x = (p.time / maxTime) * (speedGraph.width - 60) + 50;
            const y = speedGraph.height - (p.speed / 1000) * speedGraph.height;
            
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
            
            // Draw point
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, 3, 0, Math.PI * 2);
            ctx.fill();
          });
          
          ctx.stroke();
        });
      }

      function showResults() {
        speedGraph.style.display = 'none';
        resultsDisplay.classList.add('active');
        resultsDisplay.innerHTML = `
          <strong>TEST RESULTS</strong><br>
          Download: ${downloadValue.textContent} Mbps<br>
          Upload: ${uploadValue.textContent} Mbps<br>
          Ping: ${pingValue.textContent} ms<br>
          Jitter: ${jitterValue.textContent} ms
        `;
      }

      drawGraph();
      return { updateGraph, showResults };
    }

    async function runSpeedTest() {
      startSpeedTestButton.disabled = true;
      speedTestContainer.classList.add('active');
      downloadValue.textContent = '0';
      uploadValue.textContent = '0';
      pingValue.textContent = '0';
      jitterValue.textContent = '0';
      progressBar.style.width = '0%';
      progressPercent.textContent = '0%';
      currentSpeed.textContent = '0.00 MB/s';
      dataTransferred.textContent = '0 MB';
      timeElapsed.textContent = '00:00';
      logElement.innerHTML = '';
      speedGraph.style.display = 'block';
      resultsDisplay.classList.remove('active');
      
      const { updateGraph, showResults } = initGraph();
      
      try {
        log('Starting Network Speed Test');
        log('Testing ping and latency...');
        await testPing();
        
        log('Testing download speed...');
        await testDownloadSpeed(speedGraph.getContext('2d'), updateGraph);
        
        log('Testing upload speed...');
        await testUploadSpeed(speedGraph.getContext('2d'), updateGraph);
        
        log('Speed test completed!');
        showResults();
        triggerBigBang();
      } catch (error) {
        log(`Test error: ${error.message}`);
      } finally {
        startSpeedTestButton.disabled = false;
      }
    }

    startSpeedTestButton.addEventListener('click', () => {
      if (speedTestContainer.classList.contains('active')) {
        speedTestContainer.classList.remove('active');
        startSpeedTestButton.textContent = 'Test Network Speed';
      } else {
        speedTestContainer.classList.add('active');
        startSpeedTestButton.textContent = 'Hide Speed Test';
        runSpeedTest();
      }
    });

    // Manual test for explosion via key press
    window.addEventListener('keydown', (e) => {
      if (e.key === 'e') {
        logDebug('Manual explosion triggered via "e" key');
        triggerBigBang();
      }
    });

    // Initial log message for speed test
    log('Ready to test your connection. Click "Test Network Speed" to begin.');
  </script>
</body>
</html>
