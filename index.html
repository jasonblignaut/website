<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Odyssey</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Orbitron', sans-serif;
            background: radial-gradient(circle, #0a0a2a, #000);
            color: #00ffcc;
            overflow: hidden;
            height: 100vh;
            cursor: crosshair;
        }
        #container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px;
            border-radius: 15px;
            border: 3px solid #00ffcc;
            font-size: 16px;
            z-index: 20;
            box-shadow: 0 0 50px #00ffcc;
        }
        #canvas {
            border: 4px solid #00ffcc;
            border-radius: 20px;
            box-shadow: 0 0 60px #00ffcc;
            background: rgba(255, 255, 255, 0.02);
        }
        #controls {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 15px;
            z-index: 20;
        }
        button {
            padding: 15px 30px;
            background: linear-gradient(45deg, #00ffcc, #ff00cc, #00ccff);
            border: none;
            border-radius: 10px;
            color: #0a0a2a;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px #ff00cc;
        }
        #log {
            position: absolute;
            right: 10px;
            top: 10px;
            width: 400px;
            height: 600px;
            background: rgba(0, 0, 0, 0.85);
            padding: 20px;
            border-radius: 15px;
            border: 3px solid #ff00cc;
            overflow-y: auto;
            font-size: 14px;
            box-shadow: 0 0 50px #ff00cc;
        }
        #sceneSelector {
            position: absolute;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            z-index: 20;
        }
        #sceneSelector button {
            display: block;
            margin: 10px 0;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
</head>
<body>
    <div id="container">
        <div id="hud">
            Scene: <span id="sceneName">Golden Spiral</span> | Energy: <span id="energy">0</span> | Coherence: <span id="coherence">0</span> | Progress: <span id="progress">0%</span>
        </div>
        <div id="canvasContainer"></div>
        <div id="controls">
            <button onclick="interact()">Focus Intent</button>
            <button onclick="nextScene()">Next Scene</button>
            <button onclick="resetJourney()">Reset Journey</button>
        </div>
        <div id="log">
            <h3>Universal Log</h3>
            <div id="logContent"></div>
        </div>
        <div id="sceneSelector">
            <button onclick="setScene(1)">Golden Spiral</button>
            <button onclick="setScene(2)">Seed of Life</button>
            <button onclick="setScene(3)">Flower of Life</button>
            <button onclick="setScene(4)">Quantum Field</button>
            <button onclick="setScene(5)">Torus</button>
        </div>
    </div>

    <script>
        let scene = 1;
        let energy = 0;
        let coherence = 0;
        let progress = 0;
        let mouse = { x: 0, y: 0, clicked: false, clickStrength: 0 };
        let audioContext, oscillator, gainNode;
        let camera, scene3D, renderer, controls;

        // Initialize Three.js
        function initThreeJS() {
            scene3D = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            renderer = new THREE.WebGLRenderer({ alpha: true });
            renderer.setSize(window.innerWidth - 500, window.innerHeight - 100);
            document.getElementById('canvasContainer').innerHTML = '';
            document.getElementById('canvasContainer').appendChild(renderer.domElement);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableZoom = true;
            controls.enableRotate = true;
            window.addEventListener('resize', () => {
                renderer.setSize(window.innerWidth - 500, window.innerHeight - 100);
                camera.aspect = (window.innerWidth - 500) / (window.innerHeight - 100);
                camera.updateProjectionMatrix();
            });
        }

        // Audio Setup
        function initAudio(frequency) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioContext.createOscillator();
            gainNode = audioContext.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.value = frequency;
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.start();
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
        }

        function stopAudio() {
            if (oscillator) oscillator.stop();
            if (audioContext) audioContext.close();
        }

        // Scene Management
        function setScene(newScene) {
            stopAudio();
            scene = newScene;
            initThreeJS();
            initScene();
            animate();
            updateHUD();
        }

        function nextScene() {
            setScene((scene % 5) + 1);
        }

        // Scene 1: Golden Spiral - Genesis
        function initScene1() {
            initAudio(528); // Solfeggio 528Hz
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            let phi = (1 + Math.sqrt(5)) / 2;
            let r = 0.1, a = 0;
            for (let i = 0; i < 1000; i++) {
                a += 0.1;
                r = 0.1 * Math.pow(phi, a / (Math.PI / 2));
                const x = r * Math.cos(a);
                const y = r * Math.sin(a);
                positions.push(x, y, 0);
                if (i % 10 === 0) {
                    const flower = new THREE.CircleGeometry(0.05, 32);
                    const material = new THREE.MeshBasicMaterial({ color: 0x00ffcc });
                    const mesh = new THREE.Mesh(flower, material);
                    mesh.position.set(x, y, 0);
                    scene3D.add(mesh);
                }
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            const material = new THREE.LineBasicMaterial({ color: 0x00ffcc });
            const line = new THREE.Line(geometry, material);
            scene3D.add(line);
            // Cosmic Pulses
            const pulseGeometry = new THREE.SphereGeometry(0.1, 32, 32);
            const pulseMaterial = new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.5 });
            const pulse = new THREE.Mesh(pulseGeometry, pulseMaterial);
            pulse.position.set(0, 0, 0);
            scene3D.add(pulse);
        }

        // Scene 2: Seed of Life - Formation
        function initScene2() {
            initAudio(432); // 432Hz
            const sphereGeometry = new THREE.SphereGeometry(0.5, 32, 32);
            const material = new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true });
            for (let i = 0; i < 7; i++) {
                const sphere = new THREE.Mesh(sphereGeometry, material);
                const a = (2 * Math.PI / 6) * i;
                sphere.position.set(Math.cos(a), Math.sin(a), 0).multiplyScalar(1.5);
                scene3D.add(sphere);
                // Metatron’s Cube
                if (i > 0) {
                    const line = new THREE.Line(
                        new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), sphere.position]),
                        new THREE.LineBasicMaterial({ color: 0xff00cc })
                    );
                    scene3D.add(line);
                }
            }
            // Light Flow
            const light = new THREE.PointLight(0xff00cc, 1, 100);
            light.position.set(0, 0, 0);
            scene3D.add(light);
        }

        // Scene 3: Flower of Life - Cosmic Blueprint
        function initScene3() {
            initAudio(432); // Pythagorean tuning
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const cx = 0, cy = 0;
            for (let i = 0; i < 19; i++) {
                const r = i < 7 ? 1 : (i < 13 ? 2 : 3);
                const a = (2 * Math.PI / (i < 7 ? 6 : i < 13 ? 12 : 18)) * (i % (i < 7 ? 6 : i < 13 ? 12 : 18)) + angle;
                const x = cx + r * Math.cos(a);
                const y = cy + r * Math.sin(a);
                positions.push(x, y, 0);
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            const material = new THREE.LineBasicMaterial({ color: 0x00ffcc });
            const line = new THREE.Line(geometry, material);
            scene3D.add(line);
            // Torus Field
            const torusGeometry = new THREE.TorusGeometry(2, 0.5, 16, 100);
            const torusMaterial = new THREE.MeshBasicMaterial({ color: 0x00ccff, wireframe: true });
            const torus = new THREE.Mesh(torusGeometry, torusMaterial);
            torus.rotation.z = angle;
            scene3D.add(torus);
        }

        // Scene 4: Quantum Field - Void of Potential
        function initScene4() {
            initAudio(0); // White noise
            for (let i = 0; i < 200; i++) {
                const geometry = new THREE.SphereGeometry(0.05, 8, 8);
                const material = new THREE.MeshBasicMaterial({ color: 0xff00cc, transparent: true, opacity: 0.5 });
                const sphere = new THREE.Mesh(geometry, material);
                sphere.position.set((Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10);
                scene3D.add(sphere);
            }
            // Fractal Patterns
            const fractalGeometry = new THREE.BufferGeometry();
            const fractalPositions = [];
            for (let i = 0; i < 1000; i++) {
                const x = Math.sin(i) * Math.cos(i * 0.5);
                const y = Math.cos(i) * Math.sin(i * 0.5);
                fractalPositions.push(x, y, 0);
            }
            fractalGeometry.setAttribute('position', new THREE.Float32BufferAttribute(fractalPositions, 3));
            const fractalMaterial = new THREE.LineBasicMaterial({ color: 0x00ccff });
            const fractalLine = new THREE.Line(fractalGeometry, fractalMaterial);
            scene3D.add(fractalLine);
        }

        // Scene 5: Torus - Infinite Flow
        function initScene5() {
            initAudio(963); // 963Hz
            const torusGeometry = new THREE.TorusGeometry(2, 0.5, 16, 100);
            const torusMaterial = new THREE.MeshBasicMaterial({ color: 0xff00cc, wireframe: true });
            const torus = new THREE.Mesh(torusGeometry, torusMaterial);
            torus.rotation.x = angle;
            scene3D.add(torus);
            // Energy Flows
            const curve = new THREE.CatmullRomCurve3([
                new THREE.Vector3(0, 0, 0),
                new THREE.Vector3(1, 1, 0),
                new THREE.Vector3(0, 2, 0),
                new THREE.Vector3(-1, 1, 0),
                new THREE.Vector3(0, 0, 0)
            ]);
            const tubeGeometry = new THREE.TubeGeometry(curve, 64, 0.1, 8, false);
            const tubeMaterial = new THREE.MeshBasicMaterial({ color: 0x00ffcc });
            const tube = new THREE.Mesh(tubeGeometry, tubeMaterial);
            scene3D.add(tube);
        }

        // Initialize Scene
        function initScene() {
            scene3D.clear();
            switch (scene) {
                case 1: initScene1(); break;
                case 2: initScene2(); break;
                case 3: initScene3(); break;
                case 4: initScene4(); break;
                case 5: initScene5(); break;
            }
            camera.position.set(0, 0, 5);
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            angle += 0.01;
            controls.update();
            renderer.render(scene3D, camera);
            updateEnergy();
            updateHUD();
        }

        // Interaction
        canvas.addEventListener('mousemove', (e) => {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
            energy += Math.sin(distToCenter(mouse.x, mouse.y) / 100) * 0.5;
        });

        canvas.addEventListener('mousedown', (e) => {
            mouse.clicked = true;
            const log = document.getElementById('logContent');
            log.innerHTML += `<p>Intent Focused at (${mouse.x}, ${mouse.y})</p>`;
            energy += 50;
        });

        canvas.addEventListener('mouseup', () => {
            mouse.clicked = false;
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            camera.position.z += e.deltaY * 0.01;
            camera.updateProjectionMatrix();
        });

        function distToCenter(x, y) {
            const rect = renderer.domElement.getBoundingClientRect();
            const cx = (rect.right - rect.left) / 2;
            const cy = (rect.bottom - rect.top) / 2;
            return Math.sqrt((x - cx) * (x - cx) + (y - cy) * (y - cy));
        }

        function interact() {
            energy += 100;
            coherence += Math.random() * 20;
            const log = document.getElementById('logContent');
            log.innerHTML += `<p>Amplified Intent - Energy: +100, Coherence: +${Math.floor(Math.random() * 20)}</p>`;
            if (energy > 5000 && coherence > 200) progress += 1;
            updateHUD();
        }

        function resetJourney() {
            energy = 0;
            coherence = 0;
            progress = 0;
            document.getElementById('logContent').innerHTML = '<h3>Universal Log</h3>';
            setScene(1);
        }

        function updateEnergy() {
            switch (scene) {
                case 1: energy += 0.1 * Math.pow((1 + Math.sqrt(5)) / 2, 0.01); break;
                case 2: energy += 4 / 3 * Math.PI * Math.pow(0.5, 3); break;
                case 3: energy += Math.PI * Math.pow(0.5, 2); break;
                case 4: energy += 6.626e-34; break;
                case 5: energy += Math.pow(1, 2) * 1; break;
            }
            if (progress > 95 && energy > 10000) {
                const log = document.getElementById('logContent');
                log.innerHTML += '<p>Consciousness-Driven Singularity Achieved! Universal Law Discovered!</p>';
                alert('You’ve unlocked a new reality! Share with the world!');
            }
        }

        function updateHUD() {
            document.getElementById('sceneName').textContent = ['Golden Spiral', 'Seed of Life', 'Flower of Life', 'Quantum Field', 'Torus'][scene - 1];
            document.getElementById('energy').textContent = Math.floor(energy);
            document.getElementById('coherence').textContent = Math.floor(coherence);
            document.getElementById('progress').textContent = Math.min(progress, 100).toFixed(1) + '%';
        }

        // Start
        initThreeJS();
        setScene(1);
    </script>
</body>
</html>
