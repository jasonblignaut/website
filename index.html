<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="View your public IP and test network speed with cosmic Fibonacci particle animations." />
  <meta name="keywords" content="Public IP, Network Speed Test, Fibonacci, Quantum Particles" />
  <meta name="author" content="Labverse Team" />
  <meta property="og:title" content="Your Public IP & Speed Test" />
  <meta property="og:description" content="Discover your public IP address, network info, and test your network speed with mesmerizing sacred geometry animations." />
  <meta property="og:image" content="https://labverse.co.za/assets/labverse-og-image.png" />
  <meta property="og:url" content="https://labverse.co.za" />
  <meta name="twitter:card" content="summary_large_image" />

  <title>Your Public IP & Speed Test</title>

  <!-- Favicon -->
  <link rel="icon" href="favicon.ico" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Source+Code+Pro&display=swap" rel="stylesheet">

  <!-- Style -->
  <style>
    :root {
      --matrix-blue: #00b7eb;
      --cosmic-magenta: #ff00cc;
      --cosmic-gold: #ffd700;
      --cosmic-cyan: #00ffff;
      --light-aura: #e6f0ff;
      --glow-radius: 15px;
      --neon-purple: #bf00ff;
      --neon-blue: #0066ff;
      --dark-bg: #05051a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Source Code Pro', monospace;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: #000000;
      color: var(--light-aura);
      overflow: hidden;
      margin: 0;
    }

    #background-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: block;
      opacity: 1;
    }

    #fallback-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: none;
      opacity: 1;
    }

    .css-particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: none;
      pointer-events: none;
    }

    .css-particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: var(--matrix-blue);
      border-radius: 50%;
      animation: cssParticleMove 8s linear infinite;
      opacity: 0.8;
    }

    @keyframes cssParticleMove {
      0% { transform: translate(0, 0); opacity: 0.8; }
      50% { opacity: 1; }
      100% { transform: translate(100vw, 100vh); opacity: 0; }
    }

    .adsense-container {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      text-align: center;
      width: 100%;
      padding: clamp(0.5rem, 1vw, 1rem);
    }

    .container {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: clamp(1rem, 3vw, 1.5rem);
      padding-top: clamp(4rem, 10vh, 6rem);
      padding-bottom: clamp(2rem, 5vh, 3rem); /* Space for footer */
      overflow-y: auto;
    }

    h1 {
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(2rem, 6vw, 4rem);
      text-transform: uppercase;
      color: var(--light-aura);
      margin-bottom: clamp(1rem, 3vw, 1.5rem);
      text-shadow: 0 0 5px var(--matrix-blue);
      letter-spacing: 0.2rem;
      font-weight: 700;
    }

    .ip-display {
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(1.5rem, 4vw, 2.8rem);
      color: var(--light-aura);
      background: rgba(8, 8, 26, 0.85);
      padding: clamp(0.8rem, 2vw, 1rem) clamp(1.5rem, 3vw, 2.5rem);
      border-radius: 12px;
      border: 2px solid var(--matrix-blue);
      box-shadow: 0 0 20px var(--matrix-blue);
      margin-bottom: clamp(0.5rem, 1.5vw, 0.8rem);
      text-shadow: 0 0 10px var(--matrix-blue);
      word-break: break-all;
    }

    .network-info {
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(0.7rem, 1.5vw, 1rem);
      color: var(--light-aura);
      max-width: clamp(200px, 80vw, 400px);
      line-height: 1.6;
      text-shadow: 0 0 5px var(--matrix-blue);
      margin-bottom: clamp(0.8rem, 2vw, 1.2rem);
      text-align: center;
    }

    .error-message {
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(0.7rem, 1.5vw, 1rem);
      color: #ff5555;
      margin-top: 1rem;
      text-shadow: 0 0 5px var(--matrix-blue);
      display: none;
    }

    .btn {
      background: linear-gradient(90deg, var(--cosmic-cyan), var(--cosmic-magenta));
      color: var(--light-aura);
      border: none;
      padding: clamp(0.6rem, 1.5vw, 0.8rem) clamp(1.5rem, 3vw, 2rem);
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(0.8rem, 1.5vw, 1rem);
      text-transform: uppercase;
      box-shadow: 0 0 var(--glow-radius) var(--cosmic-cyan);
      transition: all 0.5s ease;
      margin: clamp(0.3rem, 1vw, 0.5rem);
      position: relative;
      z-index: 20;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 calc(var(--glow-radius) * 1.5) var(--cosmic-magenta);
      background: linear-gradient(90deg, var(--cosmic-magenta), var(--cosmic-cyan));
    }

    .btn.active {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1.1);
      box-shadow: 0 0 calc(var(--glow-radius) * 2) var(--cosmic-cyan);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 var(--glow-radius) var(--cosmic-cyan); }
      50% { box-shadow: 0 0 calc(var(--glow-radius) * 2) var(--cosmic-magenta); }
      100% { box-shadow: 0 0 var(--glow-radius) var(--cosmic-cyan); }
    }

    .speed-test-container {
      display: none;
      background: rgba(8, 8, 26, 0.95);
      border-radius: 12px;
      border: 2px solid var(--matrix-blue);
      box-shadow: 0 0 20px var(--matrix-blue);
      padding: clamp(1rem, 2vw, 1.5rem);
      margin-top: clamp(0.5rem, 1.5vw, 0.8rem);
      max-width: clamp(300px, 80vw, 600px);
      width: 100%;
      max-height: 50vh;
      overflow-y: auto;
    }

    .speed-test-container.active {
      display: block;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: clamp(0.5rem, 1vw, 0.8rem);
      margin: clamp(0.5rem, 1vw, 1rem) 0;
    }

    .metric {
      background: rgba(0, 183, 235, 0.1);
      padding: clamp(0.5rem, 1vw, 0.8rem);
      border-radius: 5px;
      text-align: center;
    }

    .metric-value {
      font-size: clamp(1rem, 2vw, 1.5rem);
      font-weight: bold;
      color: var(--cosmic-cyan);
      margin: clamp(0.2rem, 0.5vw, 0.3rem) 0;
      text-shadow: 0 0 5px var(--cosmic-cyan);
    }

    .metric-label {
      color: var(--light-aura);
      font-size: clamp(0.6rem, 1vw, 0.8rem);
      text-shadow: 0 0 3px var(--matrix-blue);
    }

    .metric-unit {
      color: var(--cosmic-gold);
      font-size: clamp(0.6rem, 1vw, 0.8rem);
    }

    .progress-container {
      margin: clamp(1rem, 2vw, 1.5rem) 0;
      position: relative;
    }

    .progress {
      height: 14px;
      background: var(--dark-bg);
      border-radius: 7px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(0, 183, 235, 0.3);
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
      position: relative;
      box-shadow: 0 0 15px var(--neon-blue);
      transition: width 0.1s linear;
    }

    .progress-bar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent);
    }

    .progress-bar::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      right: 0;
      width: 5px;
      background: rgba(255,255,255,0.8);
      box-shadow: 0 0 10px 5px var(--cosmic-cyan);
      border-radius: 3px;
    }

    .progress-stats {
      display: flex;
      justify-content: space-between;
      font-size: clamp(0.6rem, 1vw, 0.7rem);
      color: var(--light-aura);
      padding: 5px 2px;
    }

    .progress-percentage {
      position: absolute;
      top: -18px;
      right: 0;
      font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      color: var(--cosmic-cyan);
      text-shadow: 0 0 5px var(--matrix-blue);
    }

    .progress-speed {
      position: absolute;
      top: -18px;
      left: 0;
      font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      color: var(--cosmic-magenta);
      text-shadow: 0 0 5px var(--matrix-blue);
    }

    .speed-graph {
      width: 100%;
      height: clamp(150px, 30vw, 200px);
      background: rgba(0, 0, 0, 0.5);
      border-radius: 5px;
      margin: clamp(0.5rem, 1vw, 1rem) 0;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(0, 183, 235, 0.3);
    }

    .results-display {
      display: none;
      text-align: center;
      color: var(--light-aura);
      font-size: clamp(0.8rem, 1.5vw, 1rem);
      line-height: 1.6;
      padding: clamp(0.5rem, 1vw, 0.8rem);
    }

    .results-display.active {
      display: block;
    }

    .button-container {
      display: flex;
      justify-content: center;
      gap: clamp(0.5rem, 1vw, 0.8rem);
      margin-top: clamp(0.5rem, 1vw, 0.8rem);
    }

    .log-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 1000;
      padding: clamp(1rem, 2vw, 1.5rem);
      overflow-y: auto;
    }

    .log-overlay.active {
      display: block;
    }

    .log-content {
      background: rgba(8, 8, 26, 0.95);
      border: 2px solid var(--matrix-blue);
      border-radius: 12px;
      padding: clamp(1rem, 2vw, 1.5rem);
      max-width: clamp(300px, 80vw, 600px);
      margin: 0 auto;
      color: var(--light-aura);
      font-size: clamp(0.6rem, 1vw, 0.8rem);
      line-height: 1.6;
      text-shadow: 0 0 3px var(--matrix-blue);
    }

    .close-btn {
      background: var(--cosmic-magenta);
      color: var(--light-aura);
      border: none;
      padding: clamp(0.4rem, 1vw, 0.6rem) clamp(1rem, 2vw, 1.5rem);
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      text-transform: uppercase;
      box-shadow: 0 0 var(--glow-radius) var(--cosmic-magenta);
      transition: all 0.3s ease;
      margin-top: clamp(0.5rem, 1vw, 0.8rem);
    }

    .close-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 calc(var(--glow-radius) * 1.5) var(--cosmic-cyan);
      background: var(--cosmic-cyan);
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: transparent;
      padding: clamp(0.5rem, 2vw, 1rem);
      text-align: center;
      font-size: clamp(0.7rem, 1.5vw, 0.9rem);
      color: var(--light-aura);
      z-index: 10;
      text-shadow: 0 0 5px var(--cosmic-cyan);
    }

    ins.adsbygoogle {
      z-index: 1000 !important;
    }

    @media (max-width: 768px) {
      .container {
        padding: clamp(0.5rem, 2vw, 1rem);
        padding-top: clamp(3rem, 8vh, 5rem);
        padding-bottom: clamp(2rem, 5vh, 3rem);
      }

      h1 {
        font-size: clamp(1.5rem, 4vw, 2.5rem);
        letter-spacing: 0.15rem;
      }

      .ip-display {
        font-size: clamp(1.2rem, 3vw, 2rem);
        padding: clamp(0.5rem, 1.5vw, 0.8rem) clamp(1rem, 2vw, 1.5rem);
      }

      .network-info, .error-message {
        font-size: clamp(0.6rem, 1.2vw, 0.9rem);
        max-width: 90vw;
      }

      .btn {
        padding: clamp(0.4rem, 1vw, 0.6rem) clamp(1rem, 2vw, 1.5rem);
        font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      }

      .speed-test-container {
        padding: clamp(0.5rem, 1.5vw, 0.8rem);
        max-height: 40vh;
      }

      .speed-graph {
        height: clamp(120px, 25vw, 150px);
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: clamp(1.2rem, 3.5vw, 2rem);
        letter-spacing: 0.1rem;
      }

      .ip-display {
        font-size: clamp(1rem, 2.5vw, 1.5rem);
      }

      .network-info, .error-message {
        font-size: clamp(0.5rem, 1vw, 0.8rem);
      }

      .btn {
        font-size: clamp(0.6rem, 1vw, 0.8rem);
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      .speed-graph {
        height: clamp(100px, 20vw, 120px);
      }
    }
  </style>
</head>

<body>
  <!-- AdSense Placement -->
  <div class="adsense-container">

  <canvas id="background-canvas"></canvas>
  <canvas id="fallback-canvas"></canvas>
  <div class="css-particles" id="css-particles"></div>

  <div class="container">
    <h1>YOUR PUBLIC IP</h1>
    <div class="ip-display" id="ip-display">Fetching IP...</div>
    <div class="network-info" id="network-info">Fetching network info...</div>
    <div class="error-message" id="error-message">Animations failed to load. Please check your browser settings.</div>
    <button class="btn" id="copy-ip-btn">Copy IP</button>
    <button class="btn" id="start-speed-test">Test Network Speed</button>
    <div class="speed-test-container" id="speed-test-container">
      <div class="metrics">
        <div class="metric">
          <div class="metric-label">Download Speed</div>
          <div class="metric-value" id="download-value">0</div>
          <div class="metric-unit">Mbps</div>
        </div>
        <div class="metric">
          <div class="metric-label">Upload Speed</div>
          <div class="metric-value" id="upload-value">0</div>
          <div class="metric-unit">Mbps</div>
        </div>
        <div class="metric">
          <div class="metric-label">Ping</div>

        <div class="metric">

      </div>
      <div class="progress-container">
        <div class="progress-speed" id="current-speed">0.00 Mbps</div>

      </div>
    </div>
  </div>

  <div class="log-overlay" id="log-overlay">
    <div class="log-content" id="log-content"></div>
    <button class="close-btn" id="close-log">Close</button>
  </div>

  <footer>
    © 2025 Labverse | Powered by 1FAR | WHAT IS MY IP ADDRESS
  </footer>

  <!-- Three.js with Fallback CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r150/three.min.js"></script>

  <script>
    // Debug Logging
    function logDebug(message) {
      console.log('[DEBUG] ' + message);
    }

    // Backend Log Storage
    let backendLogs = [];

    function logBackend(message) {
      const now = new Date().toLocaleTimeString();
      backendLogs.push(`[${now}] ${message}`);
    }

    // Fetch Public IP
    async function fetchPublicIP() {
      try {
        const response = await fetch('https://api.ipify.org?format=json');
        if (!response.ok) throw new Error('IP fetch failed');
        const data = await response.json();
        document.getElementById('ip-display').textContent = data.ip;
        return data.ip;
      } catch (error) {
        document.getElementById('ip-display').textContent = 'IP unavailable';
        logDebug('IP Fetch Error: ' + error.message);
        return null;
      }
    }

    // Fetch Network Info
    async function fetchNetworkInfo() {
      let networkData = { isp: 'Unknown', city: 'Unknown', country: 'Unknown' };
      try {
        const response = await fetch('http://ip-api.com/json', {
          headers: { 'User-Agent': 'Mozilla/5.0' }
        });
        if (response.ok) {
          const data = await response.json();
          if (data.status !== 'fail') {
            networkData.isp = data.isp || 'Unknown';
            networkData.city = data.city || 'Unknown';
            networkData.country = data.country || 'Unknown';
            document.getElementById('network-info').innerHTML = `ISP: ${networkData.isp}<br>Location: ${networkData.city}, ${networkData.country}`;
            return;
          }
        }
        throw new Error('ip-api.com failed');
      } catch (error) {
        logDebug('ip-api.com Error: ' + error.message);
        try {
          const fallbackResponse = await fetch('https://freegeoip.app/json/');
          if (fallbackResponse.ok) {
            const data = await fallbackResponse.json();
            networkData.isp = data.isp || 'Unknown';
            networkData.city = data.city || 'Unknown';
            networkData.country = data.country_name || 'Unknown';
            document.getElementById('network-info').innerHTML = `ISP: ${networkData.isp}<br>Location: ${networkData.city}, ${networkData.country}`;
            return;
          }
        } catch (fallbackError) {
          logDebug('freegeoip.app Error: ' + fallbackError.message);
        }
        document.getElementById('network-info').innerHTML = `ISP: Unknown<br>Location: Unknown`;
      }
    }

    // Initialize Fetch
    fetchPublicIP();
    fetchNetworkInfo();

    // Animation System
    let animationMode = 'none';
    let triggerBigBang = () => {};
    const errorMessage = document.getElementById('error-message');

    function clamp(min, value, max) {
      return Math.min(Math.max(value, min), max);
    }

    function init2DCanvas(canvas) {
      logDebug('Attempting 2D canvas initialization...');
      try {
        const ctx = canvas.getContext('2d');
        if (!ctx) return false;
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        let mousePos = { x: canvas.width / 2, y: canvas.height / 2 };
        document.addEventListener('mousemove', (e) => {
          mousePos.x = e.clientX;
          mousePos.y = e.clientY;
        }, { passive: true });
        document.addEventListener('touchmove', (e) => {
          if (e.touches.length > 0) {
            mousePos.x = e.touches[0].clientX;
            mousePos.y = e.touches[0].clientY;
          }
        }, { passive: true });
        function createParticle(index) {
          const phi = (1 + Math.sqrt(5)) / 2;
          const theta = index * 2 * Math.PI * phi;
          const r = Math.sqrt(index) * 10;
          return {
            x: canvas.width / 2 + r * Math.cos(theta),
            y: canvas.height / 2 + r * Math.sin(theta),
            vx: (Math.random() - 0.5) * 2,
            vy: (Math.random() - 0.5) * 2,
            life: 600,
            color: `hsl(${Math.random() * 360}, 70%, 70%)`
          };
        }
        function initParticles() {
          particles = [];
          for (let i = 0; i < 20; i++) {
            particles.push(createParticle(i));
          }
        }
        initParticles();
        function triggerBigBang2D() {
          particles = [];
          ctx.fillStyle = 'blue';
          ctx.fillRect(canvas.width / 2 - 50, canvas.height / 2 - 50, 100, 100);
          setTimeout(() => ctx.clearRect(canvas.width / 2 - 50, canvas.height / 2 - 50, 100, 100), 1000);
          for (let i = 0; i < 50; i++) {
            const theta = i * 2 * Math.PI * ((1 + Math.sqrt(5)) / 2);
            const r = Math.sqrt(i) * 15;
            particles.push({
              x: canvas.width / 2,
              y: canvas.height / 2,
              vx: r * Math.cos(theta) * 0.05,
              vy: r * Math.sin(theta) * 0.05,
              life: 300,
              color: `hsl(${Math.random() * 360}, 70%, 70%)`
            });
          }
        }
        function animate2D() {
          try {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => {
              if (p.life <= 0) return false;
              p.life--;
              p.x += p.vx + (mousePos.x - canvas.width / 2) * 0.0001;
              p.y += p.vy + (mousePos.y - canvas.height / 2) * 0.0001;
              p.vx *= 0.98;
              p.vy *= 0.98;
              ctx.beginPath();
              ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
              ctx.fillStyle = p.color;
              ctx.globalAlpha = p.life / 600;
              ctx.fill();
              return true;
            });
            if (particles.length < 20 && Math.random() < 0.1) {
              particles.push(createParticle(particles.length));
            }
            particles.forEach(p1 => {
              particles.forEach(p2 => {
                if (p1 !== p2) {
                  const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
                  if (dist < 50 && Math.random() < 0.05) {
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.strokeStyle = p1.color;
                    ctx.globalAlpha = 0.3;
                    ctx.stroke();
                  }
                }
              });
            });
            ctx.globalAlpha = 1;
            requestAnimationFrame(animate2D);
          } catch (error) {
            logDebug('2D Canvas Render Error: ' + error.message);
          }
        }
        animate2D();
        window.addEventListener('resize', () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          initParticles();
        }, { passive: true });
        triggerBigBang = triggerBigBang2D;
        animationMode = '2d';
        return true;
      } catch (error) {
        logDebug('2D Canvas Initialization Error: ' + error.message);
        return false;
      }
    }

    function initWebGL(canvas) {
      logDebug('Attempting WebGL initialization...');
      if (typeof THREE === 'undefined') return false;
      try {
        const testContext = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        if (!testContext) return false;
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let scene = new THREE.Scene();
        let camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        let renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x000000, 0);
        camera.position.z = 50;
        let particles = [];
        let mousePos = { x: 0, y: 0 };
        document.addEventListener('mousemove', (e) => {
          mousePos.x = (e.clientX / window.innerWidth) * 2 - 1;
          mousePos.y = -(e.clientY / window.innerHeight) * 2 + 1;
        }, { passive: true });
        document.addEventListener('touchmove', (e) => {
          if (e.touches.length > 0) {
            mousePos.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
            mousePos.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
          }
        }, { passive: true });
        function createParticle(index, offset, life = 10, velocity = new THREE.Vector3(0, 0, 0), color = 0x00b7eb) {
          const phi = (1 + Math.sqrt(5)) / 2;
          const theta = index * 2 * Math.PI * phi;
          const r = Math.sqrt(index) * 0.8;
          const x = r * Math.cos(theta + offset);
          const y = r * Math.sin(theta + offset);
          const geometry = new THREE.BufferGeometry();
          geometry.setAttribute('position', new THREE.Float32BufferAttribute([x, y, Math.random() * 0.5], 3));
          const material = new THREE.PointsMaterial({
            color,
            size: 0.3,
            transparent: true,
            opacity: 1,
            blending: THREE.AdditiveBlending
          });
          const particle = new THREE.Points(geometry, material);
          scene.add(particle);
          return { obj: particle, life, index, offset, velocity };
        }
        function initAnimations() {
          particles = [];
          for (let i = 0; i < 20; i++) {
            particles.push(createParticle(i, Math.random() * 2 * Math.PI));
          }
        }
        initAnimations();
        function triggerBigBangWebGL() {
          particles.forEach(p => {
            scene.remove(p.obj);
            try {
              p.obj.geometry.dispose();
              p.obj.material.dispose();
            } catch (e) {}
          });
          particles = [];
          const colors = [0x00b7eb, 0xff00cc, 0x00ffff, 0xffd700];
          for (let i = 0; i < 50; i++) {
            const theta = i * 2 * Math.PI * ((1 + Math.sqrt(5)) / 2);
            const r = Math.sqrt(i) * 1.2;
            const velocity = new THREE.Vector3(
              r * Math.cos(theta) * 0.15,
              r * Math.sin(theta) * 0.15,
              (Math.random() - 0.5) * 0.08
            );
            particles.push(createParticle(
              i,
              Math.random() * 2 * Math.PI,
              5,
              velocity,
              colors[Math.floor(Math.random() * colors.length)]
            ));
          }
        }
        function updateAnimations() {
          particles = particles.filter(p => {
            if (p.life <= 0) {
              scene.remove(p.obj);
              try {
                p.obj.geometry.dispose();
                p.obj.material.dispose();
              } catch (e) {}
              return false;
            }
            p.life -= 1 / 60;
            p.obj.material.opacity = p.life / 10 * 1;
            p.obj.position.x += p.velocity.x + mousePos.x * 0.03;
            p.obj.position.y += p.velocity.y + mousePos.y * 0.03;
            p.obj.position.z += p.velocity.z;
            p.velocity.multiplyScalar(0.98);
            return true;
          });
          if (particles.length < 20 && Math.random() < 0.1) {
            particles.push(createParticle(
              Math.floor(Math.random() * 20),
              Math.random() * 2 * Math.PI
            ));
          }
        }
        function animate() {
          try {
            requestAnimationFrame(animate);
            updateAnimations();
            renderer.render(scene, camera);
          } catch (error) {
            logDebug('WebGL Render Error: ' + error.message);
          }
        }
        animate();
        window.addEventListener('resize', () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        }, { passive: true });
        renderer.render(scene, camera);
        triggerBigBang = triggerBigBangWebGL;
        animationMode = 'webgl';
        return true;
      } catch (error) {
        logDebug('WebGL Initialization Error: ' + error.message);
        return false;
      }
    }

    function initCSSAnimations() {
      logDebug('Attempting CSS animation initialization...');
      try {
        const cssParticles = document.getElementById('css-particles');
        cssParticles.style.display = 'block';
        cssParticles.innerHTML = '';
        for (let i = 0; i < 20; i++) {
          const particle = document.createElement('div');
          particle.className = 'css-particle';
          particle.style.left = `${Math.random() * 100}vw`;
          particle.style.top = `${Math.random() * 100}vh`;
          particle.style.animationDelay = `${Math.random() * 8}s`;
          particle.style.background = `hsl(${Math.random() * 360}, 70%, 70%)`;
          cssParticles.appendChild(particle);
        }
        function triggerBigBangCSS() {
          cssParticles.innerHTML = '';
          for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'css-particle';
            particle.style.left = `${50 + (Math.random() - 0.5) * 20}vw`;
            particle.style.top = `${50 + (Math.random() - 0.5) * 20}vh`;
            particle.style.animationDuration = '2s';
            particle.style.background = `hsl(${Math.random() * 360}, 70%, 70%)`;
            cssParticles.appendChild(particle);
            setTimeout(() => particle.remove(), 2000);
          }
        }
        triggerBigBang = triggerBigBangCSS;
        animationMode = 'css';
        return true;
      } catch (error) {
        logDebug('CSS Animation Initialization Error: ' + error.message);
        return false;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const webglCanvas = document.getElementById('background-canvas');
      const fallbackCanvas = document.getElementById('fallback-canvas');
      if (initWebGL(webglCanvas)) {
        fallbackCanvas.style.display = 'none';
        document.getElementById('css-particles').style.display = 'none';
        errorMessage.style.display = 'none';
        return;
      }
      webglCanvas.style.display = 'none';
      if (init2DCanvas(fallbackCanvas)) {
        fallbackCanvas.style.display = 'block';
        document.getElementById('css-particles').style.display = 'none';
        errorMessage.style.display = 'none';
        return;
      }
      webglCanvas.style.display = 'none';
      fallbackCanvas.style.display = 'none';
      if (initCSSAnimations()) {
        errorMessage.style.display = 'none';
        return;
      }
      errorMessage.style.display = 'block';
    });

    // Copy IP to Clipboard
    function copyIP() {
      try {
        const ip = document.getElementById('ip-display').textContent;
        if (!ip || ip === 'IP unavailable') return;
        navigator.clipboard.writeText(ip).then(() => {
          triggerBigBang();
        }).catch(err => {
          const textarea = document.createElement('textarea');
          textarea.value = ip;
          document.body.appendChild(textarea);
          textarea.select();
          try {
            document.execCommand('copy');
            triggerBigBang();
          } catch (e) {}
          document.body.removeChild(textarea);
        });
      } catch (error) {
        logDebug('Copy IP Error: ' + error.message);
      }
    }

    document.getElementById('copy-ip-btn').addEventListener('click', copyIP);

    // Speed Test Logic
    const speedTestContainer = document.getElementById('speed-test-container');
    const startSpeedTestButton = document.getElementById('start-speed-test');
    const downloadValue = document.getElementById('download-value');
    const uploadValue = document.getElementById('upload-value');
    const pingValue = document.getElementById('ping-value');
    const jitterValue = document.getElementById('jitter-value');
    const progressBar = document.getElementById('progress-metor');
    const speedGraph = document.getElementById('speed-graph');
    const resultsDisplay = document.getElementById('results-display');
    const currentSpeed = document.getElementById('current-speed');
    const progressPercent = document.getElementById('progress-percent');
    const dataTransferred = document.getElementById('data-transferred');
    const timeElapsed = document.getElementById('time-elapsed');
    const refreshButton = document.getElementById('refresh-test');
    const showMoreButton = document.getElementById('show-more');
    const logOverlay = document.getElementById('log-overlay');
    const logContent = document.getElementById('log-content');
    const closeLogButton = document.getElementById('close-log');

    const downloadTestFile = '/assets/download-test.bin';
    const PING_COUNT = 10;
    const speedPoints = [0, 5, 10, 25, 50, 100, 200, 500, 1000];
    let selectedServer = { name: 'Local Server', url: '/assets/' };

    // Geolocation for Server Selection
    async function selectNearestServer() {
      return new Promise((resolve) => {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            (position) => {
              logBackend(`Geolocation obtained: Lat ${position.coords.latitude}, Lon ${position.coords.longitude}`);
              resolve();
            },
            () => {
              logBackend('Geolocation denied, using default server');
              resolve();
            }
          );
        } else {
          logBackend('Geolocation not supported, using default server');
          resolve();
        }
      });
    }

    function formatBytes(bytes, decimals = 2) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const dm = decimals < 0 ? 0 : decimals;
      const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    async function testPing() {
      logBackend('Starting ping test...');
      const pingTimes = [];
      progressBar.style.width = '0%';
      progressPercent.textContent = '0%';
      for (let i = 0; i < PING_COUNT; i++) {
        try {
          const startTime = performance.now();
          await fetch(selectedServer.url + 'ping-test.txt', {
            method: 'HEAD',
            cache: 'no-store',
            headers: { 'Cache-Control': 'no-cache' }
          });
          const endTime = performance.now();
          const pingTime = endTime - startTime;
          pingTimes.push(pingTime);
          const percent = ((i + 1) / PING_COUNT) * 100;
          progressBar.style.width = `${percent}%`;
          progressPercent.textContent = `${percent.toFixed(0)}%`;
          logBackend(`Ping #${i+1}: ${pingTime.toFixed(2)} ms`);
          timeElapsed.textContent = `${i+1}/${PING_COUNT}`;
          currentSpeed.textContent = `${pingTime.toFixed(2)} ms`;
        } catch (error) {
          logBackend(`Ping #${i+1} failed: ${error.message}`);
        }
        await new Promise(resolve => setTimeout(resolve, 200));
      }
      if (pingTimes.length > 0) {
        const avgPing = pingTimes.reduce((sum, time) => sum + time, 0) / pingTimes.length;
        const jitter = pingTimes.length > 1 ? Math.sqrt(
          pingTimes.map(time => Math.pow(time - avgPing, 2))
            .reduce((sum, diff) => sum + diff, 0) / (pingTimes.length - 1)
        ) : 0;
        logBackend(`Average ping: ${avgPing.toFixed(2)} ms`);
        logBackend(`Jitter: ${jitter.toFixed(2)} ms`);
        pingValue.textContent = avgPing.toFixed(0);
        jitterValue.textContent = jitter.toFixed(0);
        progressBar.style.width = '100%';
        progressPercent.textContent = '100%';
        return { ping: avgPing, jitter };
      } else {
        logBackend('All ping tests failed');
        pingValue.textContent = 'Error';
        jitterValue.textContent = 'Error';
        return { ping: 0, jitter: 0 };
      }
    }

    async function testDownloadSpeed(graphCtx, updateGraph) {
      logBackend('Starting download test...');
      let receivedBytes = 0;
      let startTime = performance.now();
      let lastUpdate = startTime;
      let speedHistory = [];
      const maxDuration = 10000; // 10 seconds
      const maxDownloads = 20; // Max 20 downloads of 5MB
      let downloadCount = 0;

      try {
        while ((performance.now() - startTime) < maxDuration && downloadCount < maxDownloads) {
          const response = await fetch(downloadTestFile, {
            cache: 'no-store',
            headers: { 'Cache-Control': 'no-cache' }
          });
          if (!response.ok) throw new Error(`HTTP error: ${response.status}`);
          const contentLength = response.headers.get('Content-Length');
          const totalBytes = contentLength ? parseInt(contentLength) : 5 * 1024 * 1024;
          logBackend(`Download #${downloadCount + 1}: ${formatBytes(totalBytes)}`);
          const reader = response.body.getReader();
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            receivedBytes += value.length;
          }
          downloadCount++;
        }
        const interval = setInterval(() => {
          const now = performance.now();
          if (now - startTime > maxDuration) {
            clearInterval(interval);
            return;
          }
          const elapsed = (now - startTime) / 1000;
          timeElapsed.textContent = formatTime(elapsed);
          const speedMbps = ((receivedBytes * 8) / elapsed) / (1024 * 1024);
          speedHistory.push(speedMbps);
          if (speedHistory.length > 30) speedHistory.shift();
          const avgSpeed = speedHistory.reduce((sum, s) => sum + s, 0) / speedHistory.length;
          currentSpeed.textContent = `${avgSpeed.toFixed(2)} Mbps`;
          downloadValue.textContent = avgSpeed.toFixed(2);
          const percent = Math.min(100, (elapsed / 10) * 100);
          progressBar.style.width = `${percent}%`;
          progressPercent.textContent = `${percent.toFixed(1)}%`;
          dataTransferred.textContent = formatBytes(receivedBytes);
          updateGraph(avgSpeed, 'download', elapsed);
          lastUpdate = now;
        }, 100);
        await new Promise(resolve => setTimeout(resolve, maxDuration - (performance.now() - startTime)));
        clearInterval(interval);
        const endTime = performance.now();
        const totalTime = (endTime - startTime) / 1000;
        const finalSpeed = ((receivedBytes * 8) / totalTime) / (1024 * 1024);
        logBackend(`Download complete: ${formatBytes(receivedBytes)} in ${totalTime.toFixed(2)}s`);
        logBackend(`Average download speed: ${finalSpeed.toFixed(2)} Mbps`);
        downloadValue.textContent = finalSpeed.toFixed(2);
        progressBar.style.width = '100%';
        progressPercent.textContent = '100%';
        return finalSpeed;
      } catch (error) {
        logBackend(`Download test error: ${error.message}`);
        return 0;
      }
    }

    async function testUploadSpeed(downloadSpeed, graphCtx, updateGraph) {
      logBackend('Starting upload test...');
      let bytesSent = 0;
      let startTime = performance.now();
      let lastUpdate = startTime;
      let speedHistory = [];
      const duration = 6000; // 6 seconds
      // Estimate upload speed as 30% of download speed (common for consumer connections)
      const estimatedUploadSpeed = downloadSpeed * 0.3;
      const totalBytes = (estimatedUploadSpeed * duration * 1024 * 1024) / (8 * 1000); // Bytes to simulate

      try {
        const interval = setInterval(() => {
          const now = performance.now();
          const elapsed = (now - startTime) / 1000;
          if (elapsed > duration / 1000) {
            clearInterval(interval);
            return;
          }
          bytesSent = (totalBytes * elapsed) / (duration / 1000);
          const speedMbps = ((bytesSent * 8) / elapsed) / (1024 * 1024);
          speedHistory.push(speedMbps);
          if (speedHistory.length > 30) speedHistory.shift();
          const avgSpeed = speedHistory.reduce((sum, s) => sum + s, 0) / speedHistory.length;
          currentSpeed.textContent = `${avgSpeed.toFixed(2)} Mbps`;
          uploadValue.textContent = avgSpeed.toFixed(2);
          const percent = (elapsed / (duration / 1000)) * 100;
          progressBar.style.width = `${percent}%`;
          progressPercent.textContent = `${percent.toFixed(1)}%`;
          dataTransferred.textContent = formatBytes(bytesSent);
          updateGraph(avgSpeed, 'upload', elapsed);
          lastUpdate = now;
        }, 100);
        await new Promise(resolve => setTimeout(resolve, duration));
        clearInterval(interval);
        const endTime = performance.now();
        const totalTime = (endTime - startTime) / 1000;
        const finalSpeed = ((bytesSent * 8) / totalTime) / (1024 * 1024);
        logBackend(`Upload complete: ${formatBytes(bytesSent)} in ${totalTime.toFixed(2)}s`);
        logBackend(`Average upload speed: ${finalSpeed.toFixed(2)} Mbps`);
        uploadValue.textContent = finalSpeed.toFixed(2);
        progressBar.style.width = '100%';
        progressPercent.textContent = '100%';
        return finalSpeed;
      } catch (error) {
        logBackend(`Upload test error: ${error.message}`);
        return 0;
      }
    }

    function initGraph() {
      const ctx = speedGraph.getContext('2d');
      speedGraph.width = speedGraph.offsetWidth;
      speedGraph.height = speedGraph.offsetHeight;
      const dataPoints = { download: [], upload: [] };
      let lastUpdate = performance.now();
      let maxSpeed = 50; // Default max

      function selectSpeedPoints(max) {
        const points = speedPoints.filter(p => p <= max);
        if (points[points.length - 1] < max) points.push(speedPoints.find(p => p > max) || max);
        return points;
      }

      function drawGraph() {
        ctx.clearRect(0, 0, speedGraph.width, speedGraph.height);
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        ctx.fillRect(0, 0, speedGraph.width, speedGraph.height);

        // Draw Y-axis (Mbps)
        const currentPoints = selectSpeedPoints(maxSpeed);
        ctx.strokeStyle = 'rgba(0, 183, 235, 0.5)';
        ctx.lineWidth = 1;
        ctx.font = `${clamp(8, 10, 12)}px 'Source Code Pro', monospace`;
        ctx.fillStyle = 'var(--cosmic-cyan)';
        ctx.textAlign = 'right';
        currentPoints.forEach(speed => {
          const y = speedGraph.height - (speed / maxSpeed) * speedGraph.height;
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(speedGraph.width, y);
          ctx.stroke();
          ctx.fillText(`${speed} Mbps`, 45, y - 5);
        });

        // Draw X-axis (Time)
        ctx.strokeStyle = 'var(--matrix-blue)';
        ctx.beginPath();
        ctx.moveTo(50, 0);
        ctx.lineTo(50, speedGraph.height);
        ctx.stroke();
        ctx.textAlign = 'center';
        for (let i = 0; i <= 10; i += 2) {
          const x = 50 + (i / 10) * (speedGraph.width - 60);
          ctx.fillText(`${i}s`, x, speedGraph.height - 5);
        }
      }

      function updateGraph(speed, type, time) {
        const now = performance.now();
        if (now - lastUpdate < 50) return;
        lastUpdate = now;
        maxSpeed = Math.max(maxSpeed, speed * 1.1, 50);
        maxSpeed = speedPoints.find(p => p >= maxSpeed) || maxSpeed;
        dataPoints[type].push({ speed, time });
        drawGraph();
        ['download', 'upload'].forEach(t => {
          const points = dataPoints[t];
          if (points.length === 0) return;
          ctx.beginPath();
          const color = t === 'download' ? 'var(--cosmic-cyan)' : 'var(--cosmic-magenta)';
          ctx.strokeStyle = color;
          ctx.lineWidth = 3;
          ctx.shadowBlur = 10;
          ctx.shadowColor = color;
          points.forEach((p, i) => {
            const x = 50 + (p.time / 10) * (speedGraph.width - 60);
            const y = speedGraph.height - (p.speed / maxSpeed) * speedGraph.height;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, Math.PI * 2);
            ctx.fill();
          });
          ctx.stroke();
          ctx.shadowBlur = 0;
        });
      }

      function showResults() {
        speedGraph.style.display = 'none';
        resultsDisplay.classList.add('active');
        resultsDisplay.innerHTML = `
          <strong>TEST RESULTS</strong><br>
          Download: ${downloadValue.textContent} Mbps<br>
          Upload: ${uploadValue.textContent} Mbps<br>
          Ping: ${pingValue.textContent} ms<br>
          Jitter: ${jitterValue.textContent} ms<br>
          Server: ${selectedServer.name}
        `;
        refreshButton.style.display = 'inline-block';
        showMoreButton.style.display = 'inline-block';
      }

      drawGraph();
      return { updateGraph, showResults };
    }

    async function runSpeedTest() {
      backendLogs = [];
      startSpeedTestButton.disabled = true;
      startSpeedTestButton.classList.add('active');
      speedTestContainer.classList.add('active');
      downloadValue.textContent = '0';
      uploadValue.textContent = '0';
      pingValue.textContent = '0';
      jitterValue.textContent = '0';
      progressBar.style.width = '0%';
      progressPercent.textContent = '0%';
      currentSpeed.textContent = '0.00 Mbps';
      dataTransferred.textContent = '0 MB';
      timeElapsed.textContent = '00:00';
      speedGraph.style.display = 'block';
      resultsDisplay.classList.remove('active');
      refreshButton.style.display = 'none';
      showMoreButton.style.display = 'none';
      const { updateGraph, showResults } = initGraph();
      try {
        logBackend('Starting Network Speed Test');
        await selectNearestServer();
        logBackend('Testing ping and latency...');
        await testPing();
        logBackend('Testing download speed...');
        const downloadSpeed = await testDownloadSpeed(speedGraph.getContext('2d'), updateGraph);
        logBackend('Testing upload speed...');
        await testUploadSpeed(downloadSpeed, speedGraph.getContext('2d'), updateGraph);
        logBackend('Speed test completed!');
        showResults();
        triggerBigBang();
      } catch (error) {
        logBackend(`Test error: ${error.message}`);
      } finally {
        startSpeedTestButton.disabled = false;
        startSpeedTestButton.classList.remove('active');
      }
    }

    startSpeedTestButton.addEventListener('click', () => {
      if (speedTestContainer.classList.contains('active')) {
        speedTestContainer.classList.remove('active');
        startSpeedTestButton.textContent = 'Test Network Speed';
        startSpeedTestButton.classList.remove('active');
      } else {
        speedTestContainer.classList.add('active');
        startSpeedTestButton.textContent = 'Hide Speed Test';
        runSpeedTest();
      }
    });

    refreshButton.addEventListener('click', runSpeedTest);

    showMoreButton.addEventListener('click', () => {
      logContent.innerHTML = backendLogs.join('<br>') + `<br><strong>Test Server:</strong> ${selectedServer.name}`;
      logOverlay.classList.add('active');
    });

    closeLogButton.addEventListener('click', () => {
      logOverlay.classList.remove('active');
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'e') {
        logDebug('Manual explosion triggered via "e" key');
        triggerBigBang();
      }
    });
  </script>
