<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Labverse Speed Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Source+Code+Pro&family=Exo+2:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --matrix-blue: #00b7eb;
      --cosmic-cyan: #00f2fe;
      --light-aura: #e6f0ff;
      --dark-bg: #070b1a;
      --card-bg: rgba(13, 20, 43, 0.7);
      --neon-border: rgba(79, 172, 254, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Source Code Pro', monospace;
    }

    html, body {
      height: 100vh;
      width: 100%;
      background: var(--dark-bg);
      color: var(--light-aura);
      overflow-x: hidden;
    }

    .container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 1rem;
      gap: 1rem;
    }

    header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      text-transform: uppercase;
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .speed-test-card {
      background: var(--card-bg);
      border-radius: 15px;
      padding: 1.5rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      border: 1px solid var(--neon-border);
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .test-type {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      color: #00f2fe;
      margin-bottom: 1rem;
    }

    .speedometer {
      position: relative;
      width: 350px;
      height: 175px;
      margin: 0 auto 3rem;
    }

    .speedometer-canvas {
      width: 100%;
      height: 100%;
    }

    .speed-value {
      position: absolute;
      bottom: -2.5rem;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      color: #e0e0ff;
    }

    .speed-unit {
      position: absolute;
      bottom: -3.5rem;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Exo 2', sans-serif;
      font-size: 1rem;
      color: #8492b4;
    }

    .graph-container {
      position: relative;
      height: 300px;
      width: 100%;
      margin: 1.5rem 0;
      background: rgba(13, 25, 50, 0.5);
      border-radius: 8px;
      border: 1px solid var(--neon-border);
    }

    .graph-canvas {
      width: 100%;
      height: 100%;
    }

    .results {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }

    .result-box {
      padding: 1rem;
      border-radius: 8px;
      background: rgba(13, 25, 50, 0.7);
      border: 1px solid var(--neon-border);
    }

    .result-label {
      font-family: 'Exo 2', sans-serif;
      font-size: 1rem;
      color: #8492b4;
    }

    .result-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      color: #e0e0ff;
    }

    .button-container {
      display: flex;
      gap: 1.5rem;
      margin: 1.5rem 0;
    }

    .start-button {
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      border: none;
      color: var(--dark-bg);
      padding: 0.7rem 2rem;
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem;
      border-radius: 20px;
      cursor: pointer;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Labverse Speed Test</h1>
    </header>
    <div class="speed-test-card">
      <div class="test-type" id="test-type">Ready to Test - Testing against github.io</div>
      <div class="speedometer">
        <canvas class="speedometer-canvas" id="speedometer-canvas"></canvas>
        <div class="speed-value" id="speed-value">0.0</div>
        <div class="speed-unit">Mbps</div>
      </div>
      <div class="graph-container hidden" id="graph-container">
        <canvas class="graph-canvas" id="graph-canvas"></canvas>
      </div>
      <div class="results hidden" id="results-container">
        <div class="result-box">
          <div class="result-label">Download</div>
          <div class="result-value" id="download-result">0 Mbps</div>
        </div>
        <div class="result-box">
          <div class="result-label">Ping</div>
          <div class="result-value" id="ping-result">0 ms</div>
        </div>
      </div>
      <div class="button-container">
        <button class="start-button" id="start-button">Start Test</button>
      </div>
    </div>
  </div>

  <script>
    "use strict";

    const devicePixelRatio = window.devicePixelRatio || 1;

    // Speedometer Logic
    function speedToAngle(speed) {
      const maxSpeed = 1000;
      const startAngle = 225 * (Math.PI / 180); // Left side (225°)
      const endAngle = 135 * (Math.PI / 180);   // Right side (135°)
      const totalAngle = (225 - 135) * (Math.PI / 180); // 90° span

      speed = Math.min(speed, maxSpeed);
      let fraction;

      if (speed <= 100) {
        // 0 to 100 Mbps spans 80% of the arc (72°)
        fraction = (speed / 100) * 0.8;
      } else {
        // 100 to 1000 Mbps spans the remaining 20% (18°)
        const remainingSpeed = speed - 100;
        const remainingRange = 900;
        fraction = 0.8 + ((remainingSpeed / remainingRange) * 0.2);
      }

      return startAngle - (fraction * totalAngle); // Clockwise progression
    }

    function drawSpeedometer(speed, testRunning = false) {
      const canvas = document.getElementById('speedometer-canvas');
      const ctx = canvas.getContext('2d');
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      canvas.width = width * devicePixelRatio;
      canvas.height = height * devicePixelRatio;
      ctx.scale(devicePixelRatio, devicePixelRatio);

      ctx.clearRect(0, 0, width, height);

      const markers = [0, 5, 10, 20, 25, 50, 100, 500, 1000];
      const centerX = width / 2;
      const centerY = height;
      const radius = Math.min(width / 2, height) * 0.85;
      const labelRadius = radius + 20;

      // Draw background arc
      const startAngle = 225 * (Math.PI / 180);
      const endAngle = 135 * (Math.PI / 180);
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius, startAngle, endAngle, false);
      ctx.strokeStyle = 'rgba(73, 115, 255, 0.2)';
      ctx.lineWidth = 12;
      ctx.stroke();

      // Draw speed arc if test is running
      if (testRunning) {
        const visualAngle = speedToAngle(speed);
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, startAngle, visualAngle, false);
        ctx.strokeStyle = '#00f2fe';
        ctx.lineWidth = 12;
        ctx.stroke();
      }

      // Draw needle
      ctx.save();
      const needleAngle = testRunning ? speedToAngle(speed) : speedToAngle(0);
      ctx.translate(centerX, centerY);
      ctx.rotate(needleAngle);
      ctx.beginPath();
      ctx.moveTo(-5, 0);
      ctx.lineTo(radius - 20, 0);
      ctx.lineTo(0, -5);
      ctx.fillStyle = '#e0e0ff';
      ctx.fill();
      ctx.restore();

      // Draw markers and labels
      ctx.font = '10px "Exo 2", sans-serif';
      ctx.fillStyle = '#e0e0ff';
      ctx.textAlign = 'center';

      markers.forEach(marker => {
        const markerAngle = speedToAngle(marker);
        const labelX = centerX + labelRadius * Math.cos(markerAngle);
        const labelY = centerY + labelRadius * Math.sin(markerAngle);
        ctx.fillText(marker, labelX, labelY);

        const tickStart = radius - 5;
        const tickEnd = radius + 5;
        const tickX1 = centerX + tickStart * Math.cos(markerAngle);
        const tickY1 = centerY + tickStart * Math.sin(markerAngle);
        const tickX2 = centerX + tickEnd * Math.cos(markerAngle);
        const tickY2 = centerY + tickEnd * Math.sin(markerAngle);
        ctx.beginPath();
        ctx.moveTo(tickX1, tickY1);
        ctx.lineTo(tickX2, tickY2);
        ctx.strokeStyle = '#8492b4';
        ctx.lineWidth = 1;
        ctx.stroke();
      });
    }

    // Graph Logic
    let graphData = [];
    let graphActive = true;

    function drawGraph() {
      if (!graphActive) return;

      const canvas = document.getElementById('graph-canvas');
      const ctx = canvas.getContext('2d');
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      canvas.width = width * devicePixelRatio;
      canvas.height = height * devicePixelRatio;
      ctx.scale(devicePixelRatio, devicePixelRatio);

      ctx.clearRect(0, 0, width, height);
      const maxSpeed = 1000;
      const maxTime = 10;
      const padding = { left: 60, right: 30, top: 30, bottom: 40 };

      function speedToY(speed) {
        speed = Math.min(speed, maxSpeed);
        const graphHeight = height - padding.top - padding.bottom;
        if (speed <= 100) {
          return height - padding.bottom - (speed / 100) * (graphHeight * 0.8);
        } else {
          const remainingSpeed = speed - 100;
          const remainingRange = 900;
          return height - padding.bottom - (graphHeight * 0.8) - ((remainingSpeed / remainingRange) * (graphHeight * 0.2));
        }
      }

      const speeds = [0, 5, 10, 20, 25, 50, 100, 500, 1000];
      ctx.beginPath();
      ctx.moveTo(padding.left, padding.top);
      ctx.lineTo(padding.left, height - padding.bottom);
      ctx.lineTo(width - padding.right, height - padding.bottom);
      ctx.strokeStyle = 'rgba(73, 115, 255, 0.4)';
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.font = '10px "Exo 2", sans-serif';
      ctx.fillStyle = '#8492b4';
      ctx.textAlign = 'right';
      speeds.forEach(level => {
        const y = speedToY(level);
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(width - padding.right, y);
        ctx.strokeStyle = 'rgba(73, 115, 255, 0.1)';
        ctx.stroke();
        ctx.fillText(level, padding.left - 15, y + 5);
      });

      ctx.textAlign = 'center';
      for (let t = 0; t <= maxTime; t += 2) {
        const x = padding.left + (t / maxTime) * (width - padding.left - padding.right);
        ctx.fillText(t, x, height - padding.bottom + 20);
      }

      if (graphData.length > 0) {
        ctx.beginPath();
        let startX = padding.left;
        let startY = height - padding.bottom;
        if (graphData[0].speed > 0) {
          startY = speedToY(graphData[0].speed);
        }
        ctx.moveTo(startX, startY);

        graphData.forEach(point => {
          const x = padding.left + (point.time / maxTime) * (width - padding.left - padding.right);
          const y = speedToY(point.speed);
          ctx.lineTo(x, y);
        });

        ctx.strokeStyle = '#00f2fe';
        ctx.lineWidth = 3;
        ctx.stroke();
      }

      ctx.fillStyle = '#e0e0ff';
      ctx.fillText('Time (seconds)', width / 2, height - 10);
      ctx.save();
      ctx.translate(20, height / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText('Speed (Mbps)', 0, 0);
      ctx.restore();
    }

    function updateGraph(time, speed) {
      if (!graphActive) return;
      graphData.push({ time, speed });
      if (graphData.length > 300) graphData.shift();
      drawGraph();
    }

    function resetGraph() {
      graphData = [{ time: 0, speed: 0 }];
      graphActive = true;
      document.getElementById('graph-container').classList.remove('hidden');
      drawGraph();
    }

    // Ping Test
    async function runPingTest() {
      const testType = document.getElementById('test-type');
      testType.textContent = 'Testing Ping - Testing against github.io';
      const pingTimes = [];
      const targets = [
        { url: 'https://1.1.1.1/robots.txt', mode: 'no-cors' },
        { url: 'https://www.google.com/favicon.ico', mode: 'no-cors' },
        { url: '/assets/ping-test.txt', mode: 'cors' }
      ];

      for (const target of targets) {
        for (let i = 0; i < 10; i++) {
          try {
            const start = performance.now();
            await fetch(`${target.url}?t=${Date.now()}`, {
              method: 'HEAD',
              mode: target.mode,
              cache: 'no-store',
              signal: AbortSignal.timeout(2000)
            });
            const ping = performance.now() - start;
            if (ping > 0 && ping < 100) pingTimes.push(ping);
          } catch (error) {
            console.log(`Ping to ${target.url} failed: ${error.message}`);
          }
          await new Promise(resolve => setTimeout(resolve, 100));
        }
        if (pingTimes.length >= 5) break; // Stop if we have enough good pings
      }

      const successfulPings = pingTimes.sort((a, b) => a - b).slice(0, 5);
      const finalPing = successfulPings.length
        ? successfulPings.reduce((sum, t) => sum + t, 0) / successfulPings.length
        : 999;
      document.getElementById('ping-result').textContent = `${finalPing.toFixed(1)} ms`;
      return finalPing;
    }

    // Download Test
    async function runDownloadTest() {
      const testType = document.getElementById('test-type');
      testType.textContent = 'Testing Download Speed - Testing against github.io';
      let totalBytes = 0;
      let startTime = performance.now();
      let lastGraphUpdate = 0;

      try {
        const controller = new AbortController();
        const response = await fetch('/assets/25mb.bin', {
          cache: 'no-store',
          signal: controller.signal
        });

        const reader = response.body.getReader();
        let lastUpdate = performance.now();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          totalBytes += value ? value.length : 0;
          const elapsed = (performance.now() - startTime) / 1000;
          if (performance.now() - lastUpdate >= 100) {
            let speed = elapsed > 0 ? ((totalBytes * 8) / elapsed) / (1024 * 1024) : 0;
            speed = Math.min(speed, 1000);
            document.getElementById('speed-value').textContent = speed.toFixed(1);
            drawSpeedometer(speed, true);
            if (performance.now() - lastGraphUpdate >= 100) {
              updateGraph(elapsed, speed);
              lastGraphUpdate = performance.now();
            }
            lastUpdate = performance.now();
          }
          if (elapsed >= 10) break;
        }

        const totalTime = (performance.now() - startTime) / 1000;
        const finalSpeed = totalTime > 0 ? Math.min(((totalBytes * 8) / totalTime) / (1024 * 1024), 1000) : 0;
        document.getElementById('download-result').textContent = `${finalSpeed.toFixed(1)} Mbps`;
        return finalSpeed;
      } catch (error) {
        console.log('Download error:', error.message);
        return 0;
      }
    }

    // Initialize Test
    function initializeSpeedTest() {
      const testType = document.getElementById('test-type');
      testType.textContent = 'Ready to Test - Testing against github.io';
      drawSpeedometer(0, false);

      document.getElementById('start-button').addEventListener('click', async () => {
        document.getElementById('results-container').classList.add('hidden');
        resetGraph();
        const ping = await runPingTest();
        const downloadSpeed = await runDownloadTest();
        document.getElementById('results-container').classList.remove('hidden');
      });
    }

    // Run on Load
    document.addEventListener('DOMContentLoaded', () => {
      initializeSpeedTest();
    });
  </script>
</body>
</html>
