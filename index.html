<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Labverse Speed Test - Check your IP and network speed with stunning cosmic animations." />
  <meta name="keywords" content="Public IP, Speed Test, Fibonacci, Quantum Particles" />
  <meta name="author" content="Labverse Team" />
  <meta property="og:title" content="Labverse Speed Test" />
  <meta property="og:description" content="Discover your public IP and test your network speed with mesmerizing sacred geometry animations." />
  <meta property="og:image" content="https://labverse.co.za/assets/labverse-og-image.png" />
  <meta property="og:url" content="https://labverse.co.za" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>Labverse Speed Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Source+Code+Pro&family=Exo+2:wght@400;700&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --matrix-blue: #00b7eb;
      --cosmic-magenta: #ff00cc;
      --cosmic-gold: #ffd700;
      --cosmic-cyan: #00ffff;
      --light-aura: #e6f0ff;
      --dark-bg: #070b1a;
      --card-bg: rgba(13, 20, 43, 0.7);
      --glow-radius: 15px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Source+Code+Pro', monospace;
    }

    html, body {
      height: 100vh;
      width: 100%;
      background: var(--dark-bg);
      color: var(--light-aura);
      overflow: hidden;
    }

    #vanta-bg {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      z-index: 1;
      opacity: 0.5;
    }

    #background-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      opacity: 0.8;
    }

    .container {
      position: relative;
      z-index: 10;
      height: 100vh;
      width: 90%;
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 1rem;
    }

    header {
      text-align: center;
      padding: 0.5rem 0;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      text-transform: uppercase;
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 15px var(--cosmic-cyan); }
      to { text-shadow: 0 0 30px var(--cosmic-magenta); }
    }

    .ip-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      width: 100%;
      max-width: 400px;
    }

    .ip-display {
      font-family: 'Source+Code+Pro', monospace;
      font-size: clamp(1.2rem, 3vw, 2rem);
      color: var(--light-aura);
      background: var(--card-bg);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid rgba(79, 172, 254, 0.3);
      box-shadow: 0 0 15px var(--matrix-blue);
      text-shadow: 0 0 10px var(--matrix-blue);
      word-break: break-all;
    }

    .copy-btn {
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      color: var(--dark-bg);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      text-transform: uppercase;
      box-shadow: 0 0 20px rgba(73, 115, 255, 0.4);
      transition: all 0.3s ease;
    }

    .copy-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(73, 115, 255, 0.6);
    }

    .network-info {
      font-family: 'Exo+2', sans-serif;
      font-size: clamp(0.6rem, 1vw, 0.8rem);
      color: #8492b4;
      max-width: 300px;
      line-height: 1.4;
      margin-bottom: 0.5rem;
    }

    .error-message {
      font-family: 'Exo+2', sans-serif;
      font-size: clamp(0.6rem, 1vw, 0.8rem);
      color: #ff5555;
      margin-top: 0.5rem;
      display: none;
    }

    .speed-test-card {
      background: var(--card-bg);
      border-radius: 15px;
      padding: 1rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), 0 0 50px rgba(73, 115, 255, 0.15) inset;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(79, 172, 254, 0.3);
      width: 100%;
      max-height: 60vh;
      overflow: hidden;
    }

    .test-type {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1rem, 2vw, 1.5rem);
      text-align: center;
      margin-bottom: 0.5rem;
      color: #00f2fe;
    }

    .progress-bar {
      height: 6px;
      width: 100%;
      background: rgba(13, 25, 50, 0.7);
      border-radius: 3px;
      overflow: hidden;
      margin: 0.5rem 0;
    }

    .progress {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      border-radius: 3px;
      transition: width 0.3s linear;
      box-shadow: 0 0 10px rgba(73, 115, 255, 0.6);
    }

    .speedometer {
      position: relative;
      width: 200px;
      height: 100px;
      margin: 0 auto 0.5rem;
    }

    .speedometer-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .speed-value {
      position: absolute;
      bottom: -5px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: clamp(1rem, 2vw, 1.5rem);
      font-weight: 700;
      color: #e0e0ff;
      z-index: 5;
      text-shadow: 0 0 10px rgba(73, 115, 255, 0.8);
    }

    .speed-unit {
      position: absolute;
      bottom: -20px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: clamp(0.5rem, 0.8vw, 0.7rem);
      color: #8492b4;
      z-index: 5;
    }

    .graph-container {
      height: 150px;
      position: relative;
      margin: 0.5rem 0;
      border-left: 1px solid rgba(73, 115, 255, 0.4);
      border-bottom: 1px solid rgba(73, 115, 255, 0.4);
      padding: 5px 5px 5px 35px;
    }

    .y-axis {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: #8492b4;
      font-size: clamp(0.5rem, 0.8vw, 0.7rem);
      text-align: right;
      padding-right: 5px;
    }

    .y-axis-label {
      transform: translateY(50%);
    }

    .graph {
      position: relative;
      height: 100%;
      width: 100%;
    }

    .graph-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .grid-lines {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
    }

    .grid-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(73, 115, 255, 0.1);
    }

    .results {
      display: flex;
      justify-content: space-around;
      margin-top: 0.5rem;
    }

    .result-box {
      text-align: center;
      padding: 0.5rem;
      border-radius: 8px;
      background: rgba(13, 25, 50, 0.7);
      width: 45%;
      border: 1px solid rgba(73, 115, 255, 0.2);
    }

    .result-label {
      font-size: clamp(0.6rem, 1vw, 0.8rem);
      color: #8492b4;
      margin-bottom: 0.3rem;
    }

    .result-value {
      font-size: clamp(0.8rem, 1.5vw, 1.2rem);
      font-weight: bold;
      color: #e0e0ff;
    }

    .start-button {
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      border: none;
      color: var(--dark-bg);
      padding: 0.5rem 1.5rem;
      font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      font-weight: bold;
      border-radius: 20px;
      cursor: pointer;
      margin: 0.5rem auto;
      display: block;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(73, 115, 255, 0.4);
    }

    .start-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(73, 115, 255, 0.6);
    }

    .start-button:active {
      transform: translateY(1px);
    }

    .hidden {
      display: none;
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(7, 11, 26, 0.95);
      z-index: 100;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      padding: 1rem;
    }

    .overlay.active {
      display: flex;
    }

    .overlay iframe {
      width: 100%;
      height: 80%;
      max-width: 900px;
      border: none;
      border-radius: 8px;
    }

    .close-button {
      background: linear-gradient(90deg, #ff5555, #ff7777);
      border: none;
      color: var(--light-aura);
      padding: 0.5rem 1.5rem;
      font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      font-weight: bold;
      border-radius: 20px;
      cursor: pointer;
      margin-top: 1rem;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(255, 85, 85, 0.4);
    }

    .close-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(255, 85, 85, 0.6);
    }

    footer {
      position: absolute;
      bottom: 0.5rem;
      width: 100%;
      text-align: center;
      font-size: clamp(0.5rem, 0.8vw, 0.7rem);
      color: #8492b4;
      z-index: 10;
    }

    footer a {
      color: #00f2fe;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .container { padding: 0.5rem; }
      h1 { font-size: clamp(1.2rem, 4vw, 2rem); }
      .ip-display { font-size: clamp(1rem, 2.5vw, 1.5rem); }
      .network-info { font-size: clamp(0.5rem, 0.8vw, 0.7rem); }
      .start-button { font-size: clamp(0.6rem, 1vw, 0.8rem); }
      .speedometer { width: 150px; height: 75px; }
      .graph-container { height: 100px; }
      .y-axis { width: 25px; font-size: 0.6rem; }
    }

    @media (max-width: 480px) {
      h1 { font-size: clamp(1rem, 3vw, 1.5rem); }
      .ip-container { gap: 0.3rem; }
      .ip-display { font-size: clamp(0.8rem, 2vw, 1.2rem); }
      .results { flex-direction: column; gap: 0.5rem; }
      .result-box { width: 100%; }
      .speedometer { width: 120px; height: 60px; }
      .y-axis { width: 20px; font-size: 0.5rem; }
    }
  </style>
</head>
<body>
  <div id="vanta-bg"></div>
  <canvas id="background-canvas"></canvas>

  <div class="container">
    <header>
      <h1>Labverse Speed Test</h1>
    </header>
    <div class="ip-container">
      <div class="ip-display" id="ip-display">Fetching IP...</div>
      <button class="copy-btn" id="copy-ip-btn" aria-label="Copy IP address">Copy IP</button>
    </div>
    <div class="network-info" id="network-info">Fetching network info...</div>
    <div class="error-message" id="error-message">Animations failed to load. Please check your browser settings.</div>

    <div class="speed-test-card">
      <div class="test-type" id="testType">Speed Test</div>
      <div class="progress-bar">
        <div class="progress" id="progressBar"></div>
      </div>
      <div class="speedometer" id="speedometer">
        <canvas class="speedometer-canvas" id="speedometerCanvas"></canvas>
        <div class="speed-value" id="speedValue">0</div>
        <div class="speed-unit">Mbps</div>
      </div>
      <div class="graph-container hidden" id="graphContainer">
        <div class="y-axis" id="yAxis">
          <div class="y-axis-label">1000</div>
          <div class="y-axis-label">500</div>
          <div class="y-axis-label">200</div>
          <div class="y-axis-label">100</div>
          <div class="y-axis-label">50</div>
          <div class="y-axis-label">25</div>
          <div class="y-axis-label">20</div>
          <div class="y-axis-label">10</div>
          <div class="y-axis-label">5</div>
          <div class="y-axis-label">0</div>
        </div>
        <div class="grid-lines" id="gridLines"></div>
        <div class="graph">
          <canvas class="graph-canvas" id="graphCanvas"></canvas>
        </div>
      </div>
      <div class="results hidden" id="resultsContainer">
        <div class="result-box">
          <div class="result-label">Download</div>
          <div class="result-value" id="downloadResult">0 Mbps</div>
        </div>
        <div class="result-box">
          <div class="result-label">Ping</div>
          <div class="result-value" id="pingResult">0 ms</div>
        </div>
      </div>
      <button class="start-button" id="startButton">Start Test</button>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <iframe id="speedFrame" src=""></iframe>
    <button class="close-button" id="closeOverlay">Close</button>
  </div>

  <footer>
    © 2025 Labverse | Powered by <a href="https://onefar.co.za" target="_blank" rel="noopener">1FAR</a>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.net.min.js"></script>
  <script>
    // Initialize Vanta.js background
    VANTA.NET({
      el: "#vanta-bg",
      mouseControls: true,
      touchControls: true,
      minHeight: 200,
      minWidth: 200,
      scale: 1,
      scaleMobile: 1,
      color: 0x00ffff,
      backgroundColor: 0x070b1a
    });

    // Utility Functions
    const log = (message) => console.log('[DEBUG] ' + message);

    const copyToClipboard = (text) => {
      navigator.clipboard.writeText(text).catch(() => {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
      });
    };

    // Particle Animations with Big Bang Explosion
    let particles = [];
    let mousePos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    const canvas = document.getElementById('background-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    document.addEventListener('mousemove', (e) => {
      mousePos.x = e.clientX;
      mousePos.y = e.clientY;
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      if (e.touches.length > 0) {
        mousePos.x = e.touches[0].clientX;
        mousePos.y = e.touches[0].clientY;
      }
    }, { passive: true });

    function createParticle(index) {
      const phi = (1 + Math.sqrt(5)) / 2;
      const theta = index * 2 * Math.PI * phi;
      const r = Math.sqrt(index) * 10;
      return {
        x: canvas.width / 2 + r * Math.cos(theta),
        y: canvas.height / 2 + r * Math.sin(theta),
        vx: (Math.random() - 0.5) * 2,
        vy: (Math.random() - 0.5) * 2,
        life: 600,
        color: `hsl(${Math.random() * 360}, 70%, 70%)`
      };
    }

    function initParticles() {
      particles = Array.from({ length: 20 }, (_, i) => createParticle(i));
    }
    initParticles();

    function triggerBigBang() {
      log('Triggering Big Bang...');
      particles = Array.from({ length: 50 }, (_, i) => {
        const theta = i * 2 * Math.PI * ((1 + Math.sqrt(5)) / 2);
        const r = Math.sqrt(i) * 15;
        return {
          x: canvas.width / 2,
          y: canvas.height / 2,
          vx: r * Math.cos(theta) * 0.05,
          vy: r * Math.sin(theta) * 0.05,
          life: 300,
          color: `hsl(${Math.random() * 360}, 70%, 70%)`
        };
      });
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = particles.filter(p => {
        if (p.life <= 0) return false;
        p.life--;
        p.x += p.vx + (mousePos.x - canvas.width / 2) * 0.0001;
        p.y += p.vy + (mousePos.y - canvas.height / 2) * 0.0001;
        p.vx *= 0.98;
        p.vy *= 0.98;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life / 600;
        ctx.fill();
        return true;
      });

      if (particles.length < 20 && Math.random() < 0.1) {
        particles.push(createParticle(particles.length));
      }

      particles.forEach((p1, i) => {
        particles.slice(i + 1).forEach(p2 => {
          const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
          if (dist < 50 && Math.random() < 0.05) {
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = p1.color;
            ctx.globalAlpha = 0.3;
            ctx.stroke();
          }
        });
      });

      ctx.globalAlpha = 1;
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      initParticles();
    }, { passive: true });

    // Network Functions
    async function fetchIP() {
      log('Fetching public IP...');
      try {
        const response = await fetch('https://api.ipify.org?format=json', { signal: AbortSignal.timeout(5000) });
        const data = await response.json();
        const ip = data.ip;
        log('Public IP fetched: ' + ip);
        document.getElementById('ip-display').textContent = ip;
        return ip;
      } catch (error) {
        log('IP fetch error: ' + error.message);
        document.getElementById('ip-display').textContent = 'IP unavailable';
        throw error;
      }
    }

    async function fetchLocationInfo() {
      log('Fetching network location info...');
      try {
        const response = await fetch('http://ip-api.com/json/?fields=status,message,country,city,isp', { signal: AbortSignal.timeout(5000) });
        const data = await response.json();
        if (data.status !== 'success') throw new Error(data.message || 'Failed to fetch location info');
        const info = {
          isp: data.isp || 'Unknown ISP',
          city: data.city || 'Unknown City',
          country: data.country || 'Unknown Country'
        };
        log('Network info fetched: ' + JSON.stringify(info));
        document.getElementById('network-info').innerHTML = `ISP: ${info.isp}<br>Location: ${info.city}, ${info.country}`;
        return info;
      } catch (error) {
        log('Location fetch error: ' + error.message);
        const fallbackInfo = { isp: 'Dimension Data', city: 'Johannesburg', country: 'South Africa' };
        document.getElementById('network-info').innerHTML = `ISP: ${fallbackInfo.isp}<br>Location: ${fallbackInfo.city}, ${fallbackInfo.country}`;
        return fallbackInfo;
      }
    }

    // Speed Test Functions
    const CONFIG = {
      testServer: {
        downloadUrl: 'https://speed.cloudflare.com/__down?bytes=25000000',
        pingResource: 'https://speed.cloudflare.com/__down?bytes=1000',
      },
      testDurations: { download: 10000, ping: 3000 },
      maxTestTimeout: 15000,
    };

    function initializeSpeedTest() {
      const startButton = document.getElementById('startButton');
      const progressBar = document.getElementById('progressBar');
      const testType = document.getElementById('testType');
      const speedometer = document.getElementById('speedometer');
      const speedometerCanvas = document.getElementById('speedometerCanvas');
      const speedValue = document.getElementById('speedValue');
      const graphContainer = document.getElementById('graphContainer');
      const graphCanvas = document.getElementById('graphCanvas');
      const resultsContainer = document.getElementById('resultsContainer');
      const downloadResult = document.getElementById('downloadResult');
      const pingResult = document.getElementById('pingResult');
      const gridLines = document.getElementById('gridLines');
      const overlay = document.getElementById('overlay');
      const speedFrame = document.getElementById('speedFrame');
      const closeOverlay = document.getElementById('closeOverlay');

      let testActive = false;
      let controller = null;
      let testData = [];
      let finalDownloadSpeed = 0;
      let finalPing = 0;
      let currentSpeed = 0;

      // Speedometer Canvas Setup
      const speedometerCtx = speedometerCanvas.getContext('2d');
      let speedometerWidth, speedometerHeight;
      function resizeSpeedometer() {
        speedometerWidth = speedometerCanvas.clientWidth;
        speedometerHeight = speedometerCanvas.clientHeight;
        speedometerCanvas.width = speedometerWidth * devicePixelRatio;
        speedometerCanvas.height = speedometerHeight * devicePixelRatio;
        speedometerCtx.scale(devicePixelRatio, devicePixelRatio);
      }
      resizeSpeedometer();
      window.addEventListener('resize', resizeSpeedometer, { passive: true });

      function drawSpeedometer(speed) {
        speedometerCtx.clearRect(0, 0, speedometerWidth, speedometerHeight);
        const maxSpeed = 1000;
        const angle = (speed / maxSpeed) * Math.PI; // 0 to 180 degrees
        const centerX = speedometerWidth / 2;
        const centerY = speedometerHeight;
        const radius = Math.min(speedometerWidth / 2, speedometerHeight) * 0.8;

        // Background arc
        speedometerCtx.beginPath();
        speedometerCtx.arc(centerX, centerY, radius, Math.PI, 2 * Math.PI);
        speedometerCtx.strokeStyle = 'rgba(73, 115, 255, 0.3)';
        speedometerCtx.lineWidth = 10;
        speedometerCtx.stroke();

        // Speed arc
        speedometerCtx.beginPath();
        speedometerCtx.arc(centerX, centerY, radius, Math.PI, Math.PI + angle);
        const gradient = speedometerCtx.createLinearGradient(0, 0, speedometerWidth, 0);
        gradient.addColorStop(0, '#4facfe');
        gradient.addColorStop(1, '#00f2fe');
        speedometerCtx.strokeStyle = gradient;
        speedometerCtx.lineWidth = 10;
        speedometerCtx.stroke();

        // Needle
        speedometerCtx.save();
        speedometerCtx.translate(centerX, centerY);
        speedometerCtx.rotate(Math.PI + angle);
        speedometerCtx.beginPath();
        speedometerCtx.moveTo(0, 0);
        speedometerCtx.lineTo(radius - 10, 0);
        speedometerCtx.strokeStyle = '#e0e0ff';
        speedometerCtx.lineWidth = 2;
        speedometerCtx.stroke();
        speedometerCtx.beginPath();
        speedometerCtx.arc(0, 0, 5, 0, 2 * Math.PI);
        speedometerCtx.fillStyle = '#e0e0ff';
        speedometerCtx.fill();
        speedometerCtx.restore();
      }

      // Graph Canvas Setup
      const graphCtx = graphCanvas.getContext('2d');
      let graphWidth, graphHeight;
      function resizeGraph() {
        graphWidth = graphCanvas.clientWidth;
        graphHeight = graphCanvas.clientHeight;
        graphCanvas.width = graphWidth * devicePixelRatio;
        graphCanvas.height = graphHeight * devicePixelRatio;
        graphCtx.scale(devicePixelRatio, devicePixelRatio);
      }
      resizeGraph();
      window.addEventListener('resize', resizeGraph, { passive: true });

      // Set up grid lines and Y-axis alignment
      const SPEED_LEVELS = [0, 5, 10, 20, 25, 50, 100, 200, 500, 1000];
      function speedToHeight(speed) {
        const maxSpeed = 1000;
        if (speed <= 0) return 0;
        const logSpeed = Math.log10(speed + 1);
        const logMax = Math.log10(maxSpeed + 1);
        return (logSpeed / logMax) * 100;
      }

      function setupGridLines() {
        gridLines.innerHTML = '';
        SPEED_LEVELS.forEach(level => {
          const gridLine = document.createElement('div');
          gridLine.className = 'grid-line';
          const heightPercent = speedToHeight(level);
          gridLine.style.bottom = `${heightPercent}%`;
          gridLines.appendChild(gridLine);
        });
      }

      // Smooth graph drawing
      let graphPoints = [];
      function drawGraph() {
        graphCtx.clearRect(0, 0, graphWidth, graphHeight);
        if (graphPoints.length < 2) return;

        // Draw area fill
        graphCtx.beginPath();
        graphCtx.moveTo(0, graphHeight);
        for (let i = 0; i < graphPoints.length; i++) {
          const x = graphPoints[i].x * graphWidth;
          const y = (1 - graphPoints[i].y) * graphHeight;
          graphCtx.lineTo(x, y);
        }
        graphCtx.lineTo(graphPoints[graphPoints.length - 1].x * graphWidth, graphHeight);
        graphCtx.closePath();
        const gradient = graphCtx.createLinearGradient(0, 0, 0, graphHeight);
        gradient.addColorStop(0, 'rgba(73, 115, 255, 0.2)');
        gradient.addColorStop(1, 'rgba(0, 242, 254, 0)');
        graphCtx.fillStyle = gradient;
        graphCtx.fill();

        // Draw line
        graphCtx.beginPath();
        graphCtx.moveTo(graphPoints[0].x * graphWidth, (1 - graphPoints[0].y) * graphHeight);
        for (let i = 1; i < graphPoints.length; i++) {
          const x = graphPoints[i].x * graphWidth;
          const y = (1 - graphPoints[i].y) * graphHeight;
          graphCtx.lineTo(x, y);
        }
        const lineGradient = graphCtx.createLinearGradient(0, 0, graphWidth, 0);
        lineGradient.addColorStop(0, '#4facfe');
        lineGradient.addColorStop(1, '#00f2fe');
        graphCtx.strokeStyle = lineGradient;
        graphCtx.lineWidth = 2;
        graphCtx.stroke();
      }

      async function runPingTest() {
        log('Starting ping test...');
        const pingTimes = [];
        const totalPackets = 10;

        for (let i = 0; i < totalPackets; i++) {
          if (!testActive) break;
          let ping = 999;
          try {
            const start = performance.now();
            await fetch(`${CONFIG.testServer.pingResource}&t=${Date.now()}`, { cache: 'no-store', signal: AbortSignal.timeout(2000) });
            ping = performance.now() - start;
            pingTimes.push(ping);
            log(`Ping #${i + 1}: ${ping.toFixed(2)}ms`);
          } catch (error) {
            pingTimes.push(ping);
            log(`Ping #${i + 1} failed: ${error.message}`);
          }
          await new Promise(resolve => setTimeout(resolve, 300));
        }

        const successfulPings = pingTimes.filter(t => t !== 999);
        const avgPing = successfulPings.length ? successfulPings.reduce((sum, t) => sum + t, 0) / successfulPings.length : 999;
        finalPing = avgPing;
        pingResult.textContent = `${avgPing.toFixed(0)} ms`;
        return avgPing;
      }

      async function runDownloadTest() {
        log('Starting download test...');
        let totalBytes = 0;
        const startTime = performance.now();
        const overallTimeout = setTimeout(() => {
          log('Download test timed out');
          testActive = false;
          if (controller) controller.abort();
          finalizeTest();
        }, CONFIG.maxTestTimeout);

        try {
          controller = new AbortController();
          const response = await fetch(CONFIG.testServer.downloadUrl, { cache: 'no-store', signal: controller.signal });
          if (!response.ok) throw new Error('Failed to fetch download resource');
          const reader = response.body.getReader();

          let lastUpdate = startTime;
          while (testActive) {
            const { done, value } = await reader.read();
            if (done || !testActive) {
              controller.abort();
              break;
            }
            totalBytes += value ? value.length : 0;
            const elapsed = (performance.now() - startTime) / 1000;
            if (performance.now() - lastUpdate >= 100) {
              const speed = ((totalBytes * 8) / elapsed) / (1024 * 1024);
              currentSpeed = speed;
              const timePercentage = elapsed / (CONFIG.testDurations.download / 1000);
              testData.push({ time: elapsed, speed });
              graphPoints.push({ x: timePercentage, y: speedToHeight(speed) / 100 });
              progressBar.style.width = `${timePercentage * 100}%`;
              speedValue.textContent = speed.toFixed(1);
              drawSpeedometer(speed);
              drawGraph();
              lastUpdate = performance.now();
            }
            if (elapsed >= CONFIG.testDurations.download / 1000) {
              controller.abort();
              break;
            }
          }
        } catch (error) {
          log('Download error: ' + error.message);
          throw error;
        } finally {
          clearTimeout(overallTimeout);
          controller = null;
        }

        const totalTime = (performance.now() - startTime) / 1000;
        return totalTime > 0 ? ((totalBytes * 8) / totalTime) / (1024 * 1024) : 0;
      }

      function finalizeTest() {
        if (testData.length === 0) {
          document.getElementById('error-message').style.display = 'block';
          document.getElementById('error-message').textContent = 'Speed test failed. Please try again.';
          startButton.disabled = false;
          startButton.textContent = 'Start Test';
          testActive = false;
          return;
        }

        finalDownloadSpeed = testData.reduce((sum, data) => sum + data.speed, 0) / testData.length;
        downloadResult.textContent = `${finalDownloadSpeed.toFixed(1)} Mbps`;
        resultsContainer.classList.remove('hidden');
        startButton.textContent = 'More Info';
        startButton.disabled = false;
        testActive = false;
        triggerBigBang();
      }

      async function runTest() {
        testActive = true;
        testData = [];
        graphPoints = [];
        currentSpeed = 0;
        speedValue.textContent = '0';
        drawSpeedometer(0);
        graphCtx.clearRect(0, 0, graphWidth, graphHeight);
        progressBar.style.width = '0';
        speedometer.classList.remove('hidden');
        graphContainer.classList.remove('hidden');
        resultsContainer.classList.add('hidden');
        startButton.disabled = true;
        startButton.textContent = 'Testing...';
        testType.textContent = 'Testing Download Speed';

        try {
          await runPingTest();
          if (testActive) {
            const finalSpeed = await runDownloadTest();
            if (testActive) {
              progressBar.style.width = '100%';
              finalizeTest();
            }
          }
        } catch (error) {
          finalizeTest();
        }
      }

      setupGridLines();

      startButton.addEventListener('click', () => {
        if (startButton.textContent === 'More Info') {
          speedFrame.src = 'https://speed.cloudflare.com';
          overlay.classList.add('active');
          return;
        }

        if (startButton.textContent === 'Start Test') {
          runTest();
        }
      });

      closeOverlay.addEventListener('click', () => {
        overlay.classList.remove('active');
        speedFrame.src = '';
      });

      window.addEventListener('beforeunload', () => {
        testActive = false;
        if (controller) controller.abort();
      });
    }

    // Main Initialization
    document.addEventListener('DOMContentLoaded', async () => {
      initializeSpeedTest();
      await Promise.all([fetchIP(), fetchLocationInfo()]);
      document.getElementById('copy-ip-btn').addEventListener('click', () => {
        const ip = document.getElementById('ip-display').textContent;
        if (ip !== 'Fetching IP...' && ip !== 'IP unavailable') {
          copyToClipboard(ip);
          triggerBigBang();
          alert('IP copied to clipboard!');
        }
      });
    });
  </script>
</body>
