<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Dodecahedron LED - Realistic</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/jsm/postprocessing/EffectComposer.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/jsm/postprocessing/RenderPass.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/jsm/postprocessing/UnrealBloomPass.js"></script>
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Post-processing
        const composer = new THREE.EffectComposer(renderer);
        const renderPass = new THREE.RenderPass(scene, camera);
        composer.addPass(renderPass);
        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            0.5, // strength
            0.4, // radius
            0.85 // threshold
        );
        composer.addPass(bloomPass);

        // Dodecahedron geometry
        const geometry = new THREE.DodecahedronGeometry(1, 2);
        const material = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                uColor1: { value: new THREE.Color('#ff4d94') },
                uColor2: { value: new THREE.Color('#4dffeb') },
                uRefractPower: { value: 1.2 },
                uFresnelPower: { value: 2.0 },
                uEnvMap: { value: null }
            },
            vertexShader: `
                varying vec3 vNormal;
                varying vec3 vViewDir;
                varying vec3 vWorldPos;
                void main() {
                    vNormal = normalize(normalMatrix * normal);
                    vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
                    vViewDir = normalize(cameraPosition - vWorldPos);
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform float time;
                uniform vec3 uColor1;
                uniform vec3 uColor2;
                uniform float uRefractPower;
                uniform float uFresnelPower;
                uniform samplerCube uEnvMap;
                varying vec3 vNormal;
                varying vec3 vViewDir;
                varying vec3 vWorldPos;

                void main() {
                    // Fresnel effect for rim lighting
                    float fresnel = pow(1.0 - dot(vNormal, vViewDir), uFresnelPower);
                    
                    // Color animation
                    float t = sin(time * 0.3) * 0.5 + 0.5;
                    vec3 color = mix(uColor1, uColor2, t);
                    
                    // Reflection
                    vec3 reflectDir = reflect(-vViewDir, vNormal);
                    vec4 reflectColor = textureCube(uEnvMap, reflectDir);
                    
                    // Refraction
                    vec3 refractDir = refract(-vViewDir, vNormal, 1.0 / uRefractPower);
                    vec4 refractColor = textureCube(uEnvMap, refractDir);
                    
                    // Combine effects
                    vec3 finalColor = mix(refractColor.rgb, reflectColor.rgb, fresnel * 0.5);
                    finalColor = mix(finalColor, color, 0.3);
                    finalColor += fresnel * color * 0.5;
                    
                    gl_FragColor = vec4(finalColor, 0.8); // Semi-transparent
                }
            `,
            transparent: true,
            side: THREE.DoubleSide
        });

        const dodecahedron = new THREE.Mesh(geometry, material);
        scene.add(dodecahedron);

        // Reflective environment
        const cubeRenderTarget = new THREE.WebGLCubeRenderTarget(512, {
            generateMipmaps: true,
            minFilter: THREE.LinearMipmapLinearFilter
        });
        const cubeCamera = new THREE.CubeCamera(0.1, 1000, cubeRenderTarget);
        scene.add(cubeCamera);
        material.uniforms.uEnvMap.value = cubeRenderTarget.texture;

        // Background particles for depth
        const particleGeometry = new THREE.BufferGeometry();
        const particleCount = 1000;
        const posArray = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 50;
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particleMaterial = new THREE.PointsMaterial({
            size: 0.05,
            color: '#ffffff',
            transparent: true,
            opacity: 0.5
        });
        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 1, 10);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // Camera position
        camera.position.z = 3;

        // Animation loop
        function animate(time) {
            requestAnimationFrame(animate);
            dodecahedron.rotation.x += 0.005;
            dodecahedron.rotation.y += 0.005;
            material.uniforms.time.value = time * 0.001;
            cubeCamera.position.copy(dodecahedron.position);
            cubeCamera.update(renderer, scene);
            composer.render();
        }
        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
