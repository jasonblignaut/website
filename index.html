<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WhatsMyPip.co.za: Instantly discover your public IP address with a stunning, mathematically precise background of Golden Spirals and quantum particles.">
    <meta name="keywords" content="Public IP, Golden Spiral, Fibonacci, Quantum Particles, WebGL, IP Address">
    <meta name="author" content="WhatsMyPip">
    <meta property="og:title" content="WhatsMyPip.co.za">
    <meta property="og:description" content="See your public IP address instantly, surrounded by mesmerizing sacred geometry and particle animations.">
    <meta property="og:image" content="assets/pip-og.webp">
    <meta property="og:url" content="https://whatsmypip.co.za">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" href="assets/favicon.ico">
    <title>WhatsMyPip.co.za | Your Public IP Address</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;700&family=Space+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        :root {
            --matrix-blue: #00b7eb;
            --cosmic-magenta: #ff00cc;
            --void-black: #08081a;
            --light-aura: #e6f0ff;
            --glow-radius: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Exo 2', sans-serif;
        }

        body {
            background: var(--void-black);
            color: var(--light-aura);
            overflow: hidden;
            position: relative;
            cursor: none;
        }

        /* Custom Cursor */
        .observer-cursor {
            position: fixed;
            width: 32px;
            height: 32px;
            background: radial-gradient(circle, var(--matrix-blue) 20%, var(--cosmic-magenta) 60%, transparent 80%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1002;
            box-shadow: 0 0 20px var(--matrix-blue), 0 0 30px var(--cosmic-magenta);
            transform: translate(-50%, -50%);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        /* Quantum Particles */
        .quantum-particle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: var(--cosmic-magenta);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.9;
            box-shadow: 0 0 15px var(--cosmic-magenta);
            animation: waveCollapse 1.5s ease-out forwards;
        }

        @keyframes waveCollapse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(3); opacity: 0.6; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(8, 8, 26, 0.95);
            backdrop-filter: blur(15px);
            padding: 1.2rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1001;
        }

        .logo {
            font-family: 'Space Mono', monospace;
            font-size: 1.8rem;
            background: linear-gradient(90deg, var(--matrix-blue), var(--cosmic-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px var(--matrix-blue);
        }

        /* Main Content */
        .main {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        .main h1 {
            font-family: 'Space Mono', monospace;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            background: linear-gradient(90deg, var(--matrix-blue), var(--cosmic-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 15px var(--matrix-blue);
        }

        .ip-display {
            font-family: 'Space Mono', monospace;
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: var(--light-aura);
            background: rgba(8, 8, 26, 0.9);
            padding: 1.5rem 3rem;
            border-radius: 15px;
            border: 2px solid var(--matrix-blue);
            box-shadow: 0 0 20px var(--matrix-blue);
            margin-bottom: 2rem;
            text-shadow: 0 0 10px var(--matrix-blue);
        }

        .main p {
            font-size: clamp(1.1rem, 2.5vw, 1.4rem);
            color: var(--light-aura);
            max-width: 600px;
            line-height: 1.6;
        }

        /* Background Canvas */
        #background-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Accessibility Panel */
        .accessibility-panel {
            position: fixed;
            bottom: 2.5rem;
            left: 2.5rem;
            background: rgba(8, 8, 26, 0.95);
            padding: 1.2rem;
            border-radius: 12px;
            z-index: 1001;
        }

        .accessibility-panel button {
            background: var(--matrix-blue);
            color: var(--light-aura);
            border: none;
            padding: 0.6rem 1.2rem;
            margin: 0.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
        }

        /* Footer */
        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(8, 8, 26, 0.95);
            padding: 1.5rem;
            text-align: center;
            z-index: 1001;
        }

        footer p {
            color: var(--light-aura);
            font-size: 1rem;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .main h1 {
                font-size: clamp(2rem, 5vw, 3rem);
            }

            .ip-display {
                font-size: clamp(1.5rem, 4vw, 2.5rem);
                padding: 1rem 2rem;
            }

            .accessibility-panel {
                bottom: 1.5rem;
                left: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="observer-cursor" id="observer-cursor"></div>
    <canvas id="background-canvas"></canvas>
    <header>
        <div class="logo">WhatsMyPip.co.za</div>
    </header>
    <section class="main">
        <h1>Your Public IP Address</h1>
        <div class="ip-display" id="ip-display">Fetching IP...</div>
        <p>Explore your digital identity amidst a mathematically precise universe of Golden Spirals and quantum particles. Move your cursor to influence the cosmic dance.</p>
    </section>
    <div class="accessibility-panel">
        <button onclick="toggleHighContrast()">High Contrast</button>
        <button onclick="increaseFontSize()">Font +</button>
        <button onclick="toggleNarration()">Narrate</button>
    </div>
    <footer>
        <p>© 2025 WhatsMyPip.co.za | Powered by AI, Math & Cosmic Precision</p>
    </footer>

    <script>
        // Custom Cursor
        const observerCursor = document.getElementById('observer-cursor');
        document.addEventListener('mousemove', (e) => {
            observerCursor.style.left = `${e.clientX}px`;
            observerCursor.style.top = `${e.clientY}px`;
            const particle = document.createElement('div');
            particle.className = 'quantum-particle';
            particle.style.left = `${e.clientX}px`;
            particle.style.top = `${e.clientY}px`;
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 1500);
        });

        // Fetch Public IP
        async function fetchPublicIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                document.getElementById('ip-display').textContent = data.ip;
            } catch (error) {
                document.getElementById('ip-display').textContent = 'Unable to fetch IP';
                console.error('IP Fetch Error:', error);
            }
        }
        fetchPublicIP();

        // Background Animation
        function initBackground() {
            const canvas = document.getElementById('background-canvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.position.z = 10;

            let particles = [], spiralPoints = [], mousePos = { x: 0, y: 0 };

            // Mouse Interaction
            document.addEventListener('mousemove', (e) => {
                mousePos.x = (e.clientX / window.innerWidth) * 2 - 1;
                mousePos.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            // Golden Spiral
            function updateSpiral() {
                const phi = (1 + Math.sqrt(5)) / 2;
                spiralPoints = [];
                for (let i = 0; i < 50; i++) {
                    const theta = i * 0.1;
                    const r = Math.pow(phi, theta / Math.PI) * 0.1;
                    spiralPoints.push(new THREE.Vector3(r * Math.cos(theta), r * Math.sin(theta), 0));
                }
                const geometry = new THREE.BufferGeometry().setFromPoints(spiralPoints);
                const material = new THREE.LineBasicMaterial({ color: 0xff00cc });
                const spiral = new THREE.Line(geometry, material);
                scene.add(spiral);
                return spiral;
            }

            // Fibonacci Particles
            function updateParticles() {
                particles.forEach(p => scene.remove(p));
                particles = [];
                const fib = (n) => n <= 1 ? n : fib(n - 1) + fib(n - 2);
                for (let i = 0; i < 20; i++) {
                    const r = fib(i) * 0.05;
                    const x = r * Math.cos(i) + mousePos.x * 0.5;
                    const y = r * Math.sin(i) + mousePos.y * 0.5;
                    const geometry = new THREE.BufferGeometry();
                    geometry.setAttribute('position', new THREE.Float32BufferAttribute([x, y, Math.random() * 0.1], 3));
                    const material = new THREE.PointsMaterial({ color: 0x00b7eb, size: 0.1 });
                    const particle = new THREE.Points(geometry, material);
                    particles.push(particle);
                    scene.add(particle);
                }
            }

            let spiral = updateSpiral();
            updateParticles();

            function animate() {
                requestAnimationFrame(animate);
                scene.remove(spiral);
                spiral = updateSpiral();
                updateParticles();
                spiral.rotation.z += 0.005;
                particles.forEach(p => {
                    p.rotation.z += 0.01;
                    p.position.x += mousePos.x * 0.01;
                    p.position.y += mousePos.y * 0.01;
                });
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
        initBackground();

        // Accessibility Features
        let highContrast = false;
        function toggleHighContrast() {
            highContrast = !highContrast;
            document.body.style.filter = highContrast ? 'contrast(1.6) brightness(1.3)' : 'none';
        }

        let fontSize = 16;
        function increaseFontSize() {
            fontSize += 2;
            document.body.style.fontSize = `${fontSize}px`;
        }

        function toggleNarration() {
            const ip = document.getElementById('ip-display').textContent;
            const utterance = new SpeechSynthesisUtterance(`Your public IP address is ${ip}`);
            speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
