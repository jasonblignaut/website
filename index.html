<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Experience a cyberpunk cosmos: copy your IP and trigger a cosmic explosion of life." />

  <!-- Style -->
  <style>
    :root {
      --neon-cyan: #00FFFF;
      --neon-magenta: #FF00CC;
      --electric-blue: #00B7EB;
      --deep-black: #0A0A1A;
      --glow-white: #E6F0FF;
      --glow-radius: 20px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Source Code Pro', monospace;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: var(--deep-black);
      color: var(--glow-white);
      overflow: hidden;
      margin: 0;
    }

    #background-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: block;
      opacity: 1;
    }

    #fallback-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: none;
      opacity: 1;
    }

    .css-particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: none;
      pointer-events: none;
    }

    .css-particle {
      position: absolute;
      width: 8px;
      height: 8px;
      background: var(--neon-cyan);
      border-radius: 50%;
      animation: cssParticleGlitch 6s linear infinite;
      opacity: 0.7;
      box-shadow: 0 0 10px var(--neon-cyan);
    }

    @keyframes cssParticleGlitch {
      0% { transform: translate(0, 0); opacity: 0.7; }
      10% { transform: translate(5px, -5px); opacity: 0.9; }
      50% { opacity: 1; }
      100% { transform: translate(100vw, 100vh); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: clamp(1rem, 3vw, 1.5rem);
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.5rem, 7vw, 5rem);
      text-transform: uppercase;
      color: var(--neon-cyan);
      margin-bottom: clamp(1rem, 3vw, 1.5rem);
      text-shadow: 0 0 15px var(--neon-cyan), 0 0 30px var(--neon-magenta);
      letter-spacing: 0.3rem;
      font-weight: 700;
      animation: glitch 2s linear infinite;
    }

    @keyframes glitch {
      2%, 64% { transform: translate(2px, 0) skew(0deg); }
      4%, 60% { transform: translate(-2px, 0) skew(0deg); }
      62% { transform: translate(0, 0) skew(5deg); }
    }

    .ip-display {
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(1.8rem, 5vw, 3rem);
      color: var(--glow-white);
      background: rgba(10, 10, 26, 0.9);
      padding: clamp(0.8rem, 2vw, 1rem) clamp(1.5rem, 3vw, 2.5rem);
      border-radius: 10px;
      border: 3px solid var(--neon-magenta);
      box-shadow: 0 0 25px var(--neon-magenta), inset 0 0 10px var(--neon-cyan);
      margin-bottom: clamp(0.5rem, 1.5vw, 0.8rem);
      text-shadow: 0 0 15px var(--neon-magenta);
      word-break: break-all;
      animation: flicker 4s infinite;
    }

    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
      20%, 24%, 55% { opacity: 0.8; }
    }

    .equations {
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(0.7rem, 1.5vw, 1rem);
      color: var(--neon-cyan);
      max-width: clamp(200px, 80vw, 400px);
      line-height: 1.6;
      text-shadow: 0 0 10px var(--neon-cyan);
      margin-bottom: clamp(0.8rem, 2vw, 1.2rem);
      text-align: center;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .equations.active {
      opacity: 1;
    }

    .error-message {
      font-family: 'Source Code Pro', monospace;
      font-size: clamp(0.7rem, 1.5vw, 1rem);
      color: #FF5555;
      margin-top: 1rem;
      text-shadow: 0 0 10px var(--electric-blue);
      display: none;
    }

    .btn {
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
      color: var(--glow-white);
      border: none;
      padding: clamp(0.8rem, 2vw, 1rem) clamp(2rem, 4vw, 3rem);
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1rem, 2vw, 1.5rem);
      text-transform: uppercase;
      box-shadow: 0 0 var(--glow-radius) var(--neon-cyan), 0 0 calc(var(--glow-radius) * 2) var(--neon-magenta);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      transition: 0.5s;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 calc(var(--glow-radius) * 2) var(--neon-magenta);
      background: var(--electric-blue);
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: transparent;
      padding: clamp(0.5rem, 2vw, 1rem);
      text-align: center;
      font-size: clamp(0.7rem, 1.5vw, 0.9rem);
      color: var(--glow-white);
      z-index: 10;
      text-shadow: 0 0 10px var(--neon-cyan);
    }

    @media (max-width: 768px) {
      .container {
        padding: clamp(0.5rem, 2vw, 1rem);
      }

      h1 {
        font-size: clamp(2rem, 5vw, 3rem);
        letter-spacing: 0.2rem;
      }

      .ip-display {
        font-size: clamp(1.5rem, 4vw, 2rem);
        padding: clamp(0.5rem, 1.5vw, 0.8rem) clamp(1rem, 2vw, 1.5rem);
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: clamp(1.5rem, 4vw, 2rem);
        letter-spacing: 0.15rem;
      }

      .ip-display {
        font-size: clamp(1rem, 3vw, 1.5rem);
      }

      .btn {
        font-size: clamp(0.8rem, 1.5vw, 1rem);
        padding: clamp(0.5rem, 1.5vw, 0.8rem) clamp(1.5rem, 3vw, 2rem);
      }
    }
  </style>
</head>

<body>
  <canvas id="background-canvas"></canvas>
  <canvas id="fallback-canvas"></canvas>
  <div class="css-particles" id="css-particles"></div>

  <div class="container">
    <h1>CYBERPUNK LIFE SIMULATION</h1>
    <div class="ip-display" id="ip-display">Fetching IP...</div>
    <div class="equations" id="equations">Energy: Calculating...</div>
    <div class="error-message" id="error-message">Simulation failed. Check browser settings.</div>
    <button class="btn" id="copy-ip">Copy IP</button>
  </div>

  <footer>
    © 2025 Labverse Cybernetics | Powered by 1FAR | IGNITE THE COSMOS
  </footer>

  <!-- Three.js ES Modules -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // Debug Logging
    function logDebug(message) {
      console.log('[DEBUG] ' + message);
    }

    // Fetch Public IP
    async function fetchPublicIP() {
      const apis = [
        'https://api.ipify.org?format=json',
        'https://api64.ipify.org?format=json',
        'https://ip.seeip.org/json'
      ];
      for (const api of apis) {
        try {
          const response = await fetch(api, { mode: 'cors' });
          if (!response.ok) throw new Error(`IP fetch failed: ${response.status}`);
          const data = await response.json();
          const ip = data.ip || 'IP unavailable';
          document.getElementById('ip-display').textContent = ip;
          logDebug(`IP fetched from ${api}: ${ip}`);
          return ip;
        } catch (error) {
          logDebug(`IP Fetch Error (${api}): ${error.message}`);
        }
      }
      document.getElementById('ip-display').textContent = 'IP unavailable';
      return null;
    }

    // Initialize Fetch
    fetchPublicIP();

    // Simulation System
    let animationMode = 'none';
    let totalEnergy = 0;
    const equationsDiv = document.getElementById('equations');
    const errorMessage = document.getElementById('error-message');

    // WebGL Simulation
    function initWebGL(canvas) {
      logDebug('Attempting WebGL initialization...');
      try {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
        if (!gl) {
          logDebug('WebGL not supported');
          return false;
        }

        let scene = new THREE.Scene();
        let camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        let renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x0A0A1A, 0);
        camera.position.z = 50;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0x00FFFF, 1.5, 100);
        pointLight.position.set(20, 20, 20);
        scene.add(pointLight);

        let particles = [];
        let mousePos = { x: 0, y: 0 };
        let forcesEnabled = { em: true, strong: true, weak: true, higgs: true };

        document.addEventListener('mousemove', (e) => {
          mousePos.x = (e.clientX / window.innerWidth) * 2 - 1;
          mousePos.y = -(e.clientY / window.innerHeight) * 2 + 1;
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
          if (e.touches.length > 0) {
            mousePos.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
            mousePos.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
          }
        }, { passive: true });

        function createParticle(index, type = 'fermion', life = 10, velocity = new THREE.Vector3(0, 0, 0)) {
          const phi = (1 + Math.sqrt(5)) / 2;
          const theta = index * 2 * Math.PI * phi;
          const r = Math.sqrt(index) * 0.8;
          const x = r * Math.cos(theta);
          const y = r * Math.sin(theta);
          const geometry = new THREE.BufferGeometry();
          geometry.setAttribute('position', new THREE.Float32BufferAttribute([x, y, Math.random() * 0.5], 3));
          let color, size;
          switch (type) {
            case 'fermion': color = 0x00B7EB; size = 0.4; break;
            case 'boson': color = 0xFF00CC; size = 0.6; break;
            case 'higgs': color = 0xFFD700; size = 0.8; break;
          }
          const material = new THREE.PointsMaterial({
            color,
            size,
            transparent: true,
            opacity: 1,
            blending: THREE.AdditiveBlending
          });
          const particle = new THREE.Points(geometry, material);
          scene.add(particle);
          return {
            obj: particle,
            life,
            index,
            type,
            velocity,
            charge: type === 'fermion' ? (Math.random() > 0.5 ? 1 : -1) : 0,
            color: type === 'fermion' ? (Math.random() > 0.5 ? 'red' : 'blue') : null,
            mass: type === 'higgs' ? 2 : type === 'fermion' ? 1 : 0.5
          };
        }

        function initParticles() {
          particles = [];
          for (let i = 0; i < 20; i++) {
            particles.push(createParticle(i, Math.random() > 0.7 ? 'boson' : Math.random() > 0.9 ? 'higgs' : 'fermion'));
          }
          logDebug('WebGL particles initialized: ' + particles.length);
        }
        initParticles();

        function triggerBigBang() {
          particles.forEach(p => {
            scene.remove(p.obj);
            try {
              p.obj.geometry.dispose();
              p.obj.material.dispose();
            } catch (e) {}
          });
          particles = [];
          for (let i = 0; i < 100; i++) {
            const theta = i * 2 * Math.PI * ((1 + Math.sqrt(5)) / 2);
            const r = Math.sqrt(i) * 1.5;
            const velocity = new THREE.Vector3(
              r * Math.cos(theta) * 0.2,
              r * Math.sin(theta) * 0.2,
              (Math.random() - 0.5) * 0.1
            );
            const type = Math.random() > 0.7 ? 'boson' : Math.random() > 0.9 ? 'higgs' : 'fermion';
            particles.push(createParticle(i, type, 5, velocity));
          }
          equationsDiv.classList.add('active');
          setTimeout(() => equationsDiv.classList.remove('active'), 5000);
          logDebug('WebGL Big Bang triggered');
        }

        function calculateEnergy() {
          let kinetic = 0;
          let potential = 0;
          particles.forEach(p => {
            const v2 = p.velocity.lengthSq();
            kinetic += 0.5 * p.mass * v2;
            particles.forEach(p2 => {
              if (p !== p2) {
                const dist = p.obj.position.distanceTo(p2.obj.position);
                if (dist > 0.1) {
                  if (forcesEnabled.em && p.charge && p2.charge) {
                    potential += (p.charge * p2.charge) / dist;
                  }
                  if (forcesEnabled.strong && p.type === 'fermion' && p2.type === 'boson' && dist < 5) {
                    potential += -0.1 / dist * Math.exp(-dist / 2);
                  }
                }
              }
            });
          });
          totalEnergy = kinetic + potential;
          equationsDiv.innerHTML = `
            Energy: ${totalEnergy.toFixed(2)}<br>
            Lagrangian: \\(\\mathcal{L} = \\overline{\\psi} \\not{D} \\psi - \\frac{1}{4} F_{\\mu\\nu} F^{\\mu\\nu} + |D_\\mu \\Phi|^2 - V(\\Phi)\\)<br>
            EM Force: \\(\\vec{F} = \\frac{q_1 q_2}{r^2}\\)<br>
            Strong Potential: \\(V(r) = -\\frac{g^2}{r} e^{-r/\\lambda}\\)
          `;
        }

        function updateParticles() {
          particles = particles.filter(p => {
            if (p.life <= 0) {
              scene.remove(p.obj);
              try {
                p.obj.geometry.dispose();
                p.obj.material.dispose();
              } catch (e) {}
              return false;
            }
            p.life -= 1 / 60;
            p.obj.material.opacity = p.life / 10;

            // Apply forces
            let force = new THREE.Vector3(0, 0, 0);
            particles.forEach(p2 => {
              if (p !== p2) {
                const dist = p.obj.position.distanceTo(p2.obj.position);
                if (dist > 0.1) {
                  if (forcesEnabled.em && p.charge && p2.charge) {
                    const f = (p.charge * p2.charge) / (dist * dist);
                    const dir = p2.obj.position.clone().sub(p.obj.position).normalize();
                    force.add(dir.multiplyScalar(f * 0.05));
                  }
                  if (forcesEnabled.strong && p.type === 'fermion' && p2.type === 'boson' && dist < 5) {
                    const f = -0.1 / dist * Math.exp(-dist / 2);
                    const dir = p2.obj.position.clone().sub(p.obj.position).normalize();
                    force.add(dir.multiplyScalar(f));
                  }
                  if (forcesEnabled.weak && p.type === 'fermion' && Math.random() < 0.01) {
                    p.color = p.color === 'red' ? 'blue' : 'red';
                    p.obj.material.color.set(p.color === 'red' ? 0xFF0000 : 0x0000FF);
                  }
                  if (forcesEnabled.higgs && p2.type === 'higgs') {
                    force.add(p.velocity.clone().multiplyScalar(-0.1 * p.mass));
                  }
                }
              }
            });

            // Mouse interaction
            const mouseForce = new THREE.Vector3(mousePos.x * 0.05, mousePos.y * 0.05, 0);
            force.add(mouseForce);

            // Update velocity and position
            p.velocity.add(force.multiplyScalar(0.1 / p.mass));
            p.velocity.multiplyScalar(0.98);
            p.obj.position.add(p.velocity);

            return true;
          });

          if (particles.length < 20 && Math.random() < 0.1) {
            particles.push(createParticle(particles.length));
          }
          calculateEnergy();
        }

        function animate() {
          try {
            requestAnimationFrame(animate);
            updateParticles();
            camera.position.x += Math.sin(Date.now() * 0.0002) * 0.2;
            camera.position.z = 50 + Math.cos(Date.now() * 0.0001) * 10;
            camera.lookAt(0, 0, 0);
            renderer.render(scene, camera);
          } catch (error) {
            logDebug('WebGL Render Error: ' + error.message);
            renderer.dispose();
            return false;
          }
        }
        animate();

        window.addEventListener('resize', () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        }, { passive: true });

        animationMode = 'webgl';
        logDebug('WebGL simulation started');
        return { triggerBigBang };
      } catch (error) {
        logDebug('WebGL Initialization Error: ' + error.message);
        return false;
      }
    }

    // 2D Canvas Fallback
    function init2DCanvas(canvas) {
      logDebug('Attempting 2D canvas initialization...');
      try {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const ctx = canvas.getContext('2d', { alpha: true });
        if (!ctx) {
          logDebug('2D canvas context not supported');
          return false;
        }

        let particles = [];
        let mousePos = { x: canvas.width / 2, y: canvas.height / 2 };
        let forcesEnabled = { em: true, strong: true, weak: true, higgs: true };

        document.addEventListener('mousemove', (e) => {
          mousePos.x = e.clientX;
          mousePos.y = e.clientY;
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
          if (e.touches.length > 0) {
            mousePos.x = e.touches[0].clientX;
            mousePos.y = e.touches[0].clientY;
          }
        }, { passive: true });

        function createParticle(index, type = 'fermion') {
          const phi = (1 + Math.sqrt(5)) / 2;
          const theta = index * 2 * Math.PI * phi;
          const r = Math.sqrt(index) * 10;
          return {
            x: canvas.width / 2 + r * Math.cos(theta),
            y: canvas.height / 2 + r * Math.sin(theta),
            vx: (Math.random() - 0.5) * 2,
            vy: (Math.random() - 0.5) * 2,
            life: 600,
            type,
            color: type === 'fermion' ? (Math.random() > 0.5 ? 'red' : 'blue') : type === 'boson' ? 'magenta' : 'yellow',
            charge: type === 'fermion' ? (Math.random() > 0.5 ? 1 : -1) : 0,
            mass: type === 'higgs' ? 2 : type === 'fermion' ? 1 : 0.5
          };
        }

        function initParticles() {
          particles = [];
          for (let i = 0; i < 20; i++) {
            particles.push(createParticle(i, Math.random() > 0.7 ? 'boson' : Math.random() > 0.9 ? 'higgs' : 'fermion'));
          }
          logDebug('2D canvas particles initialized: ' + particles.length);
        }
        initParticles();

        function triggerBigBang() {
          particles = [];
          ctx.fillStyle = 'white';
          ctx.fillRect(canvas.width / 2 - 50, canvas.height / 2 - 50, 100, 100);
          setTimeout(() => ctx.clearRect(canvas.width / 2 - 50, canvas.height / 2 - 50, 100, 100), 1000);

          for (let i = 0; i < 100; i++) {
            const theta = i * 2 * Math.PI * ((1 + Math.sqrt(5)) / 2);
            const r = Math.sqrt(i) * 15;
            const type = Math.random() > 0.7 ? 'boson' : Math.random() > 0.9 ? 'higgs' : 'fermion';
            particles.push({
              x: canvas.width / 2,
              y: canvas.height / 2,
              vx: r * Math.cos(theta) * 0.05,
              vy: r * Math.sin(theta) * 0.05,
              life: 300,
              type,
              color: type === 'fermion' ? (Math.random() > 0.5 ? 'red' : 'blue') : type === 'boson' ? 'magenta' : 'yellow',
              charge: type === 'fermion' ? (Math.random() > 0.5 ? 1 : -1) : 0,
              mass: type === 'higgs' ? 2 : type === 'fermion' ? 1 : 0.5
            });
          }
          equationsDiv.classList.add('active');
          setTimeout(() => equationsDiv.classList.remove('active'), 5000);
          logDebug('2D Big Bang triggered');
        }

        function calculateEnergy() {
          let kinetic = 0;
          let potential = 0;
          particles.forEach(p => {
            const v2 = p.vx * p.vx + p.vy * p.vy;
            kinetic += 0.5 * p.mass * v2;
            particles.forEach(p2 => {
              if (p !== p2) {
                const dist = Math.hypot(p2.x - p.x, p2.y - p.y);
                if (dist > 1) {
                  if (forcesEnabled.em && p.charge && p2.charge) {
                    potential += (p.charge * p2.charge) / dist;
                  }
                  if (forcesEnabled.strong && p.type === 'fermion' && p2.type === 'boson' && dist < 50) {
                    potential += -0.1 / dist * Math.exp(-dist / 20);
                  }
                }
              }
            });
          });
          totalEnergy = kinetic + potential;
          equationsDiv.innerHTML = `
            Energy: ${totalEnergy.toFixed(2)}<br>
            Lagrangian: \\(\\mathcal{L} = \\overline{\\psi} \\not{D} \\psi - \\frac{1}{4} F_{\\mu\\nu} F^{\\mu\\nu} + |D_\\mu \\Phi|^2 - V(\\Phi)\\)<br>
            EM Force: \\(\\vec{F} = \\frac{q_1 q_2}{r^2}\\)<br>
            Strong Potential: \\(V(r) = -\\frac{g^2}{r} e^{-r/\\lambda}\\)
          `;
        }

        function animate() {
          try {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => {
              if (p.life <= 0) return false;
              p.life--;

              // Apply forces
              let fx = 0, fy = 0;
              particles.forEach(p2 => {
                if (p !== p2) {
                  const dx = p2.x - p.x;
                  const dy = p2.y - p.y;
                  const dist = Math.hypot(dx, dy);
                  if (dist > 1) {
                    if (forcesEnabled.em && p.charge && p2.charge) {
                      const f = (p.charge * p2.charge) / (dist * dist);
                      fx += f * dx / dist * 0.05;
                      fy += f * dy / dist * 0.05;
                    }
                    if (forcesEnabled.strong && p.type === 'fermion' && p2.type === 'boson' && dist < 50) {
                      const f = -0.1 / dist * Math.exp(-dist / 20);
                      fx += f * dx / dist;
                      fy += f * dy / dist;
                    }
                    if (forcesEnabled.weak && p.type === 'fermion' && Math.random() < 0.01) {
                      p.color = p.color === 'red' ? 'blue' : 'red';
                    }
                    if (forcesEnabled.higgs && p2.type === 'higgs') {
                      fx -= p.vx * 0.1 * p.mass;
                      fy -= p.vy * 0.1 * p.mass;
                    }
                  }
                }
              });

              // Mouse interaction
              fx += (mousePos.x - canvas.width / 2) * 0.0001;
              fy += (mousePos.y - canvas.height / 2) * 0.0001;

              // Update velocity and position
              p.vx += fx / p.mass;
              p.vy += fy / p.mass;
              p.vx *= 0.98;
              p.vy *= 0.98;
              p.x += p.vx;
              p.y += p.vy;

              // Draw
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.type === 'higgs' ? 5 : 3, 0, Math.PI * 2);
              ctx.fillStyle = p.type === 'fermion' ? p.color : p.type === 'boson' ? 'magenta' : 'yellow';
              ctx.globalAlpha = p.life / 600;
              ctx.fill();
              return true;
            });

            // Draw trails
            particles.forEach(p1 => {
              particles.forEach(p2 => {
                if (p1 !== p2) {
                  const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
                  if (dist < 50 && Math.random() < 0.05) {
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.strokeStyle = p1.type === 'fermion' ? p1.color : p1.type === 'boson' ? 'magenta' : 'yellow';
                    ctx.globalAlpha = 0.3;
                    ctx.stroke();
                  }
                }
              });
            });

            ctx.globalAlpha = 1;
            if (particles.length < 20 && Math.random() < 0.1) {
              particles.push(createParticle(particles.length));
            }

            calculateEnergy();
            requestAnimationFrame(animate);
          } catch (error) {
            logDebug('2D Canvas Render Error: ' + error.message);
            return false;
          }
        }
        animate();

        window.addEventListener('resize', () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          initParticles();
        }, { passive: true });

        animationMode = '2d';
        logDebug('2D canvas simulation started');
        return { triggerBigBang };
      } catch (error) {
        logDebug('2D Canvas Initialization Error: ' + error.message);
        return false;
      }
    }

    // CSS Fallback
    function initCSSAnimations() {
      logDebug('Attempting CSS animation initialization...');
      try {
        const cssParticles = document.getElementById('css-particles');
        cssParticles.style.display = 'block';

        for (let i = 0; i < 20; i++) {
          const particle = document.createElement('div');
          particle.className = 'css-particle';
          particle.style.left = `${Math.random() * 100}vw`;
          particle.style.top = `${Math.random() * 100}vh`;
          particle.style.animationDelay = `${Math.random() * 6}s`;
          particle.style.background = `hsl(${Math.random() * 360}, 70%, 70%)`;
          cssParticles.appendChild(particle);
        }

        function triggerBigBang() {
          cssParticles.innerHTML = '';
          for (let i = 0; i < 100; i++) {
            const particle = document.createElement('div');
            particle.className = 'css-particle';
            particle.style.left = `${50 + (Math.random() - 0.5) * 20}vw`;
            particle.style.top = `${50 + (Math.random() - 0.5) * 20}vh`;
            particle.style.animationDuration = '2s';
            particle.style.background = `hsl(${Math.random() * 360}, 70%, 70%)`;
            cssParticles.appendChild(particle);
            setTimeout(() => particle.remove(), 2000);
          }
          equationsDiv.classList.add('active');
          setTimeout(() => equationsDiv.classList.remove('active'), 5000);
          logDebug('CSS Big Bang triggered');
        }

        animationMode = 'css';
        logDebug('CSS animation started');
        return { triggerBigBang };
      } catch (error) {
        logDebug('CSS Animation Initialization Error: ' + error.message);
        return false;
      }
    }

    // Initialize Simulation
    function initializeSimulation() {
      const webglCanvas = document.getElementById('background-canvas');
      const fallbackCanvas = document.getElementById('fallback-canvas');

      // Try WebGL first
      let sim = initWebGL(webglCanvas);
      if (sim) {
        fallbackCanvas.style.display = 'none';
        document.getElementById('css-particles').style.display = 'none';
        errorMessage.style.display = 'none';
        return sim;
      }

      // Try 2D Canvas
      sim = init2DCanvas(fallbackCanvas);
      if (sim) {
        webglCanvas.style.display = 'none';
        fallbackCanvas.style.display = 'block';
        document.getElementById('css-particles').style.display = 'none';
        errorMessage.style.display = 'none';
        return sim;
      }

      // Fall back to CSS
      sim = initCSSAnimations();
      if (sim) {
        webglCanvas.style.display = 'none';
        fallbackCanvas.style.display = 'none';
        errorMessage.style.display = 'none';
        return sim;
      }

      errorMessage.style.display = 'block';
      logDebug('All simulation methods failed');
      return null;
    }

    // Copy IP to Clipboard
    function copyIP() {
      try {
        const ip = document.getElementById('ip-display').textContent;
        if (!ip || ip === 'IP unavailable') {
          logDebug('No IP to copy');
          return;
        }

        navigator.clipboard.writeText(ip).then(() => {
          logDebug('IP copied successfully');
          simulation.triggerBigBang();
        }).catch(err => {
          logDebug('Clipboard Error: ' + err.message);
          const textarea = document.createElement('textarea');
          textarea.value = ip;
          document.body.appendChild(textarea);
          textarea.select();
          try {
            document.execCommand('copy');
            logDebug('Fallback copy successful');
            simulation.triggerBigBang();
          } catch (e) {
            logDebug('Fallback Copy Error: ' + e.message);
          }
          document.body.removeChild(textarea);
        });
      } catch (error) {
        logDebug('Copy IP Error: ' + error.message);
      }
    }

    // Initialize and Bind Events
    document.addEventListener('DOMContentLoaded', () => {
      const simulation = initializeSimulation();
      if (simulation) {
        document.getElementById('copy-ip').addEventListener('click', copyIP);
      }
    });
  </script>
</body>
</html>
