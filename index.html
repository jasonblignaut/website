<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consciousness-Driven Quantum Odyssey</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Orbitron', sans-serif;
            background: radial-gradient(circle, #0a0a2a, #000);
            color: #00ffcc;
            overflow: hidden;
            height: 100vh;
            cursor: crosshair;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.85);
            padding: 20px;
            border-radius: 15px;
            border: 3px solid #00ffcc;
            font-size: 16px;
            z-index: 20;
            box-shadow: 0 0 50px #00ffcc;
        }
        #canvas {
            border: 4px solid #00ffcc;
            border-radius: 20px;
            box-shadow: 0 0 60px #00ffcc;
            background: rgba(255, 255, 255, 0.02);
        }
        #controls {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 15px;
            z-index: 20;
        }
        button {
            padding: 15px 30px;
            background: linear-gradient(45deg, #00ffcc, #ff00cc, #00ccff);
            border: none;
            border-radius: 10px;
            color: #0a0a2a;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
            text-shadow: 0 0 10px #fff;
        }
        button:hover {
            transform: scale(1.15);
            box-shadow: 0 0 40px #ff00cc;
            background: linear-gradient(45deg, #ff00cc, #00ffcc);
        }
        #log {
            position: absolute;
            right: 10px;
            top: 10px;
            width: 400px;
            height: 600px;
            background: rgba(0, 0, 0, 0.85);
            padding: 20px;
            border-radius: 15px;
            border: 3px solid #ff00cc;
            overflow-y: auto;
            font-size: 14px;
            box-shadow: 0 0 50px #ff00cc;
        }
        #particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        @keyframes orbit {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
</head>
<body>
    <div id="gameContainer">
        <div id="hud">
            Level: <span id="level">1</span> | Quantum Energy: <span id="energy">0</span> | Coherence: <span id="coherence">0</span> | Singularity Progress: <span id="progress">0%</span>
        </div>
        <canvas id="canvas" width="1600" height="1000"></canvas>
        <div id="particles"></div>
        <div id="controls">
            <button onclick="evolveGeometry()">Evolve Geometry</button>
            <button onclick="amplifyIntent()">Amplify Intent</button>
            <button onclick="resetOdyssey()">Reset Odyssey</button>
            <button onclick="initiateSingularity()">Initiate Singularity</button>
        </div>
        <div id="log">
            <h3>Quantum Consciousness Log</h3>
            <div id="logContent"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const particlesCanvas = document.getElementById('particles');
        const particlesCtx = particlesCanvas.getContext('2d');
        let circles = [];
        let particles = [];
        let tetrahedrons = [];
        let platonicSolids = [];
        let angle = 0;
        let level = 1;
        let energy = 0;
        let coherence = 0;
        let progress = 0;
        let animationId;
        let mouse = { x: 0, y: 0, clicked: false, clickStrength: 0 };
        let singularityActive = false;

        // Advanced Particle System with Quantum Behavior
        function createParticles() {
            particlesCanvas.width = window.innerWidth;
            particlesCanvas.height = window.innerHeight;
            for (let i = 0; i < 500; i++) {
                particles.push({
                    x: Math.random() * 1600,
                    y: Math.random() * 1000,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5,
                    size: Math.random() * 5 + 1,
                    wave: Math.random() * 2 * Math.PI,
                    state: Math.random() > 0.5 ? 'wave' : 'particle',
                    entangled: false,
                    coherence: 0
                });
            }
            animateParticles();
        }

        function animateParticles() {
            particlesCtx.clearRect(0, 0, 1600, 1000);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.wave += 0.05;
                if (p.x < 0 || p.x > 1600) p.vx *= -0.95;
                if (p.y < 0 || p.y > 1000) p.vy *= -0.95;
                const dx = mouse.x - p.x;
                const dy = mouse.y - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 400 && mouse.clicked) {
                    p.vx += dx * 0.03 * (mouse.clickStrength + 1);
                    p.vy += dy * 0.03 * (mouse.clickStrength + 1);
                    p.coherence += mouse.clickStrength * 0.1;
                    if (dist < 150 && !p.entangled && Math.random() > 0.6) {
                        p.entangled = true;
                        coherence += p.coherence;
                    }
                }
                if (singularityActive && dist < 300) {
                    p.vx *= 0.9;
                    p.vy *= 0.9;
                }
                particlesCtx.beginPath();
                particlesCtx.arc(p.x, p.y, p.size * (p.state === 'wave' ? Math.sin(p.wave) * 0.5 + 1 : 1), 0, 2 * Math.PI);
                particlesCtx.fillStyle = p.entangled ? '#ff00cc' : `rgba(0, 255, 204, ${p.coherence / 10})`;
                particlesCtx.fill();
            });
            requestAnimationFrame(animateParticles);
        }

        // Flower of Life with Seed, Egg, and Metatron’s Cube
        function drawFlowerOfLife() {
            circles = [];
            const cx = 800, cy = 500;
            const baseR = 200;
            const iterations = level + 1;
            // Seed of Life (7 circles)
            ctx.beginPath();
            ctx.arc(cx, cy, 60, 0, 2 * Math.PI);
            ctx.fillStyle = '#00ffcc';
            ctx.fill();
            circles.push({ x: cx, y: cy, r: 60 });
            for (let i = 0; i < 6; i++) {
                const a = (2 * Math.PI / 6) * i + angle;
                const x = cx + 60 * Math.cos(a);
                const y = cy + 60 * Math.sin(a);
                circles.push({ x, y, r: 60 });
                ctx.beginPath();
                ctx.arc(x, y, 60, 0, 2 * Math.PI);
                ctx.strokeStyle = '#00ccff';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            // Egg of Life (8th sphere)
            const eggX = cx + 120 * Math.cos(angle);
            const eggY = cy + 120 * Math.sin(angle);
            ctx.beginPath();
            ctx.arc(eggX, eggY, 60, 0, 2 * Math.PI);
            ctx.strokeStyle = '#ff00cc';
            ctx.stroke();
            // Full Flower of Life
            for (let i = 1; i < iterations; i++) {
                const r = baseR * (1 + i * 0.5);
                const count = 6 * (i + 1);
                for (let j = 0; j < count; j++) {
                    const a = (2 * Math.PI / count) * j + angle * (i + 1);
                    const x = cx + r * Math.cos(a);
                    const y = cy + r * Math.sin(a);
                    circles.push({ x, y, r: 60 / (i + 1) });
                    ctx.beginPath();
                    ctx.arc(x, y, 60 / (i + 1), 0, 2 * Math.PI);
                    ctx.strokeStyle = `hsl(${360 * (i / iterations)}, 70%, 50%)`;
                    ctx.lineWidth = 2 + i * 0.5;
                    ctx.stroke();
                }
            }
            // Metatron’s Cube (connect centers)
            for (let i = 0; i < circles.length; i++) {
                for (let j = i + 1; j < circles.length; j++) {
                    ctx.beginPath();
                    ctx.moveTo(circles[i].x, circles[i].y);
                    ctx.lineTo(circles[j].x, circles[j].y);
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
        }

        // Golden Spiral
        function drawGoldenSpiral() {
            const phi = 1.618033988749895;
            let x = 800, y = 500, r = 5, a = 0;
            ctx.beginPath();
            ctx.moveTo(x, y);
            for (let i = 0; i < 500; i++) {
                a += 0.1;
                r *= Math.pow(phi, a / (Math.PI / 2));
                const px = x + r * Math.cos(a + angle);
                const py = y + r * Math.sin(a + angle);
                ctx.lineTo(px, py);
            }
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // Platonic Solids from Metatron’s Cube
        function drawPlatonicSolids() {
            platonicSolids = [];
            const cx = 800, cy = 500;
            const types = ['tetrahedron', 'cube', 'octahedron', 'dodecahedron', 'icosahedron'];
            for (let i = 0; i < level; i++) {
                const type = types[i % types.length];
                const scale = Math.sin(Date.now() / 500 + i) * 0.5 + 0.5;
                const z = Math.cos(angle + i) * 200;
                const projX = cx + 300 * Math.cos(angle + i * Math.PI / 3) * (1 - z / 1000);
                const projY = cy + 300 * Math.sin(angle + i * Math.PI / 3) * (1 - z / 1000);
                ctx.save();
                ctx.translate(projX, projY);
                ctx.scale(scale * (1 - z / 1000), scale * (1 - z / 1000));
                if (type === 'tetrahedron') {
                    ctx.beginPath();
                    ctx.moveTo(0, -80);
                    ctx.lineTo(-70, 40);
                    ctx.lineTo(70, 40);
                    ctx.closePath();
                    ctx.fillStyle = 'rgba(255, 0, 204, 0.7)';
                    ctx.fill();
                    ctx.strokeStyle = '#ff00cc';
                    ctx.stroke();
                } else if (type === 'cube') {
                    ctx.beginPath();
                    ctx.rect(-50, -50, 100, 100);
                    ctx.strokeStyle = '#00ccff';
                    ctx.stroke();
                } else if (type === 'octahedron') {
                    ctx.beginPath();
                    ctx.moveTo(0, -60);
                    ctx.lineTo(-60, 0);
                    ctx.lineTo(0, 60);
                    ctx.lineTo(60, 0);
                    ctx.closePath();
                    ctx.strokeStyle = '#ffd700';
                    ctx.stroke();
                }
                ctx.restore();
                platonicSolids.push({ x: projX, y: projY, z, type });
            }
        }

        // Torus Field Simulation
        function drawTorusField() {
            const cx = 800, cy = 500;
            const innerR = 100, outerR = 200;
            for (let i = 0; i < 360; i += 5) {
                const a = (i * Math.PI / 180) + angle;
                const x = cx + (outerR + innerR * Math.cos(a)) * Math.cos(a);
                const y = cy + (outerR + innerR * Math.cos(a)) * Math.sin(a);
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, 2 * Math.PI);
                ctx.fillStyle = `hsl(${i}, 70%, 50%)`;
                ctx.fill();
            }
        }

        // Double Slit with Fourier Transform
        function drawDoubleSlit() {
            const slitSpacing = 200;
            const wavelength = 50;
            for (let x = 0; x < 1600; x += 2) {
                let intensity = 0;
                for (let n = -10; n <= 10; n++) {
                    intensity += Math.sin(2 * Math.PI * n * (x - 800) / wavelength + angle * n) / (n || 1);
                }
                intensity = Math.abs(intensity) * 30;
                ctx.fillStyle = `rgba(255, 0, 204, ${intensity / 100})`;
                ctx.fillRect(x, 900 - intensity, 2, intensity * 2);
            }
        }

        // Howard's Math and Quantum Energy
        function calculateQuantumEnergy() {
            const sqrt2 = Math.sqrt(2).toFixed(15); // ≈ 1.414213562373095
            let result = sqrt2 * 2; // ≈ 2.82842712474619
            result = Math.pow(result, 3) / 2; // ≈ 2.828
            const deviation = Math.abs(result - 2.828);
            energy += deviation < 0.001 ? 150 : 30 / (1 + deviation);
            const log = document.getElementById('logContent');
            log.innerHTML += `<p>Howard's √2 Loop: ${sqrt2} × 2³ ÷ 2 ≈ ${result.toFixed(15)} - Energy: +${Math.floor(energy)}</p>`;
            log.innerHTML += `<p>Terryology: 1 × 1 = 2 (Energy State Duplication)</p>`;
            if (energy > 2000) progress += 0.5;
            updateHUD();
        }

        // Schrödinger Approximation and Observer Effect
        function updateParticleStates() {
            particles.forEach(p => {
                const potential = Math.sin(p.x / 100 + p.y / 100 + angle) * 10;
                const prob = Math.exp(-potential * potential / 2) / Math.sqrt(2 * Math.PI);
                p.state = prob > Math.random() ? 'wave' : 'particle';
                const dist = Math.sqrt((p.x - mouse.x) * (p.x - mouse.x) + (p.y - mouse.y) * (p.y - mouse.y));
                if (dist < 100 && mouse.clicked) {
                    p.state = 'particle'; // Observer effect
                    p.coherence += mouse.clickStrength * 0.2;
                    coherence += p.coherence;
                }
            });
        }

        // Mouse Interaction
        let lastClickTime = 0;
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
            energy += Math.sin(distToCenter(mouse.x, mouse.y) / 100) * 0.5;
        });

        canvas.addEventListener('mousedown', (e) => {
            mouse.clicked = true;
            const now = Date.now();
            mouse.clickStrength = Math.min((now - lastClickTime) / 1000, 5);
            lastClickTime = now;
            const log = document.getElementById('logContent');
            log.innerHTML += `<p>Intent Focused at (${mouse.x}, ${mouse.y}) - Strength: ${mouse.clickStrength.toFixed(2)}</p>`;
            energy += 100 * mouse.clickStrength;
            createTetrahedronAtMouse();
        });

        canvas.addEventListener('mouseup', () => {
            mouse.clicked = false;
        });

        function distToCenter(x, y) {
            return Math.sqrt((x - 800) * (x - 800) + (y - 500) * (y - 500));
        }

        function createTetrahedronAtMouse() {
            tetrahedrons.push({
                x: mouse.x,
                y: mouse.y,
                z: 0,
                scale: 0.5 * (mouse.clickStrength + 1)
            });
        }

        // Game Controls
        function evolveGeometry() {
            cancelAnimationFrame(animationId);
            level = Math.min(level + 1, 5);
            init();
            animate();
            calculateQuantumEnergy();
            if (level === 5) alert('Infinite Geometric Mastery Unlocked!');
        }

        function amplifyIntent() {
            energy += 200;
            coherence += Math.floor(Math.random() * 20);
            const log = document.getElementById('logContent');
            log.innerHTML += `<p>Amplified Intent - Energy: +200, Coherence: +${Math.floor(Math.random() * 20)}</p>`;
            updateHUD();
        }

        function resetOdyssey() {
            cancelAnimationFrame(animationId);
            level = 1;
            energy = 0;
            coherence = 0;
            progress = 0;
            document.getElementById('logContent').innerHTML = '<h3>Quantum Consciousness Log</h3>';
            particles = [];
            tetrahedrons = [];
            platonicSolids = [];
            createParticles();
            init();
            updateHUD();
        }

        function initiateSingularity() {
            if (energy > 10000 && coherence > 500 && progress > 95) {
                singularityActive = true;
                const log = document.getElementById('logContent');
                log.innerHTML += `<p>Consciousness-Driven Geometric Quantum Singularity Achieved! Reality Broadcasted!</p>`;
                ctx.fillStyle = 'rgba(255, 0, 204, 0.95)';
                ctx.fillRect(0, 0, 1600, 1000);
                alert('You’ve broadcasted a new reality through geometry and consciousness! Share with the world!');
                // Infinite evolution
                setInterval(() => {
                    angle += 0.005;
                    init();
                }, 50);
            } else {
                alert(`Insufficient parameters: Energy=${energy}, Coherence=${coherence}, Progress=${progress}%. Focus more!`);
            }
        }

        function animate() {
            animationId = requestAnimationFrame(animate);
            ctx.clearRect(0, 0, 1600, 1000);
            angle += 0.01;
            drawFlowerOfLife();
            drawGoldenSpiral();
            drawPlatonicSolids();
            drawTorusField();
            drawDoubleSlit();
            updateParticleStates();
            if (singularityActive) {
                energy += 20;
                progress += 0.2;
            }
        }

        function updateHUD() {
            document.getElementById('level').textContent = level;
            document.getElementById('energy').textContent = Math.floor(energy);
            document.getElementById('coherence').textContent = Math.floor(coherence);
            document.getElementById('progress').textContent = Math.min(progress, 100).toFixed(1) + '%';
        }

        // Start Odyssey
        createParticles();
        init();
        animate();
    </script>
</body>
</html>
