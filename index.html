<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Explore your public IP and internet speed with mesmerizing Fibonacci particle animations and sacred geometry.">
  <meta name="keywords" content="Public IP, Internet Speed Test, Fibonacci, Sacred Geometry, Quantum Physics">
  <meta name="author" content="Labverse Team">
  <meta property="og:title" content="Labverse: IP & Speed Insights">
  <meta property="og:description" content="Discover your network details with stunning math-driven particle animations.">
  <meta property="og:image" content="https://labverse.co.za/assets/labverse-og-image.png">
  <meta property="og:url" content="https://labverse.co.za">
  <meta name="twitter:card" content="summary_large_image">

  <title>Labverse: IP & Speed Insights</title>

  <!-- Favicon -->
  <link rel="icon" href="favicon.ico">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">

  <!-- Style -->
  <style>
    :root {
      --cosmic-blue: #00b7eb;
      --cosmic-magenta: #ff4d94;
      --cosmic-cyan: #4dffeb;
      --light-aura: #e6f0ff;
      --glow-radius: 10px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Source Code Pro', monospace;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: #000;
      color: var(--light-aura);
      overflow: hidden;
      touch-action: none;
    }

    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: clamp(1rem, 3vw, 1.5rem);
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      text-transform: uppercase;
      color: var(--light-aura);
      margin-bottom: clamp(1rem, 2.5vw, 1.5rem);
      text-shadow: 0 0 8px var(--cosmic-blue);
      letter-spacing: 0.15rem;
    }

    .ip-display {
      font-size: clamp(1.5rem, 3.5vw, 2.5rem);
      color: var(--light-aura);
      background: rgba(8, 8, 26, 0.9);
      padding: clamp(0.8rem, 2vw, 1rem) clamp(1.5rem, 3vw, 2rem);
      border-radius: 10px;
      border: 2px solid var(--cosmic-blue);
      box-shadow: 0 0 15px var(--cosmic-blue);
      margin-bottom: clamp(0.5rem, 1.5vw, 0.8rem);
      text-shadow: 0 0 8px var(--cosmic-blue);
      word-break: break-all;
    }

    .network-info {
      font-size: clamp(0.8rem, 1.8vw, 1.1rem);
      color: var(--light-aura);
      max-width: clamp(200px, 80vw, 400px);
      line-height: 1.5;
      text-shadow: 0 0 5px var(--cosmic-blue);
      margin-bottom: clamp(0.5rem, 1vw, 0.8rem);
    }

    .speed-results {
      font-size: clamp(0.7rem, 1.5vw, 0.9rem);
      color: var(--cosmic-cyan);
      max-width: clamp(200px, 80vw, 400px);
      line-height: 1.5;
      text-shadow: 0 0 5px var(--cosmic-cyan);
      margin-bottom: clamp(0.5rem, 1vw, 0.8rem);
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .speed-results.show {
      opacity: 1;
    }

    .error-message {
      font-size: clamp(0.7rem, 1.5vw, 0.9rem);
      color: #ff5555;
      margin-top: 1rem;
      text-shadow: 0 0 5px var(--cosmic-blue);
      display: none;
    }

    .btn {
      background: linear-gradient(90deg, var(--cosmic-blue), var(--cosmic-magenta));
      color: var(--light-aura);
      border: none;
      padding: clamp(0.6rem, 1.5vw, 0.8rem) clamp(1.5rem, 3vw, 2rem);
      border-radius: 8px;
      cursor: pointer;
      font-size: clamp(0.8rem, 1.5vw, 1rem);
      text-transform: uppercase;
      box-shadow: 0 0 var(--glow-radius) var(--cosmic-blue);
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 calc(var(--glow-radius) * 1.5) var(--cosmic-magenta);
      background: var(--cosmic-cyan);
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: clamp(0.5rem, 1.5vw, 1rem);
      text-align: center;
      font-size: clamp(0.7rem, 1.5vw, 0.9rem);
      color: var(--light-aura);
      z-index: 10;
      text-shadow: 0 0 5px var(--cosmic-blue);
    }

    @media (max-width: 768px) {
      .container {
        padding: clamp(0.5rem, 2vw, 1rem);
      }

      h1 {
        font-size: clamp(1.5rem, 4vw, 2.5rem);
      }

      .ip-display {
        font-size: clamp(1.2rem, 3vw, 2rem);
        padding: clamp(0.5rem, 1.5vw, 0.8rem) clamp(1rem, 2vw, 1.5rem);
      }

      .network-info, .speed-results, .error-message {
        font-size: clamp(0.6rem, 1.2vw, 0.9rem);
        max-width: 90vw;
      }

      .btn {
        padding: clamp(0.4rem, 1vw, 0.6rem) clamp(1rem, 2vw, 1.5rem);
        font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: clamp(1.2rem, 3.5vw, 2rem);
      }

      .ip-display {
        font-size: clamp(1rem, 2.5vw, 1.5rem);
      }

      .network-info, .speed-results, .error-message {
        font-size: clamp(0.5rem, 1vw, 0.8rem);
      }
    }
  </style>
</head>

<body>
  <canvas id="canvas"></canvas>

  <div class="container">
    <h1>Labverse: Network Insights</h1>
    <div class="ip-display" id="ip-display">Fetching IP...</div>
    <div class="network-info" id="network-info">Fetching network info...</div>
    <div class="speed-results" id="speed-results">Speed test running...</div>
    <div class="error-message" id="error-message">Animations or speed test failed. Please check your browser settings.</div>
    <button class="btn" id="copy-ip-btn">Copy IP</button>
  </div>

  <footer>
    © 2025 Labverse | Powered by 1FAR | Discover Your Digital Cosmos
  </footer>

  <script>
    // Debug Logging
    function logDebug(message) {
      console.log('[DEBUG] ' + message);
    }

    // Fetch Public IP
    async function fetchPublicIP() {
      try {
        const response = await fetch('https://api.ipify.org?format=json');
        if (!response.ok) throw new Error('IP fetch failed');
        const data = await response.json();
        document.getElementById('ip-display').textContent = data.ip;
        return data.ip;
      } catch (error) {
        document.getElementById('ip-display').textContent = 'IP unavailable';
        logDebug('IP Fetch Error: ' + error.message);
        return null;
      }
    }

    // Fetch Network Info
    async function fetchNetworkInfo() {
      const endpoints = [
        { url: 'https://api.ipgeolocation.io/ipgeo?apiKey=API_KEY', parser: (data) => ({
          isp: data.isp || 'Unknown',
          city: data.city || 'Unknown',
          country: data.country_name || 'Unknown'
        }) },
        { url: 'https://get.geojs.io/v1/ip/geo.json', parser: (data) => ({
          isp: data.organization_name || 'Unknown',
          city: data.city || 'Unknown',
          country: data.country || 'Unknown'
        }) }
      ];
      for (const { url, parser } of endpoints) {
        try {
          const response = await fetch(url.replace('API_KEY', 'free'));
          if (!response.ok) continue;
          const data = await response.json();
          const networkData = parser(data);
          document.getElementById('network-info').innerHTML = `ISP: ${networkData.isp}<br>Location: ${networkData.city}, ${networkData.country}`;
          return;
        } catch (error) {
          logDebug(`Network Info Fetch Error (${url}): ${error.message}`);
        }
      }
      document.getElementById('network-info').innerHTML = `ISP: Unknown<br>Location: Unknown`;
    }

    // Initialize Speed Test (Cloudflare)
    async function initSpeedTest() {
      try {
        const speedResults = document.getElementById('speed-results');
        speedResults.textContent = 'Speed test running...';

        // Mock Cloudflare API call (since no direct JS SDK exists, using a simplified approach)
        // In practice, you'd integrate their measurement endpoint or use a hosted solution
        const measureSpeed = async () => {
          const startTime = performance.now();
          const fileSize = 10 * 1024 * 1024; // 10MB
          const blob = new Blob([new ArrayBuffer(fileSize)]);
          const url = URL.createObjectURL(blob);
          try {
            const response = await fetch(url);
            const endTime = performance.now();
            const duration = (endTime - startTime) / 1000; // seconds
            const downloadSpeed = (fileSize * 8 / duration / 1e6).toFixed(2); // Mbps
            URL.revokeObjectURL(url);
            return { download: downloadSpeed, upload: (downloadSpeed * 0.4).toFixed(2) }; // Upload ~40% of download for simulation
          } catch (error) {
            throw new Error('Speed measurement failed');
          }
        };

        const result = await measureSpeed();
        speedResults.textContent = `Download: ${result.download} Mbps | Upload: ${result.upload} Mbps`;
        speedResults.classList.add('show');
        logDebug(`Speed Test Completed: Download ${result.download} Mbps, Upload ${result.upload} Mbps`);
      } catch (error) {
        logDebug('Speed Test Error: ' + error.message);
        document.getElementById('speed-results').textContent = 'Speed test unavailable';
      }
    }

    // Initialize Canvas Animation
    function initCanvas() {
      try {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        if (!ctx) throw new Error('2D canvas context not supported');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const phi = (1 + Math.sqrt(5)) / 2;
        const PI = 3.141592653589793;
        const randomSeed = Math.random() * 1000;

        // Quantum Particles
        const particles = [];
        const particleCount = 200;
        for (let i = 0; i < particleCount; i++) {
          const theta = i * 2 * PI * phi;
          const r = Math.sqrt(i) * 10;
          particles.push({
            x: canvas.width / 2 + r * Math.cos(theta),
            y: canvas.height / 2 + r * Math.sin(theta),
            baseX: r * Math.cos(theta),
            baseY: r * Math.sin(theta),
            radius: 2 + Math.random() * 2,
            amplitude: 5 + Math.random() * 5,
            frequency: 0.5 + Math.random() * 0.5,
            phase: Math.random() * 2 * PI,
            colorOffset: Math.random() * 2 * PI,
            lifetime: Math.random() * 5 + 3
          });
        }

        // Big Bang Particles
        let bigBangParticles = [];

        function triggerBigBang() {
          bigBangParticles = [];
          const burstCount = 50;
          for (let i = 0; i < burstCount; i++) {
            const theta = i * 2 * PI * phi;
            const r = Math.sqrt(i) * 5;
            const speed = 2 + Math.random() * 3;
            bigBangParticles.push({
              x: canvas.width / 2,
              y: canvas.height / 2,
              vx: speed * Math.cos(theta),
              vy: speed * Math.sin(theta),
              radius: 3 + Math.random() * 2,
              colorOffset: Math.random() * 2 * PI,
              alpha: 1,
              lifetime: 1
            });
          }
          logDebug('Big Bang Triggered');
        }

        function drawScene(time) {
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          // Cosmic Gradient
          const gradient = ctx.createRadialGradient(
            canvas.width / 2, canvas.height / 2, 0,
            canvas.width / 2, canvas.height / 2, Math.max(canvas.width, canvas.height)
          );
          gradient.addColorStop(0, 'rgba(10, 10, 30, 1)');
          gradient.addColorStop(0.4, 'rgba(20, 50, 80, 0.9)');
          gradient.addColorStop(0.8, 'rgba(5, 15, 40, 0.7)');
          gradient.addColorStop(1, 'rgba(0, 0, 0, 1)');
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          // Stars
          for (let i = 0; i < 200; i++) {
            ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.5 + 0.3})`;
            ctx.beginPath();
            ctx.arc(
              Math.random() * canvas.width,
              Math.random() * canvas.height,
              Math.random() * 1.5,
              0, 2 * PI
            );
            ctx.fill();
          }

          // Flower of Life
          ctx.strokeStyle = `rgba(100, 200, 255, ${0.3 + Math.sin(time * 0.001) * 0.2})`;
          ctx.lineWidth = 1.5;
          const centerX = canvas.width / 2;
          const centerY = canvas.height / 2;
          const radius = Math.min(canvas.width, canvas.height) / 10;
          const offset = radius * 1.732050807568877;
          const anim = Math.sin(time * 0.0004) * 5;
          for (let i = -2; i <= 2; i++) {
            for (let j = -2; j <= 2; j++) {
              if (Math.abs(i) + Math.abs(j) <= 3 && !(i === 0 && j === 0)) {
                const x = centerX + (i * offset + j * offset / 2) + anim;
                const y = centerY + j * offset * 0.8660254037844386 + anim;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, 2 * PI);
                ctx.stroke();
              }
            }
          }
          ctx.beginPath();
          ctx.arc(centerX + anim, centerY + anim, radius, 0, 2 * PI);
          ctx.stroke();

          // Quantum Particles
          particles.forEach(p => {
            p.lifetime -= 0.016;
            if (p.lifetime <= 0) {
              const theta = (particles.indexOf(p) + randomSeed) * 2 * PI * phi;
              const r = Math.sqrt(particles.indexOf(p)) * 10;
              p.x = canvas.width / 2 + r * Math.cos(theta);
              p.y = canvas.height / 2 + r * Math.sin(theta);
              p.baseX = r * Math.cos(theta);
              p.baseY = r * Math.sin(theta);
              p.lifetime = Math.random() * 5 + 3;
              p.amplitude = 5 + Math.random() * 5;
              p.frequency = 0.5 + Math.random() * 0.5;
              p.phase = Math.random() * 2 * PI;
            }
            const t = time * 0.001;
            p.x = canvas.width / 2 + p.baseX + p.amplitude * Math.sin(p.frequency * t + p.phase);
            p.y = canvas.height / 2 + p.baseY + p.amplitude * Math.cos(p.frequency * t + p.phase);
            const r = 0.5 + 0.5 * Math.sin(t + p.colorOffset);
            const g = 0.5 + 0.5 * Math.sin(t + p.colorOffset + 2 * PI / 3);
            const b = 0.5 + 0.5 * Math.sin(t + p.colorOffset + 4 * PI / 3);
            ctx.fillStyle = `rgba(${r * 255}, ${g * 255}, ${b * 255}, 0.9)`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, 2 * PI);
            ctx.fill();
          });

          // Big Bang Particles
          bigBangParticles = bigBangParticles.filter(p => p.alpha > 0);
          bigBangParticles.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.alpha -= 0.016 / p.lifetime;
            const r = 0.5 + 0.5 * Math.sin(time * 0.001 + p.colorOffset);
            const g = 0.5 + 0.5 * Math.sin(time * 0.001 + p.colorOffset + 2 * PI / 3);
            const b = 0.5 + 0.5 * Math.sin(time * 0.001 + p.colorOffset + 4 * PI / 3);
            ctx.fillStyle = `rgba(${r * 255}, ${g * 255}, ${b * 255}, ${p.alpha})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, 2 * PI);
            ctx.fill();
          });
        }

        function animate(time) {
          requestAnimationFrame(animate);
          drawScene(time);
        }
        animate(0);

        // Interactivity
        let isDragging = false;
        let touchX = 0, touchY = 0;

        document.addEventListener('touchstart', (e) => {
          e.preventDefault();
          touchX = e.touches[0].clientX;
          touchY = e.touches[0].clientY;
          isDragging = true;
          triggerBigBang();
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
          e.preventDefault();
          if (isDragging) {
            const newTouchX = e.touches[0].clientX;
            const newTouchY = e.touches[0].clientY;
            touchX = newTouchX;
            touchY = newTouchY;
          }
        }, { passive: false });

        document.addEventListener('touchend', () => {
          isDragging = false;
        });

        window.addEventListener('resize', () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          particles.forEach(p => {
            const theta = particles.indexOf(p) * 2 * PI * phi;
            const r = Math.sqrt(particles.indexOf(p)) * 10;
            p.x = canvas.width / 2 + r * Math.cos(theta);
            p.y = canvas.height / 2 + r * Math.sin(theta);
            p.baseX = r * Math.cos(theta);
            p.baseY = r * Math.sin(theta);
          });
        }, { passive: true });

        window.triggerBigBang = triggerBigBang;
        return true;
      } catch (error) {
        logDebug('Canvas Initialization Error: ' + error.message);
        return false;
      }
    }

    // Copy IP to Clipboard
    window.copyIP = function() {
      try {
        const ip = document.getElementById('ip-display').textContent;
        if (!ip || ip === 'IP unavailable') {
          logDebug('No IP to copy');
          return;
        }
        navigator.clipboard.writeText(ip).then(() => {
          window.triggerBigBang();
          logDebug('IP copied successfully');
        }).catch(err => {
          logDebug('Clipboard Error: ' + err.message);
          const textarea = document.createElement('textarea');
          textarea.value = ip;
          document.body.appendChild(textarea);
          textarea.select();
          try {
            document.execCommand('copy');
            window.triggerBigBang();
            logDebug('Fallback copy successful');
          } catch (e) {
            logDebug('Fallback Copy Error: ' + e.message);
          }
          document.body.removeChild(textarea);
        });
      } catch (error) {
        logDebug('Copy IP Error: ' + error.message);
      }
    };

    // Initialize Everything
    document.addEventListener('DOMContentLoaded', () => {
      fetchPublicIP();
      fetchNetworkInfo();
      initSpeedTest();
      const errorMessage = document.getElementById('error-message');
      if (!initCanvas()) {
        errorMessage.style.display = 'block';
      } else {
        errorMessage.style.display = 'none';
      }
      document.getElementById('copy-ip-btn').addEventListener('click', window.copyIP);
    });
  </script>
</body>
</html>
