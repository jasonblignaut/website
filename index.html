<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Labverse.co.za: Instantly see and hear your public IP address with a cosmic background of Golden Spirals and quantum particles.">
    <meta name="keywords" content="Public IP, Golden Spiral, Fibonacci, Quantum Particles, WebGL, IP Address">
    <meta name="author" content="Labverse">
    <meta property="og:title" content="Labverse.co.za">
    <meta property="og:description" content="Discover your public IP address instantly, with mesmerizing sacred geometry and particle animations.">
    <meta property="og:image" content="assets/labverse-og.webp">
    <meta property="og:url" content="https://labverse.co.za">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" href="assets/favicon.ico">
    <title>Labverse.co.za | Your Public IP Address</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;700&family=Space+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        :root {
            --matrix-blue: #00b7eb;
            --cosmic-magenta: #ff00cc;
            --void-black: #08081a;
            --light-aura: #e6f0ff;
            --glow-radius: 15px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Exo 2', sans-serif;
        }

        body {
            background: var(--void-black);
            color: var(--light-aura);
            overflow: hidden;
            position: relative;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(8, 8, 26, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1001;
        }

        .logo {
            font-family: 'Space Mono', monospace;
            font-size: 1.6rem;
            background: linear-gradient(90deg, var(--matrix-blue), var(--cosmic-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 8px var(--matrix-blue);
        }

        /* Main Content */
        .main {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 1.5rem;
            position: relative;
            z-index: 1;
        }

        .main h1 {
            font-family: 'Space Mono', monospace;
            font-size: clamp(2rem, 5vw, 4rem);
            background: linear-gradient(90deg, var(--matrix-blue), var(--cosmic-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            text-shadow: 0 0 12px var(--matrix-blue);
        }

        .ip-display {
            font-family: 'Space Mono', monospace;
            font-size: clamp(1.8rem, 4vw, 3rem);
            color: var(--light-aura);
            background: rgba(8, 8, 26, 0.9);
            padding: 1rem 2.5rem;
            border-radius: 12px;
            border: 2px solid var(--matrix-blue);
            box-shadow: 0 0 15px var(--matrix-blue);
            margin-bottom: 1rem;
            text-shadow: 0 0 8px var(--matrix-blue);
        }

        .copy-button {
            background: linear-gradient(90deg, var(--matrix-blue), var(--cosmic-magenta));
            color: var(--light-aura);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            text-transform: uppercase;
            box-shadow: 0 0 var(--glow-radius) var(--matrix-blue);
            transition: all 0.2s;
        }

        .copy-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 calc(var(--glow-radius) * 1.5) var(--matrix-blue);
        }

        /* Background Canvas */
        #background-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Footer */
        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(8, 8, 26, 0.95);
            padding: 1rem;
            text-align: center;
            z-index: 1001;
        }

        footer p {
            color: var(--light-aura);
            font-size: 0.9rem;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .main h1 {
                font-size: clamp(1.8rem, 4vw, 2.5rem);
            }

            .ip-display {
                font-size: clamp(1.5rem, 3vw, 2rem);
                padding: 0.8rem 1.5rem;
            }

            .copy-button {
                padding: 0.6rem 1.5rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="background-canvas"></canvas>
    <header>
        <div class="logo">Labverse.co.za</div>
    </header>
    <section class="main">
        <h1>Your Public IP Address</h1>
        <div class="ip-display" id="ip-display">Fetching IP...</div>
        <button class="copy-button" onclick="copyIP()">Copy IP</button>
    </section>
    <footer>
        <p>© 2025 Labverse.co.za | Powered by AI, Math & Cosmic Precision</p>
    </footer>

    <script>
        // Fetch Public IP
        async function fetchPublicIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                const ip = data.ip;
                document.getElementById('ip-display').textContent = ip;
                // Auto-narrate IP
                const utterance = new SpeechSynthesisUtterance(`Your public IP address is ${ip}`);
                speechSynthesis.speak(utterance);
            } catch (error) {
                document.getElementById('ip-display').textContent = 'Unable to fetch IP';
                console.error('IP Fetch Error:', error);
            }
        }
        fetchPublicIP();

        // Copy IP to Clipboard
        function copyIP() {
            const ip = document.getElementById('ip-display').textContent;
            navigator.clipboard.writeText(ip).then(() => {
                alert('IP copied to clipboard!');
            }).catch(err => {
                console.error('Copy Error:', err);
            });
        }

        // Background Animation
        function initBackground() {
            const canvas = document.getElementById('background-canvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            camera.position.z = 10;

            let spirals = [], particles = [], trails = [], mousePos = { x: 0, y: 0 };

            // Mouse Interaction (Minimal)
            document.addEventListener('mousemove', (e) => {
                mousePos.x = (e.clientX / window.innerWidth) * 2 - 1;
                mousePos.y = -(e.clientY / window.innerHeight) * 2 + 1;
            }, { passive: true });

            // Check if position is outside IP display area (400x200px centered)
            function isOutsideIPArea(x, y) {
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                const ipWidth = 400;
                const ipHeight = 200;
                return (Math.abs(x * window.innerWidth - centerX) > ipWidth / 2) || 
                       (Math.abs(y * window.innerHeight - centerY) > ipHeight / 2);
            }

            // Golden Spiral
            function createSpiral(offset, scale) {
                const phi = (1 + Math.sqrt(5)) / 2;
                const points = [];
                for (let i = 0; i < 20; i++) {
                    const theta = i * 0.2 + offset;
                    const r = Math.pow(phi, theta / Math.PI) * scale;
                    const x = r * Math.cos(theta);
                    const y = r * Math.sin(theta);
                    // Map to screen coordinates for area check
                    const screenX = (x / 10 + 0.5) * window.innerWidth;
                    const screenY = (-y / 10 + 0.5) * window.innerHeight;
                    if (isOutsideIPArea(screenX / window.innerWidth, screenY / window.innerHeight)) {
                        points.push(new THREE.Vector3(x, y, 0));
                    }
                }
                if (points.length < 2) return null; // Skip if too few valid points
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const material = new THREE.LineBasicMaterial({ color: 0xff00cc, transparent: true, opacity: 0.6 });
                const spiral = new THREE.Line(geometry, material);
                scene.add(spiral);
                return { obj: spiral, life: 10, offset, scale };
            }

            // Fibonacci Particles
            function createParticle(index, offset) {
                const fib = (n) => n <= 1 ? n : fib(n - 1) + fib(n - 2);
                const r = fib(index) * 0.08;
                const x = r * Math.cos(index + offset);
                const y = r * Math.sin(index + offset);
                // Map to screen coordinates for area check
                const screenX = (x / 10 + 0.5) * window.innerWidth;
                const screenY = (-y / 10 + 0.5) * window.innerHeight;
                if (!isOutsideIPArea(screenX / window.innerWidth, screenY / window.innerHeight)) return null;
                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.Float32BufferAttribute([x, y, Math.random() * 0.05], 3));
                const material = new THREE.PointsMaterial({ color: 0x00b7eb, size: 0.06, transparent: true, opacity: 0.7 });
                const particle = new THREE.Points(geometry, material);
                scene.add(particle);
                return { obj: particle, life: 10, index, offset };
            }

            // Connecting Trails
            function createTrail(from, to, color) {
                // Check if trail endpoints are outside IP area
                const screenX1 = (from.x / 10 + 0.5) * window.innerWidth;
                const screenY1 = (-from.y / 10 + 0.5) * window.innerHeight;
                const screenX2 = (to.x / 10 + 0.5) * window.innerWidth;
                const screenY2 = (-to.y / 10 + 0.5) * window.innerHeight;
                if (!isOutsideIPArea(screenX1 / window.innerWidth, screenY1 / window.innerHeight) ||
                    !isOutsideIPArea(screenX2 / window.innerWidth, screenY2 / window.innerHeight)) return null;
                const points = [from, to];
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const material = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.4 });
                const trail = new THREE.Line(geometry, material);
                scene.add(trail);
                return { obj: trail, life: 10 };
            }

            // Initialize Animations
            function initAnimations() {
                const spiral = createSpiral(Math.random() * 2 * Math.PI, 0.08 + Math.random() * 0.04);
                if (spiral) spirals.push(spiral);
                for (let i = 0; i < 10; i++) {
                    const particle = createParticle(i % 5, Math.random() * 2 * Math.PI);
                    if (particle) particles.push(particle);
                }
            }
            initAnimations();

            function updateAnimations() {
                // Update Spirals
                spirals = spirals.filter(s => {
                    if (s.life <= 0) { scene.remove(s.obj); return false; }
                    s.life -= 1 / 60;
                    s.obj.material.opacity = s.life / 10;
                    s.obj.rotation.z += 0.005 * (Math.random() - 0.5);
                    s.obj.position.x = mousePos.x * 0.1;
                    s.obj.position.y = mousePos.y * 0.1;
                    return true;
                });

                // Update Particles
                particles = particles.filter(p => {
                    if (p.life <= 0) { scene.remove(p.obj); return false; }
                    p.life -= 1 / 60;
                    p.obj.material.opacity = p.life / 10;
                    let newX = p.obj.position.x + (Math.random() - 0.5) * 0.01 + mousePos.x * 0.005;
                    let newY = p.obj.position.y + (Math.random() - 0.5) * 0.01 + mousePos.y * 0.005;
                    // Ensure new position is outside IP area
                    const screenX = (newX / 10 + 0.5) * window.innerWidth;
                    const screenY = (-newY / 10 + 0.5) * window.innerHeight;
                    if (isOutsideIPArea(screenX / window.innerWidth, screenY / window.innerHeight)) {
                        p.obj.position.x = newX;
                        p.obj.position.y = newY;
                    }
                    return true;
                });

                // Update Trails
                trails = trails.filter(t => {
                    if (t.life <= 0) { scene.remove(t.obj); return false; }
                    t.life -= 1 / 60;
                    t.obj.material.opacity = t.life / 10;
                    return true;
                });

                // Create New Elements (Throttled)
                if (spirals.length < 3 && Math.random() < 0.03) {
                    const spiral = createSpiral(Math.random() * 2 * Math.PI, 0.08 + Math.random() * 0.04);
                    if (spiral) spirals.push(spiral);
                }
                if (particles.length < 10 && Math.random() < 0.05) {
                    const particle = createParticle(Math.floor(Math.random() * 5), Math.random() * 2 * Math.PI);
                    if (particle) particles.push(particle);
                }

                // Connect Particles and Spirals
                if (trails.length < 50) {
                    particles.forEach(p => {
                        const pos = p.obj.position;
                        // Connect to nearby particles
                        particles.forEach(p2 => {
                            if (p !== p2) {
                                const pos2 = p2.obj.position;
                                const dist = pos.distanceTo(pos2);
                                if (dist < 0.5 && Math.random() < 0.01) {
                                    const trail = createTrail(pos, pos2, 0x00b7eb);
                                    if (trail) trails.push(trail);
                                }
                            }
                        });
                        // Connect to spiral points
                        spirals.forEach(s => {
                            const points = s.obj.geometry.attributes.position.array;
                            for (let i = 0; i < points.length; i += 3) {
                                const spiralPos = new THREE.Vector3(points[i], points[i + 1], points[i + 2]);
                                const dist = pos.distanceTo(spiralPos);
                                if (dist < 0.5 && Math.random() < 0.005) {
                                    const trail = createTrail(pos, spiralPos, 0xff00cc);
                                    if (trail) trails.push(trail);
                                }
                            }
                        });
                    });
                }
            }

            function animate() {
                requestAnimationFrame(animate);
                updateAnimations();
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }, { passive: true });
        }
        initBackground();
    </script>
</body>
</html>
